      - id: "T-04"
        title: "Fix-up Task Display and Activity Feed Events"
        task_context: |
          Add visual distinction for fix-up tasks and update ActivityFeed.tsx for new events.

          Fix-up task display in step task list (RunDetail.tsx or step detail component):
          - Condition: task.spawned_by_gap_report === true
          - Apply dashed border (Tailwind: border-dashed)
