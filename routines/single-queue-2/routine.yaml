id: "single-queue-2"
name: "Single-Queue Signal Model (v2)"
description: |
  Replace the dual-path signal routing with a single, uniform queue through which all
  lifecycle signals pass unconditionally. Eliminates has_active_workflow branching,
  introduces a consumer loop, adds STOPPING state, and enforces registry isolation.
  Phases: schema → consumer → sender rewiring → registry isolation → guards → validation.
  v2: migration assumes clean server stop (no backfill); rename processed_at → handled_at.

steps:
  - id: "S-01"
    title: "Schema and State Machine"
    step_context: |
      Lay the data foundation without changing runtime behavior. Restructure pending_signals,
      add STOPPING to RunStatus, and define RUN_START signal type.
    tasks:
      - id: "T-01"
        title: "Alembic migration for pending_signals and STOPPING status"
        context_from:
          - artifact: "docs/single-queue-2/plan.md"
            as: "plan"
            required: true
          - artifact: "docs/single-queue-2/plan-summary.md"
            as: "summary"
            required: true
          - artifact: "docs/single-queue-2/architecture.md"
            as: "arch"
            required: false
          - artifact: "docs/single-queue-2/step-01-plan.md"
            as: "step_plan"
            required: false
        task_context: |
          Implement Phase 1 of the single-queue signal model: schema changes and state machine additions.

          PLAN SUMMARY:
          {{context.summary}}

          DETAILED PLAN:
          {{context.plan}}

          Tasks to complete:
          1. Create Alembic migration at src/orchestrator/db/migrations/versions/ (NOT alembic/versions/)
             that:
             (a) replaces UUID string PK with INTEGER PRIMARY KEY AUTOINCREMENT,
             (b) renames existing processed_at column to handled_at (repurpose, do not add new column),
             (c) adds delivered_at TIMESTAMP NULL as a new column,
             (d) retains created_at for audit only — must NOT appear in any ORDER BY clause.
             NOTE: Migration assumes clean server stop with no pending signals; no backfill needed.

          2. Update PendingSignal ORM model in src/orchestrator/db/models.py:
             - id: Integer primary key (autoincrement)
             - delivered_at: Optional[datetime] = None (new column)
             - handled_at: Optional[datetime] = None (renamed from processed_at)
             - Drain queries order by integer PK (id), not created_at

          3. Add STOPPING = "stopping" to RunStatus enum in src/orchestrator/config/enums.py.

          4. Add state machine guards in src/orchestrator/workflow/engine.py:
             - ACTIVE → STOPPING is a valid transition
             - STOPPING → PAUSED and STOPPING → FAILED are valid transitions
             - start_task() and submit_for_verification() reject STOPPING runs (same error as PAUSED)
             - All other transitions from STOPPING are invalid

          5. Add API guards in src/orchestrator/api/routers/runs.py:
             - Return 409 for resume/restart/pause/cancel on STOPPING runs
             - STOPPING is exposed in the REST API (not hidden/remapped)

          6. Add RUN_START to WorkflowSignal enum in src/orchestrator/workflow/signals/signals.py.
             No handler wiring yet — type definition and serialization only.

          7. Write tests/unit/test_stopping_state.py covering:
             - All valid transitions from STOPPING (→PAUSED, →FAILED)
             - All invalid transitions from STOPPING (resume, restart, duplicate pause/cancel)
             - API returns 409 for invalid operations on STOPPING runs

          8. Run all existing tests and confirm they pass with no regressions.

          CAVEATS:
          - Migration directory is src/orchestrator/db/migrations/versions/ NOT alembic/versions/
          - Use batch_alter_table() for SQLite schema changes (not hard-coded constraint names)
          - processed_at is RENAMED to handled_at (not deleted and re-added as new column)
          - RunStatus enum is in src/orchestrator/config/enums.py (NOT src/orchestrator/db/models.py)
        requirements:
          - id: "R1"
            desc: "Alembic migration exists in src/orchestrator/db/migrations/versions/ and applies cleanly"
            priority: critical
          - id: "R2"
            desc: "PendingSignal ORM model has integer id PK, delivered_at (new), handled_at (renamed from processed_at); drain queries order by integer PK"
            priority: critical
          - id: "R3"
            desc: "RunStatus.STOPPING enum value exists with enforced transitions: ACTIVE→STOPPING valid; STOPPING→PAUSED/FAILED valid; all others rejected"
            priority: critical
          - id: "R4"
            desc: "API returns 409 for resume/restart/pause/cancel on STOPPING runs; STOPPING exposed in REST API"
            priority: critical
          - id: "R5"
            desc: "WorkflowSignal.RUN_START enum value exists and serializes correctly"
            priority: critical
          - id: "R6"
            desc: "All existing tests pass with no regressions after schema changes"
            priority: critical
        auto_verify:
          items:
            - id: "migration_exists"
              cmd: "uv run python -c \"import os; files = os.listdir('src/orchestrator/db/migrations/versions/'); matches = [f for f in files if 'single_queue' in f or 'signal' in f or 'stopping' in f or 'pending' in f]; assert matches, 'No signal/stopping migration found in versions/: ' + str(files)\""
              must: true
            - id: "migration_has_correct_columns"
              cmd: "uv run python -c \"import os; content = open([f'src/orchestrator/db/migrations/versions/{f}' for f in os.listdir('src/orchestrator/db/migrations/versions/') if any(k in f for k in ['signal', 'stopping', 'pending', 'single_queue', 'queue'])][0]).read(); assert 'delivered_at' in content, 'delivered_at missing from migration'; assert 'handled_at' in content or 'processed_at' in content, 'handled_at/processed_at rename missing'\""
              must: false
            - id: "stopping_enum"
              cmd: "uv run python -c \"from src.orchestrator.config.enums import RunStatus; assert RunStatus.STOPPING.value == 'stopping', f'STOPPING not found, values: {[s.value for s in RunStatus]}'\""
              must: true
            - id: "run_start_signal"
              cmd: "uv run python -c \"from src.orchestrator.workflow.signals.signals import WorkflowSignal; assert WorkflowSignal.RUN_START.value == 'run_start', f'RUN_START not found, values: {[s.value for s in WorkflowSignal]}'\""
              must: true
            - id: "pending_signal_model"
              cmd: "uv run python -c \"from src.orchestrator.db.models import PendingSignal; cols = {c.name for c in PendingSignal.__table__.c}; assert 'delivered_at' in cols, f'delivered_at missing, cols: {cols}'; assert 'handled_at' in cols, f'handled_at missing, cols: {cols}'; assert 'processed_at' not in cols, f'processed_at still present (should be renamed to handled_at)'\""
              must: true
            - id: "ordering_by_pk"
              cmd: "uv run python -c \"import ast, sys; src = open('src/orchestrator/workflow/signals/signals.py').read(); assert 'created_at' not in src or 'order_by' not in src or 'ORDER BY created_at' not in src, 'created_at still used for ordering in signals.py'\""
              must: false
            - id: "stopping_state_tests"
              cmd: "uv run pytest tests/unit/test_stopping_state.py -v"
              must: true
            - id: "all_unit_tests"
              cmd: "uv run pytest tests/unit/ -q --tb=short"
              must: true
        verifier:
          rubric:
            - id: "R1"
              text: |
                R1 — Read the migration file in src/orchestrator/db/migrations/versions/.
                A: migration exists, uses batch_alter_table(), renames processed_at to handled_at, adds delivered_at,
                replaces UUID PK with integer autoincrement. No backfill logic needed (clean server stop assumption).
                B: migration exists but wrong directory, uses hardcoded constraint names, or misses a column change.
                F: no migration file found.
            - id: "R2"
              text: |
                R2 — Read PendingSignal ORM model definition and drain query code.
                A: id is Integer primary key, delivered_at is nullable datetime (new), handled_at is nullable datetime
                (renamed), processed_at is GONE, drain queries ORDER BY id (integer PK) not created_at.
                B: fields exist but drain queries still use created_at, or processed_at still present alongside handled_at.
                F: model unchanged or core fields missing.
            - id: "R3"
              text: |
                R3 — Read RunStatus enum and engine.py transition guards.
                A: STOPPING exists in enum; engine.py has guards for ACTIVE→STOPPING (valid), STOPPING→PAUSED/FAILED
                (valid), all other STOPPING transitions rejected; start_task() and submit_for_verification()
                reject STOPPING runs.
                B: enum exists but transition guards incomplete (missing some directions).
                F: STOPPING not in enum or no guards.
            - id: "R4"
              text: |
                R4 — Read routers/runs.py for STOPPING state rejection logic.
                A: resume, restart, pause, cancel endpoints all return 409 when run is STOPPING;
                STOPPING appears in RunStatus type returned by API (not remapped).
                B: some endpoints missing the guard.
                F: no API guards added.
            - id: "R5"
              text: |
                R5 — Read signals.py WorkflowSignal enum.
                A: RUN_START is defined with value "run_start"; can be created and serialized without error.
                F: RUN_START not present.
            - id: "R6"
              text: |
                R6 — Review test results.
                A: all pre-existing tests pass (unit + integration); test_stopping_state.py covers
                valid/invalid STOPPING transitions.
                B: new tests pass but 1-2 pre-existing tests fail.
                F: significant test regressions.
          submission_template:
            grade_scale: [A, B, C, D, F]
            require_reason_if_below: A
            require_remediation_if_below: B
        retry:
          max_attempts: 3

  - id: "S-02"
    title: "Consumer Loop"
    step_context: |
      Build the consumer as new code. It reads from the queue but senders don't use it yet.
      Consumer is the sole owner of RunWorkflow lifecycle and active-run registry.
    tasks:
      - id: "T-01"
        title: "Implement signal consumer module with handlers and startup redelivery"
        context_from:
          - artifact: "docs/single-queue-2/plan.md"
            as: "plan"
            required: true
          - artifact: "docs/single-queue-2/plan-summary.md"
            as: "summary"
            required: true
          - artifact: "docs/single-queue-2/architecture.md"
            as: "arch"
            required: false
          - artifact: "docs/single-queue-2/step-02-plan.md"
            as: "step_plan"
            required: false
        task_context: |
          Implement Phase 2 of the single-queue signal model: the consumer loop.

          PLAN SUMMARY:
          {{context.summary}}

          DETAILED PLAN:
          {{context.plan}}

          Tasks to complete:
          1. Create src/orchestrator/workflow/signals/consumer.py with:
             - Core loop: poll pending_signals ordered by integer PK (id), every 100ms
             - Concurrent across run_ids (one asyncio.Task per run_id)
             - Serial FIFO processing per run_id (inline, one signal at a time)
             - Set delivered_at before handler invocation, handled_at after success
             - Leave handled_at null on error (signal eligible for redelivery)

          2. Implement all signal handlers:
             - RUN_START: DRAFT→ACTIVE, create RunWorkflow, call register_active_run()
             - RESUME: PAUSED→ACTIVE, create RunWorkflow, call register_active_run()
             - PAUSE (with active RunWorkflow): ACTIVE→STOPPING, deliver to RunWorkflow,
               on ack: STOPPING→PAUSED, call unregister_active_run()
             - PAUSE (no active RunWorkflow): apply PAUSED directly
             - CANCEL (with active RunWorkflow): ACTIVE→STOPPING, deliver to RunWorkflow,
               on ack: STOPPING→FAILED, call unregister_active_run()
             - CANCEL (no active RunWorkflow): apply FAILED directly
             - ACTIVITY_COMPLETED / ACTIVITY_VERIFIED: deliver to RunWorkflow (passthrough)

          3. Startup redelivery:
             - On startup query: WHERE delivered_at IS NOT NULL AND handled_at IS NULL
             - Filter for runs with no active RunWorkflow (inactive runs only)
             - Re-dispatch these signals through normal handler path

          4. Write tests/unit/test_signal_consumer.py:
             - FIFO ordering per run_id test
             - delivered_at set before handler, handled_at set after success
             - Error path leaves handled_at null
             - Each signal type with active and inactive RunWorkflow paths

          5. Write tests/unit/test_signal_redelivery.py:
             - Simulates crash (signal has delivered_at set, handled_at null)
             - Consumer startup triggers redelivery for inactive runs
             - Signal is processed successfully on second delivery

          6. Run all tests and confirm pass.

          IMPORTANT: Consumer module is new code only. Do NOT wire it into executor or app.py yet
          (that happens in Phase 3). Registry functions (register_active_run, unregister_active_run,
          has_active_workflow) are used inside the consumer but must NOT be called from service.py or routes.
        requirements:
          - id: "R1"
            desc: "consumer.py exists with poll loop ordered by integer PK, 100ms interval, concurrent across runs via asyncio.Task per run_id, serial per run_id"
            priority: critical
          - id: "R2"
            desc: "All signal handlers implemented: RUN_START, RESUME, PAUSE (active/inactive), CANCEL (active/inactive), ACTIVITY_COMPLETED, ACTIVITY_VERIFIED"
            priority: critical
          - id: "R3"
            desc: "delivered_at set before handler invocation; handled_at set on success; null on error (eligible for redelivery)"
            priority: critical
          - id: "R4"
            desc: "Startup redelivery: signals with delivered_at set but handled_at null re-dispatched for inactive runs"
            priority: critical
          - id: "R5"
            desc: "Unit tests cover FIFO ordering, delivery tracking, all signal handlers (both paths), and crash redelivery"
            priority: critical
          - id: "R6"
            desc: "All existing tests continue to pass (consumer is new code; no behavioral changes to existing paths)"
            priority: expected
        auto_verify:
          items:
            - id: "consumer_importable"
              cmd: "uv run python -c \"from src.orchestrator.workflow.signals.consumer import SignalConsumer; print('SignalConsumer imported OK')\""
              must: true
            - id: "consumer_has_poll_loop"
              cmd: "uv run python -c \"import inspect; from src.orchestrator.workflow.signals.consumer import SignalConsumer; src = inspect.getsource(SignalConsumer); assert 'asyncio' in src or 'async' in src, 'No async code in consumer'; assert 'pending_signals' in src or 'poll' in src.lower() or 'delivered_at' in src, 'No poll logic found'\""
              must: true
            - id: "run_start_handler"
              cmd: "uv run python -c \"import inspect; from src.orchestrator.workflow.signals.consumer import SignalConsumer; src = inspect.getsource(SignalConsumer); assert 'RUN_START' in src or 'run_start' in src, 'RUN_START handler missing'\""
              must: true
            - id: "delivery_tracking"
              cmd: "uv run python -c \"import inspect; from src.orchestrator.workflow.signals.consumer import SignalConsumer; src = inspect.getsource(SignalConsumer); assert 'delivered_at' in src, 'delivered_at not set in consumer'; assert 'handled_at' in src, 'handled_at not set in consumer'\""
              must: true
            - id: "redelivery_logic"
              cmd: "uv run python -c \"import inspect; from src.orchestrator.workflow.signals.consumer import SignalConsumer; src = inspect.getsource(SignalConsumer); assert 'delivered_at' in src and 'handled_at' in src, 'Redelivery query missing'\""
              must: true
            - id: "consumer_tests"
              cmd: "uv run pytest tests/unit/test_signal_consumer.py -v"
              must: true
            - id: "redelivery_tests"
              cmd: "uv run pytest tests/unit/test_signal_redelivery.py -v"
              must: true
            - id: "no_registry_in_service"
              cmd: "uv run python -c \"src = open('src/orchestrator/workflow/service.py').read(); bad = [l for l in src.splitlines() if 'has_active_workflow' in l and not l.strip().startswith('#')]; assert not bad, 'has_active_workflow found in service.py: ' + str(bad)\""
              must: true
        verifier:
          rubric:
            - id: "R1"
              text: |
                R1 — Read consumer.py.
                A: poll loop exists, signals fetched ordered by integer PK, 100ms poll interval,
                concurrent across runs via asyncio.Task per run_id, serial per run_id (FIFO).
                B: loop exists but ordering wrong (still created_at), or concurrency model incorrect.
                F: consumer.py missing or has no poll loop.
            - id: "R2"
              text: |
                R2 — Read consumer.py handler functions.
                A: all signal types handled; RUN_START/RESUME create RunWorkflow and call register_active_run;
                PAUSE/CANCEL handle both active (STOPPING path) and inactive (direct transition) paths;
                ACTIVITY_* deliver to RunWorkflow.
                B: handlers exist but one path (active or inactive) is missing for PAUSE or CANCEL.
                F: handlers missing or dispatch not implemented.
            - id: "R3"
              text: |
                R3 — Read delivery tracking logic in consumer.py.
                A: delivered_at is set in DB before calling handler; handled_at set after handler returns
                successfully; error path leaves handled_at null (eligible for redelivery).
                B: tracking exists but order wrong (e.g., handled_at set before handler completes).
                F: delivery tracking not implemented.
            - id: "R4"
              text: |
                R4 — Read startup redelivery logic in consumer.py.
                A: on startup, queries signals WHERE delivered_at IS NOT NULL AND handled_at IS NULL
                for runs with no active RunWorkflow, and re-dispatches through normal handlers.
                B: redelivery exists but does not check if run is active (risks double-delivery).
                F: no startup redelivery logic.
            - id: "R5"
              text: |
                R5 — Review test files.
                A: test_signal_consumer.py tests FIFO ordering, delivery tracking (delivered_at/handled_at),
                each signal type for both active and inactive RunWorkflow paths;
                test_signal_redelivery.py simulates crash (delivered_at set, handled_at null) and
                verifies redelivery on consumer restart.
                B: tests exist but coverage is shallow (happy path only, missing error paths).
                F: test files missing or empty.
            - id: "R6"
              text: |
                R6 — Review test results.
                A: all pre-existing tests pass; no regressions from new consumer module.
                F: pre-existing test failures introduced.
          submission_template:
            grade_scale: [A, B, C, D, F]
            require_reason_if_below: A
            require_remediation_if_below: B
        retry:
          max_attempts: 3

  - id: "S-03"
    title: "Sender Rewiring"
    step_context: |
      Switch all WorkflowService lifecycle methods to unconditional signal enqueueing.
      Remove has_active_workflow branching. Wire consumer into executor startup.
      API endpoints change from 200 to 202 Accepted (breaking change).
    tasks:
      - id: "T-01"
        title: "Rewire WorkflowService and wire consumer into executor"
        context_from:
          - artifact: "docs/single-queue-2/plan.md"
            as: "plan"
            required: true
          - artifact: "docs/single-queue-2/plan-summary.md"
            as: "summary"
            required: true
          - artifact: "docs/single-queue-2/step-03-plan.md"
            as: "step_plan"
            required: false
        task_context: |
          Implement Phase 3 of the single-queue signal model: sender rewiring.

          PLAN SUMMARY:
          {{context.summary}}

          DETAILED PLAN:
          {{context.plan}}

          Tasks to complete:
          1. Rewire start_run() in service.py:
             - Remove engine.start_run(run_id) direct call
             - Enqueue RUN_START signal via SignalQueue(DbSignalTransport(session)).enqueue(run_id, WorkflowSignal.RUN_START, payload=None)
             - Move env_lifecycle.on_run_start() hook into consumer's _handle_run_start() handler
             - Do NOT directly transition DRAFT→ACTIVE in service.py

          2. Rewire pause_run(), resume_run(), cancel_run() in service.py:
             - Remove has_active_workflow() check and direct-DB branch from each
             - Enqueue PAUSE / RESUME / CANCEL signals unconditionally
             - Remove unregister_active_run() call from RunWorkflow.handle_pause()
             - Move env_lifecycle hooks from cancel_run() into consumer _handle_cancel()

          3. Rewire retry_fan_out_child() in service.py:
             - Remove has_active_workflow() check
             - Enqueue PAUSE signal for active runs; consumer handles the transition

          4. Wire consumer into startup (executor.py or app.py):
             - Start consumer loop at startup before any signals can be enqueued
             - Consumer replaces current direct-spawn paths

          5. Update API endpoints to return 202 Accepted instead of 200:
             - /api/runs/{id}/start → 202
             - /api/runs/{id}/pause → 202
             - /api/runs/{id}/resume → 202
             - /api/runs/{id}/cancel → 202

          6. Update integration tests that assumed synchronous start; tests must wait for
             consumer to process signal and transition run state before asserting.

          7. Run full test suite and confirm all tests pass.

          CAVEATS:
          - Enqueue API: SignalQueue(DbSignalTransport(session)).enqueue(run_id, signal_type, payload)
          - Preserve all env_lifecycle hooks — move to consumer handlers, do NOT delete them
          - Consumer must start before any service methods are called (startup order matters)
          - No direct executor.spawn_run() or engine.start_run() calls should remain in service.py
        requirements:
          - id: "R1"
            desc: "start_run(), pause_run(), resume_run(), cancel_run() all enqueue signals unconditionally with no has_active_workflow branch or direct DB mutation for lifecycle transitions"
            priority: critical
          - id: "R2"
            desc: "retry_fan_out_child() enqueues PAUSE signal for active runs; no has_active_workflow check"
            priority: critical
          - id: "R3"
            desc: "Consumer wired into executor or app.py startup, starts before any signals can be enqueued"
            priority: critical
          - id: "R4"
            desc: "unregister_active_run() removed from RunWorkflow.handle_pause(); env_lifecycle hooks preserved in consumer handlers"
            priority: critical
          - id: "R5"
            desc: "No has_active_workflow() calls remain in service.py or routers/; grep confirms zero matches (wiring check)"
            priority: critical
          - id: "R6"
            desc: "start/pause/resume/cancel API endpoints return 202 Accepted (breaking change from 200)"
            priority: critical
          - id: "R7"
            desc: "All existing tests pass after sender rewiring; integration tests updated for async signal processing"
            priority: critical
        auto_verify:
          items:
            - id: "no_has_active_in_service"
              cmd: "! grep -n 'has_active_workflow' src/orchestrator/workflow/service.py"
              must: true
            - id: "no_has_active_in_routers"
              cmd: "! grep -rn 'has_active_workflow' src/orchestrator/api/routers/"
              must: true
            - id: "no_engine_start_in_service"
              cmd: "! grep -n 'engine\\.start_run\\|spawn_run' src/orchestrator/workflow/service.py"
              must: true
            - id: "no_unregister_in_run_workflow"
              cmd: "! grep -n 'unregister_active_run' src/orchestrator/workflow/run_workflow.py"
              must: true
            - id: "run_start_enqueued_in_service"
              cmd: "grep -q 'RUN_START' src/orchestrator/workflow/service.py"
              must: true
            - id: "202_response_for_start"
              cmd: "grep -q '202\\|status_code=202\\|HTTP_202' src/orchestrator/api/routers/runs.py"
              must: true
            - id: "consumer_started_in_app"
              cmd: "grep -rq 'SignalConsumer\\|consumer' src/orchestrator/executor.py src/orchestrator/app.py"
              must: true
            - id: "integration_tests"
              cmd: "uv run pytest tests/integration/test_api_full_lifecycle.py -v"
              must: true
        verifier:
          rubric:
            - id: "R1"
              text: |
                R1 — Read service.py start_run(), pause_run(), resume_run(), cancel_run().
                A: ALL four methods enqueue signals via SignalQueue; NO has_active_workflow check in any of them;
                NO direct DB state mutation for lifecycle transitions.
                B: most methods rewired but one still has direct-DB path or has_active_workflow.
                F: methods unchanged; old branching logic present.
            - id: "R2"
              text: |
                R2 — Read retry_fan_out_child() in service.py.
                A: no has_active_workflow() call; enqueues PAUSE signal for active runs.
                B: fan-out rewired but uses alternate method to check active status.
                F: has_active_workflow() still present.
            - id: "R3"
              text: |
                R3 — Read executor.py or app.py startup code.
                A: consumer loop started explicitly at startup, before any service calls can arrive;
                direct spawn_run paths replaced by consumer.
                B: consumer started but after first request could arrive, or spawn_run also still present.
                F: consumer not wired into startup.
            - id: "R4"
              text: |
                R4 — Read run_workflow.py handle_pause() and consumer.py cancel handler.
                A: unregister_active_run() NOT in run_workflow.handle_pause(); env_lifecycle hooks
                (on_run_start, cancel hooks) are present in consumer handlers.
                B: unregister removed from handle_pause but env_lifecycle hooks missing from consumer.
                F: unregister_active_run() still called from run_workflow.py.
            - id: "R5"
              text: |
                R5 — Run: grep -rn 'has_active_workflow' src/orchestrator/workflow/service.py src/orchestrator/api/
                A: zero results — all routing is via signal queue.
                F: one or more matches found — wiring incomplete.
            - id: "R6"
              text: |
                R6 — Read routers/runs.py start/pause/resume/cancel endpoint definitions.
                A: all four endpoints return status_code=202 (Accepted); Response/JSONResponse uses 202.
                B: some but not all endpoints return 202.
                F: endpoints still return 200.
            - id: "R7"
              text: |
                R7 — Review test results.
                A: all tests pass; integration tests confirm lifecycle signals go through queue;
                tests wait for async processing rather than asserting synchronously after API call.
                B: most pass but 1-2 integration tests fail due to timing assumptions.
                F: significant test failures.
          submission_template:
            grade_scale: [A, B, C, D, F]
            require_reason_if_below: A
            require_remediation_if_below: B
        retry:
          max_attempts: 3

  - id: "S-04"
    title: "Registry Isolation"
    step_context: |
      Restrict register_active_run / unregister_active_run / has_active_workflow
      to the consumer module only. Remove from public API surface.
    tasks:
      - id: "T-01"
        title: "Move registry functions to consumer-only scope"
        context_from:
          - artifact: "docs/single-queue-2/plan.md"
            as: "plan"
            required: true
          - artifact: "docs/single-queue-2/step-04-plan.md"
            as: "step_plan"
            required: false
        task_context: |
          Implement Phase 4 of the single-queue signal model: registry isolation.

          DETAILED PLAN:
          {{context.plan}}

          Tasks to complete:
          1. Audit current usage:
             grep -rn 'has_active_workflow\|register_active_run\|unregister_active_run' src/

          2. Remove registry function exports from signals.py public surface:
             - Remove from src/orchestrator/workflow/signals/__init__.py __all__
             - Remove from src/orchestrator/workflow/__init__.py __all__ (if present)

          3. Restrict function definitions:
             - Registry functions must NOT be importable from signals.py by external code
             - Move them into consumer.py or prefix with _ to prevent re-export
             - consumer.py still accesses them (from its own module or via private import)

          4. Remove all non-consumer imports:
             - Delete imports from any files outside consumer.py and its test file

          5. Verify isolation:
             - Confirm: python -c "from src.orchestrator.workflow.signals.signals import register_active_run" fails
             - Confirm: consumer.py still works correctly

          6. Run all tests and confirm pass.

          IMPORTANT: has_active_workflow() must still work inside consumer.py for startup redelivery.
          The isolation is about external callers only — consumer can still use registry functions internally.
        requirements:
          - id: "R1"
            desc: "registry functions (register_active_run, unregister_active_run, has_active_workflow) not importable from signals.py public API"
            priority: critical
          - id: "R2"
            desc: "No imports of registry functions outside consumer.py and consumer test files"
            priority: critical
          - id: "R3"
            desc: "__init__.py files in signals/ and workflow/ do not re-export registry functions"
            priority: expected
          - id: "R4"
            desc: "All tests pass after registry isolation; consumer.py still uses registry functions internally"
            priority: critical
        auto_verify:
          items:
            - id: "registry_not_importable"
              cmd: "uv run python -c \"try:\n    from src.orchestrator.workflow.signals.signals import register_active_run\n    raise AssertionError('register_active_run is still publicly importable from signals.py')\nexcept ImportError:\n    pass\""
              must: true
            - id: "registry_not_in_init"
              cmd: "! grep -n 'register_active_run\\|unregister_active_run\\|has_active_workflow' src/orchestrator/workflow/signals/__init__.py"
              must: true
            - id: "no_registry_outside_consumer"
              cmd: "uv run python -c \"import subprocess; r = subprocess.run(['grep', '-rn', '--include=*.py', 'register_active_run', 'src/orchestrator/'], capture_output=True, text=True); bad = [l for l in r.stdout.splitlines() if 'consumer.py' not in l]; assert not bad, 'register_active_run used outside consumer: ' + str(bad)\""
              must: true
            - id: "consumer_still_works"
              cmd: "uv run python -c \"from src.orchestrator.workflow.signals.consumer import SignalConsumer; print('consumer OK')\""
              must: true
            - id: "unit_tests"
              cmd: "uv run pytest tests/unit/ -q --tb=short"
              must: true
        verifier:
          rubric:
            - id: "R1"
              text: |
                R1 — Attempt: python -c "from src.orchestrator.workflow.signals.signals import register_active_run"
                A: import raises ImportError — function not on public surface.
                F: import succeeds — function still publicly exported.
            - id: "R2"
              text: |
                R2 — Run: grep -rn 'register_active_run|unregister_active_run|has_active_workflow' src/orchestrator/ --include='*.py' | grep -v consumer.py | grep -v test_signal
                A: zero results — no usage outside consumer and its tests.
                B: only 1-2 residual references in comments or dead code.
                F: active usage outside consumer module.
            - id: "R3"
              text: |
                R3 — Read src/orchestrator/workflow/signals/__init__.py and src/orchestrator/workflow/__init__.py.
                A: neither file exports register_active_run, unregister_active_run, or has_active_workflow.
                B: one file still re-exports one of them.
                F: both files still export registry functions.
            - id: "R4"
              text: |
                R4 — Review test results.
                A: all tests pass; consumer.py imports and uses registry functions internally without error.
                F: test failures from broken imports or registry isolation breaking consumer functionality.
          submission_template:
            grade_scale: [A, B, C, D, F]
            require_reason_if_below: A
            require_remediation_if_below: B
        retry:
          max_attempts: 2

  - id: "S-05"
    title: "Guards and Documentation"
    step_context: |
      Lock in new invariants with a pre-commit AST guard script and AGENTS.md rules.
    tasks:
      - id: "T-01"
        title: "Pre-commit guard script and AGENTS.md signal-queue rules"
        context_from:
          - artifact: "docs/single-queue-2/plan.md"
            as: "plan"
            required: true
          - artifact: "docs/single-queue-2/step-05-plan.md"
            as: "step_plan"
            required: false
        task_context: |
          Implement Phase 5 of the single-queue signal model: guards and documentation.

          DETAILED PLAN:
          {{context.plan}}

          Tasks to complete:
          1. Create scripts/check_signal_routing.py:
             - Use Python ast module to parse all .py files in src/
             - Fail if has_active_workflow, register_active_run, or unregister_active_run
               are imported or called outside allowed files (consumer.py, test_signal_consumer.py,
               test_signal_redelivery.py)
             - Support "# noqa: signal-routing" suppression for edge cases
             - Follow the same structure as existing scripts/check_module_imports.py
             - Script exits 0 on clean codebase, non-zero on violation with descriptive output

          2. Add script to pre-commit hooks:
             - Find existing hook config (.pre-commit-config.yaml)
             - Add entry for scripts/check_signal_routing.py

          3. Add to AGENTS.md a section "Signal Queue and Runner Isolation" with these four rules:
             Rule 1: No registry function calls (register_active_run, unregister_active_run,
                     has_active_workflow) outside consumer.py
             Rule 2: No process-local shared state that crosses the API/executor boundary
             Rule 3: No app.state access from RunWorkflow or AgentRunnerExecutor; use constructor injection
             Rule 4: All lifecycle transitions (start, pause, resume, cancel) go through the signal queue;
                     no direct DB mutations in WorkflowService for lifecycle state changes

          4. Validate script:
             - Run on clean codebase (must pass / exit 0)
             - Introduce a test violation, confirm it exits non-zero

          5. Run all tests.
        requirements:
          - id: "R1"
            desc: "scripts/check_signal_routing.py exists, uses ast module, exits non-zero on disallowed registry function imports/calls outside consumer"
            priority: critical
          - id: "R2"
            desc: "Script integrated into .pre-commit-config.yaml hook configuration"
            priority: critical
          - id: "R3"
            desc: "AGENTS.md contains 'Signal Queue and Runner Isolation' section with all four rules explicitly stated"
            priority: critical
          - id: "R4"
            desc: "Script exits 0 on current clean codebase (no false positives)"
            priority: critical
          - id: "R5"
            desc: "No app.state access in RunWorkflow or AgentRunnerExecutor (dependencies injected via constructor)"
            priority: expected
        auto_verify:
          items:
            - id: "guard_script_exists"
              cmd: "test -f scripts/check_signal_routing.py"
              must: true
            - id: "guard_uses_ast"
              cmd: "grep -q 'import ast' scripts/check_signal_routing.py"
              must: true
            - id: "guard_checks_all_three"
              cmd: "uv run python -c \"src = open('scripts/check_signal_routing.py').read(); assert 'has_active_workflow' in src, 'has_active_workflow not checked'; assert 'register_active_run' in src, 'register_active_run not checked'; assert 'unregister_active_run' in src, 'unregister_active_run not checked'\""
              must: true
            - id: "guard_passes_clean"
              cmd: "uv run python scripts/check_signal_routing.py"
              must: true
            - id: "agents_md_section"
              cmd: "grep -q 'Signal Queue and Runner Isolation' AGENTS.md"
              must: true
            - id: "agents_md_rule1"
              cmd: "grep -q 'register_active_run\\|unregister_active_run\\|has_active_workflow' AGENTS.md"
              must: true
            - id: "precommit_hook"
              cmd: "grep -q 'check_signal_routing' .pre-commit-config.yaml"
              must: true
        verifier:
          rubric:
            - id: "R1"
              text: |
                R1 — Read scripts/check_signal_routing.py.
                A: uses ast module to walk Python files; checks all three function names
                (has_active_workflow, register_active_run, unregister_active_run); fails on
                imports/calls outside allowed files; supports noqa suppression; exit codes correct.
                B: script exists but uses grep instead of AST, or misses one function name.
                F: script missing or always exits 0.
            - id: "R2"
              text: |
                R2 — Read .pre-commit-config.yaml.
                A: check_signal_routing.py registered as a hook that runs on Python file changes.
                B: script registered but not triggered on Python file changes.
                F: not in pre-commit config.
            - id: "R3"
              text: |
                R3 — Read AGENTS.md.
                A: section "Signal Queue and Runner Isolation" exists with all four rules:
                (1) no registry outside consumer, (2) no process-local state crossing API/executor,
                (3) no app.state from RunWorkflow/executor, (4) all lifecycle via signal queue.
                B: section exists but one or two rules missing or vaguely stated.
                F: section absent.
            - id: "R4"
              text: |
                R4 — Run: uv run python scripts/check_signal_routing.py
                A: exits 0 on current codebase.
                F: exits non-zero (false positives on clean code).
            - id: "R5"
              text: |
                R5 — Read run_workflow.py and executor.py for app.state access.
                A: no app.state usage; all dependencies injected via constructor.
                B: one minor reference but not load-bearing.
                F: app.state used for core functionality.
          submission_template:
            grade_scale: [A, B, C, D, F]
            require_reason_if_below: A
            require_remediation_if_below: B
        retry:
          max_attempts: 2

  - id: "S-06"
    title: "Validation and Cleanup"
    step_context: |
      Final verification: full test suite pass, dead code removal, traceability audit.
      All intent items must be satisfied. Frontend updated for STOPPING state and 202 responses.
    tasks:
      - id: "T-01"
        title: "Full test suite, dead code removal, and traceability audit"
        context_from:
          - artifact: "docs/single-queue-2/intent.md"
            as: "intent"
            required: true
          - artifact: "docs/single-queue-2/plan-summary.md"
            as: "summary"
            required: true
          - artifact: "docs/single-queue-2/step-06-plan.md"
            as: "step_plan"
            required: false
        task_context: |
          Implement Phase 6 of the single-queue signal model: validation and cleanup.

          INTENT:
          {{context.intent}}

          PLAN SUMMARY:
          {{context.summary}}

          Tasks to complete:
          1. Run full backend test suite: uv run pytest tests/unit/ tests/integration/ -q
             Expect 330+ unit, 235+ integration tests to pass.

          2. Run frontend checks:
             - cd ui && npx tsc --noEmit
             - cd ui && npx eslint src/ --ext .ts,.tsx
             - Ensure STOPPING added to frontend RunStatus type
             - Ensure frontend handles 202 responses from start/pause/resume/cancel

          3. Remove dead code:
             - Old has_active_workflow branching logic now unused in service.py
             - No-op handle_resume log message from RunWorkflow (if present)
             - Unused imports from the rewiring

          4. Write or update tests/integration/test_signal_queue.py with:
             - Concurrent runs: two runs process signals independently
             - Full lifecycle: create run → start (202) → RUN_START consumed → ACTIVE → complete
             - Pause/resume cycle via queue (STOPPING path for active run)
             - Cancel via queue (STOPPING path)

          5. Confirm RUN_START and RESUME are functional (not no-ops).

          6. Traceability: verify every [I-XX] from intent.md maps to implemented code.

          7. Confirm all Definition of Complete criteria from intent.md are met.
        requirements:
          - id: "R1"
            desc: "All backend tests pass (330+ unit, 235+ integration); no regressions"
            priority: critical
          - id: "R2"
            desc: "Frontend TypeScript type check clean; ESLint clean; STOPPING added to frontend RunStatus type; 202 responses handled"
            priority: critical
          - id: "R3"
            desc: "No dead code: old has_active_workflow branching removed, unused imports cleaned, no-op handle_resume removed"
            priority: expected
          - id: "R4"
            desc: "Integration test confirms full lifecycle via queue: RUN_START consumed by consumer, run transitions DRAFT→ACTIVE"
            priority: critical
          - id: "R5"
            desc: "Integration test confirms STOPPING state path: pause active run, run enters STOPPING, then PAUSED"
            priority: critical
          - id: "R6"
            desc: "All 36 intent items [I-01]–[I-36] satisfied; [I-18], [I-19], [I-20] confirmed out of scope (NO-REQ)"
            priority: expected
        auto_verify:
          items:
            - id: "unit_tests"
              cmd: "uv run pytest tests/unit/ -q --tb=short"
              must: true
            - id: "integration_tests"
              cmd: "uv run pytest tests/integration/ -q --tb=short"
              must: true
            - id: "no_has_active_anywhere"
              cmd: "! grep -rn 'has_active_workflow' src/orchestrator/workflow/service.py src/orchestrator/api/"
              must: true
            - id: "stopping_in_frontend"
              cmd: "grep -rq 'STOPPING\\|stopping' ui/src/types/"
              must: true
            - id: "signal_queue_integration_test"
              cmd: "uv run pytest tests/integration/test_signal_queue.py -v"
              must: true
            - id: "frontend_typecheck"
              cmd: "cd ui && npx tsc --noEmit"
              must: true
            - id: "202_responses_in_api"
              cmd: "grep -c '202' src/orchestrator/api/routers/runs.py"
              must: false
            - id: "run_start_functional"
              cmd: "uv run python -c \"from src.orchestrator.workflow.signals.signals import WorkflowSignal; assert WorkflowSignal.RUN_START.value == 'run_start'; from src.orchestrator.workflow.signals.consumer import SignalConsumer; import inspect; src = inspect.getsource(SignalConsumer); assert 'RUN_START' in src, 'RUN_START handler missing from consumer'\""
              must: true
        verifier:
          rubric:
            - id: "R1"
              text: |
                R1 — Review test results.
                A: 330+ unit tests pass, 235+ integration tests pass, zero regressions.
                B: most tests pass but a handful fail (unrelated to new code).
                F: systemic failures or new code breaks existing tests.
            - id: "R2"
              text: |
                R2 — Run: cd ui && npx tsc --noEmit
                A: zero TypeScript errors; STOPPING added to frontend RunStatus type and shown in UI
                (e.g., "Stopping..." indicator); frontend handles 202 responses without errors.
                B: type check passes but STOPPING has no UI representation or 202 causes console errors.
                F: TypeScript errors.
            - id: "R3"
              text: |
                R3 — Read service.py and run_workflow.py for dead code.
                A: no has_active_workflow branch remaining; no-op handle_resume removed; unused imports cleaned.
                B: minor dead code remains (unreachable else, commented-out code).
                F: significant dead code blocks present.
            - id: "R4"
              text: |
                R4 — Read test_signal_queue.py full lifecycle test.
                A: test creates a run, calls start API (expects 202), waits for consumer to process
                RUN_START signal, confirms run transitions DRAFT→ACTIVE, and completes full cycle.
                Test would FAIL if old direct-spawn code path were still active.
                B: test exists but could pass via old code path (not a true wiring verification).
                F: test missing or too shallow.
            - id: "R5"
              text: |
                R5 — Read STOPPING state integration test.
                A: test pauses an active run, confirms run enters STOPPING state transiently,
                then transitions to PAUSED after consumer processes the PAUSE signal.
                B: STOPPING state tested but not via the queue path.
                F: no test for STOPPING path via queue.
            - id: "R6"
              text: |
                R6 — Cross-reference intent.md [I-XX] items with implemented code.
                A: all [I-01]–[I-36] items satisfied; [I-18], [I-19], [I-20], [I-23] correctly NO-REQ.
                B: 1-2 intent items not clearly addressed.
                F: multiple intent items unimplemented.
          submission_template:
            grade_scale: [A, B, C, D, F]
            require_reason_if_below: A
            require_remediation_if_below: B
        retry:
          max_attempts: 3
