repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']

  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: uv run pyright
        language: system
        types: [python]
        pass_filenames: false
      - id: pytest
        name: pytest
        entry: uv run pytest -x --timeout=30
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: ui-lint
        name: ui-lint
        entry: bash -c 'test -d ui/node_modules && npm --prefix ui run lint || echo "Skipping ui-lint (node_modules not installed)"'
        language: system
        pass_filenames: false
      - id: ui-typecheck
        name: ui-typecheck
        entry: bash -c 'test -d ui/node_modules && npm --prefix ui run typecheck || echo "Skipping ui-typecheck (node_modules not installed)"'
        language: system
        pass_filenames: false
