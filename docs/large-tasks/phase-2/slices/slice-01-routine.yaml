routine:
  id: phase2-oversight-slice-01
  name: Phase 2 Oversight slice-01
  description: Deterministic smoke slice for the external oversight loop.
  steps:
  - id: S-01
    title: Execute slice-01
    step_context: This is a bounded oversight-loop smoke slice. It must only produce
      evidence for the current slice.
    tasks:
    - id: T-01
      title: Write slice-01 evidence
      script: 'mkdir -p docs/phase2-oversight-smoke && printf ''%s\n'' ''slice-01:
        A real orchestrator script-task run writes slice-01 evidence in its worktree.''
        ''assumption: The external coordinator can create and execute a first bounded
        slice.'' > docs/phase2-oversight-smoke/slice-01-evidence.txt'
      requirements:
      - id: R1
        desc: The external coordinator can create and execute a first bounded slice.
      - id: R2
        desc: A real orchestrator script-task run writes slice-01 evidence in its
          worktree.
