- name: verifier_planned_to_ready
  given_events:
    - node_created: {node_id: verify-1, kind: verifier, state: planned}
    - input_bound: {to_node_id: verify-1, candidate_id: candidate-1}
    - node_state_changed: {node_id: verify-1, new_state: ready, trigger: candidate_file_state_bound}
  when_command: null
  then_events: []
  then_projection: {verify-1: ready}

- name: verifier_ready_to_leased
  given_events:
    - run_lifecycle_changed: {to_state: active}
    - node_created: {node_id: verify-2, kind: verifier, state: ready}
  when_command: {schedule_tick: {run_id: run-1, base_snapshot_id: S0}}
  then_events:
    - lease_granted: {node_id: verify-2}
    - node_state_changed: {node_id: verify-2, new_state: leased}
  then_projection: {verify-2: leased}

- name: verifier_leased_to_running
  given_events:
    - node_created: {node_id: verify-3, kind: verifier, state: leased}
    - callback_accepted: {node_id: verify-3, callback_type: verifier_started}
    - node_state_changed: {node_id: verify-3, new_state: running, trigger: verifier_starts}
  when_command: null
  then_events: []
  then_projection: {verify-3: running}

- name: verifier_running_to_completed_pass
  given_events:
    - node_created: {node_id: verify-4, kind: verifier, state: running}
    - verification_passed: {node_id: verify-4, candidate_id: candidate-1}
    - node_state_changed: {node_id: verify-4, new_state: completed, trigger: valid_verification_result}
  when_command: null
  then_events: []
  then_projection: {verify-4: completed}

- name: verifier_running_to_completed_failure
  given_events:
    - node_created: {node_id: verify-5, kind: verifier, state: running}
    - verification_failed: {node_id: verify-5, candidate_id: candidate-1, valid_result: true}
    - node_state_changed: {node_id: verify-5, new_state: completed, trigger: valid_verification_result}
  when_command: null
  then_events: []
  then_projection: {verify-5: completed}

- name: verifier_running_to_failed
  given_events:
    - node_created: {node_id: verify-6, kind: verifier, state: running}
    - callback_accepted: {node_id: verify-6, callback_type: verifier_runtime_error}
    - node_state_changed: {node_id: verify-6, new_state: failed, trigger: verifier_runtime_error}
  when_command: null
  then_events: []
  then_projection: {verify-6: failed}
