id: "codex-server"
name: "Codex Server Agent Integration"
description: |
  Implement local and remote Codex app server agent support with explicit
  contract enforcement, callback parity, lifecycle integration, and release
  hardening. Release is blocked until both codex_server and codex_server_remote
  are production-ready.
inputs: []
steps:
  - id: "S-01"
    title: "Research + Integration Contract"
    step_context: |
      Lock Codex integration decisions as enforceable contract artifacts and align
      planning docs to that contract before implementation.
    tasks:
      - id: "T-01"
        title: "Build contract matrix from clarified decisions"
        task_context: |
          Create docs/codex-server/context/contract-matrix.md and capture baseline
          interface, auth, callback channels, tool allow-list, compatibility
          policy, release gate, and out-of-scope v1 items. Trace each decision to
          docs/codex-server/clarifications.md and include non-go conditions.
        requirements:
          - id: "R1"
            desc: "Contract matrix exists with traceable decisions for interface/auth/callback/tools/compatibility/release"
            priority: critical
          - id: "R2"
            desc: "Out-of-scope v1 section excludes non-callback experimental tools"
            priority: critical
        auto_verify:
          items:
            - id: "contract_matrix_exists"
              cmd: "test -f docs/codex-server/context/contract-matrix.md"
              must: true
      - id: "T-02"
        title: "Align plan and architecture docs to contract"
        task_context: |
          Update docs/codex-server/plan.md and docs/codex-server/architecture.md to
          reference context/contract-matrix.md as the contract source of truth,
          add explicit contract constraints, and define mismatch handling.
        requirements:
          - id: "R1"
            desc: "plan.md and architecture.md reference contract-matrix as normative source"
            priority: critical
          - id: "R2"
            desc: "No contradictory statements remain on auth/callback/tool scope/compatibility/release"
            priority: critical
        auto_verify:
          items:
            - id: "contract_refs_in_docs"
              cmd: "rg -n 'contract-matrix' docs/codex-server/plan.md docs/codex-server/architecture.md"
              must: true
      - id: "T-03"
        title: "Record open implementation risks"
        task_context: |
          Create docs/codex-server/context/open-risks.md with actionable risk
          entries including trigger, affected step plans, mitigation, and whether
          each risk is blocking.
        requirements:
          - id: "R1"
            desc: "open-risks.md exists with actionable entries linked to step-02 through step-06 plans"
            priority: critical
          - id: "R2"
            desc: "Risk list includes payload drift, remote timeout behavior, and callback parity"
            priority: expected
        auto_verify:
          items:
            - id: "open_risks_exists"
              cmd: "test -f docs/codex-server/context/open-risks.md"
              must: true

  - id: "S-02"
    title: "Types and Detector Support"
    step_context: |
      Add codex_server and codex_server_remote as first-class agent types and
      expose selectable detector metadata without breaking existing API surfaces.
    tasks:
      - id: "T-01"
        title: "Add enum and schema compatibility"
        task_context: |
          Extend src/orchestrator/config/enums.py and
          src/orchestrator/api/schemas/runs.py with CODEX_SERVER and
          CODEX_SERVER_REMOTE, and add integration coverage for create/read/update
          run round-trip serialization of both values.
        requirements:
          - id: "R1"
            desc: "Run schemas and enums accept codex_server and codex_server_remote"
            priority: critical
          - id: "R2"
            desc: "Integration tests verify persisted run round-trip for both new types"
            priority: critical
        auto_verify:
          items:
            - id: "pyright_enums_runs"
              cmd: "uv run pyright src/orchestrator/config/enums.py src/orchestrator/api/schemas/runs.py"
              must: true
      - id: "T-02"
        title: "Extend ToolDetector options and config fields"
        task_context: |
          Update src/orchestrator/agents/detector.py so detector output includes
          local and remote Codex options with required config-field metadata,
          availability messaging, and policy alignment to latest documented Codex
          app server.
        requirements:
          - id: "R1"
            desc: "Detector returns codex_server and codex_server_remote options with required config metadata"
            priority: critical
          - id: "R2"
            desc: "Unavailable states provide actionable install/connection hints"
            priority: expected
        auto_verify:
          items:
            - id: "detector_unit_tests"
              cmd: "uv run pytest tests/unit -k detector -v"
              must: true
      - id: "T-03"
        title: "Verify API exposure of detector options"
        task_context: |
          Ensure GET /api/agents returns both Codex variants with stable response
          shape and explicit unavailable-state hints. Add integration tests for
          API exposure and negative cases.
        requirements:
          - id: "R1"
            desc: "/api/agents includes codex_server and codex_server_remote entries"
            priority: critical
          - id: "R2"
            desc: "Unavailable responses are explicit and actionable"
            priority: expected
        auto_verify:
          items:
            - id: "api_agents_tests"
              cmd: "uv run pytest tests/integration -k api_agents -v"
              must: true

  - id: "S-03"
    title: "Base Codex Server Agent Implementation"
    step_context: |
      Implement managed local Codex server execution with callback-tool
      allow-list enforcement, normalized outputs, and explicit cancellation/error
      behavior.
    tasks:
      - id: "T-01"
        title: "Scaffold local agent and shared common module"
        task_context: |
          Add src/orchestrator/agents/codex_server.py and
          src/orchestrator/agents/codex_server_common.py with protocol-compliant
          skeletons and shared helper interfaces for prompt assembly, tool
          registration, and output normalization.
        requirements:
          - id: "R1"
            desc: "New Codex local modules compile and satisfy agent protocol surface"
            priority: critical
        auto_verify:
          items:
            - id: "pyright_local_scaffold"
              cmd: "uv run pyright src/orchestrator/agents/codex_server.py src/orchestrator/agents/codex_server_common.py"
              must: true
      - id: "T-02"
        title: "Implement execute path and callback-tool bridging"
        task_context: |
          Implement phase-aware prompt assembly, callback transport handling
          (REST/MCP), allow only update_checklist/grade/submit/request_clarification
          tools, and normalize output/events for existing persistence/UI consumers.
        requirements:
          - id: "R1"
            desc: "Execute path supports builder/verifier flows with allow-listed callback tools only"
            priority: critical
          - id: "R2"
            desc: "Disallowed tool invocations are rejected and covered by tests"
            priority: critical
        auto_verify:
          items:
            - id: "codex_callbacks_tests"
              cmd: "uv run pytest tests/unit -k 'codex_server and callbacks' -v"
              must: true
      - id: "T-03"
        title: "Implement cancellation and explicit error mapping"
        task_context: |
          Add idempotent cancel behavior and map startup/callback/parser failures
          to explicit orchestrator agent errors without leaking secrets.
        requirements:
          - id: "R1"
            desc: "Cancellation terminates sessions cleanly with idempotent behavior"
            priority: critical
          - id: "R2"
            desc: "Failure paths map to explicit orchestrator error types"
            priority: critical
        auto_verify:
          items:
            - id: "codex_local_tests"
              cmd: "uv run pytest tests/unit -k codex_server -v"
              must: true

  - id: "S-04"
    title: "Remote Codex Server Variant"
    step_context: |
      Implement codex_server_remote with bearer-authenticated transport,
      callback parity, deterministic token resolution, and resilient error
      handling.
    tasks:
      - id: "T-01"
        title: "Create remote agent module and configuration adapter"
        task_context: |
          Add src/orchestrator/agents/codex_server_remote.py, parse and validate
          remote settings (base_url, model/session, callback transport, retry,
          timeout), and enforce token precedence: api_key -> token_env_var
          (default CODEX_SERVER_API_KEY) -> OPENAI_API_KEY.
        requirements:
          - id: "R1"
            desc: "Remote agent construction validates config and deterministic token resolution"
            priority: critical
          - id: "R2"
            desc: "Invalid or unresolved token config fails with explicit error"
            priority: critical
        auto_verify:
          items:
            - id: "codex_remote_config_tests"
              cmd: "uv run pytest tests/unit -k 'codex_server_remote and config' -v"
              must: true
      - id: "T-02"
        title: "Implement authenticated remote execution and callback parity"
        task_context: |
          Implement remote execute flow with Authorization bearer token, enforce
          identical callback-tool allow-list as local variant, and prove builder
          and verifier parity for both REST and MCP callback channels.
        requirements:
          - id: "R1"
            desc: "Remote execution uses bearer auth and keeps token-safe telemetry"
            priority: critical
          - id: "R2"
            desc: "2x2 parity matrix passes (builder/verifier x REST/MCP)"
            priority: critical
        auto_verify:
          items:
            - id: "codex_remote_auth_tests"
              cmd: "uv run pytest tests/unit -k 'codex_server_remote and auth' -v"
              must: true
            - id: "codex_remote_parity_matrix"
              cmd: "uv run pytest tests/integration -k 'codex_server_remote and (builder or verifier) and (rest or mcp)' -v"
              must: true
      - id: "T-03"
        title: "Add network resilience and transport error mapping"
        task_context: |
          Add bounded retry/timeout behavior and explicit mapping for 401/403,
          timeout, unreachable endpoint, and schema mismatch failures to
          orchestrator error types with redacted diagnostics.
        requirements:
          - id: "R1"
            desc: "Remote transport failures map to explicit timeout/execution errors"
            priority: critical
          - id: "R2"
            desc: "401/403 handling is explicit and token-safe"
            priority: expected
        auto_verify:
          items:
            - id: "codex_remote_tests"
              cmd: "uv run pytest tests/unit -k codex_server_remote -v"
              must: true

  - id: "S-05"
    title: "Executor and Monitor Integration"
    step_context: |
      Wire both Codex variants into lifecycle control paths: create, start,
      pause/resume, cancel, recover, and dead-agent monitoring.
    tasks:
      - id: "T-01"
        title: "Add executor dispatch for both Codex variants"
        task_context: |
          Update src/orchestrator/agents/executor.py so _create_agent can build
          codex_server and codex_server_remote agents while preserving existing
          creation behavior for other agent types.
        requirements:
          - id: "R1"
            desc: "Executor dispatch can instantiate local and remote Codex agents"
            priority: critical
        auto_verify:
          items:
            - id: "executor_codex_unit_tests"
              cmd: "uv run pytest tests/unit -k 'executor and codex' -v"
              must: true
      - id: "T-02"
        title: "Integrate spawn/cancel/resume/recover lifecycle flows"
        task_context: |
          Extend lifecycle flow handling for both Codex variants and enforce
          deterministic recovery rule: resume healthy persisted session; fail stale
          session and start new attempt with explicit reason.
        requirements:
          - id: "R1"
            desc: "Lifecycle transitions behave correctly for codex_server and codex_server_remote"
            priority: critical
          - id: "R2"
            desc: "Recovery avoids duplicate attempts and handles healthy vs stale sessions deterministically"
            priority: critical
        auto_verify:
          items:
            - id: "codex_lifecycle_tests"
              cmd: "uv run pytest tests/integration -k 'codex and lifecycle' -v"
              must: true
      - id: "T-03"
        title: "Extend monitor dead-agent handling for Codex sessions"
        task_context: |
          Update src/orchestrator/agents/monitor.py to include Codex local/remote
          session health checks and dead-agent handling without lock leaks.
        requirements:
          - id: "R1"
            desc: "Monitor dead-agent logic covers both Codex variants"
            priority: critical
          - id: "R2"
            desc: "No orphaned locks or ghost-running attempts after monitor intervention"
            priority: expected
        auto_verify:
          items:
            - id: "monitor_codex_tests"
              cmd: "uv run pytest tests/unit -k 'monitor and codex' -v"
              must: true

  - id: "S-06"
    title: "Tests, Documentation, and Release Hardening"
    step_context: |
      Close the release gate with complete coverage, quality checks, and
      documentation updates that reflect final implementation details.
    tasks:
      - id: "T-01"
        title: "Complete Codex-focused automated coverage"
        task_context: |
          Add and run explicit required test targets covering detector metadata,
          local/remote agents, error mapping, executor dispatch, API exposure, and
          callback parity across both variants.
        requirements:
          - id: "R1"
            desc: "Codex-specific unit and integration coverage is complete with explicit target lists"
            priority: critical
          - id: "R2"
            desc: "Allow-listed tool enforcement and callback parity are covered by tests"
            priority: critical
        auto_verify:
          items:
            - id: "codex_unit_target_list"
              cmd: "uv run pytest tests/unit/test_tool_detector.py tests/unit/test_agent_types.py tests/unit/test_agent_monitor.py tests/unit/test_codex_server_agent.py tests/unit/test_codex_server_remote_agent.py -v"
              must: true
            - id: "codex_integration_target_list"
              cmd: "uv run pytest tests/integration/test_api_agents.py tests/integration/test_api_runs.py tests/integration/test_agent_executor.py tests/integration/test_api_runs_recover.py tests/integration/test_codex_server_callbacks.py -v"
              must: true
      - id: "T-02"
        title: "Run quality gates and record evidence"
        task_context: |
          Run static checks and pre-commit, then record command list, pass/fail
          outcomes, date, and blockers (if any) in
          docs/codex-server/context/release-readiness.md.
        requirements:
          - id: "R1"
            desc: "release-readiness.md captures reproducible verification evidence"
            priority: critical
          - id: "R2"
            desc: "Failures are explicitly documented as blockers when present"
            priority: expected
        auto_verify:
          items:
            - id: "ruff_check_all"
              cmd: "uv run ruff check ."
              must: true
            - id: "pyright_all"
              cmd: "uv run pyright"
              must: true
            - id: "precommit_all_files"
              cmd: "uv run pre-commit run --all-files"
              must: true
      - id: "T-03"
        title: "Update architecture docs and enforce dual-variant release gate"
        task_context: |
          Update AGENTS.md and docs/ARCHITECTURE.md to include codex_server,
          codex_server_remote, and codex_server_common modules plus agent-option
          route coverage, and explicitly block release until both variants are
          production-ready.
        requirements:
          - id: "R1"
            desc: "Project docs mirror new Codex modules and agent option exposure"
            priority: critical
          - id: "R2"
            desc: "Release gate language explicitly requires both variants to be production-ready"
            priority: critical
        auto_verify:
          items:
            - id: "docs_codex_refs"
              cmd: "rg -n 'codex_server|codex_server_remote|codex_server_common' AGENTS.md docs/ARCHITECTURE.md"
              must: true
