  - id: "S-05"
    title: "Phase 5: Absorb metrics/ + mcp/ → api/"
    step_context: |
      Consolidate cost metrics and MCP server into API module.

      HIDDEN DEPENDENCY: Phase 2 (repos→git) MUST be complete before this phase.
      mcp/tools.py imports from repos/ which Phase 2 moves to git/. If Phase 2 ran
      first, update the repos import in mcp/tools.py to git/ when moving to api/mcp/.

