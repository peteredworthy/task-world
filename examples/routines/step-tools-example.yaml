routine:
  id: step-tools-example
  name: Step Tools Example
  description: Demonstrates per-step tool availability and external MCP servers.

  steps:
    - id: build-with-browser
      title: Build with Browser Access
      step_context: >
        This step has access to browser tools and an external chrome MCP server
        for web testing capabilities.
      available_tools:
        - terminal
        - file_editor
        - browser
      mcp_servers:
        - name: chrome-mcp
          url: https://chrome-mcp.example.com
          timeout_seconds: 60
      tasks:
        - id: implement-feature
          title: Implement the Feature
          task_context: Write code to implement the requested feature with browser testing support.
          requirements:
            - id: r1
              desc: Feature code is written and functional
              must: true
              priority: critical
            - id: r2
              desc: Browser tests pass
              must: true
              priority: critical

    - id: verify-without-browser
      title: Verify Without Browser
      step_context: >
        This verification step uses only standard tools — no browser or MCP servers.
      tasks:
        - id: review-code
          title: Review Code Quality
          task_context: Review the implemented code for quality and adherence to standards.
          requirements:
            - id: r1
              desc: Code follows project conventions
              must: true
              priority: critical
            - id: r2
              desc: No security issues
              must: false
              priority: expected

    - id: integration-with-context7
      title: Integration with Context7
      step_context: >
        This step demonstrates running integration tests with external context7 MCP server.
      available_tools:
        - terminal
      mcp_servers:
        - name: context7
          command: context7-mcp
          args:
            - --verbose
      tasks:
        - id: run-integration
          title: Run Integration Tests
          task_context: Execute integration tests using the context7 MCP server.
          requirements:
            - id: r1
              desc: All integration tests pass
              must: true
              priority: critical
