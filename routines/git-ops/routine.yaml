id: "git-ops"
name: "Run Review, Prune & Merge Workbench"
description: |
  Implement the pre-merge review workbench on the run detail page. Delivers
  diff viewing, selective pruning, test execution, back merge with conflict
  resolution, agent-assisted fixes, merge readiness gating, branch history,
  and task file attribution across 12 incremental steps.

inputs:
  - name: "feature"
    required: true
    description: "Feature name used for directory structure (docs/{feature}/ and routines/{feature}/)"

steps:
  # ── Step 1: Backend diff endpoints + branch status enhancements ──
  - id: "S-01"
    title: "Backend diff endpoints + branch status enhancements"
    step_context: |
      Provide the backend API foundation for the Review & Merge workbench.
      Create diff generation, file listing, commit history endpoints, and
      enhance branch status with predicted conflict count and merge readiness.

      Reference: docs/git-ops/step-01-plan.md, docs/git-ops/steps/step-01.md
    tasks:
      - id: "T-01"
        title: "Create Review Domain Models"
        task_context: |
          Create Pydantic domain models for the review subsystem in
          src/orchestrator/review/models.py:
          - DiffResult (raw_diff, file_path, scope)
          - ModifiedFile (path, status, additions, deletions)
          - CommitInfo (sha, short_sha, message, author, timestamp)

          Create src/orchestrator/review/__init__.py as well.
          Follow existing model patterns in src/orchestrator/models/.
        requirements:
          - id: "R1"
            desc: "Create review domain models with DiffResult, ModifiedFile, CommitInfo"
            priority: critical
        auto_verify:
          items:
            - id: "models_exist"
              cmd: "test -f src/orchestrator/review/models.py"
              must: true

      - id: "T-02"
        title: "Create diff_ops.py Git Operations"
        task_context: |
          Implement async diff generation functions in src/orchestrator/git/diff_ops.py:
          - get_branch_diff(worktree_path, base_sha, head_sha) -> str
          - get_commit_diff(worktree_path, commit_sha) -> str
          - get_task_diff(worktree_path, start_sha, end_sha) -> str
          - get_modified_files(worktree_path, base_sha, head_sha) -> list[ModifiedFile]
          - get_commit_log(worktree_path, base_sha, head_sha) -> list[CommitInfo]

          Use asyncio.to_thread() wrapping git subprocess calls. Follow the
          existing async patterns in the codebase.
        requirements:
          - id: "R1"
            desc: "Implement all five async diff/file/commit functions"
            priority: critical
          - id: "R2"
            desc: "Use asyncio.to_thread() for async git subprocess execution"
            priority: expected
        auto_verify:
          items:
            - id: "diff_ops_exist"
              cmd: "test -f src/orchestrator/git/diff_ops.py"
              must: true

      - id: "T-03"
        title: "Create Review API Schemas"
        task_context: |
          Create request/response schemas in src/orchestrator/api/schemas/review.py:
          - DiffResponse (diff text, scope, file_path)
          - DiffFileEntry (path, status, additions, deletions)
          - CommitEntry (sha, short_sha, message, author, timestamp)

          Follow existing schema patterns in src/orchestrator/api/schemas/.
        requirements:
          - id: "R1"
            desc: "Create DiffResponse, DiffFileEntry, CommitEntry API schemas"
            priority: critical
        auto_verify:
          items:
            - id: "schemas_exist"
              cmd: "test -f src/orchestrator/api/schemas/review.py"
              must: true

      - id: "T-04"
        title: "Create Review API Router"
        task_context: |
          Create src/orchestrator/api/routers/review.py with endpoints:
          - GET /api/runs/{id}/review/diff — returns unified diff (aggregate, per-commit, per-task scopes via query params)
          - GET /api/runs/{id}/review/diff/files — returns list of modified files with change stats
          - GET /api/runs/{id}/review/commits — returns commit history for the run branch

          Register the router in the FastAPI app. Validate that the run has a
          worktree before serving review endpoints.
        requirements:
          - id: "R1"
            desc: "Create review router with diff, diff/files, and commits endpoints"
            priority: critical
          - id: "R2"
            desc: "Register review router in FastAPI app"
            priority: critical
        auto_verify:
          items:
            - id: "router_exist"
              cmd: "test -f src/orchestrator/api/routers/review.py"
              must: true

      - id: "T-05"
        title: "Enhance Branch Status"
        task_context: |
          Enhance the existing GET /api/runs/{id}/branch-status endpoint to
          include predicted_conflict_count and merge_readiness fields in the
          BranchStatusResponse. Update the existing schema and branch_ops
          functions accordingly.
        requirements:
          - id: "R1"
            desc: "Add predicted_conflict_count and merge_readiness to branch status"
            priority: expected

      - id: "T-06"
        title: "Write Unit Tests for Diff Operations"
        task_context: |
          Write unit tests for all diff functions in tests/unit/test_diff_ops.py.
          Use real git repos created with tmp_path fixtures (no mocking).
          Test edge cases: empty diff, binary files, renamed files.
        requirements:
          - id: "R1"
            desc: "Unit tests cover all diff_ops functions with real git repos"
            priority: critical
        auto_verify:
          items:
            - id: "unit_tests_pass"
              cmd: "uv run pytest tests/unit/test_diff_ops.py -v"
              must: true

      - id: "T-07"
        title: "Write Integration Tests for Review API"
        task_context: |
          Write integration tests for the review API endpoints in
          tests/integration/test_review_api.py. Test with running FastAPI app
          and real worktrees. Verify response schemas and status codes.
        requirements:
          - id: "R1"
            desc: "Integration tests cover all review API endpoints"
            priority: critical
        auto_verify:
          items:
            - id: "integration_tests_pass"
              cmd: "uv run pytest tests/integration/test_review_api.py -v"
              must: true
        verifier:
          rubric:
            - id: "api_coverage"
              text: |
                R1 — A: integration tests exercise all three review endpoints with
                real worktrees, verifying response shapes and edge cases. B: tests
                exist but only cover the happy path.
        retry:
          max_attempts: 2

  # ── Step 2: Frontend Review & Merge tab skeleton + branch status panel ──
  - id: "S-02"
    title: "Frontend Review & Merge tab skeleton + branch status panel"
    step_context: |
      Create the foundational frontend surface: a new Review & Merge tab on
      RunDetail.tsx visible when the run has a worktree, with branch status
      and modified file list panels.

      Prerequisites: Step 1.
      Reference: docs/git-ops/step-02-plan.md, docs/git-ops/steps/step-02.md
    tasks:
      - id: "T-01"
        title: "Create TypeScript Types and API Client"
        task_context: |
          Define TypeScript types (DiffResponse, DiffFileEntry, CommitEntry) in
          ui/src/types/review.ts. Create API client functions for the new review
          endpoints in ui/src/api/reviewClient.ts.
        requirements:
          - id: "R1"
            desc: "Create TypeScript types matching backend review schemas"
            priority: critical
          - id: "R2"
            desc: "Create API client functions for review endpoints"
            priority: critical
        auto_verify:
          items:
            - id: "types_exist"
              cmd: "test -f ui/src/types/review.ts && test -f ui/src/api/reviewClient.ts"
              must: true

      - id: "T-02"
        title: "Create TanStack Query Hooks"
        task_context: |
          Create TanStack Query hooks in ui/src/hooks/useReview.ts:
          - useDiffFiles(runId) — fetches modified file list
          - useCommits(runId) — fetches commit history
          - enhanced useBranchStatus(runId) — includes new fields
        requirements:
          - id: "R1"
            desc: "Create useDiffFiles, useCommits, and enhanced useBranchStatus hooks"
            priority: critical

      - id: "T-03"
        title: "Create BranchStatusSection Component"
        task_context: |
          Create ui/src/components/review/BranchStatusSection.tsx displaying:
          branch name, target branch, base/head SHAs, ahead/behind counts,
          worktree path with copy-to-clipboard button.
        requirements:
          - id: "R1"
            desc: "BranchStatusSection displays all branch metadata with copy-to-clipboard"
            priority: critical

      - id: "T-04"
        title: "Create FileListSection Component"
        task_context: |
          Create ui/src/components/review/FileListSection.tsx rendering the
          modified files list with file status icons (added/modified/deleted)
          and +/- line counts. Clicking a file should emit an onFileSelect event.
        requirements:
          - id: "R1"
            desc: "FileListSection renders files with status icons and line counts"
            priority: critical

      - id: "T-05"
        title: "Create ReviewMergeTab and Add to RunDetail"
        task_context: |
          Create ui/src/components/review/ReviewMergeTab.tsx with a left rail +
          main panel layout. Include BranchStatusSection and FileListSection in
          the left rail. Add the tab to RunDetail.tsx, visible only when the
          run has a worktree (any run status).
        requirements:
          - id: "R1"
            desc: "ReviewMergeTab renders with left rail layout on RunDetail"
            priority: critical
          - id: "R2"
            desc: "Tab only visible for runs with worktrees, regardless of run status"
            priority: critical
        auto_verify:
          items:
            - id: "frontend_builds"
              cmd: "cd ui && npm run build"
              must: true
        verifier:
          rubric:
            - id: "tab_integration"
              text: |
                R1/R2 — A: tab renders with branch status and file list, only
                shown for runs with worktrees. B: tab renders but visibility
                logic is incomplete.
        retry:
          max_attempts: 2

  # ── Step 3: Diff dialog with react-diff-view ──
  - id: "S-03"
    title: "Diff dialog with react-diff-view"
    step_context: |
      Implement core diff viewing with a near full-screen dialog, inline/split
      view modes, and scope switching (aggregate/commit/task).

      Prerequisites: Step 2.
      Reference: docs/git-ops/step-03-plan.md, docs/git-ops/steps/step-03.md
    tasks:
      - id: "T-01"
        title: "Install Diff Rendering Dependencies"
        task_context: |
          Install react-diff-view and unidiff packages in the ui/ directory:
          cd ui && npm install react-diff-view unidiff

          Verify the gutter API is available in the installed version.
        requirements:
          - id: "R1"
            desc: "react-diff-view and unidiff installed and importable"
            priority: critical

      - id: "T-02"
        title: "Create DiffViewer Component"
        task_context: |
          Create ui/src/components/review/DiffViewer.tsx that:
          - Parses unified diff text using the diff parser
          - Renders hunks via react-diff-view
          - Supports inline and side-by-side (split) view modes
          - Handles empty diff and error states
        requirements:
          - id: "R1"
            desc: "DiffViewer renders parsed diffs in inline and split modes"
            priority: critical

      - id: "T-03"
        title: "Create DiffDialog Component"
        task_context: |
          Create ui/src/components/review/DiffDialog.tsx:
          - Near full-screen overlay dialog
          - File header with filename and change stats
          - Scope selector (aggregate/commit/task)
          - Inline/side-by-side toggle
          - Loading and error states
          - Add useDiff(runId, scope, params) hook to useReview.ts
        requirements:
          - id: "R1"
            desc: "DiffDialog renders as near full-screen overlay with scope selector and view toggle"
            priority: critical

      - id: "T-04"
        title: "Wire File List Clicks to DiffDialog"
        task_context: |
          Connect FileListSection file clicks to open DiffDialog with the
          selected file. Pass the correct scope (aggregate by default).
          Ensure dialog closes cleanly and scope changes re-fetch data.
        requirements:
          - id: "R1"
            desc: "Clicking a file in FileListSection opens DiffDialog with correct content"
            priority: critical
        auto_verify:
          items:
            - id: "frontend_builds"
              cmd: "cd ui && npm run build"
              must: true
        verifier:
          rubric:
            - id: "diff_experience"
              text: |
                A: diff dialog opens from file clicks, renders correctly with
                line numbers, supports view mode toggling and scope switching.
                B: dialog opens and renders but scope switching or view toggle
                has issues.
        retry:
          max_attempts: 2

  # ── Step 4: Backend prune endpoints ──
  - id: "S-04"
    title: "Backend prune endpoints"
    step_context: |
      Implement the API for selectively removing unwanted changes at
      file/hunk/line granularity using git apply --reverse.

      Prerequisites: Step 1.
      Reference: docs/git-ops/step-04-plan.md, docs/git-ops/steps/step-04.md
    tasks:
      - id: "T-01"
        title: "Create Prune Schemas"
        task_context: |
          Add prune-related schemas to src/orchestrator/api/schemas/review.py:
          - LineRange (start, end)
          - FilePrune (path, hunks, lines)
          - PruneSelection (files: list[FilePrune])
          - PrunePreviewResponse (summary, affected_files, reverse_patch)
          - PruneApplyResponse (commit_sha, affected_files, event_id)
        requirements:
          - id: "R1"
            desc: "Create all prune-related Pydantic schemas"
            priority: critical

      - id: "T-02"
        title: "Create prune_ops.py with File-Level Prune"
        task_context: |
          Create src/orchestrator/git/prune_ops.py with:
          - revert_file(worktree_path, file_path, base_sha) — file-level revert using git checkout
          - preview_prune(worktree_path, selection) — read-only preview of prune result
          - apply_prune(worktree_path, selection, message) — apply prune and create commit

          Start with file-level prune using git checkout from base SHA.
        requirements:
          - id: "R1"
            desc: "Implement file-level prune with revert_file, preview_prune, apply_prune"
            priority: critical
        auto_verify:
          items:
            - id: "prune_ops_exist"
              cmd: "test -f src/orchestrator/git/prune_ops.py"
              must: true

      - id: "T-03"
        title: "Implement Hunk-Level and Line-Level Prune"
        task_context: |
          Extend prune_ops.py with hunk-level and line-level prune support:
          - Construct reverse patches from selected hunks/lines
          - Apply using git apply --reverse
          - Adjust hunk headers correctly for partial selections
          - Handle edge cases: multi-hunk files, adjacent changes, empty hunks
        requirements:
          - id: "R1"
            desc: "Hunk-level and line-level prune work correctly via reverse patches"
            priority: critical

      - id: "T-04"
        title: "Add PRUNE_APPLIED Event and Prune API Endpoints"
        task_context: |
          Add PRUNE_APPLIED event type to the workflow events system.
          Create prune API endpoints in the review router:
          - POST /api/runs/{id}/review/prune/preview
          - POST /api/runs/{id}/review/prune/apply
          - POST /api/runs/{id}/review/revert-file

          Each prune-apply creates a dedicated commit for auditability.
        requirements:
          - id: "R1"
            desc: "Prune endpoints created and PRUNE_APPLIED event logged on apply"
            priority: critical

      - id: "T-05"
        title: "Write Prune Tests"
        task_context: |
          Write unit tests for file/hunk/line prune in tests/unit/test_prune_ops.py.
          Write integration tests for prune API endpoints in
          tests/integration/test_prune_api.py. Use real git repos with
          tmp_path fixtures. Test edge cases: multi-hunk, adjacent changes,
          empty selections.
        requirements:
          - id: "R1"
            desc: "Unit and integration tests cover file/hunk/line prune operations"
            priority: critical
        auto_verify:
          items:
            - id: "prune_tests_pass"
              cmd: "uv run pytest tests/unit/test_prune_ops.py tests/integration/test_prune_api.py -v"
              must: true
        verifier:
          rubric:
            - id: "prune_correctness"
              text: |
                A: tests cover file/hunk/line level prune with edge cases,
                preview is verified as read-only, apply creates commits.
                B: basic prune tests pass but edge cases are sparse.
        retry:
          max_attempts: 2

  # ── Step 5: Frontend prune mode ──
  - id: "S-05"
    title: "Frontend prune mode"
    step_context: |
      Implement the interactive prune UI with selection at file/hunk/line
      granularity, preview modal, and apply confirmation.

      Prerequisites: Steps 3, 4.
      Reference: docs/git-ops/step-05-plan.md, docs/git-ops/steps/step-05.md
    tasks:
      - id: "T-01"
        title: "Create PruneModeProvider Context"
        task_context: |
          Create ui/src/components/review/PruneModeProvider.tsx with React context:
          - State: isPruneMode, selectedFiles, selectedHunks, selectedLines
          - Methods: togglePruneMode, selectHunk, selectLine, selectFile, clearSelection
        requirements:
          - id: "R1"
            desc: "PruneModeProvider manages prune selection state"
            priority: critical

      - id: "T-02"
        title: "Create PruneGutter and PruneToolbar"
        task_context: |
          Create ui/src/components/review/PruneGutter.tsx with custom
          react-diff-view gutter cells showing hunk/line checkboxes.
          Create PruneToolbar.tsx with selection count display and
          Preview/Cancel buttons.
        requirements:
          - id: "R1"
            desc: "PruneGutter renders checkboxes in diff gutter during prune mode"
            priority: critical

      - id: "T-03"
        title: "Create PrunePreviewModal and Add API Mutations"
        task_context: |
          Create ui/src/components/review/PrunePreviewModal.tsx showing prune
          summary with affected files and an Apply button with confirmation.
          Add TanStack Query mutations (usePrunePreview, usePruneApply,
          useRevertFile) to useReview.ts and API client functions to
          reviewClient.ts.
        requirements:
          - id: "R1"
            desc: "PrunePreviewModal shows summary and Apply triggers prune with confirmation"
            priority: critical

      - id: "T-04"
        title: "Wire Prune Mode into ReviewMergeTab"
        task_context: |
          Wrap ReviewMergeTab content in PruneModeProvider. Add prune mode
          toggle button to the tab header. Add file context menu (three-dot
          button) with "Prune File" action on file list items. Wire
          PruneGutter into DiffViewer when prune mode is active.
        requirements:
          - id: "R1"
            desc: "Prune mode integrates into ReviewMergeTab with toggle, gutter, and file actions"
            priority: critical
        auto_verify:
          items:
            - id: "frontend_builds"
              cmd: "cd ui && npm run build"
              must: true
        verifier:
          rubric:
            - id: "prune_ux"
              text: |
                A: prune mode toggles cleanly, checkboxes appear/disappear,
                preview shows accurate summary, apply creates commit and
                refreshes. B: prune mode works but some UX flows are rough.
        retry:
          max_attempts: 2

  # ── Step 6: Backend test execution endpoint ──
  - id: "S-06"
    title: "Backend test execution endpoint"
    step_context: |
      Implement the API for executing the routine's auto_verify commands
      from the Review & Merge workbench.

      Prerequisites: Step 1.
      Reference: docs/git-ops/step-06-plan.md, docs/git-ops/steps/step-06.md
    tasks:
      - id: "T-01"
        title: "Create Test Runner Module"
        task_context: |
          Create src/orchestrator/review/test_runner.py with a TestRunner class:
          - start_test_run(worktree_path, commands) -> test_run_id
          - get_test_result(test_run_id) -> TestRunResult
          - _execute_commands(worktree_path, commands) — async subprocess execution

          Use asyncio subprocess for non-blocking execution. Capture stdout/stderr.
          Store results in memory (acceptable v1 limitation).
        requirements:
          - id: "R1"
            desc: "TestRunner executes commands asynchronously and captures results"
            priority: critical
        auto_verify:
          items:
            - id: "test_runner_exists"
              cmd: "test -f src/orchestrator/review/test_runner.py"
              must: true

      - id: "T-02"
        title: "Add Test Schemas and Event Types"
        task_context: |
          Add to src/orchestrator/api/schemas/review.py:
          - TestRunRequest (optional command override)
          - TestRunResponse (test_run_id, status)
          - TestSummary (total, passed, failed, errors)
          - TestRunResult (status, summary, log_output, duration)

          Add TEST_RUN_STARTED and TEST_RUN_COMPLETED event types.
        requirements:
          - id: "R1"
            desc: "Test schemas and event types created"
            priority: critical

      - id: "T-03"
        title: "Add Test Execution API Endpoints"
        task_context: |
          Add to the review router:
          - POST /api/runs/{id}/review/test — starts test execution, returns test_run_id
          - GET /api/runs/{id}/review/test/{test_run_id} — returns test status/results

          Validate worktree exists. Prevent concurrent test runs (409 if already running).
          Log TEST_RUN_STARTED and TEST_RUN_COMPLETED events.
        requirements:
          - id: "R1"
            desc: "Test execution endpoints start and retrieve test runs"
            priority: critical
          - id: "R2"
            desc: "Concurrent test runs prevented with 409 response"
            priority: expected

      - id: "T-04"
        title: "Write Test Execution Integration Tests"
        task_context: |
          Write integration tests in tests/integration/test_review_test_api.py.
          Test: endpoint starts and completes, output captured, failures reported,
          422 when no auto_verify config, 409 on concurrent runs.
        requirements:
          - id: "R1"
            desc: "Integration tests cover test execution endpoints"
            priority: critical
        auto_verify:
          items:
            - id: "test_api_tests_pass"
              cmd: "uv run pytest tests/integration/test_review_test_api.py -v"
              must: true
        verifier:
          rubric:
            - id: "test_coverage"
              text: |
                A: tests cover happy path, failure reporting, concurrent run
                prevention, and missing config. B: basic happy path only.
        retry:
          max_attempts: 2

  # ── Step 7: Frontend test panel + agent fix tests ──
  - id: "S-07"
    title: "Frontend test panel + agent fix tests"
    step_context: |
      Implement the test execution UI with results display, log viewer,
      and agent-assisted test fixing.

      Prerequisites: Steps 5, 6.
      Reference: docs/git-ops/step-07-plan.md, docs/git-ops/steps/step-07.md
    tasks:
      - id: "T-01"
        title: "Create TestPanel Component"
        task_context: |
          Create ui/src/components/review/TestPanel.tsx with:
          - Test status indicator (idle/running/passed/failed)
          - "Run Tests" button
          - "View Logs" link
          - "Use Agent to Fix Tests" button (visible only on failure)

          Add API client functions (runTests, getTestResult, agentFixTests) to
          reviewClient.ts. Add hooks (useRunTests, useTestResult,
          useAgentFixTests) to useReview.ts.
        requirements:
          - id: "R1"
            desc: "TestPanel renders with run/status/logs/agent-fix controls"
            priority: critical

      - id: "T-02"
        title: "Create TestLogsDrawer Component"
        task_context: |
          Create ui/src/components/review/TestLogsDrawer.tsx:
          - Collapsible drawer/panel
          - Summary counts (passed/failed/errors)
          - Failing test names list
          - Terminal-style log output with monospace font
        requirements:
          - id: "R1"
            desc: "TestLogsDrawer shows summary counts and full log output"
            priority: critical

      - id: "T-03"
        title: "Create AgentFixTestsModal Component"
        task_context: |
          Create ui/src/components/review/AgentFixTestsModal.tsx:
          - Scope description (which tests failed)
          - Default to run's agent_type/config
          - Advanced toggle revealing agent picker for override
          - Confirm button dispatching agent work
          - Progress indicator during agent execution
          - On completion, invalidate diff and test queries for auto-refresh
        requirements:
          - id: "R1"
            desc: "Agent fix modal defaults to run's agent with Advanced override toggle"
            priority: critical

      - id: "T-04"
        title: "Wire Test Panel into ReviewMergeTab"
        task_context: |
          Add TestPanel to the left rail of ReviewMergeTab. Manage modal and
          drawer state (open/close). Ensure post-agent completion auto-refreshes
          diff files and test results.
        requirements:
          - id: "R1"
            desc: "TestPanel integrated into ReviewMergeTab with working agent flow"
            priority: critical
        auto_verify:
          items:
            - id: "frontend_builds"
              cmd: "cd ui && npm run build"
              must: true
        verifier:
          rubric:
            - id: "test_panel_ux"
              text: |
                A: run button triggers execution, results show pass/fail,
                logs display full output, agent modal works with default and
                override, data refreshes after agent. B: basic flow works
                but agent override or auto-refresh has issues.
        retry:
          max_attempts: 2

  # ── Step 8: Backend conflict resolution endpoints ──
  - id: "S-08"
    title: "Backend conflict resolution endpoints"
    step_context: |
      Implement the API for detecting, displaying, and resolving merge
      conflicts. Enhance back_merge to support conflict detection and
      auto-commit clean merges.

      Prerequisites: Step 1.
      Reference: docs/git-ops/step-08-plan.md, docs/git-ops/steps/step-08.md
    tasks:
      - id: "T-01"
        title: "Create Conflict Operations Module"
        task_context: |
          Create src/orchestrator/git/conflict_ops.py with:
          - get_conflict_files(worktree_path) -> list[str]
          - parse_conflict_blocks(file_content) -> list[ConflictBlock]
          - get_conflict_blocks(worktree_path, file_path) -> list[ConflictBlock]
          - resolve_conflict(worktree_path, file_path, resolutions) -> None
          - mark_all_resolved(worktree_path) -> str (commit SHA)

          Parse conflict markers (<<<<<<< ======= >>>>>>>) into structured
          ours/theirs/base blocks.
        requirements:
          - id: "R1"
            desc: "Conflict ops parse markers and apply per-block resolutions"
            priority: critical
        auto_verify:
          items:
            - id: "conflict_ops_exist"
              cmd: "test -f src/orchestrator/git/conflict_ops.py"
              must: true

      - id: "T-02"
        title: "Enhance back_merge() and Add Revert"
        task_context: |
          Enhance back_merge() in branch_ops.py:
          - Auto-commit clean merges (existing behavior preserved with default param)
          - On conflict, leave merge in-progress and return conflict file list
          - Add abort_on_conflict parameter (default True for backward compatibility)

          Implement revert_back_merge() using git revert to undo the last
          back merge commit.
        requirements:
          - id: "R1"
            desc: "back_merge auto-commits clean merges and returns conflict details on conflict"
            priority: critical
          - id: "R2"
            desc: "revert_back_merge undoes the last back merge commit"
            priority: critical

      - id: "T-03"
        title: "Add Conflict Schemas and Event Types"
        task_context: |
          Add to src/orchestrator/api/schemas/review.py:
          - ConflictBlock (ours, theirs, base, block_index)
          - ConflictFile (path, blocks, resolved)
          - BlockResolution (block_index, choice: ours/theirs/manual, manual_content)
          - ConflictResolutionRequest (resolutions: list[BlockResolution])
          - ConflictResolutionResponse (resolved, remaining_conflicts)
          - Enhanced BackMergeResponse (merge_sha, conflicts, conflict_count)

          Add CONFLICT_RESOLVED, BACK_MERGE_COMPLETED, BACK_MERGE_REVERTED events.
        requirements:
          - id: "R1"
            desc: "Conflict schemas and event types created"
            priority: critical

      - id: "T-04"
        title: "Add Conflict API Endpoints"
        task_context: |
          Add to the review router:
          - GET /api/runs/{id}/review/conflicts — list conflict files with block details
          - POST /api/runs/{id}/review/conflicts/{path}/resolve — apply resolutions for a file
          - POST /api/runs/{id}/review/conflicts/agent-resolve — dispatch agent to resolve
          - POST /api/runs/{id}/review/revert-back-merge — revert last back merge
        requirements:
          - id: "R1"
            desc: "Conflict API endpoints for listing, resolving, agent dispatch, and revert"
            priority: critical

      - id: "T-05"
        title: "Write Conflict Tests"
        task_context: |
          Write unit tests in tests/unit/test_conflict_ops.py for conflict
          parsing and resolution. Write integration tests in
          tests/integration/test_conflict_api.py with real merge conflicts.
          Test auto-commit clean merges, conflict file listing, resolution,
          and revert.
        requirements:
          - id: "R1"
            desc: "Unit and integration tests cover conflict detection, resolution, and revert"
            priority: critical
        auto_verify:
          items:
            - id: "conflict_tests_pass"
              cmd: "uv run pytest tests/unit/test_conflict_ops.py tests/integration/test_conflict_api.py -v"
              must: true
        verifier:
          rubric:
            - id: "conflict_coverage"
              text: |
                A: tests exercise conflict detection, per-block resolution (ours/theirs/manual),
                auto-commit clean merges, and revert. B: basic conflict detection tested
                but resolution edge cases are sparse.
        retry:
          max_attempts: 2

  # ── Step 9: Frontend back merge + conflict resolver ──
  - id: "S-09"
    title: "Frontend back merge + conflict resolver"
    step_context: |
      Implement back merge UI with confirmation, conflict display, interactive
      conflict resolver dialog, and agent-assisted conflict resolution.

      Prerequisites: Steps 3, 8.
      Reference: docs/git-ops/step-09-plan.md, docs/git-ops/steps/step-09.md
    tasks:
      - id: "T-01"
        title: "Create BackMergeModal and BackMergeBanner"
        task_context: |
          Create ui/src/components/review/BackMergeModal.tsx with confirmation
          dialog showing source/target branches and predicted conflict count.
          Create BackMergeBanner.tsx showing post-merge result with SHA and
          undo button (calls revert-back-merge).
          Add API client functions and TanStack Query hooks for conflicts,
          resolution, agent resolve, and revert to reviewClient.ts and useReview.ts.
        requirements:
          - id: "R1"
            desc: "BackMergeModal and BackMergeBanner with undo functionality"
            priority: critical

      - id: "T-02"
        title: "Create ConflictFileList Component"
        task_context: |
          Create ui/src/components/review/ConflictFileList.tsx:
          - List conflict files with unresolved/resolved status chips
          - Clicking a file opens the conflict resolver dialog
          - Visual distinction from regular modified files
        requirements:
          - id: "R1"
            desc: "ConflictFileList shows files with resolution status"
            priority: critical

      - id: "T-03"
        title: "Create ConflictResolverDialog"
        task_context: |
          Create ui/src/components/review/ConflictBlock.tsx with ours/theirs
          display and per-block actions (Keep Run, Keep Target, Manual Selection).
          Create ConflictResolverDialog.tsx as near full-screen overlay with:
          - Conflict blocks with warm/cool tinting for ours/theirs
          - Per-block action buttons
          - "Mark File Resolved" button with confirmation modal
          - Prev/next file navigation
        requirements:
          - id: "R1"
            desc: "ConflictResolverDialog supports per-block resolution with navigation"
            priority: critical

      - id: "T-04"
        title: "Create AgentResolveConflictsModal and Wire into ReviewMergeTab"
        task_context: |
          Create ui/src/components/review/AgentResolveConflictsModal.tsx with
          agent dispatch (defaults to run's agent, Advanced toggle for override).
          Integrate all back merge and conflict components into ReviewMergeTab.
          Invalidate queries on agent completion.
        requirements:
          - id: "R1"
            desc: "Agent resolve modal and full back merge/conflict flow integrated"
            priority: critical
        auto_verify:
          items:
            - id: "frontend_builds"
              cmd: "cd ui && npm run build"
              must: true
        verifier:
          rubric:
            - id: "conflict_ux"
              text: |
                A: back merge shows confirmation, clean merge shows undo banner,
                conflicts display with resolver dialog, per-block actions work,
                agent modal works. B: basic flow works but some UX elements
                are incomplete.
        retry:
          max_attempts: 2

  # ── Step 10: Merge readiness gating + final merge ──
  - id: "S-10"
    title: "Merge readiness gating + final merge"
    step_context: |
      Implement the merge readiness system that gates the final merge-back
      action. All four gates must pass before merge is allowed.

      Prerequisites: Steps 5, 7, 9.
      Reference: docs/git-ops/step-10-plan.md, docs/git-ops/steps/step-10.md
    tasks:
      - id: "T-01"
        title: "Add Merge Readiness Backend Endpoint"
        task_context: |
          Add Gate and MergeReadiness schemas to review.py. Implement
          compute_readiness() evaluating four gates:
          - clean_merge: merge prediction is clean
          - no_unresolved_conflicts: no unresolved conflict files
          - tests_pass: last test run passed
          - no_active_jobs: no running agent or test jobs

          Add GET /api/runs/{id}/review/merge-readiness endpoint.
          Enhance merge_back() to accept merge strategy ("squash" or "merge").
          Add pre-flight readiness check returning 409 if gates are unmet.
        requirements:
          - id: "R1"
            desc: "Merge readiness endpoint evaluates four gates correctly"
            priority: critical
          - id: "R2"
            desc: "merge_back accepts squash/merge strategy choice"
            priority: critical

      - id: "T-02"
        title: "Create MergeReadinessBar Frontend"
        task_context: |
          Create ui/src/components/review/MergeReadinessBar.tsx:
          - Sticky bottom bar with gate status indicators (pass/fail/pending)
          - Gate names and descriptions
          - "Commit Merge Back" button (disabled when gates unmet, enabled when all pass)

          Add useMergeReadiness() hook and getMergeReadiness() API client function.
        requirements:
          - id: "R1"
            desc: "MergeReadinessBar shows gate statuses with disabled/enabled merge button"
            priority: critical

      - id: "T-03"
        title: "Create Merge Confirmation Modal and Wire into ReviewMergeTab"
        task_context: |
          Create merge confirmation modal with merge strategy radio buttons
          (squash default, merge commit option). Wire MergeReadinessBar as
          sticky bottom in ReviewMergeTab. Ensure readiness is invalidated
          after prune/test/conflict/agent/back-merge operations via TanStack
          Query invalidation.
        requirements:
          - id: "R1"
            desc: "Merge modal offers strategy choice and readiness auto-refreshes"
            priority: critical

      - id: "T-04"
        title: "Write Merge Readiness Integration Tests"
        task_context: |
          Write integration tests in tests/integration/test_merge_readiness.py:
          - Gate computation in various states (all pass, conflicts fail, tests fail, jobs running)
          - Merge with squash creates single commit
          - Merge with merge strategy preserves history
          - 409 when gates are unmet
        requirements:
          - id: "R1"
            desc: "Integration tests cover gate computation and merge strategies"
            priority: critical
        auto_verify:
          items:
            - id: "readiness_tests_pass"
              cmd: "uv run pytest tests/integration/test_merge_readiness.py -v"
              must: true
        verifier:
          rubric:
            - id: "gating_correctness"
              text: |
                A: tests verify all four gates in various states, both merge
                strategies produce correct git history, 409 on unmet gates.
                B: basic gating tested but strategy or state combinations sparse.
        retry:
          max_attempts: 2

  # ── Step 11: Branch history + task file attribution ──
  - id: "S-11"
    title: "Branch history + task file attribution"
    step_context: |
      Implement the branch history timeline with commit badges and task-level
      file attribution showing files under every task that touched them.

      Prerequisites: Steps 2, 3.
      Reference: docs/git-ops/step-11-plan.md, docs/git-ops/steps/step-11.md
    tasks:
      - id: "T-01"
        title: "Create HistoryPanel Component"
        task_context: |
          Create ui/src/components/review/HistoryPanel.tsx:
          - Commit timeline in reverse chronological order
          - Each entry: short SHA, message, timestamp, author
          - Badge detection from commit message patterns (prune, agent, back-merge)
          - Radio toggle: "Overall branch changes" vs "Selected commit"
          - Selecting a commit updates the main diff panel scope
        requirements:
          - id: "R1"
            desc: "HistoryPanel shows commit timeline with badges and scope toggle"
            priority: critical

      - id: "T-02"
        title: "Create TaskFilesPanel Component"
        task_context: |
          Create ui/src/components/review/TaskFilesPanel.tsx:
          - Task cards showing task name/ID and "Files touched (N)" count
          - Per-file entries with "View Diff" link
          - Files appear under every task that touched them (each shows its own diff)
          - "View Diff" opens DiffDialog with task scope
          - Collapsed by default when many files
        requirements:
          - id: "R1"
            desc: "TaskFilesPanel shows per-task file attribution with diff links"
            priority: critical

      - id: "T-03"
        title: "Wire History and Tasks into ReviewMergeTab"
        task_context: |
          Add HistoryPanel and TaskFilesPanel to the left rail of ReviewMergeTab.
          Connect commit selection from HistoryPanel to update DiffDialog scope
          (aggregate vs single commit). Wire task file "View Diff" links to
          open DiffDialog with the task-scoped diff.
        requirements:
          - id: "R1"
            desc: "History and task panels integrated with scope-aware diff viewing"
            priority: critical
        auto_verify:
          items:
            - id: "frontend_builds"
              cmd: "cd ui && npm run build"
              must: true
        verifier:
          rubric:
            - id: "history_ux"
              text: |
                A: commits show in order with badges, selecting a commit
                updates the diff, task cards show correct files with working
                diff links. B: basic rendering works but scope switching
                or attribution has issues.
        retry:
          max_attempts: 2

  # ── Step 12: Visual polish + edge states + keyboard shortcuts + visual regression ──
  - id: "S-12"
    title: "Visual polish + edge states + keyboard shortcuts + visual regression tests"
    step_context: |
      Final polish pass: empty states, binary file handling, large diff
      performance, keyboard shortcuts, loading/error states, responsive
      design, documentation updates, and Playwright visual regression tests.

      Prerequisites: Steps 1-11.
      Reference: docs/git-ops/step-12-plan.md, docs/git-ops/steps/step-12.md
    tasks:
      - id: "T-01"
        title: "Implement Empty States and Binary File Handling"
        task_context: |
          Add empty states to FileListSection, ConflictFileList, TestPanel,
          BackMergeBanner, HistoryPanel (e.g., "Nothing to review", "No conflicts",
          "Back merge clean"). Handle binary files in DiffViewer with metadata
          display and keep-ours/keep-theirs only (no inline diff).
        requirements:
          - id: "R1"
            desc: "Empty states display for all panels and binary files handled gracefully"
            priority: expected

      - id: "T-02"
        title: "Implement Large Diff Handling and Keyboard Shortcuts"
        task_context: |
          Add collapsed-by-default file sections for diffs >1000 lines with
          Expand/Collapse All controls. Implement keyboard shortcuts:
          - j/k: next/prev change
          - [/]: prev/next conflict file
          - Shift+P: toggle prune mode
          - t: run tests

          Shortcuts active only in Review tab, disabled in text inputs.
        requirements:
          - id: "R1"
            desc: "Large diffs collapsed by default with keyboard shortcuts"
            priority: expected

      - id: "T-03"
        title: "Add Loading States, Error Boundaries, Responsive Design"
        task_context: |
          Add skeleton loaders to file list, diff viewer, history panel,
          readiness bar, test panel. Wrap major panels in error boundaries
          with Retry button. Responsive design: left rail collapses on narrow
          viewports (<768px) with toggle button, dialogs adapt to screen size.
        requirements:
          - id: "R1"
            desc: "Loading skeletons, error boundaries, and responsive layout implemented"
            priority: expected

      - id: "T-04"
        title: "Update Documentation"
        task_context: |
          Update docs/ARCHITECTURE.md with:
          - All new review API routes (/api/runs/{id}/review/*)
          - New source files (diff_ops.py, prune_ops.py, conflict_ops.py, review/*)
          - New API schemas
          - New frontend components, API client functions, hooks
        requirements:
          - id: "R1"
            desc: "ARCHITECTURE.md updated with all new routes, files, and components"
            priority: expected

      - id: "T-05"
        title: "Create Playwright Visual Regression Tests"
        task_context: |
          Create Playwright visual regression tests capturing 8 baseline snapshots:
          - Clean review tab (no changes)
          - Tab with file list
          - Diff dialog inline mode
          - Diff dialog split mode
          - Prune mode active
          - Conflict resolver dialog
          - Merge readiness bar (all gates pass)
          - Merge readiness bar (gates blocked)

          Use expect(page).toHaveScreenshot() for visual comparison.
          Ensure all prior tests still pass.
        requirements:
          - id: "R1"
            desc: "8 Playwright visual regression baselines established"
            priority: critical
          - id: "R2"
            desc: "All existing tests continue to pass"
            priority: critical
        auto_verify:
          items:
            - id: "frontend_builds"
              cmd: "cd ui && npm run build"
              must: true
            - id: "existing_tests_pass"
              cmd: "uv run pytest tests/unit -v"
              must: true
        verifier:
          rubric:
            - id: "polish_quality"
              text: |
                A: empty states display, keyboard shortcuts work, loading
                skeletons appear, responsive layout adapts, documentation
                updated, visual baselines established. B: most polish items
                done but one or two are incomplete.
        retry:
          max_attempts: 2
