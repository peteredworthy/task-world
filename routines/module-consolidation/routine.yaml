            - id: "no_old_mcp_imports"
              cmd: "bash -c '! grep -rn \"from orchestrator.mcp\" src/ tests/'"
              must: true
            - id: "tests_pass"
              cmd: "uv run pytest tests/ -q --tb=short"
              must: true
        verifier:
          rubric:
            - id: "R1"
              text: "R1 — A: api/metrics.py exists and importable with cost calculation functions. B: file exists but incomplete."
            - id: "R2"
              text: "R2 — A: api/mcp/ sub-package with all MCP server content importable; tools.py uses git/ path (not repos/) if repos was moved. B: sub-package exists but content incomplete or stale repos/ import."
            - id: "R3"
