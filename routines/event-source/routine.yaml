              text: "R1 — A: consumer.py has zero definitions or uses of _active_run_ids, register_active_run, unregister_active_run, has_active_workflow; all active-run checks use RunLifecycleProjector.is_active() via injected dependency. B: most removed but one reference or definition remains."
            - id: "R2"
              text: "R2 — A: enqueue() appends SignalEnqueued to events_v2; drain() returns unprocessed signals in FIFO order and appends SignalProcessed; second drain() returns empty list; no INSERT into pending_signals. B: transport works but idempotency not enforced or pending_signals still written in some path."
            - id: "R3"
              text: "R3 — A: unit tests cover enqueue/drain round-trip, idempotency, inactive-run rejection, SignalProcessed position correctness; integration tests cover normal delivery, stale signal no-op, startup recovery; all pass. B: most tests pass but one scenario missing."
