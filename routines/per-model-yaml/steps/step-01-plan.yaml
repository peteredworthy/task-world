id: "S-01"
title: "Core Data Model and Cost Config (M1)"
step_context: |
  Add the ModelTokenUsage Pydantic class, cost rate YAML config, and cost lookup
  module. This is pure additive infrastructure — no behavior changes. All subsequent
  steps depend on these pieces being in place.

  Key design decisions from clarifications:
  - Model name normalization: strip version suffixes via prefix matching
    (e.g. claude-sonnet-4-6-20250514 → claude-sonnet-4-6)
  - Unknown models: return zero rates (not an error); UI shows "cost unknown" badge (M6)
  - config/model_costs.yaml lives at project root config/ directory
  - Legacy flat fields (tokens_cache, etc.) remain unchanged

tasks:
  - id: "T-01"
    title: "Create config/model_costs.yaml"
    task_context: |
      Create model_costs.yaml at the project root with per-model cost rates
      (USD per 1M tokens) for Sonnet, Haiku, Opus, and an unknown_model zero-rate entry.

      File location: model_costs.yaml (at project root, NOT in a config/ subdirectory)

      IMPORTANT: costs.py searches for model_costs.yaml at the project root (not in
      config/). The file must live at the project root for it to be loaded at runtime.
      If the file already exists at the project root, verify its contents match the
      required structure and update rates if needed.

      Required YAML structure:
        models:
          claude-sonnet-4-6:
            cache_read: 0.30
            cache_creation: 3.75
            input: 3.00
            output: 15.00
          claude-haiku-4-5-20251001:
            cache_read: 0.08
            cache_creation: 1.00
            input: 0.80
            output: 4.00
          claude-opus-4-6:
            cache_read: 0.75
            cache_creation: 9.375
            input: 7.50
            output: 37.50
          unknown_model:
            cache_read: 0
            cache_creation: 0
            input: 0
            output: 0

      Note: the unknown_model entry is documentation only — costs.py uses _ZERO_COSTS
      directly as a fallback rather than reading this entry.
    requirements:
      - id: "R1"
        desc: "model_costs.yaml exists at project root and contains rates for claude-sonnet-4-6, claude-haiku-4-5-20251001, claude-opus-4-6, and unknown_model"
        priority: critical
    auto_verify:
      items:
        - id: "yaml_exists"
          cmd: "test -f model_costs.yaml"
          must: true
        - id: "yaml_valid"
          cmd: "uv run python -c \"import yaml; d=yaml.safe_load(open('model_costs.yaml')); assert 'models' in d; assert 'claude-sonnet-4-6' in d['models']; assert 'claude-haiku-4-5-20251001' in d['models']; assert 'claude-opus-4-6' in d['models']\""
          must: true

  - id: "T-02"
    title: "Add ModelTokenUsage class and token_usage_by_model fields to state/models.py"
    task_context: |
      Add the ModelTokenUsage Pydantic class to src/orchestrator/state/models.py and
      add token_usage_by_model fields to both Attempt and Run.

      NOTE: This code may already exist in the codebase. Read
      src/orchestrator/state/models.py before making any changes. If ModelTokenUsage,
      Attempt.token_usage_by_model, and Run.token_usage_by_model already exist and
      match the spec below, verify correctness and mark requirements done without
      re-implementing. Adding duplicate class definitions will break imports.

      1. Add ModelTokenUsage class (around line 162, before AttemptMetrics) if missing:

        class ModelTokenUsage(BaseModel):
            model: str
            cache_read_tokens: int = 0
            cache_creation_tokens: int = 0
            input_tokens: int = 0
            output_tokens: int = 0
            cost_per_m_cache_read: float = 0.0
            cost_per_m_cache_creation: float = 0.0
            cost_per_m_input: float = 0.0
            cost_per_m_output: float = 0.0

            @property
            def total_cost_usd(self) -> float:
                return (
                    self.cache_read_tokens * self.cost_per_m_cache_read
                    + self.cache_creation_tokens * self.cost_per_m_cache_creation
                    + self.input_tokens * self.cost_per_m_input
                    + self.output_tokens * self.cost_per_m_output
                ) / 1_000_000

      2. Add to Attempt class (around line 238):
            token_usage_by_model: list[ModelTokenUsage] = Field(default_factory=lambda: [])

      3. Add to Run class (around line 378):
            token_usage_by_model: list[ModelTokenUsage] = Field(default_factory=lambda: [])

      Do NOT modify AttemptMetrics or any existing fields.
    requirements:
      - id: "R2"
        desc: "ModelTokenUsage class exists in state/models.py with token count fields, cost rate fields, and total_cost_usd computed property"
        priority: critical
      - id: "R3"
        desc: "Attempt.token_usage_by_model field exists (list[ModelTokenUsage], default empty list)"
        priority: critical
      - id: "R4"
        desc: "Run.token_usage_by_model field exists (list[ModelTokenUsage], default empty list)"
        priority: critical
    auto_verify:
      items:
        - id: "model_token_usage_class"
          cmd: "python3 -c \"from orchestrator.state.models import ModelTokenUsage; u = ModelTokenUsage(model='test', input_tokens=1000000, cost_per_m_input=3.0); assert abs(u.total_cost_usd - 3.0) < 1e-9\""
          must: true
        - id: "attempt_field"
          cmd: "python3 -c \"from orchestrator.state.models import Attempt; a = Attempt(attempt_num=1); assert a.token_usage_by_model == []\""
          must: true
        - id: "run_field"
          cmd: "python3 -c \"from orchestrator.state.models import Run; import inspect; fields = Run.model_fields; assert 'token_usage_by_model' in fields\""
          must: true

  - id: "T-03"
    title: "Create src/orchestrator/runners/costs.py"
    task_context: |
      Create src/orchestrator/runners/costs.py with the cost table loader and
      get_model_costs() lookup function.

      NOTE: This file may already exist. Read src/orchestrator/runners/costs.py before
      making any changes. If get_model_costs() already exists and passes the auto_verify
      checks below, mark requirements done without re-implementing.

      IMPORTANT: _find_cost_file() must locate model_costs.yaml at the PROJECT ROOT
      (not in a config/ subdirectory). The file is at model_costs.yaml relative to the
      project root. Ensure the lookup walks up from __file__ looking for model_costs.yaml
      (not config/model_costs.yaml).

      The module must:
      1. Define _cost_table: dict[str, dict[str, float]] = {} at module level
      2. Define _ZERO_COSTS with keys: cost_per_m_cache_read, cost_per_m_cache_creation,
         cost_per_m_input, cost_per_m_output (all 0.0)
      3. Implement _find_cost_file() -> Path | None:
         - Walk up from __file__ looking for config/model_costs.yaml
         - Check up to 4 parent directories
         - Falls back to CWD/config/model_costs.yaml
      4. Implement load_cost_table(path: Path | None = None) -> None:
         - Loads YAML from path (or auto-finds via _find_cost_file)
         - Populates _cost_table from YAML models section
         - Maps YAML keys (cache_read, cache_creation, input, output) to cost_per_m_* keys
      5. Implement get_model_costs(model_name: str | None) -> dict[str, float]:
         - Calls load_cost_table() if _cost_table is empty (lazy load)
         - Returns exact match if found
         - Falls back to prefix matching in both directions
           (e.g. "claude-sonnet-4-6-20250514" matches "claude-sonnet-4-6")
         - Returns copy of _ZERO_COSTS for unknown/None models
         - Never raises

      The function must return a dict with keys:
        cost_per_m_cache_read, cost_per_m_cache_creation, cost_per_m_input, cost_per_m_output
    requirements:
      - id: "R5"
        desc: "src/orchestrator/runners/costs.py exists with get_model_costs() function"
        priority: critical
      - id: "R6"
        desc: "get_model_costs('claude-sonnet-4-6') returns correct Sonnet rates (input=3.0, output=15.0)"
        priority: critical
      - id: "R7"
        desc: "get_model_costs('claude-sonnet-4-6-20250514') normalizes to Sonnet rates via prefix matching"
        priority: critical
      - id: "R8"
        desc: "get_model_costs('unknown-model-xyz') returns all-zero rates without raising"
        priority: critical
    auto_verify:
      items:
        - id: "costs_module"
          cmd: "python3 -c \"from orchestrator.runners.costs import get_model_costs; r = get_model_costs('claude-sonnet-4-6'); assert r['cost_per_m_input'] == 3.0 and r['cost_per_m_output'] == 15.0\""
          must: true
        - id: "prefix_match"
          cmd: "python3 -c \"from orchestrator.runners.costs import get_model_costs; r = get_model_costs('claude-sonnet-4-6-20250514'); assert r['cost_per_m_input'] == 3.0\""
          must: true
        - id: "unknown_model"
          cmd: "python3 -c \"from orchestrator.runners.costs import get_model_costs; r = get_model_costs('totally-unknown-model'); assert all(v == 0.0 for v in r.values())\""
          must: true
        - id: "none_model"
          cmd: "python3 -c \"from orchestrator.runners.costs import get_model_costs; r = get_model_costs(None); assert all(v == 0.0 for v in r.values())\""
          must: true

  - id: "T-04"
    title: "Write unit tests for ModelTokenUsage and get_model_costs"
    task_context: |
      Create tests/unit/test_model_costs.py with unit tests covering:

      1. ModelTokenUsage.total_cost_usd:
         - Returns 0.0 when all tokens and rates are 0
         - Correct computation for input-only tokens
         - Correct computation combining all 4 token types

      2. get_model_costs():
         - Known model (claude-sonnet-4-6) returns expected rates
         - Version-suffixed model (claude-sonnet-4-6-20250514) normalizes to base rates
         - Unknown model returns all-zero rates
         - None returns all-zero rates
         - Haiku and Opus rates correct

      Use a _reset_cost_table autouse fixture that resets the module-level
      _cost_table between tests:
        import orchestrator.runners.costs as costs_mod
        @pytest.fixture(autouse=True)
        def _reset_cost_table():
            costs_mod._cost_table = {}
            yield
            costs_mod._cost_table = {}

      For tests that need specific rates, use a cost_file fixture that writes
      YAML to tmp_path and calls load_cost_table(path).

      The test file should be self-contained — no mocking of the filesystem
      beyond writing real YAML files to tmp_path.
    requirements:
      - id: "R9"
        desc: "tests/unit/test_model_costs.py exists and all tests in it pass"
        priority: critical
    auto_verify:
      items:
        - id: "test_file_exists"
          cmd: "test -f tests/unit/test_model_costs.py"
          must: true
        - id: "tests_pass"
          cmd: "uv run pytest tests/unit/test_model_costs.py -v --tb=short -q"
          must: true
        - id: "all_existing_tests_pass"
          cmd: "uv run pytest tests/unit/ -q --tb=short"
          must: true
    verifier:
      rubric:
        - id: "R9"
          text: |
            R9 — Review tests/unit/test_model_costs.py for coverage and implementation correctness.
            A: Tests cover ModelTokenUsage.total_cost_usd (zero case, single type, all types),
               get_model_costs with exact match, prefix/version normalization, unknown model,
               and None input. All pass. ModelTokenUsage has all required fields, total_cost_usd
               uses / 1_000_000, get_model_costs normalizes via prefix matching in both
               directions, returns zero dict copy (not the same object) for unknown models.
            B: Coverage is mostly complete but missing one edge case (e.g. None input or
               reverse prefix matching), or implementation has a minor issue (e.g. mutates
               _ZERO_COSTS instead of copying).
            F: Tests missing major cases (no normalization test, no unknown model test),
               tests fail, or total_cost_usd formula is wrong.
