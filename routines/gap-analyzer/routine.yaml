          - "step_verification_completed": final verdict summary with appropriate icon

          Use exact event_type strings (snake_case as emitted by backend).

          Write frontend tests:
          - StepTimeline renders pulsing purple badge for verifying=true steps
          - GapReportCard renders assessment text, verdict badge, action list
          - Fix-up task renders with "Fix-up" badge and dashed border

          Reference: docs/gap-analyzer/steps/step-05.md Task 4
        requirements:
          - id: "R1"
            desc: "Fix-up tasks (spawned_by_gap_report=true) show dashed border and Fix-up badge"
            priority: critical
          - id: "R2"
            desc: "ActivityFeed handles step_verification_started, gap_report_generated, step_verification_completed"
            priority: critical
          - id: "R3"
            desc: "Frontend tests pass for verifying badge, gap report card, and fix-up task"
            priority: critical
          - id: "R4"
            desc: "ESLint passes with no errors"
            priority: expected
        auto_verify:
          items:
            - id: "activity_feed_events"
              cmd: "grep -n 'step_verification_started\\|gap_report_generated\\|step_verification_completed' ui/src/components/detail/ActivityFeed.tsx"
              must: true
            - id: "frontend_tests_pass"
              cmd: "cd ui && npx vitest run"
              must: true
            - id: "typescript_check"
              cmd: "cd ui && npx tsc --noEmit"
              must: true
            - id: "eslint_clean"
              cmd: "cd ui && npx eslint src/"
              must: true
        verifier:
          rubric:
            - id: "R1_fixup"
              text: |
                R1 — A: fix-up tasks visually distinct with dashed border and "Fix-up" badge.
                F: no visual distinction.
            - id: "R2_activity"
              text: |
                R2 — A: all three event types handled with appropriate icons and content;
                exact event_type strings match backend. B: handlers present but generic
                (no specific icon or content). F: events not handled.
            - id: "R3_tests"
              text: |
                R3 — A: all three frontend test cases present and passing. F: tests missing.
        retry:
          max_attempts: 2
