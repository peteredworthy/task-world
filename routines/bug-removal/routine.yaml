      history, revert and copy-back actions. Security constraint: env values must never appear
      unmasked in component state, logs, or rendered output. This step is independent of Steps 1-9.
    tasks:
      - id: "T-01"
        title: "Add env file TypeScript types and client functions"
        task_context: |
          Add EnvFile, EnvSnapshot, EnvDefaultTarget types and all five env file client functions
          to the frontend.

