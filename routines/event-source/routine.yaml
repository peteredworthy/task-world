          Update default transport in RunWorkflow to EventSignalTransport.
          Update SignalConsumer._find_pending_run_ids() to query events_v2 instead of pending_signals.

          Add Alembic migration to deprecate pending_signals (add _deprecated column or comment).
          Write tests/unit/test_event_signal_transport.py and tests/integration/test_signal_events.py.

