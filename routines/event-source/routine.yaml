id: "event-source"
name: "Event-Driven Migration"
description: |
  Migrate the Orchestrator from dual-write state-mutation-first architecture to a true
  event-sourced system where the append-only event log is the single source of truth.
  Six phases: Pydantic event conversion (M0), event store foundation (M1), projection
  infrastructure (M2), command-event refactor of RunRepository (M3), signal system
  migration (M4), and output batching + cleanup (M5).

inputs:
  - name: feature
    required: false
    default: "event-source"
    description: "Feature slug (used for docs/{{feature}}/ artifacts)"

steps:
  - id: "S-00"
    title: "Pydantic Event Conversion"
    step_context: "Convert all WorkflowEvent dataclasses to Pydantic BaseModel and update serialization call sites. All existing tests must pass after this preparatory step."
    tasks:
      - id: "T-01"
        title: "Convert WorkflowEvent subclasses and update serialization call sites"
        task_context: |
          Convert WorkflowEvent base class and all ~30 subclasses in
          src/orchestrator/workflow/events/types.py from @dataclass to Pydantic BaseModel.
          Also convert the nested GradeDetail dataclass. Key changes per class:
          - Remove @dataclass decorator; inherit from WorkflowEvent (which now inherits BaseModel)
          - Replace field(default_factory=...) with Field(default_factory=...)
          - WorkflowEvent.timestamp: Field(default_factory=lambda: datetime.now(timezone.utc))
          - Remove custom __init__ from ClarificationRequested and ClarificationResponded

          Update serialization call sites:
          - src/orchestrator/db/access/event_store.py: replace dataclasses.asdict() with event.model_dump(mode="json")
          - src/orchestrator/api/websocket.py: replace dataclasses.asdict() with event.model_dump(mode="json")

          Create tests/unit/test_pydantic_events.py covering every concrete event type with
          construct/serialize/deserialize round-trip assertions. Verify enum fields serialize to
          their .value strings and datetime fields produce ISO 8601 strings. Preserve every
          existing event_type string value.

          See docs/event-source/steps/step-00-plan.md for dry-run hardening guidance.
        context_from:
          - artifact: "docs/event-source/steps/step-00-plan.md"
            as: "step_plan"
            required: true
          - artifact: "docs/event-source/architecture.md"
            as: "architecture"
            required: false
        requirements:
          - id: "R1"
            desc: "All WorkflowEvent subclasses converted to Pydantic BaseModel; no @dataclass decorator remains; mutable defaults use Field(default_factory=...); GradeDetail also converted"
            priority: critical
          - id: "R2"
            desc: "Serialization call sites in event_store.py and websocket.py use model_dump(mode='json'); no dataclasses.asdict calls remain in those files"
            priority: critical
          - id: "R3"
            desc: "tests/unit/test_pydantic_events.py covers every concrete event type with round-trip assertions; all existing unit tests pass"
            priority: critical
        auto_verify:
          items:
            - id: "pydantic_roundtrip"
              cmd: "uv run python -c \"from orchestrator.workflow.events.types import RunStatusChanged, AgentOutputEvent; e = RunStatusChanged(run_id='r1', old_status='queued', new_status='active'); j = e.model_dump_json(); r = RunStatusChanged.model_validate_json(j); assert r.run_id == 'r1', 'round-trip failed'\""
              must: true
            - id: "no_dataclass_in_types"
              cmd: "uv run python -c \"import pathlib; src = pathlib.Path('src/orchestrator/workflow/events/types.py').read_text(); assert '@dataclass' not in src, '@dataclass still present in types.py'\""
              must: true
            - id: "no_asdict_in_callsites"
              cmd: "uv run python -c \"import pathlib; es = pathlib.Path('src/orchestrator/db/access/event_store.py').read_text(); ws = pathlib.Path('src/orchestrator/api/websocket.py').read_text(); assert 'asdict' not in es and 'asdict' not in ws, 'dataclasses.asdict still used in serialization call sites'\""
              must: true
            - id: "pydantic_tests"
              cmd: "uv run pytest tests/unit/test_pydantic_events.py -v"
              must: true
            - id: "unit_suite"
              cmd: "uv run pytest tests/unit -v"
              must: true
        verifier:
          rubric:
            - id: "R1"
              text: "R1 — A: all WorkflowEvent subclasses are Pydantic BaseModel with Field(default_factory=...) for mutable defaults; no @dataclass decorators remain; GradeDetail converted. B: mostly converted but one or two classes still use @dataclass or raw mutable defaults."
            - id: "R2"
              text: "R2 — A: event_store.py and websocket.py use model_dump(mode='json') exclusively; no asdict calls remain in those files. B: updated but one legacy path still uses asdict."
            - id: "R3"
              text: "R3 — A: test_pydantic_events.py exercises every concrete type with construct/serialize/deserialize; confirms enums serialize to value strings and datetimes to ISO 8601; all unit tests pass. B: test exists but incomplete coverage or one test fails."
          submission_template:
            grade_scale: [A, B, C, D, F]
            require_reason_if_below: "B"
            require_remediation_if_below: "C"

  - id: "S-01"
    title: "Event Store Foundation"
    step_context: "Build the unified SQLite event store (events_v2), concurrency strategy, JSONL outbox observer, and wire PersistentEventEmitter to use it. Preserve legacy EventStore during transition."
    tasks:
      - id: "T-01"
        title: "events_v2 ORM model and Alembic migration"
        task_context: |
          Add EventV2Model to src/orchestrator/db/orm/models.py and create an Alembic migration
          that creates the events_v2 table. Schema: position (INTEGER PK autoincrement),
          aggregate_id (TEXT NOT NULL), event_type (TEXT NOT NULL), payload (TEXT NOT NULL),
          timestamp (TEXT NOT NULL), version (INTEGER NOT NULL). Add UNIQUE(aggregate_id, version),
          idx_events_v2_aggregate on (aggregate_id, position), idx_events_v2_type on
          (event_type, position). Export EventV2Model from src/orchestrator/db/__init__.py.
          Do not modify any existing migration or ORM class.

          See docs/event-source/steps/step-01-plan.md Task 1.1 for naming conventions.
        context_from:
          - artifact: "docs/event-source/steps/step-01-plan.md"
            as: "step_plan"
            required: true
        requirements:
          - id: "R1"
            desc: "EventV2Model ORM class with correct schema; Alembic migration creates events_v2 with UNIQUE(aggregate_id, version) constraint and both indexes; migration is reversible"
            priority: critical
          - id: "R2"
            desc: "EventV2Model exported from orchestrator.db; init_db runs migration cleanly on an empty DB"
            priority: expected
        auto_verify:
          items:
            - id: "event_v2_import"
              cmd: "uv run python -c \"from orchestrator.db import EventV2Model; assert EventV2Model.__tablename__ == 'events_v2', 'wrong tablename'\""
              must: true
            - id: "migration_runs"
              cmd: "uv run python -c \"import asyncio; from orchestrator.db.access.connection import init_db; asyncio.run(init_db('sqlite+aiosqlite://'))\""
              must: true
        verifier:
          rubric:
            - id: "R1"
              text: "R1 — A: EventV2Model has all required columns with correct types; migration creates the table with UNIQUE(aggregate_id, version) and both indexes; downgrade drops cleanly. B: schema exists but missing an index or the unique constraint."
            - id: "R2"
              text: "R2 — A: EventV2Model importable from orchestrator.db; init_db completes without error on a fresh DB. B: importable but migration has minor issues."
          submission_template:
            grade_scale: [A, B, C, D, F]
            require_reason_if_below: "B"
            require_remediation_if_below: "C"

      - id: "T-02"
        title: "SqliteEventStore, EventStore protocol, and ConcurrencyStrategy"
        task_context: |
          Create two new files:
          1. src/orchestrator/db/access/concurrency.py: ConcurrencyConflictError exception,
             ConcurrencyStrategy base class, RetryWithBackoff (max_attempts=3, base_delay_ms=10.0).
             RetryWithBackoff retries only UNIQUE constraint violations; re-raises all other
             exceptions immediately; raises ConcurrencyConflictError after exhausting attempts.
          2. src/orchestrator/db/access/event_store_v2.py: StoredEvent frozen dataclass,
             EventStore Protocol (append, get_stream, get_all), SqliteEventStore implementation.
             append() fetches current max version per aggregate, assigns next version, flushes
             to events_v2, notifies listeners. Use TYPE_CHECKING guard for WorkflowEvent import.

          Do not modify the existing event_store.py. Export new symbols from orchestrator.db.
          Write tests/unit/test_event_store_v2.py (>=5 tests) and
          tests/unit/test_concurrency_strategy.py (>=4 tests). No mocking — real in-memory SQLite.

          See docs/event-source/steps/step-01-plan.md Tasks 1.2 and 1.5 for implementation details.
        context_from:
          - artifact: "docs/event-source/steps/step-01-plan.md"
            as: "step_plan"
            required: true
        requirements:
          - id: "R1"
            desc: "SqliteEventStore implements append/get_stream/get_all; version auto-increments per aggregate; ConcurrencyConflictError raised after max_attempts on version conflict"
            priority: critical
          - id: "R2"
            desc: "RetryWithBackoff re-raises non-conflict exceptions immediately without retrying or wrapping in ConcurrencyConflictError"
            priority: critical
          - id: "R3"
            desc: "Unit tests test_event_store_v2.py and test_concurrency_strategy.py pass with real in-memory SQLite"
            priority: critical
        auto_verify:
          items:
            - id: "imports"
              cmd: "uv run python -c \"from orchestrator.db.access.event_store_v2 import SqliteEventStore, EventStore, StoredEvent; from orchestrator.db.access.concurrency import RetryWithBackoff, ConcurrencyConflictError; print('ok')\""
              must: true
            - id: "store_tests"
              cmd: "uv run pytest tests/unit/test_event_store_v2.py -v"
              must: true
            - id: "concurrency_tests"
              cmd: "uv run pytest tests/unit/test_concurrency_strategy.py -v"
              must: true
        verifier:
          rubric:
            - id: "R1"
              text: "R1 — A: SqliteEventStore.append() increments version per aggregate, writes to events_v2, get_stream and get_all return events in correct order; listener notified. B: functional but missing one method or version logic is incorrect."
            - id: "R2"
              text: "R2 — A: RetryWithBackoff only retries UNIQUE conflict errors; ValueError/other exceptions propagate on the first attempt without wrapping. B: retry logic present but treats all exceptions as conflicts."
            - id: "R3"
              text: "R3 — A: all tests in both files pass with real in-memory SQLite; listener-callback test verifies post-append notification; conflict-retry test uses injected callable. B: tests mostly pass but one scenario missing."
          submission_template:
            grade_scale: [A, B, C, D, F]
            require_reason_if_below: "B"
            require_remediation_if_below: "C"

      - id: "T-03"
        title: "JsonlOutboxObserver and wiring into SqliteEventStore"
        task_context: |
          Create src/orchestrator/db/access/jsonl_outbox.py with JsonlOutboxObserver. The
          observer subscribes to SqliteEventStore post-append notifications and writes events
          to the JSONL file keyed by event position. Re-calling with the same position is a
          no-op (idempotent). JSONL write failures must be caught and logged at WARNING level
          without propagating. The __call__ signature is (events: list[StoredEvent]) -> None.
          JSONL records must include: position, aggregate_id, event_type, timestamp, payload (parsed).

          Update SqliteEventStore._listeners typing to list[Callable[[list[StoredEvent]], Awaitable[None]]].

          Then update src/orchestrator/api/deps.py: add get_event_store_v2() dependency that
          constructs SqliteEventStore with JsonlOutboxObserver registered as a post-append listener.
          Update get_workflow_service() to pass the new store to PersistentEventEmitter.
          Export SqliteEventStore, StoredEvent, ConcurrencyConflictError, RetryWithBackoff from
          orchestrator.db. Keep legacy EventStore and get_event_store paths untouched.

          Write tests/unit/test_jsonl_outbox.py (>=4 tests: single write, idempotent, multiple,
          failure-swallowed). Add tests/integration/test_event_store_wiring.py that constructs
          SqliteEventStore + JsonlOutboxObserver, calls PersistentEventEmitter.emit(event), and
          asserts both an events_v2 row and a JSONL line are produced.

          See docs/event-source/steps/step-01-plan.md Tasks 1.3, 1.4, 1.5.
        context_from:
          - artifact: "docs/event-source/steps/step-01-plan.md"
            as: "step_plan"
            required: true
        requirements:
          - id: "R1"
            desc: "JsonlOutboxObserver writes JSONL keyed by position; re-calling with same position is a no-op; write failures are caught and logged without propagating"
            priority: critical
          - id: "R2"
            desc: "PersistentEventEmitter wired to SqliteEventStore in deps.py; emitting an event writes to events_v2 AND JSONL via JsonlOutboxObserver"
            priority: critical
          - id: "R3"
            desc: "test_jsonl_outbox.py and test_event_store_wiring.py pass; full test suite passes with no regressions"
            priority: critical
        auto_verify:
          items:
            - id: "jsonl_import"
              cmd: "uv run python -c \"from orchestrator.db.access.jsonl_outbox import JsonlOutboxObserver; from orchestrator.db import SqliteEventStore, StoredEvent; print('ok')\""
              must: true
            - id: "jsonl_tests"
              cmd: "uv run pytest tests/unit/test_jsonl_outbox.py -v"
              must: true
            - id: "wiring_test"
              cmd: "uv run pytest tests/integration/test_event_store_wiring.py -v"
              must: true
            - id: "full_suite"
              cmd: "uv run pytest -v"
              must: true
        verifier:
          rubric:
            - id: "R1"
              text: "R1 — A: observer writes one JSONL line per unique position; calling twice with same position produces exactly one line; __call__ body wrapped in try/except; failure logged at WARNING and not propagated. B: writes correctly but idempotency not enforced or exceptions may propagate."
            - id: "R2"
              text: "R2 — A: deps.py get_event_store_v2() wires SqliteEventStore to PersistentEventEmitter with JsonlOutboxObserver registered; emitting produces both a DB row and JSONL line. B: wired but JSONL observer not registered or emit path bypasses new store."
            - id: "R3"
              text: "R3 — A: all four test scenarios in test_jsonl_outbox.py pass; integration test constructs wired store and asserts both DB row and JSONL line; full suite passes. B: tests pass but integration wiring test is missing or incomplete."
          submission_template:
            grade_scale: [A, B, C, D, F]
            require_reason_if_below: "B"
            require_remediation_if_below: "C"

  - id: "S-02"
    title: "Projection Infrastructure"
    step_context: "Build the projection framework: Projector protocol, ProjectionRegistry, concrete projectors, projection_checkpoints table, and rebuild-projections CLI command."
    tasks:
      - id: "T-01"
        title: "ProjectionCheckpointModel ORM model, Alembic migration, and Projector protocol"
        task_context: |
          1. Add ProjectionCheckpointModel to src/orchestrator/db/orm/models.py. Table name:
             'projection_checkpoints'. Columns: projector_name (TEXT, PK), last_position
             (INTEGER, NOT NULL, default 0), updated_at (TEXT, NOT NULL). Create Alembic migration.
             Export from orchestrator.db.

          2. Create src/orchestrator/db/projections/ package with registry.py defining:
             - Projector Protocol: handle(event, session) -> None, rebuild(events, session) -> None,
               handled_events: frozenset[type] class attribute
             - ProjectionRegistry: register(), __call__(stored_events, session, workflow_events),
               rebuild_all(all_events, session). Projector exceptions during dispatch propagate and
               abort the append transaction. Per-projector checkpoints advance only when that
               projector handled at least one event in the batch.

          Export Projector and ProjectionRegistry from orchestrator.db.projections.
          See docs/event-source/steps/step-02-plan.md Tasks 2.1 and 2.2.
        context_from:
          - artifact: "docs/event-source/steps/step-02-plan.md"
            as: "step_plan"
            required: true
        requirements:
          - id: "R1"
            desc: "ProjectionCheckpointModel ORM class with correct schema; Alembic migration creates projection_checkpoints table; Projector protocol and ProjectionRegistry implemented"
            priority: critical
          - id: "R2"
            desc: "Registry dispatches events only to projectors that declare the type in handled_events; projector exceptions propagate; checkpoint advances only for projectors that handled events"
            priority: critical
        auto_verify:
          items:
            - id: "checkpoint_import"
              cmd: "uv run python -c \"from orchestrator.db import ProjectionCheckpointModel; assert ProjectionCheckpointModel.__tablename__ == 'projection_checkpoints'\""
              must: true
            - id: "registry_import"
              cmd: "uv run python -c \"from orchestrator.db.projections import Projector, ProjectionRegistry; r = ProjectionRegistry(); print('ok')\""
              must: true
            - id: "migration_runs"
              cmd: "uv run python -c \"import asyncio; from orchestrator.db.access.connection import init_db; asyncio.run(init_db('sqlite+aiosqlite://'))\""
              must: true
        verifier:
          rubric:
            - id: "R1"
              text: "R1 — A: ProjectionCheckpointModel has projector_name (PK), last_position (int default 0), updated_at; Projector protocol has handle/rebuild/handled_events; ProjectionRegistry has register/__call__/rebuild_all. B: schema exists but deviates from spec, or one protocol method missing."
            - id: "R2"
              text: "R2 — A: registry dispatches only to projectors with matching handled_events; projector exceptions propagate (not swallowed); checkpoints upserted only for projectors that handled at least one event. B: dispatch works but checkpoint logic is incorrect or exceptions are caught."
          submission_template:
            grade_scale: [A, B, C, D, F]
            require_reason_if_below: "B"
            require_remediation_if_below: "C"

      - id: "T-02"
        title: "Concrete projectors, registry wiring, and rebuild-projections CLI"
        task_context: |
          1. Create concrete projectors:
             - src/orchestrator/db/projections/run_state.py: RunStateProjector handling
               RunStatusChanged, StepCompleted, StepSkipped, RunStepBackward, GradesEvaluated,
               AutoVerifyCompleted, ChecklistGateEvaluated, HealthCheckEvent. Placeholder
               case_: pass for RunCreated/TaskCreated (Step 03 fills these in).
             - src/orchestrator/db/projections/task_state.py: TaskStateProjector handling
               TaskStatusChanged, ClarificationRequested, ClarificationResponded, ApprovalRequested,
               ApprovalDecision, TaskReverted, FanOutSpawned, ChildSpawned, ChildCompleted,
               ChildFailed, FanOutCompleted.
             Export both from orchestrator.db.projections.

          2. Update SqliteEventStore in event_store_v2.py: add add_projection_listener() method
             that stores listeners receiving (stored_events, session, workflow_events). In deps.py,
             create ProjectionRegistry, register both projectors, call store.add_projection_listener(registry).

          3. Add 'orchestrator db rebuild-projections' CLI command to src/orchestrator/cli/db.py:
             - Check for server lock file (exit 1 if present)
             - Get all events from SqliteEventStore.get_all()
             - Add deserialize_event() helper to orchestrator.workflow.events that dispatches
               on event_type string and calls model_validate_json() on the correct class
             - Clear projection-owned tables (RunModel, TaskModel, ProjectionCheckpointModel)
             - Call registry.rebuild_all(events, session)

          Write tests/unit/test_projectors.py (>=7 tests) and test_projection_rebuild.py (>=4 tests).
          Write tests/integration/test_projection_recovery.py (full lifecycle rebuild test).
          See docs/event-source/steps/step-02-plan.md Tasks 2.3, 2.4, 2.5.
        context_from:
          - artifact: "docs/event-source/steps/step-02-plan.md"
            as: "step_plan"
            required: true
        requirements:
          - id: "R1"
            desc: "RunStateProjector and TaskStateProjector implemented; each handles declared event types and updates correct read-model tables; unknown events silently skipped"
            priority: critical
          - id: "R2"
            desc: "orchestrator db rebuild-projections CLI command exists; exits 1 if server lock file present; clears and replays all events through projectors"
            priority: critical
          - id: "R3"
            desc: "Unit tests test_projectors.py (>=7) and test_projection_rebuild.py (>=4) pass; integration test test_projection_recovery.py passes"
            priority: critical
        auto_verify:
          items:
            - id: "projectors_import"
              cmd: "uv run python -c \"from orchestrator.db.projections import RunStateProjector, TaskStateProjector; r = RunStateProjector(); t = TaskStateProjector(); print('ok')\""
              must: true
            - id: "cli_help"
              cmd: "uv run orchestrator db --help"
              must: true
            - id: "projector_tests"
              cmd: "uv run pytest tests/unit/test_projectors.py -v"
              must: true
            - id: "rebuild_tests"
              cmd: "uv run pytest tests/unit/test_projection_rebuild.py -v"
              must: true
            - id: "recovery_test"
              cmd: "uv run pytest tests/integration/test_projection_recovery.py -v"
              must: true
            - id: "full_suite"
              cmd: "uv run pytest -v"
              must: true
        verifier:
          rubric:
            - id: "R1"
              text: "R1 — A: RunStateProjector handles RunStatusChanged (updates runs.status), StepCompleted (updates steps.completed), etc.; TaskStateProjector handles TaskStatusChanged, ClarificationRequested; handled_events is frozenset; unknown events use case _: pass. B: projectors exist but one handler is incomplete or handled_events is wrong type."
            - id: "R2"
              text: "R2 — A: 'rebuild-projections' appears in orchestrator db --help; command exits 1 if lock file present; clears projection tables before replay; runs rebuild_all. B: command exists but lock check or table-clear logic is incomplete."
            - id: "R3"
              text: "R3 — A: test_projectors.py has >=7 tests covering status changes, step completion, clarification handling, and unknown-event no-op; test_projection_rebuild.py has >=4 tests; recovery integration test creates run, corrupts read model, rebuilds, asserts API correct; all pass. B: tests exist but one file has fewer than the minimum count."
          submission_template:
            grade_scale: [A, B, C, D, F]
            require_reason_if_below: "B"
            require_remediation_if_below: "C"

  - id: "S-03"
    title: "Command-Event Refactor of RunRepository"
    step_context: "Replace all RunRepository write methods with command handlers that emit events. Make RunRepository read-only. Enable full empty-DB rebuild via RunCreated/TaskCreated events."
    tasks:
      - id: "T-01"
        title: "New event types and command module"
        task_context: |
          Add 9 new Pydantic WorkflowEvent subclasses to src/orchestrator/workflow/events/types.py:
          RunCreated, TaskCreated, TaskAttemptCreated, AttemptUpdated,
          ParentOversightFactsUpdated, FanOutChildrenCreated, FanOutChildrenReset,
          FanOutChildRetried, StepIndexRewound.
          Export all 9 from orchestrator.workflow.events.

          Create src/orchestrator/workflow/commands/ package with three modules:
          - run_lifecycle.py: CreateRunCommand/handle_create_run, CreateTaskCommand/handle_create_task
          - status_mutations.py: UpdateRunStatusCommand/handle_update_run_status,
            UpdateTaskStatusCommand/handle_update_task_status,
            RewindStepIndexCommand/handle_rewind_step_index
          - attempt_and_fanout.py: CreateTaskAttemptCommand, UpdateLatestAttemptCommand,
            UpdateParentOversightFactsCommand, CreateFanOutChildrenCommand,
            ResetFanOutChildrenCommand, RetryFanOutChildCommand, and their handlers.
          Export all command classes and handlers from orchestrator.workflow.commands.

          Update RunStateProjector to handle RunCreated (create RunModel row from event fields)
          and TaskStateProjector to handle TaskCreated (create TaskModel row from event fields).

          Extend tests/unit/test_pydantic_events.py with round-trip tests for all 9 new types.

          See docs/event-source/steps/step-03-plan.md Tasks 3.1, 3.2, 3.3, 3.4.
        context_from:
          - artifact: "docs/event-source/steps/step-03-plan.md"
            as: "step_plan"
            required: true
        requirements:
          - id: "R1"
            desc: "All 9 new event types defined as Pydantic BaseModel subclasses; round-trip serialization works for each"
            priority: critical
          - id: "R2"
            desc: "All three command modules created with correct handler signatures; all symbols importable from orchestrator.workflow.commands"
            priority: critical
          - id: "R3"
            desc: "RunStateProjector handles RunCreated (creates RunModel row); TaskStateProjector handles TaskCreated (creates TaskModel row); projector tests confirm"
            priority: critical
        auto_verify:
          items:
            - id: "new_events_import"
              cmd: "uv run python -c \"from orchestrator.workflow.events import RunCreated, TaskCreated, TaskAttemptCreated, AttemptUpdated, ParentOversightFactsUpdated, FanOutChildrenCreated, FanOutChildrenReset, FanOutChildRetried, StepIndexRewound; print('ok')\""
              must: true
            - id: "commands_import"
              cmd: "uv run python -c \"from orchestrator.workflow.commands import CreateRunCommand, handle_create_run, CreateTaskCommand, handle_create_task, UpdateRunStatusCommand, handle_update_run_status, UpdateTaskStatusCommand, handle_update_task_status, CreateTaskAttemptCommand, handle_create_task_attempt, UpdateLatestAttemptCommand, handle_update_latest_attempt, UpdateParentOversightFactsCommand, handle_update_parent_oversight_facts, CreateFanOutChildrenCommand, handle_create_fan_out_children, ResetFanOutChildrenCommand, handle_reset_fan_out_children, RetryFanOutChildCommand, handle_retry_fan_out_child; print('ok')\""
              must: true
            - id: "pydantic_tests_extended"
              cmd: "uv run pytest tests/unit/test_pydantic_events.py -v"
              must: true
        verifier:
          rubric:
            - id: "R1"
              text: "R1 — A: all 9 new event types inherit WorkflowEvent (Pydantic BaseModel); each has correct fields; round-trip test covers all 9 new types. B: events defined but one or two have incorrect field types or are missing."
            - id: "R2"
              text: "R2 — A: all three command modules (run_lifecycle.py, status_mutations.py, attempt_and_fanout.py) exist with correct async handler signatures using TYPE_CHECKING guards; all symbols importable. B: commands exist but one module missing or has import errors."
