routine:
  id: demo-task
  name: Demo Task Workflow
  description: A simple multi-step routine demonstrating both automatic and LLM verification with achievable goals.
  inputs:
    - name: project_name
      required: false
      default: demo
      description: Name for the demo project files
  steps:
    - id: S-01
      title: Create Files
      step_context: Create basic project files for demonstration.
      tasks:
        - id: T-01
          title: Create README
          task_context: |
            Create a README.md file with basic project information.
            The file should contain at least a title and description.
          requirements:
            - id: R-01
              desc: README.md file exists
              priority: critical
            - id: R-02
              desc: README contains a title (# heading)
              priority: expected
          auto_verify:
            items:
              - id: file_exists
                cmd: test -f README.md && echo "README.md exists"
              - id: has_title
                cmd: grep -q "^# " README.md && echo "Has title heading"
            tail_lines: 10
          retry:
            max_attempts: 3

        - id: T-02
          title: Create Config File
          task_context: |
            Create a config.json file with basic configuration.
            Include at least a "name" and "version" field.
          requirements:
            - id: R-03
              desc: config.json file exists
              priority: critical
            - id: R-04
              desc: Config has name field
              priority: expected
            - id: R-05
              desc: Config has version field
              priority: nice
          auto_verify:
            items:
              - id: config_exists
                cmd: test -f config.json && echo "config.json exists"
              - id: valid_json
                cmd: python3 -c "import json; json.load(open('config.json'))" && echo "Valid JSON"
              - id: has_name
                cmd: python3 -c "import json; d=json.load(open('config.json')); assert 'name' in d" && echo "Has name"
                must: false
            tail_lines: 15
          retry:
            max_attempts: 2

    - id: S-02
      title: Documentation Review
      step_context: Review the created documentation for quality.
      tasks:
        - id: T-03
          title: Review Documentation Quality
          task_context: |
            Review the README.md and config.json files created in the previous step.
            Evaluate the quality and completeness of the documentation.
          requirements:
            - id: R-06
              desc: Documentation is clear and readable
              priority: critical
            - id: R-07
              desc: All files are properly formatted
              priority: expected
            - id: R-08
              desc: Documentation follows best practices
              priority: nice
          verifier:
            rubric:
              - id: clarity
                text: Is the documentation clear and easy to understand?
              - id: completeness
                text: Does the documentation cover the essential information?
              - id: formatting
                text: Are the files properly formatted (markdown, JSON)?
            submission_template:
              grade_scale: [A, B, C, D, F]
              require_reason_if_below: A
              require_remediation_if_below: B
          retry:
            max_attempts: 2
