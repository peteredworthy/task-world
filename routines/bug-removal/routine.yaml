id: "bug-removal"
name: "Bug and Gap Removal"
description: |
  Fix 10 identified bugs and UI gaps in priority order: backend agent lifecycle issues first
  (they block autonomous operation), then the recovery API (critical for non-technical users),
  then MCP phase filtering (reduces wasted tool calls), and finally all frontend-only gaps
  ordered by severity. Each step is independently deployable and verified before the next begins.

  Milestone 1: Backend Agent Reliability (Steps 1-4)
  Milestone 2: MCP Phase Filtering + High-Severity UI (Steps 5-6)
  Milestone 3: Medium-Severity UI Gaps (Steps 7-9)
  Milestone 4: Low-Severity UI Gaps (Steps 10-12)

steps:
  - id: "S-01"
    title: "Fix GateBlockedError Handling (Backend)"
    step_context: |
      Fix AGENT-DEATH-HUMAN-GATE bug. GateBlockedError raised by on_submit() currently falls
      through to the generic except Exception handler in cli.py, causing it to be wrapped as
      AgentExecutionError and triggering on_agent_died. After this fix, a gate-blocked submit
      causes the executor to keep the task in BUILDING state and retry with feedback.
      This step is a prerequisite for Step 2 (human gate prompt rewrite).
    tasks:
      - id: "T-01"
        title: "Add GateBlockedError re-raise in cli.py"
        task_context: |
          Import GateBlockedError from workflow/errors.py and add an explicit re-raise before
          the generic except Exception block in cli.py's execute() method so it propagates to
          executor.py.

          Steps:
          1. Open src/orchestrator/agents/cli.py and locate the execute() method
          2. Add the import at the top of the file:
             from orchestrator.workflow.errors import GateBlockedError
          3. Inside execute(), add except GateBlockedError: raise BEFORE the generic
             except Exception block
          4. Verify only cli.py is changed in this task

          Verification:
          - grep -n "GateBlockedError" src/orchestrator/agents/cli.py shows both import and re-raise
          - uv run ruff check src/orchestrator/agents/cli.py exits 0
          - uv run pyright src/orchestrator/agents/cli.py exits 0
        requirements:
          - id: "R1"
            desc: "GateBlockedError is imported in cli.py from orchestrator.workflow.errors"
            priority: critical
          - id: "R2"
            desc: "GateBlockedError is explicitly re-raised (not wrapped as AgentExecutionError)"
            priority: critical
        auto_verify:
          items:
            - id: "gate_blocked_imported"
              cmd: "grep -n 'GateBlockedError' src/orchestrator/agents/cli.py | grep -q 'import'"
              must: true
            - id: "gate_blocked_reraised"
              cmd: "grep -n 'except GateBlockedError' src/orchestrator/agents/cli.py | grep -q 'raise'"
              must: true
        verifier:
          rubric:
            - id: "correctness"
              text: |
                R1/R2 — A: GateBlockedError is imported and re-raised explicitly before the generic
                except Exception block in cli.py's execute(). B: import or re-raise is present but
                placement is incorrect (e.g., after generic handler).
        retry:
          max_attempts: 2

      - id: "T-02"
        title: "Catch GateBlockedError in executor.py"
        task_context: |
          In executor.py's _execute_task, catch GateBlockedError from await agent.execute(...),
          log a warning, and return without calling on_agent_died or on_error. This leaves the
          task in BUILDING state so the executor loop retries automatically.

          Steps:
          1. Open src/orchestrator/agents/executor.py and locate _execute_task
          2. Add the import: from orchestrator.workflow.errors import GateBlockedError
          3. In _execute_task, add the catch BEFORE the generic exception handler:
             except GateBlockedError:
                 logger.warning("Agent submit blocked by gate — task remains BUILDING, will retry")
                 return
          4. Verify the task is NOT transitioned or marked failed — simply return

          Verification:
          - grep -n "GateBlockedError" src/orchestrator/agents/executor.py shows import and catch
          - uv run ruff check src/orchestrator/agents/executor.py exits 0
          - uv run pyright src/orchestrator/agents/executor.py exits 0
        requirements:
          - id: "R1"
            desc: "GateBlockedError is caught in executor.py _execute_task without calling on_agent_died"
            priority: critical
          - id: "R2"
            desc: "Task remains in BUILDING state after gate-blocked submit"
            priority: critical
        auto_verify:
          items:
            - id: "gate_blocked_caught"
              cmd: "grep -n 'GateBlockedError' src/orchestrator/agents/executor.py | grep -q 'except'"
              must: true
        verifier:
          rubric:
            - id: "correctness"
              text: |
                R1/R2 — A: GateBlockedError is caught in _execute_task, returns without calling
                on_agent_died, and the task status remains BUILDING. B: error is caught but
                on_agent_died may still be called in some code path.
        retry:
          max_attempts: 2

      - id: "T-03"
        title: "Write unit tests for GateBlockedError handling"
        task_context: |
          Write unit tests that verify cli.py re-raises GateBlockedError (not wrapping it) and
          that executor.py's _execute_task returns without calling on_agent_died when a
          gate-blocked error occurs.

          Steps:
          1. Create or extend tests/unit/agents/test_gate_blocked.py
          2. Test 1 — cli.py re-raise: mock on_submit to raise GateBlockedError; call execute();
             assert GateBlockedError propagates (not wrapped as AgentExecutionError)
          3. Test 2 — executor.py no on_agent_died: mock agent that raises GateBlockedError;
             call _execute_task; assert on_agent_died was NOT called and task is BUILDING
          4. Run: pytest tests/ -k "gate_blocked" -v and confirm both tests pass

          Verification:
          - pytest tests/ -k "gate_blocked" -v exits 0 with both tests PASSED
          - Test file exists at tests/unit/agents/test_gate_blocked.py
        requirements:
          - id: "R1"
            desc: "Unit test for cli.py GateBlockedError propagation exists and passes"
            priority: critical
          - id: "R2"
            desc: "Unit test for executor.py retry-without-death behavior exists and passes"
            priority: critical
        auto_verify:
          items:
            - id: "test_file_exists"
              cmd: "test -f tests/unit/agents/test_gate_blocked.py"
              must: true
            - id: "tests_pass"
              cmd: "uv run pytest tests/ -k 'gate_blocked' -q 2>&1 | grep -q 'passed'"
              must: true
        verifier:
          rubric:
            - id: "test_coverage"
              text: |
                R1/R2 — A: both tests exist and pass; cli.py re-raise test and executor.py
                no-death test are clearly separate and independently verifiable.
                B: only one test present or both test the same behavior.
        retry:
          max_attempts: 2

  - id: "S-02"
    title: "Rewrite Human Gate Task Prompts (Routine)"
    step_context: |
      Fix AGENT-DEATH-HUMAN-GATE bug (part 2). Replace no-op wait instructions in idea-to-plan.yaml
      human gate tasks (S-02 and S-08) with actionable prompts that direct the CLI agent to verify
      human feedback annotations in artifact files, mark the checklist requirement done or blocked,
      and submit. Prerequisite: Step 1 must be deployed first.
    tasks:
      - id: "T-01"
        title: "Update S-02 T-01 human gate prompt in idea-to-plan.yaml"
        task_context: |
          Replace the current no-op Await Human Feedback task context in S-02 T-01 with an
          actionable verification prompt. The new prompt must instruct the agent to check artifact
          files for [HUMAN] annotations, mark R1 as done if confirmed, or mark blocked if absent.

          Steps:
          1. Open routines/idea-to-plan.yaml and locate the S-02 T-01 task definition
          2. Replace the task_context with actionable instructions:
             - Check docs/{{feature}}/intent.md, plan.md, design-questions.md, architecture.md
               for [HUMAN] annotations
             - If annotations found: mark R1 done and submit
             - If no annotations found: mark R1 blocked with note "Awaiting human review —
               no [HUMAN] annotations found in artifact files" and submit
          3. Preserve task IDs, step structure, requirement IDs, and {{feature}} template variable
          4. Validate YAML after change: python -c "import yaml; yaml.safe_load(open('routines/idea-to-plan.yaml'))"

          Verification:
          - python -c "import yaml; yaml.safe_load(open('routines/idea-to-plan.yaml'))" exits 0
          - grep -A 20 "S-02" routines/idea-to-plan.yaml | grep -c "done" returns at least 1
          - grep -A 20 "S-02" routines/idea-to-plan.yaml | grep -c "blocked" returns at least 1
        requirements:
          - id: "R1"
            desc: "S-02 T-01 task_context contains actionable file-check and mark-done/blocked instructions"
            priority: critical
          - id: "R2"
            desc: "YAML remains syntactically valid after changes"
            priority: critical
          - id: "R3"
            desc: "{{feature}} template variable is preserved verbatim"
            priority: critical
        auto_verify:
          items:
            - id: "yaml_valid"
              cmd: "python -c \"import yaml; yaml.safe_load(open('routines/idea-to-plan.yaml'))\""
              must: true
        verifier:
          rubric:
            - id: "actionability"
              text: |
                R1 — A: new prompt contains specific file paths with {{feature}} template variable,
                explicit mark-done and mark-blocked branches with notes, and submit instruction.
                B: prompt is improved but missing one of the three elements.
        retry:
          max_attempts: 2

      - id: "T-02"
        title: "Update S-08 human gate prompt in idea-to-plan.yaml"
        task_context: |
          Apply the same actionable prompt pattern to the S-08 final review gate task. S-08 is
          the final plan review human gate; its prompt should follow the same structure as S-02.

          Steps:
          1. In routines/idea-to-plan.yaml, locate the S-08 task definition
          2. Replace the S-08 task prompt with actionable verification pattern:
             - Check docs/{{feature}}/intent.md, plan.md, architecture.md for [HUMAN] annotations
             - If [HUMAN] annotations present: mark R1 done and submit
             - If no annotations: mark R1 blocked with note "Awaiting final human review —
               no [HUMAN] annotations found" and submit
          3. Preserve the rest of the S-08 task definition unchanged
          4. Validate YAML: python -c "import yaml; yaml.safe_load(open('routines/idea-to-plan.yaml'))"

          Verification:
          - python -c "import yaml; yaml.safe_load(open('routines/idea-to-plan.yaml'))" exits 0
          - grep -A 20 "S-08" routines/idea-to-plan.yaml | grep -c "done" returns at least 1
          - grep -A 20 "S-08" routines/idea-to-plan.yaml | grep -c "blocked" returns at least 1
        requirements:
          - id: "R1"
            desc: "S-08 task_context contains actionable [HUMAN] annotation check with mark-done/blocked branches"
            priority: critical
          - id: "R2"
            desc: "YAML remains syntactically valid after S-08 changes"
            priority: critical
        auto_verify:
          items:
            - id: "yaml_valid"
              cmd: "python -c \"import yaml; yaml.safe_load(open('routines/idea-to-plan.yaml'))\""
              must: true
        verifier:
          rubric:
            - id: "actionability"
              text: |
                R1 — A: S-08 prompt contains artifact paths with {{feature}} template variable,
                mark-done and mark-blocked branches, and submit instruction.
                B: prompt improved but missing one element.
        retry:
          max_attempts: 2

  - id: "S-03"
    title: "Implement Failed-Run Recovery API"
    step_context: |
      Fix FAILED-RUN-RECOVERY bug (backend). Add POST /api/runs/{id}/recover endpoint that lets
      a user roll a FAILED run back to a chosen task and resume from that point. FAILED is currently
      a terminal state with no outbound transitions. This step adds the endpoint, service method,
      schemas, and integration tests. COMPLETED run recovery is explicitly out of scope (deferred).
    tasks:
      - id: "T-01"
        title: "Add RecoverRequest and RecoverResponse schemas"
        task_context: |
          Add the Pydantic request and response schemas for the recovery endpoint to
          src/orchestrator/api/schemas/runs.py.

          Steps:
          1. Open src/orchestrator/api/schemas/runs.py
          2. Add RecoverRequest schema with fields:
             - target_task_id: str
             - additional_attempts: int = 1
             - agent_type: str | None = None
             - agent_config: dict | None = None
             - preserve_checklist: bool = False
          3. Add RecoverResponse schema with fields:
             - run_id: str
             - status: str
             - pause_reason: str | None
             - current_step_index: int | None
          4. Run uv run pyright src/orchestrator/api/schemas/runs.py to confirm no type errors

          Verification:
          - python -c "from orchestrator.api.schemas.runs import RecoverRequest, RecoverResponse; print('OK')" exits 0
          - uv run pyright src/orchestrator/api/schemas/runs.py exits 0
          - uv run ruff check src/orchestrator/api/schemas/runs.py exits 0
        requirements:
          - id: "R1"
            desc: "RecoverRequest is importable with all documented fields (target_task_id, preserve_checklist, etc.)"
            priority: critical
          - id: "R2"
            desc: "RecoverResponse is importable with run_id, status, pause_reason fields"
            priority: critical
        auto_verify:
          items:
            - id: "schemas_importable"
              cmd: "uv run python -c \"from orchestrator.api.schemas.runs import RecoverRequest, RecoverResponse; print('OK')\""
              must: true
        verifier:
          rubric:
            - id: "schema_completeness"
              text: |
                R1/R2 — A: both schemas are present with all required fields; types are correct
                (str, int, bool, None-able); pyright passes. B: schemas exist but field types
                are wrong or optional fields are missing.
        retry:
          max_attempts: 2

      - id: "T-02"
        title: "Implement WorkflowService.recover_run()"
        task_context: |
          Add recover_run() async method to WorkflowService implementing the recovery logic:
          validate FAILED status, reset target task, reset downstream tasks, restore worktree,
          transition run.

          Steps:
          1. Open src/orchestrator/workflow/service.py
          2. Add async recover_run() method with parameters:
             run_id, target_task_id, additional_attempts=1, agent_type=None,
             agent_config=None, preserve_checklist=False
          3. Implement the 8-step logic:
             1. Load run; assert FAILED status (raise ConflictError otherwise — 409 for ALL non-FAILED)
             2. Validate target_task_id belongs to this run
             3. Identify target task and all downstream tasks in execution order
             4. Reset target task: status → BUILDING, bump max_attempts
             5. Reset downstream tasks: status → PENDING, clear attempt records
             6. Reset downstream checklist items to open (unless preserve_checklist=True)
             7. Un-complete affected steps (completed → False)
             8. Restore worktree: git checkout {end_commit} (fall back to source_branch HEAD if absent)
             9. Transition run: FAILED → PAUSED, pause_reason="recovered"
          4. Use DB-recorded end_commit (not user-supplied refs) for security
          5. Return RecoverResponse with updated run state

          Verification:
          - uv run pyright src/orchestrator/workflow/service.py exits 0
          - uv run ruff check src/orchestrator/workflow/service.py exits 0
        requirements:
          - id: "R1"
            desc: "WorkflowService.recover_run() exists and is async"
            priority: critical
          - id: "R2"
            desc: "Run transitions from FAILED to PAUSED with pause_reason='recovered'"
            priority: critical
          - id: "R3"
            desc: "Returns 409 for ALL non-FAILED statuses (ACTIVE, PAUSED, COMPLETED)"
            priority: critical
          - id: "R4"
            desc: "preserve_checklist flag supported (default: reset to open)"
            priority: expected
        auto_verify:
          items:
            - id: "service_type_check"
              cmd: "uv run pyright src/orchestrator/workflow/service.py"
              must: true
        verifier:
          rubric:
            - id: "logic_correctness"
              text: |
                R1/R2/R3 — A: all 8 steps implemented; status transitions correct; COMPLETED and
                ACTIVE runs return 409; preserve_checklist flag works. B: core logic works but
                one edge case (preserve_checklist or COMPLETED 409) is missing.
        retry:
          max_attempts: 2

      - id: "T-03"
        title: "Add POST /api/runs/{id}/recover route"
        task_context: |
          Wire the WorkflowService.recover_run() method to a new FastAPI route in
          src/orchestrator/api/routers/runs.py.

          Steps:
          1. Open src/orchestrator/api/routers/runs.py
          2. Add the recovery route:
             @router.post("/{run_id}/recover", response_model=RecoverResponse)
             async def recover_run(run_id: str, body: RecoverRequest, service: WorkflowService = Depends(...))
          3. Handle exceptions: NotFoundError → 404, ConflictError → 409
          4. Import RecoverRequest, RecoverResponse from the schemas module

          Verification:
          - uv run pyright src/orchestrator/api/routers/runs.py exits 0
          - uv run ruff check src/orchestrator/api/routers/runs.py exits 0
          - python -c "from orchestrator.api.routers.runs import router; routes = [r.path for r in router.routes]; assert any('recover' in r for r in routes)" exits 0
        requirements:
          - id: "R1"
            desc: "POST /api/runs/{run_id}/recover route exists and is registered"
            priority: critical
          - id: "R2"
            desc: "Route returns 404 when run or task_id not found"
            priority: expected
          - id: "R3"
            desc: "Route returns 409 when run is not FAILED"
            priority: critical
        auto_verify:
          items:
            - id: "route_registered"
              cmd: "uv run python -c \"from orchestrator.api.routers.runs import router; routes = [r.path for r in router.routes]; assert any('recover' in r for r in routes)\""
              must: true
        verifier:
          rubric:
            - id: "endpoint_correctness"
              text: |
                R1/R2/R3 — A: route is registered, accepts RecoverRequest body, delegates to
                service, and returns correct HTTP codes (200/404/409). B: route exists but error
                handling is incomplete or response model is wrong.
        retry:
          max_attempts: 2

      - id: "T-04"
        title: "Write integration tests for recovery endpoint"
        task_context: |
          Write integration tests covering the happy path, 409 conflict case, and
          preserve_checklist flag behavior.

          Steps:
          1. Create tests/integration/test_api_runs_recover.py
          2. Test 1 — happy path: create FAILED run; POST to /api/runs/{id}/recover with
             valid target_task_id; assert run is PAUSED with pause_reason="recovered",
             target task is BUILDING, downstream tasks are PENDING, checklist is open
          3. Test 2 — preserve_checklist: same setup but POST with preserve_checklist=true;
             assert checklist items are NOT reset
          4. Test 3 — non-FAILED status: create ACTIVE run; POST to recover; assert 409
          5. Test 4 — invalid task_id: POST with task_id from a different run; assert 404
          6. Run: pytest tests/integration/ -k "recover" -v

          Verification:
          - pytest tests/integration/ -k "recover" -v exits 0 with all tests PASSED
          - Test file exists at tests/integration/test_api_runs_recover.py
        requirements:
          - id: "R1"
            desc: "Integration test for happy path recovery passes"
            priority: critical
          - id: "R2"
            desc: "Integration test for 409 conflict case passes"
            priority: critical
          - id: "R3"
            desc: "Integration test for preserve_checklist=true passes"
            priority: expected
        auto_verify:
          items:
            - id: "test_file_exists"
              cmd: "test -f tests/integration/test_api_runs_recover.py"
              must: true
            - id: "tests_pass"
              cmd: "uv run pytest tests/integration/ -k 'recover' -q 2>&1 | grep -q 'passed'"
              must: true
        verifier:
          rubric:
            - id: "test_coverage"
              text: |
                R1/R2/R3 — A: all 4 tests present (happy path, preserve_checklist, non-FAILED 409,
                invalid task_id 404) and all pass. B: happy path and 409 test present and pass
                but preserve_checklist or invalid task_id test is missing.
        retry:
          max_attempts: 2

  - id: "S-04"
    title: "Add Recovery UI"
    step_context: |
      Fix FAILED-RUN-RECOVERY bug (frontend). Surface the POST /api/runs/{id}/recover endpoint
      (added in Step 3) in the frontend by adding a RecoveryPanel component to the RunDetail page.
      Prerequisite: Step 3 (recovery API) must be deployed first.
    tasks:
      - id: "T-01"
        title: "Add RecoverRequest and RecoverResponse TypeScript types"
        task_context: |
          Add the TypeScript types for the recovery API request and response to the frontend
          types directory.

          Steps:
          1. Open or create ui/src/types/recovery.ts (or add to existing runs.ts types file)
          2. Add RecoverRequest interface with fields:
             - target_task_id: string
             - additional_attempts?: number
             - agent_type?: string
             - agent_config?: Record<string, unknown>
             - preserve_checklist?: boolean
          3. Add RecoverResponse interface with fields:
             - run_id: string
             - status: string
             - pause_reason: string | null
             - current_step_index: number | null
          4. Export types from the types index if one exists
          5. Run npx tsc --noEmit to confirm no type errors

          Verification:
          - npx tsc --noEmit exits 0
        requirements:
          - id: "R1"
            desc: "RecoverRequest and RecoverResponse are importable from ui/src/types/"
            priority: critical
        auto_verify:
          items:
            - id: "ts_compiles"
              cmd: "cd ui && npx tsc --noEmit 2>&1 | head -20"
              must: false
        verifier:
          rubric:
            - id: "type_completeness"
              text: |
                R1 — A: both types are exported from the types directory with correct field names
                and TypeScript types matching the backend schema. B: types exist but field names
                diverge from backend or optional fields are missing.
        retry:
          max_attempts: 2

      - id: "T-02"
        title: "Add recoverRun client function and useRecoverRun hook"
        task_context: |
          Add the API client function and TanStack Query mutation hook for the recovery endpoint.

          Steps:
          1. Open ui/src/api/client.ts
          2. Add recoverRun(runId, data) client function calling POST /api/runs/{runId}/recover
          3. Handle 404 (task not found) and 409 (not FAILED) error status codes distinctly
          4. Open ui/src/hooks/useApi.ts
          5. Add useRecoverRun(runId) mutation hook that invalidates ['run', runId] on success
          6. Run npx tsc --noEmit to confirm no type errors

          Verification:
          - grep -n "recoverRun" ui/src/api/client.ts shows the export
          - grep -n "useRecoverRun" ui/src/hooks/useApi.ts shows the export
          - npx tsc --noEmit exits 0
        requirements:
          - id: "R1"
            desc: "recoverRun is exported from ui/src/api/client.ts"
            priority: critical
          - id: "R2"
            desc: "useRecoverRun is exported from ui/src/hooks/useApi.ts and invalidates run query on success"
            priority: critical
        auto_verify:
          items:
            - id: "client_fn_exists"
              cmd: "grep -n 'recoverRun' ui/src/api/client.ts | grep -q 'export'"
              must: true
            - id: "hook_exists"
              cmd: "grep -n 'useRecoverRun' ui/src/hooks/useApi.ts | grep -q 'export'"
              must: true
        verifier:
          rubric:
            - id: "api_wiring"
              text: |
                R1/R2 — A: client function calls correct endpoint, handles error codes, and
                hook invalidates the right query key on success. B: function and hook exist
                but query invalidation or error handling is incomplete.
        retry:
          max_attempts: 2

      - id: "T-03"
        title: "Create RecoveryPanel component"
        task_context: |
          Create the RecoveryPanel component that renders a step/task timeline with rollback
          target selection and a confirmation dialog with preserve_checklist toggle.

          Steps:
          1. Create ui/src/components/detail/RecoveryPanel.tsx
          2. Component receives the run object (including steps/tasks) as a prop
          3. Render a timeline of steps and tasks, each showing last status and end_commit
          4. Clicking a task sets it as selectedTaskId and opens a confirmation dialog
          5. Confirmation dialog shows:
             - Which task was selected
             - Warning: "This will reset all downstream tasks to PENDING"
             - Checkbox for preserve_checklist (default unchecked)
             - Confirm and Cancel buttons
          6. On confirm, call useRecoverRun with {target_task_id, preserve_checklist}
          7. On success, show success toast; on error, display error and keep dialog open
          8. Run npx tsc --noEmit to confirm no type errors

          Verification:
          - npx tsc --noEmit exits 0
          - File exists: ui/src/components/detail/RecoveryPanel.tsx
        requirements:
          - id: "R1"
            desc: "RecoveryPanel.tsx exists at ui/src/components/detail/RecoveryPanel.tsx"
            priority: critical
          - id: "R2"
            desc: "Timeline renders steps and tasks with last status"
            priority: expected
          - id: "R3"
            desc: "Confirmation dialog includes preserve_checklist toggle"
            priority: expected
        auto_verify:
          items:
            - id: "panel_exists"
              cmd: "test -f ui/src/components/detail/RecoveryPanel.tsx"
              must: true
        verifier:
          rubric:
            - id: "component_completeness"
              text: |
                R1/R2/R3 — A: component exists, renders timeline, opens dialog on task click,
                dialog has preserve_checklist toggle, calls useRecoverRun on confirm.
                B: component exists but dialog or preserve_checklist toggle is missing.
        retry:
          max_attempts: 2

      - id: "T-04"
        title: "Mount RecoveryPanel in RunDetail and write Vitest test"
        task_context: |
          Update RunDetail.tsx to conditionally mount RecoveryPanel for FAILED runs, and write
