            flush_interval_ms (default 100), clock (callable returning float, default time.monotonic)
          - Buffer keyed by (run_id, task_id, attempt_id)
          - add_line(run_id, task_id, attempt_id, text): accumulates; auto-flushes when count
            threshold or time threshold reached
          - flush(): appends accumulated AgentOutputEvent batches; no-op if buffer empty;
            clears buffer only AFTER successful event_store append
          - flush_immediate(): flushes all buffers regardless of thresholds
          Export OutputBatcher from src/orchestrator/runners/execution/__init__.py.

          Write tests/unit/test_output_batcher.py using FakeClock for time control and a
          list-based event_store stub. Must cover: count threshold flush, time threshold flush,
          immediate flush, empty buffer no-op, correct line ordering in batched payloads.

          See docs/event-source/steps/step-05-plan.md Tasks 5.1, 5.2.
