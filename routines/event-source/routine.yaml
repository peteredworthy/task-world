  - id: "S-05"
    title: "Output Batching and Cleanup"
    step_context: "Implement AgentOutputEvent batching. Add JSONL bootstrap for empty-DB startup. Remove legacy recovery code, pending_signals table. Update ARCHITECTURE.md."
