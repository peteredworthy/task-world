id: "planning-routine-improvements"
name: "Idea-to-Plan Routine Optimization"
description: |
  Apply seven recommendations (R1-R7) from token usage analysis to reduce the
  idea-to-plan routine cost by 60-70% and wall-clock time by 65%. Produces a new
  optimized variant (routines/idea-to-plan-optimized/routine.yaml) while preserving
  the original for A/B comparison. Includes two small engine fixes for fan-out
  per-item context support.

inputs:
  - name: "feature"
    required: true
    description: "Feature name for directory paths (docs/{feature}/, routines/{feature}/)"
    default: "planning-routine-improvements"

steps:
  # ──────────────────────────────────────────────────────────────────────
  # Step 1: Context Injection (M1 — R1, R6, R7)
  # ──────────────────────────────────────────────────────────────────────
  - id: "S-01"
    title: "Context Injection"
    step_context: |
      Copy the original idea-to-plan routine to a new optimized variant and add
      context_from declarations, reference doc injection, and source code suppression.
      This is the highest-impact change (~40% cost reduction) with zero risk.
    tasks:
      - id: "T-01"
        title: "Copy Routine and Add context_from to All Artifact-Consuming Tasks"
        profile: "coder"
        context_from:
          - artifact: "routines/idea-to-plan/routine.yaml"
            as: "context.original_routine"
            required: true
          - artifact: "docs/{{feature}}/intent.md"
            as: "context.intent"
            required: true
          - artifact: "docs/{{feature}}/plan.md"
            as: "context.plan"
            required: true
          - artifact: "docs/{{feature}}/architecture.md"
            as: "context.architecture"
            required: true
        task_context: |
          Create the optimized routine variant by copying the original and adding
          context_from declarations, reference doc injection, and source code suppression.

          ORIGINAL ROUTINE:
          {{context.original_routine}}

          INTENT (for reference):
          {{context.intent}}

          PLAN (M1 section):
          {{context.plan}}

          ARCHITECTURE (context_from injection section):
          {{context.architecture}}

          ## Instructions

          1. Create directory `routines/idea-to-plan-optimized/`
          2. Copy the original routine to `routines/idea-to-plan-optimized/routine.yaml`
          3. Update the routine `id` to `"idea-to-plan-optimized"` and `name` to include "Optimized"
          4. Add `context_from` entries to these tasks (all `as:` values MUST use `context.` prefix):
             - S-04/T-01: plan, architecture, clarifications, step-files format guide
             - S-05/T-01: intent, plan, architecture, clarifications
             - S-06/T-01: add architecture, clarifications (already has intent, plan, dry_run)
             - S-08/T-01: intent, plan, dry_run, verification_report
             - S-08/T-02: intent, plan, architecture
          5. Add reference doc injection to S-01/T-01 via context_from:
             - docs/plan-runner/idea_to_plan_stripped.md (as: "context.process_checklist")
             - docs/plan-runner/idea_to_plan_detailed.md (as: "context.process_detailed")
          6. Add reference doc injection to S-04/T-01:
             - docs/plan-runner/step-files.md (as: "context.step_files_format")
          7. Add source code suppression directive to S-01/T-01 task_context:
             "IMPORTANT: Do NOT read source code files..."
          8. Update task_context templates to reference injected variables
          9. Fix existing as: values in S-02/T-01 and S-06/T-01 to use context. prefix

          CRITICAL: Verify reference docs exist before adding context_from entries.
          If missing, skip those entries (keep existing inline references instead).

          The original routine at routines/idea-to-plan/routine.yaml must NOT be modified.
        requirements:
          - id: "R1"
            desc: "Optimized routine created at routines/idea-to-plan-optimized/routine.yaml with updated id and name"
            priority: critical
          - id: "R2"
            desc: "context_from added to S-04/T-01, S-05/T-01, S-06/T-01, S-08/T-01, S-08/T-02 with context. prefix on all as: values"
            priority: critical
          - id: "R3"
            desc: "Reference doc injection on S-01/T-01 (process_checklist, process_detailed) and S-04/T-01 (step_files_format)"
            priority: critical
          - id: "R4"
            desc: "Source code suppression directive in S-01/T-01 task_context"
            priority: critical
          - id: "R5"
            desc: "Original routine at routines/idea-to-plan/routine.yaml is unchanged (byte-identical to git HEAD)"
            priority: critical
          - id: "R6"
            desc: "Optimized routine passes schema validation"
            priority: critical
        artifacts:
          - path: "routines/idea-to-plan-optimized/routine.yaml"
            required: true
        auto_verify:
          items:
            - id: "optimized_routine_exists"
              cmd: "test -f routines/idea-to-plan-optimized/routine.yaml"
              must: true
            - id: "has_context_from_on_targets"
              cmd: "uv run python -c \"import yaml; r=yaml.safe_load(open('routines/idea-to-plan-optimized/routine.yaml')); tasks={s['id']:{t['id']:t for t in s['tasks']} for s in r.get('routine',r)['steps'] if 'routine' not in r or True}; steps=r.get('steps', r.get('routine',{}).get('steps',[])); td={s['id']:{t['id']:t for t in s['tasks']} for s in steps}; assert 'context_from' in td['S-04']['T-01'], 'S-04/T-01 missing context_from'; assert 'context_from' in td['S-05']['T-01'], 'S-05/T-01 missing context_from'; assert 'context_from' in td['S-08']['T-01'], 'S-08/T-01 missing context_from'; assert 'context_from' in td['S-08']['T-02'], 'S-08/T-02 missing context_from'; print('All target tasks have context_from')\""
              must: true
            - id: "has_source_suppression"
              cmd: "grep -q 'Do NOT read source code' routines/idea-to-plan-optimized/routine.yaml"
              must: true
            - id: "original_unchanged"
              cmd: "git diff HEAD -- routines/idea-to-plan/routine.yaml --exit-code"
              must: true
            - id: "schema_valid"
              cmd: "uv run orchestrator --json routines validate routines/idea-to-plan-optimized/routine.yaml"
              must: true
        verifier:
          rubric:
            - id: "R1"
              text: |
                R1 — A: optimized routine exists with correct id and name. B: exists but id/name not updated.
            - id: "R2"
              text: |
                R2 — A: all 5 target tasks have context_from with context. prefix on as: values.
                B: most tasks have context_from but prefix missing on some. F: context_from missing.
            - id: "R3"
              text: |
                R3 — A: S-01/T-01 has reference doc context_from and S-04/T-01 has step-files format.
                B: partial reference doc injection. F: no reference docs injected.
            - id: "R4"
              text: |
                R4 — A: S-01/T-01 task_context contains clear source code suppression directive.
                F: directive missing.
            - id: "R5"
              text: |
                R5 — A: git diff shows zero changes to original routine. F: original modified.
            - id: "R6"
              text: |
                R6 — A: schema validation passes with zero errors. F: validation fails.
        retry:
          max_attempts: 2

  # ──────────────────────────────────────────────────────────────────────
  # Step 2: Verification Optimization (M2 — R5)
  # ──────────────────────────────────────────────────────────────────────
  - id: "S-02"
    title: "Verification Optimization"
    step_context: |
      Remove LLM verification from mechanical tasks and add structural auto-verify.
      Eliminates unnecessary LLM verifier spawns, saving ~$3-5 per run.
    tasks:
      - id: "T-01"
        title: "Remove Verifier Rubrics and Add Structural Auto-Verify"
        profile: "coder"
        task_context: |
          In routines/idea-to-plan-optimized/routine.yaml:

          1. Remove the entire `verifier:` block from S-07/T-01 (Human Final Approval)
          2. Remove the entire `verifier:` block from S-08/T-01 (Generate Summary)
          3. Add/update structural auto-verify to S-08/T-01:
             ```yaml
             auto_verify:
               items:
                 - id: "summary_exists"
                   cmd: "test -f docs/{{feature}}/plan-summary.md"
                   must: true
                 - id: "has_sections"
                   cmd: "grep -q 'Intent' docs/{{feature}}/plan-summary.md && grep -q 'Risks' docs/{{feature}}/plan-summary.md"
                   must: true
             ```
          4. Leave all other tasks' verifier blocks unchanged

          This removes ~$3-5 of unnecessary LLM verification per run. Tasks without
          verifier blocks auto-complete verification when auto_verify passes.
        requirements:
          - id: "R1"
            desc: "S-07/T-01 has no verifier block (auto-verify only)"
            priority: critical
          - id: "R2"
            desc: "S-08/T-01 has no verifier block, replaced with structural auto-verify"
            priority: critical
          - id: "R3"
            desc: "All other tasks' verifier blocks remain unchanged"
            priority: expected
        auto_verify:
          items:
            - id: "no_verifier_s07"
              cmd: "uv run python -c \"import yaml; r=yaml.safe_load(open('routines/idea-to-plan-optimized/routine.yaml')); steps=r.get('steps', r.get('routine',{}).get('steps',[])); s07=[s for s in steps if s['id']=='S-07'][0]; t01=[t for t in s07['tasks'] if t['id']=='T-01'][0]; assert 'verifier' not in t01, 'S-07/T-01 still has verifier'; print('S-07/T-01 verifier removed')\""
              must: true
            - id: "no_verifier_s08t01"
              cmd: "uv run python -c \"import yaml; r=yaml.safe_load(open('routines/idea-to-plan-optimized/routine.yaml')); steps=r.get('steps', r.get('routine',{}).get('steps',[])); s08=[s for s in steps if s['id']=='S-08'][0]; t01=[t for t in s08['tasks'] if t['id']=='T-01'][0]; assert 'verifier' not in t01, 'S-08/T-01 still has verifier'; assert 'auto_verify' in t01, 'S-08/T-01 missing auto_verify'; print('S-08/T-01 verifier removed, auto_verify present')\""
              must: true
            - id: "other_verifiers_intact"
              cmd: "uv run python -c \"import yaml; r=yaml.safe_load(open('routines/idea-to-plan-optimized/routine.yaml')); steps=r.get('steps', r.get('routine',{}).get('steps',[])); need_verifier=['S-01/T-01','S-02/T-01','S-03/T-01','S-05/T-01','S-06/T-01','S-08/T-02']; found=[]; [found.append(f'{s[chr(105)+(chr(100))]}/{t[chr(105)+chr(100)]}') for s in steps for t in s['tasks'] if 'verifier' in t]; missing=[x for x in need_verifier if x not in found]; assert not missing, f'Missing verifiers: {missing}'; print(f'All {len(need_verifier)} expected verifiers intact')\""
              must: true
        verifier:
          rubric:
            - id: "R1"
              text: |
                R1 — A: S-07/T-01 has no verifier key. F: verifier block still present.
            - id: "R2"
              text: |
                R2 — A: S-08/T-01 has no verifier and has auto_verify with summary_exists + has_sections.
                F: verifier still present or auto_verify missing.
            - id: "R3"
              text: |
                R3 — A: all other tasks retain their verifier blocks. B: one task's verifier accidentally removed.

  # ──────────────────────────────────────────────────────────────────────
  # Step 3: Profile-Based Model Routing (M3 — R4)
  # ──────────────────────────────────────────────────────────────────────
  - id: "S-03"
    title: "Profile-Based Model Routing"
    step_context: |
      Add profile fields to every task for model routing. Architect tasks use Opus,
      coder tasks use Sonnet, summarizer tasks use Haiku.
    tasks:
      - id: "T-01"
        title: "Add Profile Fields to All Tasks"
        profile: "coder"
        task_context: |
          In routines/idea-to-plan-optimized/routine.yaml, add `profile` field to all tasks:

          architect (reasoning-heavy tasks):
          - S-01/T-01 (Generate Initial Artifacts)
          - S-02/T-01 (Gather Requirements)
          - S-03/T-01 (Create Step Plans)
          - S-05/T-01 (Simulate Execution)

          coder (structured output tasks):
          - S-04/T-01 (Create Step Files)
          - S-06/T-01 (Cross-Check Artifacts)
          - S-08/T-02 (Create Routine YAML)

          summarizer (mechanical tasks):
          - S-07/T-01 (Human Final Approval)
          - S-08/T-01 (Generate Summary)

          Profile-to-model mappings (configured at runtime, not in YAML):
          - architect -> claude-opus-4-6
          - coder -> claude-sonnet-4-6
          - summarizer -> claude-haiku-4-5

          Valid profile values: architect, coder, summarizer, designer
        requirements:
          - id: "R1"
            desc: "Every task in the optimized routine has a profile field"
            priority: critical
          - id: "R2"
            desc: "Profile assignments match the mapping: architect for S-01/S-02/S-03/S-05, coder for S-04/S-06/S-08-T-02, summarizer for S-07/S-08-T-01"
            priority: critical
        auto_verify:
          items:
            - id: "all_tasks_have_profile"
              cmd: "uv run python -c \"import yaml; r=yaml.safe_load(open('routines/idea-to-plan-optimized/routine.yaml')); steps=r.get('steps', r.get('routine',{}).get('steps',[])); missing=[f'{s[chr(105)+chr(100)]}/{t[chr(105)+chr(100)]}' for s in steps for t in s['tasks'] if 'profile' not in t]; assert not missing, f'Tasks missing profile: {missing}'; print('All tasks have profile field')\""
              must: true
            - id: "correct_profile_assignments"
              cmd: "uv run python -c \"import yaml; r=yaml.safe_load(open('routines/idea-to-plan-optimized/routine.yaml')); steps=r.get('steps', r.get('routine',{}).get('steps',[])); td={s['id']+'/'+ t['id']: t.get('profile','') for s in steps for t in s['tasks']}; expect={'S-01/T-01':'architect','S-02/T-01':'architect','S-03/T-01':'architect','S-05/T-01':'architect','S-04/T-01':'coder','S-06/T-01':'coder','S-08/T-02':'coder','S-07/T-01':'summarizer','S-08/T-01':'summarizer'}; wrong={k:f'expected {v} got {td.get(k)}' for k,v in expect.items() if td.get(k)!=v}; assert not wrong, f'Wrong profiles: {wrong}'; print('All profile assignments correct')\""
              must: true
        verifier:
          rubric:
            - id: "R1"
              text: |
                R1 — A: every task has a profile field. F: any task missing profile.
            - id: "R2"
              text: |
                R2 — A: all profile assignments match the specification exactly.
                B: profiles present but one assignment differs. F: systematic misassignment.

  # ──────────────────────────────────────────────────────────────────────
  # Step 4: Engine Enhancements (M4 Prerequisites)
  # ──────────────────────────────────────────────────────────────────────
  - id: "S-04"
    title: "Engine Enhancements"
    step_context: |
      Implement two small engine fixes required for fan-out parallelism:
      two-pass template resolution in templates.py and passing run variables
      to shared_context resolution in executor.py.
    tasks:
      - id: "T-01"
        title: "Implement Two-Pass Template Resolution"
        profile: "coder"
        context_from:
          - artifact: "docs/{{feature}}/architecture.md"
            as: "context.architecture"
            required: true
          - artifact: "docs/{{feature}}/steps/step-04.md"
            as: "context.step_file"
            required: true
        task_context: |
          Modify resolve_template() in src/orchestrator/workflow/templates.py to use
          two-pass resolution: variables first, then {{file:...}} references.

          ARCHITECTURE (section 5):
          {{context.architecture}}

          STEP FILE:
          {{context.step_file}}

          ## Implementation

          The current resolve_template() uses a single re.sub() pass with regex
          `\{\{(.+?)\}\}`. This fails on nested patterns like
          `{{file:docs/{{feature}}/{{item_stem}}-plan.md}}`.

          Split into two passes:

          Pass 1: Use `_SIMPLE_VAR_RE = re.compile(r"\{\{([^{]+?)\}\}")` to resolve
          only simple (non-nested) variables. Skip any match starting with "file:".

          Pass 2: Use the original `_PLACEHOLDER_RE` to resolve `{{file:...}}` patterns
          (paths now have variables substituted).

          CRITICAL: Use `[^{]+?` not `.+?` in Pass 1 regex to avoid matching across
          nested `{{` boundaries.

          Add unit tests in tests/unit/test_templates.py for:
          - Nested variable resolution in {{file:...}} paths
          - Plain variables still resolve (no regression)
          - {{file:...}} without nesting still works
          - Missing file returns [File not found: ...]
          - _SIMPLE_VAR_RE must be a module-level constant
        requirements:
          - id: "R1"
            desc: "resolve_template() uses two-pass resolution: plain variables first, then {{file:...}} references"
            priority: critical
          - id: "R2"
            desc: "Pass 1 regex uses [^{]+? character class to skip nested patterns"
            priority: critical
          - id: "R3"
            desc: "All existing template tests pass (no regression)"
            priority: critical
          - id: "R4"
            desc: "New unit tests cover nested resolution, plain vars, missing files"
            priority: critical
        auto_verify:
          items:
            - id: "template_tests_pass"
              cmd: "uv run pytest tests/unit/test_templates.py -v --tb=short"
              must: true
            - id: "has_two_pass_logic"
              cmd: "uv run python -c \"import ast; src=open('src/orchestrator/workflow/templates.py').read(); assert 'file:' in src, 'No file: handling found'; assert '[^{]' in src or 'SIMPLE_VAR' in src or 'simple_var' in src, 'No two-pass regex found'; print('Two-pass logic present')\""
              must: true
        verifier:
          rubric:
            - id: "R1"
              text: |
                R1 — A: resolve_template splits resolution into two passes. B: works but approach differs.
            - id: "R2"
              text: |
                R2 — A: regex uses [^{]+? or equivalent non-nested pattern. F: uses .+? which breaks nesting.
            - id: "R3"
              text: |
                R3 — A: all existing tests pass. F: any regression.
            - id: "R4"
              text: |
                R4 — A: new tests cover nested vars in file paths, plain vars, missing files.
                B: some coverage gaps.
        retry:
          max_attempts: 2

      - id: "T-02"
        title: "Pass Run Variables to shared_context Resolution"
        profile: "coder"
        context_from:
          - artifact: "docs/{{feature}}/steps/step-04.md"
            as: "context.step_file"
            required: true
        task_context: |
          Modify the fan-out execution path in src/orchestrator/runners/executor.py
          to pass run config variables to resolve_template() when resolving
          shared_context entries.

          STEP FILE (Task 2):
          {{context.step_file}}

          ## Implementation

          Currently shared_context entries are resolved via
          `resolve_template(ctx_entry, worktree_path=worktree_path)` without variables.
          This means {{feature}} in shared_context paths is left unresolved.

          Fix: Build config_vars from run.config BEFORE the shared_context resolution
          loop, then pass variables=config_vars to resolve_template():

          ```python
          config_vars = {k: str(v) for k, v in run.config.items() if v is not None}
          # ... in the shared_context loop:
          resolved = resolve_template(ctx_entry, variables=config_vars, worktree_path=worktree_path)
          ```

          CRITICAL: config_vars must be built BEFORE the shared_context loop (not
          reusing the variables dict constructed later).

          Add tests verifying:
          1. shared_context with {{file:...}} and variables resolves to file contents
          2. shared_context with nested variables resolves after two-pass
          3. bare path without {{file:...}} returns literal string (regression guard)
        requirements:
          - id: "R1"
            desc: "shared_context resolution receives run config variables via resolve_template()"
            priority: critical
          - id: "R2"
            desc: "config_vars built from run.config BEFORE shared_context loop"
            priority: critical
          - id: "R3"
            desc: "All unit and integration tests pass"
            priority: critical
        auto_verify:
          items:
            - id: "unit_tests_pass"
              cmd: "uv run pytest tests/unit/ -x -q --tb=short"
              must: true
            - id: "integration_tests_pass"
              cmd: "uv run pytest tests/integration/ -x -q --tb=short --ignore=tests/integration/test_openhands_agent.py --ignore=tests/integration/test_openhands_docker.py"
              must: true
            - id: "has_variables_in_shared_context"
              cmd: "grep -q 'variables' src/orchestrator/runners/executor.py"
              must: true
        verifier:
          rubric:
            - id: "R1"
              text: |
                R1 — A: resolve_template call for shared_context includes variables parameter.
                F: variables not passed.
            - id: "R2"
              text: |
                R2 — A: config_vars built before shared_context loop. F: built after or reusing wrong dict.
            - id: "R3"
              text: |
                R3 — A: all tests pass. F: test failures.

  # ──────────────────────────────────────────────────────────────────────
  # Step 5: Fan-Out Parallelism (M4 — R2, R3)
  # ──────────────────────────────────────────────────────────────────────
  - id: "S-05"
    title: "Fan-Out Parallelism"
    step_context: |
      Convert S-04 and S-05 in the optimized routine from sequential to parallel
      fan-out execution. S-05 is restructured from dry_run step type to standard
      step with fan-out task + merge task.
    tasks:
      - id: "T-01"
        title: "Convert S-04/T-01 to Fan-Out"
        profile: "coder"
        context_from:
          - artifact: "docs/{{feature}}/steps/step-05.md"
            as: "context.step_file"
            required: true
          - artifact: "docs/{{feature}}/architecture.md"
            as: "context.architecture"
            required: true
        task_context: |
          Convert S-04/T-01 (Create Step Files) in the optimized routine from sequential
          to fan-out over step-plan files.

          STEP FILE:
          {{context.step_file}}

          ARCHITECTURE (fan-out section):
          {{context.architecture}}

          ## Instructions

          In routines/idea-to-plan-optimized/routine.yaml:

          1. REMOVE task_context from S-04/T-01 (fan_out and task_context are mutually exclusive)
          2. REMOVE context_from from S-04/T-01 (replaced by shared_context)
          3. Add fan_out block:
             ```yaml
             fan_out:
               input_glob: "docs/{{feature}}/step-*-plan.md"
               output_pattern: "docs/{{feature}}/steps/{{item_stem}}.md"
               per_item_prompt: |
                 Convert the following step plan into a step file.
                 STEP PLAN:
                 {{item_content}}
                 Create output at {{output_path}}.
                 Follow the step-files format guide provided in shared context.
               shared_context:
                 - "{{file:docs/{{feature}}/plan.md}}"
                 - "{{file:docs/{{feature}}/architecture.md}}"
                 - "{{file:docs/{{feature}}/clarifications.md}}"
                 - "{{file:docs/plan-runner/step-files.md}}"
               max_concurrent: 4
               auto_verify:
                 items:
                   - id: "step_file_exists"
                     cmd: "test -f {{output_path}}"
                     must: true
             ```

          CRITICAL: fan_out and task_context are mutually exclusive (ValueError).
          NAMING: item_stem for step-01-plan.md is "step-01-plan" — output will be
          steps/step-01-plan.md. This is acceptable.
        requirements:
          - id: "R1"
            desc: "S-04/T-01 has fan_out block with input_glob, output_pattern, per_item_prompt, shared_context, max_concurrent"
            priority: critical
          - id: "R2"
            desc: "S-04/T-01 has no task_context (mutually exclusive with fan_out)"
            priority: critical
          - id: "R3"
            desc: "S-04/T-01 has no context_from (replaced by shared_context in fan_out)"
            priority: critical
          - id: "R4"
            desc: "shared_context references plan, architecture, clarifications, step-files format guide with {{file:...}} wrapper"
            priority: expected
        auto_verify:
          items:
            - id: "s04_has_fanout"
              cmd: "uv run python -c \"import yaml; r=yaml.safe_load(open('routines/idea-to-plan-optimized/routine.yaml')); steps=r.get('steps', r.get('routine',{}).get('steps',[])); s04=[s for s in steps if s['id']=='S-04'][0]; t01=[t for t in s04['tasks'] if t['id']=='T-01'][0]; assert 'fan_out' in t01, 'S-04/T-01 missing fan_out'; assert 'task_context' not in t01, 'S-04/T-01 still has task_context'; assert 'context_from' not in t01, 'S-04/T-01 still has context_from'; fo=t01['fan_out']; assert 'input_glob' in fo; assert 'shared_context' in fo; assert fo.get('max_concurrent')==4; print('S-04/T-01 fan_out configured correctly')\""
              must: true
            - id: "schema_still_valid"
              cmd: "uv run orchestrator --json routines validate routines/idea-to-plan-optimized/routine.yaml"
              must: true
        verifier:
          rubric:
            - id: "R1"
              text: |
                R1 — A: S-04/T-01 has complete fan_out block with all required fields.
                F: fan_out missing or incomplete.
            - id: "R2"
              text: |
                R2 — A: task_context removed from S-04/T-01. F: still present.
            - id: "R3"
              text: |
                R3 — A: context_from removed from S-04/T-01. F: still present.
            - id: "R4"
              text: |
                R4 — A: shared_context has all 4 files with {{file:...}} wrapper.
                B: some files missing or wrapper missing.

      - id: "T-02"
        title: "Restructure S-05 from dry_run to Fan-Out + Merge"
        profile: "coder"
        context_from:
          - artifact: "docs/{{feature}}/steps/step-05.md"
            as: "context.step_file"
            required: true
        task_context: |
          Restructure S-05 in the optimized routine from dry_run step type to standard
          step with fan-out T-01 + merge T-02.

          STEP FILE (Task 2):
          {{context.step_file}}

          ## Instructions

          In routines/idea-to-plan-optimized/routine.yaml:

          1. Remove `type: dry_run` from S-05
          2. Remove the entire `dry_run:` config block
          3. REMOVE task_context from S-05/T-01 (mutually exclusive with fan_out)
          4. REMOVE context_from from S-05/T-01 (replaced by shared_context)
          5. Add fan_out to S-05/T-01:
             - input_glob: "docs/{{feature}}/steps/step-*.md"
             - output_pattern: "docs/{{feature}}/dry-run/{{item_stem}}-notes.md"
             - per_item_prompt with simulation instructions
             - shared_context: intent, plan, architecture (with {{file:...}} wrapper)
             - max_concurrent: 4
             - auto_verify inside fan_out block
          6. Add S-05/T-02 merge task:
             - profile: "summarizer"
             - context_from: intent, plan (with context. prefix on as: values)
             - Merges per-step notes into docs/{{feature}}/dry-run-notes.md
             - auto_verify: merged file exists

          CRITICAL: item_stem for steps/step-01-plan.md is "step-01-plan".
          Use {{file:docs/{{feature}}/{{item_stem}}.md}} in per_item_prompt (NOT
          {{item_stem}}-plan.md which would double the -plan suffix).

          CRITICAL: auto_verify for per-item checks MUST go INSIDE fan_out block.
        requirements:
          - id: "R1"
            desc: "S-05 has no type: dry_run or dry_run: config block"
            priority: critical
          - id: "R2"
            desc: "S-05/T-01 has fan_out with input_glob over step files, shared_context, and per-item auto-verify"
            priority: critical
          - id: "R3"
            desc: "S-05/T-01 has no task_context or context_from"
            priority: critical
          - id: "R4"
            desc: "S-05/T-02 merge task exists with profile summarizer and context_from"
            priority: critical
          - id: "R5"
            desc: "S-06/T-01 context_from still references dry-run-notes.md (merged file path unchanged)"
            priority: expected
        auto_verify:
          items:
            - id: "s05_no_dryrun"
              cmd: "uv run python -c \"import yaml; r=yaml.safe_load(open('routines/idea-to-plan-optimized/routine.yaml')); steps=r.get('steps', r.get('routine',{}).get('steps',[])); s05=[s for s in steps if s['id']=='S-05'][0]; assert s05.get('type') is None or s05.get('type')=='standard', 'S-05 still has dry_run type'; assert 'dry_run' not in s05, 'S-05 still has dry_run config'; print('S-05 dry_run removed')\""
              must: true
            - id: "s05_t01_fanout"
              cmd: "uv run python -c \"import yaml; r=yaml.safe_load(open('routines/idea-to-plan-optimized/routine.yaml')); steps=r.get('steps', r.get('routine',{}).get('steps',[])); s05=[s for s in steps if s['id']=='S-05'][0]; t01=[t for t in s05['tasks'] if t['id']=='T-01'][0]; assert 'fan_out' in t01, 'S-05/T-01 missing fan_out'; assert 'task_context' not in t01, 'S-05/T-01 still has task_context'; print('S-05/T-01 fan_out configured')\""
              must: true
            - id: "s05_t02_merge"
              cmd: "uv run python -c \"import yaml; r=yaml.safe_load(open('routines/idea-to-plan-optimized/routine.yaml')); steps=r.get('steps', r.get('routine',{}).get('steps',[])); s05=[s for s in steps if s['id']=='S-05'][0]; t02=[t for t in s05['tasks'] if t['id']=='T-02']; assert len(t02)==1, 'S-05/T-02 not found'; assert t02[0].get('profile')=='summarizer', 'S-05/T-02 wrong profile'; assert 'context_from' in t02[0], 'S-05/T-02 missing context_from'; print('S-05/T-02 merge task correct')\""
              must: true
            - id: "schema_valid_after_restructure"
              cmd: "uv run orchestrator --json routines validate routines/idea-to-plan-optimized/routine.yaml"
              must: true
        verifier:
          rubric:
            - id: "R1"
              text: |
                R1 — A: S-05 has no dry_run type or config. F: dry_run remnants present.
            - id: "R2"
              text: |
                R2 — A: S-05/T-01 has complete fan_out block. F: fan_out missing.
            - id: "R3"
              text: |
                R3 — A: task_context and context_from removed from S-05/T-01. F: still present.
            - id: "R4"
              text: |
                R4 — A: S-05/T-02 exists with summarizer profile and context_from. F: missing.
            - id: "R5"
              text: |
                R5 — A: S-06/T-01 still references dry-run-notes.md in context_from.

  # ──────────────────────────────────────────────────────────────────────
  # Step 6: Validation and Live Test
  # ──────────────────────────────────────────────────────────────────────
  - id: "S-06"
    title: "Validation and Live Test"
    step_context: |
      Validate the complete optimized routine end-to-end: schema validation,
      unit tests, integration tests, and a live test run. Confirm cost savings
      against the $18.28 baseline.
    tasks:
      - id: "T-01"
        title: "Run Schema Validation and Test Suites"
        profile: "coder"
        task_context: |
          Validate the optimized routine and run all test suites to ensure no
          regressions from engine enhancements.

          1. Run schema validation:
             uv run orchestrator --json routines validate routines/idea-to-plan-optimized/routine.yaml
          2. Verify original routine unchanged:
             git diff HEAD -- routines/idea-to-plan/routine.yaml
          3. Run unit tests:
             uv run pytest tests/unit/ -x -q
          4. Run integration tests:
             uv run pytest tests/integration/ -x -q --ignore=tests/integration/test_openhands_agent.py --ignore=tests/integration/test_openhands_docker.py
          5. Fix any issues and re-run until all pass

          Do not modify routines/idea-to-plan/routine.yaml.
        requirements:
          - id: "R1"
            desc: "Optimized routine passes schema validation with zero errors"
            priority: critical
          - id: "R2"
            desc: "Original routine unchanged from git HEAD"
            priority: critical
          - id: "R3"
            desc: "All unit tests pass"
            priority: critical
          - id: "R4"
            desc: "All integration tests pass (excluding openhands)"
            priority: critical
        auto_verify:
          items:
            - id: "schema_validation"
              cmd: "uv run orchestrator --json routines validate routines/idea-to-plan-optimized/routine.yaml"
              must: true
            - id: "original_unchanged"
              cmd: "git diff HEAD -- routines/idea-to-plan/routine.yaml --exit-code"
              must: true
            - id: "unit_tests"
              cmd: "uv run pytest tests/unit/ -x -q --tb=short"
              must: true
            - id: "integration_tests"
              cmd: "uv run pytest tests/integration/ -x -q --tb=short --ignore=tests/integration/test_openhands_agent.py --ignore=tests/integration/test_openhands_docker.py"
              must: true
        verifier:
          rubric:
            - id: "R1"
              text: |
                R1 — A: schema validation exits 0 with no errors. F: validation fails.
            - id: "R2"
              text: |
                R2 — A: git diff shows zero changes to original routine. F: original modified.
            - id: "R3"
              text: |
                R3 — A: all unit tests pass. F: any failure.
            - id: "R4"
              text: |
                R4 — A: all integration tests pass (excluding openhands). F: any failure.

      - id: "T-02"
        title: "Execute Live Test Run"
        profile: "coder"
        task_context: |
          Run the optimized routine end-to-end using Claude CLI on a small test idea.
          Collect metrics and compare to the $18.28 baseline.

          ## Pre-flight checks (run ALL before proceeding)
          - Server running: curl -sf http://localhost:8000/health
          - Claude CLI available: which claude
          - Agents configured: curl -sf http://localhost:8000/api/agents

          ## Ensure profile-to-model mappings configured
          - architect -> claude-opus-4-6
          - coder -> claude-sonnet-4-6
          - summarizer -> claude-haiku-4-5
          Configure via Agents page (http://localhost:3000/agents) or API if not set.

          ## Execute
          Create a small test idea (2-3 step complexity) and run:
          uv run orchestrator runs create --routine routines/idea-to-plan-optimized/routine.yaml --input feature=test-feature --input idea="<test idea>"

          ## Verify
          - Fan-out steps spawn concurrent sub-agents
          - No LLM verifier for S-07/T-01 or S-08/T-01
          - Correct models per profile in agent metadata
          - Cost < $12 (pass threshold, 35% reduction minimum)

          ## Document metrics
          | Metric | Baseline | Target | Actual | Pass Threshold |
          |--------|----------|--------|--------|----------------|
          | Cost | $18.28 | $5-7 | ? | < $12 |
          | Wall-clock | 70 min | 20-25 min | ? | < 50 min |
          | Tool calls | 703 | 250-300 | ? | < 500 |
          | Duplicate reads | 103 | 10-15 | ? | < 60 |
        requirements:
          - id: "R1"
            desc: "Live test run completes all steps successfully"
            priority: critical
          - id: "R2"
            desc: "All expected artifact files exist in output directory"
            priority: expected
          - id: "R3"
            desc: "Cost below $12 pass threshold"
            priority: expected
          - id: "R4"
            desc: "Metrics comparison table documented with actual values"
            priority: expected
        auto_verify:
          items:
            - id: "preflight_server"
              cmd: "curl -sf http://localhost:8000/health"
              must: true
            - id: "preflight_cli"
              cmd: "which claude"
              must: true
            - id: "run_completed"
              cmd: "uv run python -c \"import urllib.request, json; runs=json.loads(urllib.request.urlopen('http://localhost:8000/api/runs').read()); opt=[r for r in runs if 'idea-to-plan-optimized' in str(r.get('routine_id',''))]; assert opt, 'No optimized routine run found'; r=opt[-1]; assert r['status']=='completed', f'Run status={r[chr(115)+chr(116)+chr(97)+chr(116)+chr(117)+chr(115)]}, expected completed'; print(f'Live test run completed')\""
              must: true
            - id: "cost_below_threshold"
              cmd: "uv run python -c \"import urllib.request, json; runs=json.loads(urllib.request.urlopen('http://localhost:8000/api/runs').read()); opt=[r for r in runs if 'idea-to-plan-optimized' in str(r.get('routine_id',''))]; assert opt, 'No run found'; rid=opt[-1]['id']; detail=json.loads(urllib.request.urlopen(f'http://localhost:8000/api/runs/{rid}').read()); cost=detail.get('estimated_cost_usd') or 0; assert cost > 0, f'No cost data recorded (got {cost})'; assert cost < 12, f'Cost ${cost:.2f} exceeds $12 threshold'; print(f'Cost ${cost:.2f} within threshold')\""
              must: true
            - id: "output_artifacts_exist"
              cmd: "uv run python -c \"import urllib.request, json, os; runs=json.loads(urllib.request.urlopen('http://localhost:8000/api/runs').read()); opt=[r for r in runs if 'idea-to-plan-optimized' in str(r.get('routine_id',''))]; assert opt, 'No run found'; rid=opt[-1]['id']; detail=json.loads(urllib.request.urlopen(f'http://localhost:8000/api/runs/{rid}').read()); cfg=detail.get('config',{}); feature=cfg.get('feature','test-feature'); base=f'docs/{feature}'; required=['intent.md','plan.md','architecture.md']; found=[f for f in required if os.path.isfile(os.path.join(base,f)) and os.path.getsize(os.path.join(base,f))>50]; assert len(found)==len(required), f'Missing/empty artifacts in {base}: {set(required)-set(found)}'; print(f'All {len(required)} core artifacts verified in {base}')\""
              must: true
        verifier:
          rubric:
            - id: "R1"
              text: |
                R1 — A: live test reaches completed status with all steps passing.
                B: completes with minor issues. F: does not complete.
            - id: "R2"
              text: |
                R2 — A: all expected artifacts exist (intent, plan, architecture, step plans,
                step files, dry-run notes, merged notes, verification report, summary, routine).
                B: most artifacts present.
            - id: "R3"
              text: |
                R3 — A: cost is below $12. B: cost is $12-15. F: cost exceeds $15.
            - id: "R4"
              text: |
                R4 — A: metrics table has all 4 columns filled. B: partial metrics.
