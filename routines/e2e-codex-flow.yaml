routine:
  id: "e2e-codex-flow"
  name: "E2E Codex Flow Routine"
  description: "Execute the notes app plan generated by idea-to-plan."
  inputs: []
  steps:
    - id: "S-01"
      title: "Backend Notes API"
      step_context: "Implement backend notes create/list/search support."
      tasks:
        - id: "T-01"
          title: "Build API"
          task_context: "Implement backend API and tests following docs/e2e-codex-flow/steps/step-01.md"
          requirements:
            - id: "R1"
              desc: "Implement notes create/list/search backend"
              priority: critical
            - id: "R2"
              desc: "Add backend tests for notes API"
              priority: expected
          auto_verify:
            items:
              - id: "backend_step_exists"
                cmd: "test -f docs/e2e-codex-flow/steps/step-01.md"
                must: true
    - id: "S-02"
      title: "Frontend Notes UI"
      step_context: "Implement notes UI wired to backend."
      tasks:
        - id: "T-01"
          title: "Build UI"
          task_context: "Implement notes UI and tests following docs/e2e-codex-flow/steps/step-02.md"
          requirements:
            - id: "R1"
              desc: "Implement notes create/list/search UI"
              priority: critical
            - id: "R2"
              desc: "Add UI and E2E coverage"
              priority: expected
          auto_verify:
            items:
              - id: "frontend_step_exists"
                cmd: "test -f docs/e2e-codex-flow/steps/step-02.md"
                must: true
