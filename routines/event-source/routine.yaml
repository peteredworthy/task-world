              must: true
            - id: "no_recovery_imports_in_src"
              cmd: "uv run python -c \"import pathlib; files = [f for f in pathlib.Path('src').rglob('*.py') if 'recovery/event_journal' not in str(f) and 'recovery/journal_replay' not in str(f) and 'recovery/recovery' not in str(f)]; text = ''.join(f.read_text() for f in files); assert 'from orchestrator.db.recovery.event_journal' not in text and 'from orchestrator.db.recovery.journal_replay' not in text, 'legacy recovery imports found'\""
              must: true
            - id: "migration_runs"
              cmd: "uv run python -c \"import asyncio; from orchestrator.db.access.connection import init_db; asyncio.run(init_db('sqlite+aiosqlite://'))\""
              must: true
            - id: "full_suite"
              cmd: "uv run pytest -v"
              must: true
        verifier:
          rubric:
            - id: "R1"
              text: "R1 — A: event_journal.py, journal_replay.py, recovery.py deleted; grep of src/ shows no imports from orchestrator.db.recovery.event_journal or journal_replay; event_store.py has no JsonlEventJournal reference. B: files deleted but one import reference remains in a non-recovery file."
            - id: "R2"
              text: "R2 — A: Alembic migration drops pending_signals; init_db runs cleanly on a fresh DB; schema inspection (sqlite_master) confirms table absent. B: migration exists but does not run cleanly."
            - id: "R3"
              text: "R3 — A: full pytest suite passes with zero failures; ARCHITECTURE.md describes the event-sourced data flow with no references to removed components; latency regression documented as <10%. B: suite passes but ARCHITECTURE.md not fully updated."
          submission_template:
            grade_scale: [A, B, C, D, F]
            require_reason_if_below: "B"
            require_remediation_if_below: "C"
