id: "gap-analyzer"
name: "Gap Analyzer + Targeted Retry"
description: |
  Implement step-level verification agent (Option B) that runs after all tasks in a step
  reach terminal state, examines their combined output, and takes targeted recovery actions:
  retry_task, spawn_fix, pass, or fail. Closes integration-gap blind spot where individually-
  passing tasks can still leave mismatched API contracts undetected.

steps:
  - id: "S-01"
    title: "Data Models + Schema"
    step_context: |
      Define all new types — enums, Pydantic models, DB columns, and event types —
      so the rest of the system can reference them without touching the engine or executor.
      This is the foundation step: everything else depends on these types existing.
    tasks:
      - id: "T-01"
        title: "Add Enums and Config Models"
        task_context: |
          Add StepVerdict enum and StepVerifierConfig Pydantic model. Extend StepConfig
          with an optional step_verifier field.

          Files to modify:
          - src/orchestrator/config/enums.py — add StepVerdict enum with PASS="pass",
            RETRY="retry", FIX="fix", FAIL="fail"
          - src/orchestrator/config/models.py — add StepVerifierConfig(prompt: str,
            max_iterations: int = 3, auto_verify: AutoVerifyConfig | None = None) with
            @field_validator on max_iterations (must be >= 1); add step_verifier:
            StepVerifierConfig | None = None to StepConfig (after existing fields,
            before any validators that would conflict)

          StepConfig.step_verifier must default to None — no existing routines must break.
          Do NOT add state or DB models in this task.

          Reference: docs/gap-analyzer/steps/step-01.md Task 1
        requirements:
          - id: "R1"
            desc: "StepVerdict enum exists with PASS/RETRY/FIX/FAIL members, correct string values"
            priority: critical
          - id: "R2"
            desc: "StepVerifierConfig model exists with prompt, max_iterations=3, auto_verify=None defaults"
            priority: critical
          - id: "R3"
            desc: "StepConfig.step_verifier field exists, defaults to None (backward compatible)"
            priority: critical
          - id: "R4"
            desc: "StepVerifierConfig max_iterations validator rejects values < 1"
            priority: expected
        auto_verify:
          items:
            - id: "step_verdict_enum"
              cmd: "uv run python -c \"from orchestrator.config.enums import StepVerdict; assert {v.value for v in StepVerdict} == {'pass','retry','fix','fail'}, f'got {set(v.value for v in StepVerdict)}'\""
              must: true
            - id: "step_verifier_config"
              cmd: "uv run python -c \"from orchestrator.config.models import StepVerifierConfig; c = StepVerifierConfig(prompt='test'); assert c.max_iterations == 3 and c.auto_verify is None\""
              must: true
            - id: "step_config_field"
              cmd: "uv run python -c \"from orchestrator.config.models import StepConfig; assert 'step_verifier' in StepConfig.model_fields and StepConfig.model_fields['step_verifier'].default is None\""
              must: true
        verifier:
          rubric:
            - id: "R1_enum"
              text: |
                R1 — A: StepVerdict importable from enums.py, all four values present with correct
                string values ('pass','retry','fix','fail'). F: enum missing or wrong values.
            - id: "R2_config"
              text: |
                R2 — A: StepVerifierConfig importable, defaults match spec (max_iterations=3,
                auto_verify=None), validator rejects max_iterations < 1. B: model exists but
                validator missing. F: model missing.
            - id: "R3_backward_compat"
              text: |
                R3 — A: existing routine YAML files load without error after adding step_verifier
                field (confirmed by loading at least one existing routine). F: field breaks
                existing routines.
        retry:
          max_attempts: 2

      - id: "T-02"
        title: "Add GapAction, GapReport, and StepState Fields"
        task_context: |
          Add GapAction and GapReport Pydantic models to src/orchestrator/state/models.py.
          Extend StepState and TaskState with new fields.

          GapAction fields:
            type: Literal["retry_task", "spawn_fix", "pass", "fail"]
            task_id: str | None = None
            feedback: str | None = None
            title: str | None = None
            context: str | None = None
            requirements: list[dict] | None = None

          GapReport fields:
            id: str = Field(default_factory=generate_id)
            iteration: int
            assessment: str
            verdict: StepVerdict
            actions: list[GapAction] = Field(default_factory=list)
            timestamp: datetime = Field(default_factory=_utc_now)

          StepState additions:
            verifying: bool = False
            verifier_iterations: int = 0
            gap_reports: list[GapReport] = Field(default_factory=list)

          TaskState additions:
            spawned_by_gap_report: bool = False
            gap_report_feedback: str | None = None

          Use Field(default_factory=list) not = [] for mutable defaults.
          Use from typing import Literal for the type field.

          Reference: docs/gap-analyzer/steps/step-01.md Task 2
        requirements:
          - id: "R1"
            desc: "GapAction model exists with Literal type field and all optional fields"
            priority: critical
          - id: "R2"
            desc: "GapReport model exists with id, iteration, assessment, verdict, actions, timestamp"
            priority: critical
          - id: "R3"
            desc: "StepState has verifying=False, verifier_iterations=0, gap_reports=[] fields"
            priority: critical
          - id: "R4"
            desc: "TaskState has spawned_by_gap_report=False and gap_report_feedback=None fields"
            priority: critical
        auto_verify:
          items:
            - id: "gap_action_model"
              cmd: "uv run python -c \"from orchestrator.state.models import GapAction; a = GapAction(type='retry_task', task_id='t1', feedback='try again'); assert a.type == 'retry_task'\""
              must: true
            - id: "gap_report_model"
              cmd: "uv run python -c \"from orchestrator.state.models import GapReport; assert all(f in GapReport.model_fields for f in ['id','iteration','assessment','verdict','actions','timestamp'])\""
              must: true
            - id: "step_state_fields"
              cmd: "uv run python -c \"from orchestrator.state.models import StepState; assert all(f in StepState.model_fields for f in ['verifying','verifier_iterations','gap_reports'])\""
              must: true
            - id: "task_state_fields"
              cmd: "uv run python -c \"from orchestrator.state.models import TaskState; assert all(f in TaskState.model_fields for f in ['spawned_by_gap_report','gap_report_feedback'])\""
              must: true
        verifier:
          rubric:
            - id: "R1_gap_action"
              text: |
                R1 — A: GapAction uses Literal type field, unknown type values cause Pydantic
                validation error. B: model exists but type is bare str (accepts invalid values).
            - id: "R2_gap_report"
              text: |
                R2 — A: GapReport with unknown verdict string raises ValidationError (enum mismatch).
                F: verdict accepts arbitrary strings.
            - id: "R3_defaults"
              text: |
                R3/R4 — A: all new fields have correct defaults (verifying=False, etc.);
                mutable defaults use Field(default_factory=...). F: defaults wrong or missing.
        retry:
          max_attempts: 2

      - id: "T-03"
        title: "Add DB Columns and Alembic Migration"
        task_context: |
          Add new columns to StepModel and TaskModel in src/orchestrator/db/models.py,
          then create and apply an Alembic migration.

          StepModel additions:
            verifying: Mapped[bool] = mapped_column(Integer, default=0)
            verifier_iterations: Mapped[int] = mapped_column(Integer, default=0)
            gap_reports: Mapped[list[dict[str, Any]]] = mapped_column(JSON, default=list)

          TaskModel additions:
            spawned_by_gap_report: Mapped[bool] = mapped_column(Integer, default=0)
            gap_report_feedback: Mapped[str | None] = mapped_column(Text, nullable=True)

          Follow existing pattern: StepModel.completed uses mapped_column(Integer, default=0).
          After adding to models, generate migration:
            uv run alembic revision --autogenerate -m "add step_verifier columns"
          Inspect the generated file to confirm all 5 columns are present, then:
            uv run alembic upgrade head

          Migration must be additive — no data loss, no dropped columns.

          Reference: docs/gap-analyzer/steps/step-01.md Task 3
        requirements:
          - id: "R1"
            desc: "StepModel has verifying, verifier_iterations, gap_reports ORM attributes"
            priority: critical
          - id: "R2"
            desc: "TaskModel has spawned_by_gap_report, gap_report_feedback ORM attributes"
            priority: critical
          - id: "R3"
            desc: "Alembic migration file exists and applies cleanly"
            priority: critical
        auto_verify:
          items:
            - id: "step_model_attrs"
              cmd: "uv run python -c \"from orchestrator.db.models import StepModel; assert all(hasattr(StepModel, f) for f in ['verifying','verifier_iterations','gap_reports'])\""
              must: true
            - id: "task_model_attrs"
              cmd: "uv run python -c \"from orchestrator.db.models import TaskModel; assert all(hasattr(TaskModel, f) for f in ['spawned_by_gap_report','gap_report_feedback'])\""
              must: true
            - id: "migration_applies"
              cmd: "uv run alembic upgrade head"
              must: true
        verifier:
          rubric:
            - id: "R1_orm"
              text: |
                R1/R2 — A: all five new ORM attributes exist on correct model classes;
                boolean columns use Integer mapped type (matching existing pattern).
                F: attributes missing from ORM models.
            - id: "R3_migration"
              text: |
                R3 — A: migration file in alembic/versions/ adds all 5 columns with correct
                defaults; upgrade applies without error. F: migration missing or fails.
        retry:
          max_attempts: 2

      - id: "T-04"
        title: "Add Event Types and Unit Tests"
        task_context: |
          Add three new event types to src/orchestrator/workflow/events.py and write
          unit tests in tests/unit/test_gap_analyzer_models.py.

          Event types to add (follow existing @dataclass pattern):
            StepVerificationStarted: step_id="", iteration=0, max_iterations=0
              event_type value: "step_verification_started"
            GapReportGenerated: step_id="", iteration=0, assessment="", verdict="", action_count=0
              event_type value: "gap_report_generated"
            StepVerificationCompleted: step_id="", total_iterations=0, final_verdict=""
              event_type value: "step_verification_completed"

          Unit tests in tests/unit/test_gap_analyzer_models.py covering:
          - GapReport validation: valid data constructs; missing required fields raise errors
          - GapAction with all four types (retry_task, spawn_fix, pass, fail)
          - StepVerifierConfig defaults: max_iterations=3, auto_verify=None
          - StepVerdict values: all four members with correct string values
          - StepState default values: verifying=False, verifier_iterations=0, gap_reports=[]
          - Event type construction: all three new event types instantiate correctly

          Reference: docs/gap-analyzer/steps/step-01.md Task 4
        requirements:
          - id: "R1"
            desc: "StepVerificationStarted, GapReportGenerated, StepVerificationCompleted event types exist"
            priority: critical
          - id: "R2"
            desc: "Event types use correct snake_case event_type string values"
            priority: critical
          - id: "R3"
            desc: "tests/unit/test_gap_analyzer_models.py exists and all tests pass"
            priority: critical
        auto_verify:
          items:
            - id: "event_types_importable"
              cmd: "uv run python -c \"from orchestrator.workflow.events import StepVerificationStarted, GapReportGenerated, StepVerificationCompleted; e = StepVerificationStarted(event_type='step_verification_started', run_id='r1', step_id='s1', iteration=1, max_iterations=3); assert e.step_id == 's1'\""
              must: true
            - id: "unit_tests_pass"
              cmd: "uv run pytest tests/unit/test_gap_analyzer_models.py -v"
              must: true
            - id: "no_regressions"
              cmd: "uv run pytest tests/unit/ -v"
              must: true
        verifier:
          rubric:
            - id: "R1_events"
              text: |
                R1/R2 — A: all three event types importable; event_type strings are exact
                snake_case values specified. F: events missing or wrong event_type strings.
            - id: "R3_tests"
              text: |
                R3 — A: test file covers all six categories listed; both happy-path and
                validation-error cases present. B: file exists but missing some categories.
                F: tests missing or failing.
        retry:
          max_attempts: 2

  - id: "S-02"
    title: "Engine Lifecycle + Action Dispatch"
    step_context: |
      Wire step verification into the workflow engine. Adds start_step_verification() and
      complete_step_verification() entry points, implements all four verdict dispatch paths,
      and updates repositories.py to persist the new step and task fields.
      check_step_progression() in transitions.py must NOT be modified.
    tasks:
      - id: "T-01"
        title: "Add start_step_verification to WorkflowEngine"
        task_context: |
          Implement start_step_verification(run_id, step_id) on WorkflowEngine in
          src/orchestrator/workflow/engine.py.

          Behavior:
          - Load step state via WorkflowService
          - Guard: if step.verifying is already True, log warning and return (idempotent)
          - Set step.verifying = True; increment step.verifier_iterations
          - Emit StepVerificationStarted(step_id=step_id, iteration=step.verifier_iterations,
            max_iterations=step_config.step_verifier.max_iterations)
          - Persist updated step state via WorkflowService

          Must be idempotent on double-call (log + return, not raise).
          Do NOT modify check_step_progression().

          Reference: docs/gap-analyzer/steps/step-02.md Task 1
        requirements:
          - id: "R1"
            desc: "start_step_verification async method exists on WorkflowEngine"
            priority: critical
          - id: "R2"
            desc: "Method sets verifying=True and increments verifier_iterations"
            priority: critical
          - id: "R3"
            desc: "Method emits StepVerificationStarted event"
            priority: critical
          - id: "R4"
            desc: "Double-call is idempotent (no error, no double-increment)"
            priority: expected
        auto_verify:
          items:
            - id: "method_exists"
              cmd: "uv run python -c \"import asyncio; from orchestrator.workflow.engine import WorkflowEngine; assert asyncio.iscoroutinefunction(WorkflowEngine.start_step_verification)\""
              must: true
            - id: "transitions_unchanged"
              cmd: "git --no-pager diff HEAD -- src/orchestrator/workflow/transitions.py"
              must: false
            - id: "no_regressions"
              cmd: "uv run pytest tests/unit/ -v"
              must: true
        verifier:
          rubric:
            - id: "R1_method"
              text: |
                R1 — A: method is async, accepts (self, run_id, step_id) parameters.
                F: method missing.
            - id: "R2_R3_behavior"
              text: |
                R2/R3 — A: implementation sets verifying=True, increments counter, emits event,
                persists state. Idempotent on second call. F: any of these behaviors missing.
        retry:
          max_attempts: 2

      - id: "T-02"
        title: "Add complete_step_verification to WorkflowEngine"
        task_context: |
          Implement complete_step_verification(run_id, step_id, gap_report) on WorkflowEngine
          with full verdict dispatch logic.

          Dispatch logic:
          1. Append gap_report to step.gap_reports; emit GapReportGenerated
          2. Check step.verifier_iterations >= step_config.step_verifier.max_iterations
             → pause run with reason "step_verifier_max_iterations" (regardless of verdict)
          3. Verdict dispatch:
             - PASS: set verifying=False, emit StepVerificationCompleted(final_verdict="pass"),
               call existing step completion path using check_step_progression() and
               check_run_completion() from transitions.py (same pattern as complete_verification()
               at engine.py lines 418-463 — do NOT duplicate, import and call)
             - FAIL: set verifying=False, emit StepVerificationCompleted(final_verdict="fail"),
               call self.pause_run(run_id, reason="step_verifier_failed")
             - RETRY/FIX: dispatch actions (Task 3), leave verifying=True
          4. Persist state after all mutations: self._state.update_run(run)

          max_iterations check runs BEFORE verdict dispatch.

          Reference: docs/gap-analyzer/steps/step-02.md Task 2
        requirements:
          - id: "R1"
            desc: "complete_step_verification async method exists on WorkflowEngine"
            priority: critical
          - id: "R2"
            desc: "PASS verdict advances step to completion and emits StepVerificationCompleted"
            priority: critical
          - id: "R3"
            desc: "FAIL verdict pauses run with reason step_verifier_failed"
            priority: critical
          - id: "R4"
            desc: "max_iterations guard auto-fails with step_verifier_max_iterations reason"
            priority: critical
        auto_verify:
          items:
            - id: "method_signature"
              cmd: "uv run python -c \"import inspect; from orchestrator.workflow.engine import WorkflowEngine; params = inspect.signature(WorkflowEngine.complete_step_verification).parameters; assert 'gap_report' in params and 'step_id' in params\""
              must: true
            - id: "no_regressions"
              cmd: "uv run pytest tests/unit/ -v"
              must: true
        verifier:
          rubric:
            - id: "R1_method"
              text: |
                R1 — A: method is async with correct signature (run_id, step_id, gap_report).
                F: method missing.
            - id: "R2_R3_R4"
              text: |
                R2/R3/R4 — A: all three verdict paths (pass, fail, max_iterations) implemented
                correctly; step completion path reuses transitions.py functions without duplication.
                F: any verdict path missing.
        retry:
          max_attempts: 2

      - id: "T-03"
        title: "Implement retry_task and spawn_fix Action Dispatch"
        task_context: |
          Implement retry_task and spawn_fix action handlers inside complete_step_verification
          (called when verdict is RETRY or FIX).

          retry_task handler:
          - Look up task by action.task_id; if not found, log error and skip
          - If task status is not COMPLETED, log warning and skip
          - If task.current_attempt >= task.max_attempts, treat as FAIL:
            pause run with reason "step_verifier_failed" and return
          - Reset task to PENDING: set task.status = TaskStatus.PENDING
          - Do NOT reset task.current_attempt
          - Set task.gap_report_feedback = action.feedback

          spawn_fix handler:
          - Create new TaskState with spawned_by_gap_report=True, title from action.title,
            status=PENDING, max_attempts=3, checklist from action.requirements
          - Add task to step.tasks list
          - Persist immediately via self._state.update_run(run)

          After dispatching all RETRY/FIX actions, call self._state.update_run(run).

          Reference: docs/gap-analyzer/steps/step-02.md Task 3
        requirements:
          - id: "R1"
            desc: "retry_task resets COMPLETED task to PENDING with gap_report_feedback set"
            priority: critical
          - id: "R2"
            desc: "retry_task skips non-COMPLETED tasks (no crash)"
            priority: critical
          - id: "R3"
            desc: "retry_task on exhausted task (current_attempt >= max_attempts) pauses run"
            priority: critical
          - id: "R4"
            desc: "spawn_fix creates new TaskState with spawned_by_gap_report=True in step.tasks"
            priority: critical
          - id: "R5"
            desc: "retry_task does NOT reset task.current_attempt"
            priority: expected
        auto_verify:
          items:
            - id: "complete_step_verification_handles_retry"
              cmd: "uv run python -c \"import inspect; from orchestrator.workflow.engine import WorkflowEngine; src = inspect.getsource(WorkflowEngine.complete_step_verification); assert 'retry_task' in src and 'spawn_fix' in src\""
              must: true
            - id: "no_regressions"
              cmd: "uv run pytest tests/unit/ -v"
              must: true
        verifier:
          rubric:
            - id: "R1_retry"
              text: |
                R1/R2/R3 — A: retry_task path handles all three sub-cases (COMPLETED→PENDING,
                non-COMPLETED skipped, exhausted→pause). current_attempt not reset. F: any
                sub-case missing.
            - id: "R4_spawn_fix"
              text: |
                R4 — A: spawn_fix creates new TaskState with spawned_by_gap_report=True,
                checklist from requirements. New task appears in step.tasks. F: task not created.
        retry:
          max_attempts: 2

      - id: "T-04"
        title: "Update Persistence and Write Engine Unit Tests"
        task_context: |
          Update repositories.py to round-trip all new fields, then write engine unit tests.

          In src/orchestrator/db/repositories.py, update _to_domain() StepState constructor:
            verifying=bool(step_model.verifying),
            verifier_iterations=step_model.verifier_iterations or 0,
            gap_reports=[GapReport(**d) for d in (step_model.gap_reports or [])],

          Update _to_domain() TaskState constructor:
            spawned_by_gap_report=bool(task_model.spawned_by_gap_report),
            gap_report_feedback=task_model.gap_report_feedback,

          Update _to_model() StepModel constructor:
            verifying=int(step.verifying),
            verifier_iterations=step.verifier_iterations,
            gap_reports=[r.model_dump(mode="json") for r in step.gap_reports],

          Update _to_model() TaskModel constructor:
            spawned_by_gap_report=int(task.spawned_by_gap_report),
            gap_report_feedback=task.gap_report_feedback,

          Create tests/unit/test_gap_analyzer_engine.py covering:
          - start_step_verification sets verifying=True, increments verifier_iterations, emits event
          - complete_step_verification with pass → step completes, verifying=False, event emitted
          - complete_step_verification with fail → run paused with step_verifier_failed
          - complete_step_verification with retry_task on COMPLETED task → task reset to PENDING
          - complete_step_verification with retry_task on non-COMPLETED task → skipped
          - complete_step_verification with spawn_fix → new task appears in step
          - verifier_iterations >= max_iterations → auto-fail regardless of verdict
          - Two-pass iteration: retry_task → tasks complete → pass → step completes

          Confirm transitions.py is UNCHANGED (no diff).

          Reference: docs/gap-analyzer/steps/step-02.md Task 4
        requirements:
          - id: "R1"
            desc: "repositories.py round-trips verifying, verifier_iterations, gap_reports through DB"
            priority: critical
          - id: "R2"
            desc: "repositories.py round-trips spawned_by_gap_report, gap_report_feedback through DB"
            priority: critical
          - id: "R3"
            desc: "tests/unit/test_gap_analyzer_engine.py passes with all 8 scenarios covered"
            priority: critical
          - id: "R4"
            desc: "transitions.py is unchanged (zero diff)"
            priority: critical
        auto_verify:
          items:
            - id: "engine_tests_pass"
              cmd: "uv run pytest tests/unit/test_gap_analyzer_engine.py -v"
              must: true
            - id: "full_unit_suite"
              cmd: "uv run pytest tests/unit/ tests/integration/ -v"
              must: true
            - id: "transitions_unchanged"
              cmd: "uv run python -c \"import subprocess; r = subprocess.run(['git','diff','HEAD','--','src/orchestrator/workflow/transitions.py'], capture_output=True, text=True); assert r.stdout.strip() == '', f'transitions.py modified: {r.stdout[:200]}'\""
              must: true
        verifier:
          rubric:
            - id: "R1_R2_persistence"
              text: |
                R1/R2 — A: _to_domain and _to_model updated for all 5 new fields; boolean
                columns coerce int→bool on read and bool→int on write; gap_reports uses
                model_dump(mode="json") for serialization. F: any field missing.
            - id: "R3_tests"
              text: |
                R3 — A: all 8 engine test scenarios present with concrete assertions.
                F: test file missing or fewer than 8 scenarios.
            - id: "R4_transitions"
              text: |
                R4 — A: zero diff to transitions.py confirmed. F: any changes to transitions.py.
        retry:
          max_attempts: 2

  - id: "S-03"
    title: "Executor + Prompts"
    step_context: |
      Connect the executor to the engine lifecycle. Implements the step verifier prompt
      generator and wires the executor to detect when step verification should run,
      spawn the verifier agent, parse its JSON output, and call the engine lifecycle methods.
      Fan-out parent step path must remain unaffected.
    tasks:
      - id: "T-01"
        title: "Add build_step_verifier_prompt to prompts.py"
        task_context: |
          Add build_step_verifier_prompt(step_config, step_state, auto_verify_results) to
          src/orchestrator/workflow/prompts.py.

          The function must return a multi-section string with these sections:
          1. User-supplied prompt: {step_config.step_verifier.prompt}
          2. "## Step Context": step title/id, current iteration, max_iterations
          3. "## Task Outcomes": for each root task (parent_task_id is None):
             status, last attempt outcome, grades, auto_verify_results;
             if task.gap_report_feedback is set, include as "Retry feedback: {feedback}"
          4. "## Step Auto-Verify Results": render auto_verify_results if present;
             OMIT this section entirely if auto_verify_results is empty
          5. "## Required Output": instruction to respond with JSON only (no markdown fences,
             no preamble); include schema:
             {"assessment": "...", "verdict": "pass"|"retry"|"fix"|"fail", "actions": [...]}

          Write unit test in tests/unit/test_gap_analyzer_prompts.py confirming all sections
          present in output for a sample call.

          Reference: docs/gap-analyzer/steps/step-03.md Task 1
        requirements:
          - id: "R1"
            desc: "build_step_verifier_prompt function exists in prompts.py and is callable"
            priority: critical
          - id: "R2"
            desc: "Output contains all required sections including verdict schema"
            priority: critical
          - id: "R3"
            desc: "Empty auto_verify_results omits the Step Auto-Verify Results section"
            priority: expected
          - id: "R4"
            desc: "tests/unit/test_gap_analyzer_prompts.py passes"
            priority: critical
        auto_verify:
          items:
            - id: "function_importable"
              cmd: "uv run python -c \"from orchestrator.workflow.prompts import build_step_verifier_prompt; assert callable(build_step_verifier_prompt)\""
              must: true
            - id: "prompt_tests_pass"
              cmd: "uv run pytest tests/unit/test_gap_analyzer_prompts.py -v"
              must: true
            - id: "no_regressions"
              cmd: "uv run pytest tests/unit/ -v"
              must: true
        verifier:
          rubric:
            - id: "R1_R2_prompt"
              text: |
                R1/R2 — A: function returns non-empty string with all five sections including
                verdict schema block. F: function missing or incomplete sections.
            - id: "R3_empty_auto_verify"
              text: |
                R3 — A: confirmed via test or manual check that empty auto_verify_results
                omits the section header entirely. B: section header present but empty.
        retry:
          max_attempts: 2

      - id: "T-02"
        title: "Wire Executor to Step Verification Loop"
        task_context: |
          Modify src/orchestrator/runners/executor.py to detect when all tasks in a step
          have reached terminal state and step_verifier is configured, then drive the
          full verification flow.

          Insertion point: the `if task_state is None:` block in _run_agent_loop (around
          line 509). Before the `break`, add a check for step_verifier configured.

          Add the step verification check BEFORE the break — see docs/gap-analyzer/steps/step-03.md
          Task 2 Step B for the exact code block. Key points:
          - Check if current (non-completed) step has step_verifier configured
          - Skip if fan-out parent (inline: any(t.status == FAN_OUT_RUNNING for t in step.tasks))
          - Only verify if run.routine_embedded is not None
          - Call await self._run_step_verification(...); then `continue` (not break)

          Implement _run_step_verification as a private method:
          1. Call service.start_step_verification(run_id, step_state.id)
          2. Refresh run state from DB
          3. Run step-level auto_verify if configured
          4. Build prompt via build_step_verifier_prompt
          5. Spawn verifier agent (same runner as step tasks), collect output
          6. Parse JSON from output; on any parse/validation error, create fail-verdict GapReport
             and log raw output at WARNING level
          7. Call service.complete_step_verification(run_id, step_state.id, gap_report)

          Also: in the builder prompt phase, if task.gap_report_feedback is set, prepend
          "Previous attempt feedback: {feedback}\n\n" to the prompt, then clear the field
          (set to None and persist).

          Fan-out parent step path must NOT be modified.

          Reference: docs/gap-analyzer/steps/step-03.md Task 2
        requirements:
          - id: "R1"
            desc: "_run_step_verification private method exists on AgentRunnerExecutor"
            priority: critical
          - id: "R2"
            desc: "JSON parse error produces fail-verdict GapReport with raw output logged at WARNING"
            priority: critical
          - id: "R3"
            desc: "After RETRY/FIX verdict, loop continues (not breaks) to pick up newly-PENDING tasks"
            priority: critical
          - id: "R4"
            desc: "gap_report_feedback injected into builder prompt and cleared after use"
            priority: expected
          - id: "R5"
            desc: "Fan-out parent step path unmodified"
            priority: critical
        auto_verify:
          items:
            - id: "method_exists"
              cmd: "uv run python -c \"from orchestrator.runners.executor import AgentRunnerExecutor; assert hasattr(AgentRunnerExecutor, '_run_step_verification')\""
              must: true
            - id: "no_regressions"
              cmd: "uv run pytest tests/unit/ -v"
              must: true
        verifier:
          rubric:
            - id: "R1_method"
              text: |
                R1 — A: _run_step_verification exists and implements the 7-step flow.
                F: method missing.
            - id: "R2_parse_error"
              text: |
                R2 — A: JSON parse failure path creates fail-verdict GapReport; raw output
                logged at WARNING before constructing the fallback report. F: parse error
                crashes or swallowed silently.
            - id: "R3_loop"
              text: |
                R3 — A: `continue` (not `break`) used after _run_step_verification call.
                F: `break` used, which would prevent retry tasks from running.
            - id: "R5_fanout"
              text: |
                R5 — A: inline fan-out check prevents verifier from running on fan-out
                parent steps; existing fan-out code path unchanged. F: fan-out path modified.
        retry:
          max_attempts: 2

  - id: "S-04"
    title: "API Surface + Integration Tests"
    step_context: |
      Expose step verification state and gap reports through the REST API, and write
      end-to-end integration tests that exercise the full verification loop.
    tasks:
      - id: "T-01"
        title: "Add GapReportSchema, Extend StepSummary and TaskSummary"
        task_context: |
          Add GapActionSchema and GapReportSchema Pydantic models to
          src/orchestrator/api/schemas/runs.py. Extend StepSummary and TaskSummary.

          Add before StepSummary class:
            class GapActionSchema(ApiModel):
                type: str
                task_id: str | None = None
                feedback: str | None = None
                title: str | None = None
                context: str | None = None
                requirements: list[dict] | None = None

            class GapReportSchema(ApiModel):
                id: str
                iteration: int
                assessment: str
                verdict: str
                actions: list[GapActionSchema] = []
                timestamp: datetime

          Add to StepSummary:
            verifying: bool = False
            verifier_iterations: int = 0
            gap_reports: list[GapReportSchema] = Field(default_factory=list)

          Add to TaskSummary (after parent_task_id field):
            spawned_by_gap_report: bool = False

          Use ApiModel base (not BaseModel). GapReportSchema.verdict is str (not enum).

          Reference: docs/gap-analyzer/steps/step-04.md Task 1
        requirements:
          - id: "R1"
            desc: "GapActionSchema and GapReportSchema importable from api/schemas/runs.py"
            priority: critical
          - id: "R2"
            desc: "StepSummary has verifying, verifier_iterations, gap_reports fields with correct defaults"
            priority: critical
          - id: "R3"
            desc: "TaskSummary has spawned_by_gap_report field defaulting to False"
            priority: critical
        auto_verify:
          items:
            - id: "schemas_importable"
              cmd: "uv run python -c \"from orchestrator.api.schemas.runs import GapReportSchema, GapActionSchema, StepSummary, TaskSummary; assert all(f in StepSummary.model_fields for f in ['verifying','verifier_iterations','gap_reports'])\""
              must: true
            - id: "task_summary_field"
              cmd: "uv run python -c \"from orchestrator.api.schemas.runs import TaskSummary; assert 'spawned_by_gap_report' in TaskSummary.model_fields\""
              must: true
            - id: "pyright_clean"
              cmd: "uv run pyright src/orchestrator/api/schemas/runs.py"
              must: true
        verifier:
          rubric:
            - id: "R1_schemas"
              text: |
                R1 — A: both schemas importable, use ApiModel base, GapReportSchema.verdict is str.
                F: schemas missing or use wrong base class.
            - id: "R2_R3_fields"
              text: |
                R2/R3 — A: all new fields have correct defaults; spawned_by_gap_report defaults
                False so existing code building TaskSummary is unaffected. F: wrong defaults.
        retry:
          max_attempts: 2

      - id: "T-02"
        title: "Update Serialization to Populate New Fields"
        task_context: |
          Update the serialization path in src/orchestrator/api/routers/runs.py (likely
          _run_to_response() or _step_to_summary()) to populate new StepSummary and
          TaskSummary fields.

          For StepSummary construction:
          - verifying: coerce Integer 0/1 to bool
          - verifier_iterations: default 0 if None
          - gap_reports: deserialize from step's gap_reports JSON list using GapReportSchema(**d);
            handle None → []; wrap in try/except for malformed JSON (log warning, return [])

          For TaskSummary construction:
          - spawned_by_gap_report: bool(task_data.get("spawned_by_gap_report", False))
            or from ORM model attribute

          GET /api/runs/{run_id} must return verifying, verifier_iterations, gap_reports on
          each step and spawned_by_gap_report on each task.

          Reference: docs/gap-analyzer/steps/step-04.md Task 2
        requirements:
          - id: "R1"
            desc: "GET /api/runs/{id} response includes verifying, verifier_iterations, gap_reports on steps"
            priority: critical
          - id: "R2"
            desc: "Null gap_reports in DB returns gap_reports: [] without error"
            priority: expected
          - id: "R3"
            desc: "spawned_by_gap_report included in task summaries"
            priority: expected
        auto_verify:
          items:
            - id: "serialization_imports"
              cmd: "uv run python -c \"from orchestrator.api.schemas.runs import GapReportSchema; s = GapReportSchema(id='x', iteration=1, assessment='ok', verdict='pass', timestamp='2026-01-01T00:00:00Z'); assert s.verdict == 'pass'\""
              must: true
            - id: "no_integration_regressions"
              cmd: "uv run pytest tests/integration/ -v"
              must: true
        verifier:
          rubric:
            - id: "R1_serialization"
              text: |
                R1 — A: serialization populates all new step fields from StepModel; null
                gap_reports returns []; malformed JSON logs warning and returns []. F: new
                fields missing from API response.
            - id: "R2_R3_defaults"
              text: |
                R2/R3 — A: pre-existing rows (null gap_reports) return [] without error;
                spawned_by_gap_report correctly serialized. B: null handling works but
                spawned_by_gap_report missing.
        retry:
          max_attempts: 2

      - id: "T-03"
        title: "Write Integration Tests"
        task_context: |
          Create tests/integration/test_gap_analyzer.py with 8 end-to-end scenarios.

          Use two-track approach:
          - Track A (service direct calls, scenarios 1-6, 8): use WorkflowService directly
            with in-memory DB (create_all, no Alembic). Pattern from test_mock_agent_workflow.py.
          - Track B (API response, scenario 7): test HTTP client + GET /api/runs/{id}

          Scenarios:
          1. Full lifecycle pass: task COMPLETED → start_step_verification → complete with PASS
             → step.completed=True, run.current_step_index advanced, gap_reports=[pass report]
          2. retry_task → re-run → pass: RETRY with retry_task action → task reset to PENDING +
             feedback set → task completes → PASS → step.completed=True, verifier_iterations=2
          3. spawn_fix → new task → pass: FIX with spawn_fix → len(step.tasks)==2,
             spawned_by_gap_report=True → complete new task → PASS → step.completed=True
          4. FAIL verdict: complete with FAIL → run.status==PAUSED, pause_reason==step_verifier_failed
          5. max_iterations: set max_iterations=1, call start (iterations=1), call complete with any
             verdict → run.status==PAUSED, pause_reason==step_verifier_max_iterations
          6. Parse error (simulated): construct fail-verdict GapReport with "Parse error" assessment
             → complete with it → run.status==PAUSED, "Parse error" in gap_reports[-1].assessment
          7. GET response: create run, set verifying state via service, GET /api/runs/{id}
             → step_data["verifying"]==True, step_data["gap_reports"][0]["verdict"]=="retry"
          8. Regression: normal step (no step_verifier) completes normally → verifier_iterations==0,
             gap_reports==[]

          Reference: docs/gap-analyzer/steps/step-04.md Task 3
        requirements:
          - id: "R1"
            desc: "tests/integration/test_gap_analyzer.py exists with all 8 scenarios"
            priority: critical
          - id: "R2"
            desc: "All 8 integration test scenarios pass"
            priority: critical
          - id: "R3"
            desc: "No existing integration tests broken"
            priority: critical
        auto_verify:
          items:
            - id: "integration_tests_pass"
              cmd: "uv run pytest tests/integration/test_gap_analyzer.py -v"
              must: true
            - id: "full_integration_suite"
              cmd: "uv run pytest tests/integration/ -v"
              must: true
        verifier:
          rubric:
            - id: "R1_R2_scenarios"
              text: |
                R1/R2 — A: all 8 scenarios present with concrete assertions (not just comments);
                both Track A and Track B patterns used correctly. F: fewer than 8 scenarios or
                scenarios without assertions.
            - id: "R3_regression"
              text: |
                R3 — A: all existing integration tests pass. F: any pre-existing test broken.
        retry:
          max_attempts: 2

  - id: "S-05"
    title: "Frontend Display"
    step_context: |
      Render step verification state and gap reports in the UI. Users should see when a
      step is being verified, how many iterations have run, what the verifier assessed,
      and what actions were taken — including fix-up tasks spawned by the verifier.
    tasks:
      - id: "T-01"
        title: "Update TypeScript Types"
        task_context: |
          Add GapAction and GapReport TypeScript interfaces to ui/src/types/runs.ts.
          Extend StepSummary and TaskSummary interfaces.

          Add to ui/src/types/runs.ts:
            export interface GapAction {
              type: string;
              task_id?: string;
              feedback?: string;
              title?: string;
              context?: string;
              requirements?: Record<string, unknown>[];
            }
            export interface GapReport {
              id: string;
              iteration: number;
              assessment: string;
              verdict: 'pass' | 'retry' | 'fix' | 'fail';
              actions: GapAction[];
              timestamp: string;
            }

          Add to StepSummary interface:
            verifying: boolean;
            verifier_iterations: number;
            gap_reports: GapReport[];

          Add to TaskSummary interface:
            spawned_by_gap_report?: boolean;  (optional for backward compat)

          Run npx tsc --noEmit to confirm no type errors.

          Reference: docs/gap-analyzer/steps/step-05.md Task 1
        requirements:
          - id: "R1"
            desc: "GapAction and GapReport TypeScript interfaces exported from types/runs.ts"
            priority: critical
          - id: "R2"
            desc: "StepSummary extended with verifying, verifier_iterations, gap_reports"
            priority: critical
          - id: "R3"
            desc: "TaskSummary extended with spawned_by_gap_report (optional)"
            priority: expected
          - id: "R4"
            desc: "TypeScript type check passes with no errors"
            priority: critical
        auto_verify:
          items:
            - id: "types_exported"
              cmd: "grep -n 'export interface GapReport\\|export interface GapAction' ui/src/types/runs.ts"
              must: true
            - id: "step_summary_fields"
              cmd: "grep -n 'verifying.*boolean\\|verifier_iterations.*number\\|gap_reports.*GapReport' ui/src/types/runs.ts"
              must: true
            - id: "typescript_check"
              cmd: "cd ui && npx tsc --noEmit"
              must: true
        verifier:
          rubric:
            - id: "R1_R2_types"
              text: |
                R1/R2 — A: both interfaces exported with correct field types; GapReport.verdict
                is typed as the four-value union. StepSummary fields added. F: interfaces missing.
            - id: "R4_typecheck"
              text: |
                R4 — A: tsc passes clean. F: type errors introduced.
        retry:
          max_attempts: 2

      - id: "T-02"
        title: "Add Verifying State to StepTimeline"
        task_context: |
          Update stepTimelineUtils.ts and StepTimeline.tsx to render verifying steps.

          In ui/src/lib/stepTimelineUtils.ts:
          - Add 'verifying' to the step state union type
          - Update getStepState() to return 'verifying' when step.verifying === true
          - Add 'verifying' entry to stepBadgeClasses with pulsing purple badge
            (e.g., animate-pulse bg-purple-500 or matching existing badge class pattern)

          In ui/src/components/dashboard/StepTimeline.tsx:
          - Render verifying steps with the pulsing purple badge
          - Show iteration counter text: "Verifying {verifier_iterations}"
            (show denominator if max_iterations available from step config, else omit)

          Follow existing badge class pattern in stepBadgeClasses — do not inline ad-hoc styles.

          Reference: docs/gap-analyzer/steps/step-05.md Task 2
        requirements:
          - id: "R1"
            desc: "getStepState() returns 'verifying' for steps where verifying === true"
            priority: critical
          - id: "R2"
            desc: "Verifying steps render with pulsing purple badge and iteration counter text"
            priority: critical
          - id: "R3"
            desc: "TypeScript check passes"
            priority: critical
        auto_verify:
          items:
            - id: "verifying_state"
              cmd: "grep -n \"'verifying'\" ui/src/lib/stepTimelineUtils.ts"
              must: true
            - id: "badge_class"
              cmd: "grep -n 'verifying' ui/src/lib/stepTimelineUtils.ts"
              must: true
            - id: "typescript_check"
              cmd: "cd ui && npx tsc --noEmit"
              must: true
        verifier:
          rubric:
            - id: "R1_state"
              text: |
                R1 — A: getStepState returns 'verifying' correctly; badge class uses
                animate-pulse with purple color. B: state returned but badge styling
                doesn't match spec. F: 'verifying' state not handled.
            - id: "R2_counter"
              text: |
                R2 — A: iteration counter text rendered for verifying steps.
                B: badge present but no counter. F: no verifying badge.
        retry:
          max_attempts: 2

      - id: "T-03"
        title: "Build Gap Report Display Component"
        task_context: |
          Create a gap report card component showing assessment, verdict badge, action list,
          iteration counter, and collapsible history.

          Create ui/src/components/detail/GapReportCard.tsx with:
          - Props: reports: GapReport[], verifier_iterations: number
          - For each report: assessment text, verdict badge (green=pass, amber=retry/fix, red=fail),
            action list (type + target task ID + feedback/context), iteration counter
          - Historical gap reports: collapsible — most recent expanded, prior collapsed
          - Empty state (gap_reports: []): render nothing (no card)

          Export only the component from this file (no utility functions mixed in — React
          Fast Refresh requirement per project conventions).

          Also integrate GapReportCard into the step detail section of RunDetail.tsx
          (or wherever step details are shown), passing gap_reports and verifier_iterations.

          Reference: docs/gap-analyzer/steps/step-05.md Task 3
        requirements:
          - id: "R1"
            desc: "GapReportCard component exists and renders assessment, verdict badge, action list"
            priority: critical
          - id: "R2"
            desc: "Verdict badge colors: green=pass, amber=retry/fix, red=fail"
            priority: expected
          - id: "R3"
            desc: "Empty gap_reports renders nothing"
            priority: expected
          - id: "R4"
            desc: "GapReportCard integrated into run detail view for steps with gap_reports"
            priority: critical
        auto_verify:
