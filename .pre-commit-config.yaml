repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']

  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: uv run pyright
        language: system
        types: [python]
        pass_filenames: false
      - id: ui-lint
        name: ui-lint
        entry: npm --prefix ui run lint
        language: system
        pass_filenames: false
      - id: ui-typecheck
        name: ui-typecheck
        entry: npm --prefix ui run typecheck
        language: system
        pass_filenames: false
