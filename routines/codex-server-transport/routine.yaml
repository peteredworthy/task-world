id: "codex-server-transport"
name: "Codex Server HTTP Transport Implementation"
description: |
  Implements the missing HTTP transport layer inside CodexServerAgent.execute()
  and CodexServerRemoteAgent.execute(). Both methods are currently stubs that
  immediately raise AgentNotAvailableError("not yet implemented"). This routine
  replaces those stubs with real session creation, event streaming, and callback
  routing — and verifies each with behavioral tests that call execute() against
  a fake HTTP server, making it impossible to pass verification with a stub.

  Context: the executor dispatch, session-recovery rule, lifecycle API, and
  monitor health checks were all correctly implemented in the prior run. Only
  the execute() transport is missing.

  WARNING TO BUILDER AGENT: The previous implementation attempt wrote tests
  that assert AgentNotAvailableError is raised from execute(). Those tests
  document the stub, they do not prove behavior. The auto-verify and verifier
  rubric in this routine are specifically designed to reject stub implementations.
  A passing auto-verify here means execute() made a real HTTP call to a fake
  server and invoked a real callback. Do not write tests that assert
  AgentNotAvailableError is raised from execute() — those would be
  testing the broken state, not the fixed state.

inputs: []

steps:
  - id: "S-01"
    title: "Research Codex app-server HTTP API"
    step_context: |
      Before touching any code, lock down the exact API contract the transport
      layer must implement. The stubs already contain a commented outline
      (POST /sessions, stream/poll events, tool-call routing). This step
      confirms the real API shape and documents it so that the transport
      implementation has no ambiguity.
    tasks:
      - id: "T-01"
        title: "Document the Codex app-server session and event API"
        task_context: |
          Research the Codex app-server HTTP API and produce
          docs/codex-server-transport/api-contract.md covering:

          1. Session creation endpoint:
             - Method, path (e.g. POST /sessions or POST /api/sessions)
             - Required request body fields (model, prompt, tools, etc.)
             - Response shape (session_id, status, etc.)

          2. Event streaming or polling mechanism:
             - Does the server use SSE (text/event-stream) or polling?
             - What is the endpoint path for events? (e.g. GET /sessions/{id}/events)
             - Event envelope schema: what fields does each event have?

          3. Tool-call event shape:
             - How does a tool invocation appear in the event stream?
             - What fields carry tool name and arguments?

          4. Session terminal states:
             - What status values indicate the session is complete, errored, or cancelled?

          5. Any authentication differences between local (loopback, no auth) and
             remote (bearer token in Authorization header) variants.

          Primary source: the codex CLI / app-server documentation.
          Also read docs/codex-server/context/contract-matrix.md for existing
          decisions, and inspect src/orchestrator/agents/codex_server.py and
          src/orchestrator/agents/codex_server_remote.py for the stub comments
          which describe the intended API shape.

          Save all findings to docs/codex-server-transport/api-contract.md.
        requirements:
          - id: "R1"
            desc: "api-contract.md documents the session creation request/response schema"
            priority: critical
          - id: "R2"
            desc: "api-contract.md documents the event streaming/polling mechanism and event envelope"
            priority: critical
          - id: "R3"
            desc: "api-contract.md documents tool-call event shape and how to extract tool name and args"
            priority: critical
          - id: "R4"
            desc: "api-contract.md documents session terminal states"
            priority: expected
        auto_verify:
          items:
            - id: "api_contract_exists"
              cmd: "test -f docs/codex-server-transport/api-contract.md"
              must: true
            - id: "api_contract_covers_sessions"
              cmd: "grep -q 'session' docs/codex-server-transport/api-contract.md && grep -q 'event' docs/codex-server-transport/api-contract.md && grep -q 'tool' docs/codex-server-transport/api-contract.md"
              must: true
        verifier:
          rubric:
            - id: "completeness"
              text: "Does api-contract.md provide enough detail to implement POST /sessions, parse the event stream, and extract tool calls — or are critical fields left as unknowns?"
            - id: "source"
              text: "Is the documented API shape grounded in actual Codex app-server documentation, the CLI source, or another verifiable source — or is it purely speculative?"

  - id: "S-02"
    title: "Implement CodexServerAgent.execute() HTTP transport"
    step_context: |
      Replace the stub in CodexServerAgent.execute() with a real implementation.
      The stub currently does:
        raise AgentNotAvailableError("Codex server HTTP transport not yet implemented.")

      The real implementation must:
        1. Ensure a codex app-server process is running (spawn if needed; emit
           PID via on_agent_metadata).
        2. POST to {endpoint}/sessions with the assembled prompt and model.
        3. Stream or poll session events.
        4. For each tool-call event: call enforce_tool_allowlist(tool_name),
           then route to _route_tool_call().
        5. Collect output text into output_lines.
        6. Return ExecutionResult when the session reaches a terminal state or
           self._cancelled is set.

      DESIGN REQUIREMENT: The agent must accept an injectable httpx.AsyncClient
      (or httpx transport) via a constructor parameter (e.g. _http_client or
      _transport) so tests can intercept HTTP calls without starting a real
      Codex process. Name it with a leading underscore to signal it is for
      testing only.
    tasks:
      - id: "T-01"
        title: "Implement session creation and process management"
        task_context: |
          In src/orchestrator/agents/codex_server.py:

          1. Add an optional _http_client: httpx.AsyncClient | None = None constructor
             parameter. When None, create a default httpx.AsyncClient in execute().
             This enables tests to inject a fake client without starting a real server.

          2. Implement process spawning: if the configured endpoint is loopback
             (localhost / 127.0.0.1), check whether the process is already running.
             If not, spawn `codex app-server` as a subprocess and emit its PID via
             on_agent_metadata({"pid": pid}).

          3. Implement session creation: POST {endpoint}/sessions with the prompt
             and model (from _full_prompt and self._model). Parse the response to
             extract the session_id.

          4. Handle the AgentNotAvailableError case: if the POST fails with a
             connection error, raise AgentNotAvailableError (not AgentExecutionError).

          5. Remove the "not yet implemented" stub raise entirely. If the transport
             is incomplete, leave a TODO comment — do NOT raise AgentNotAvailableError
             as a placeholder, because that makes all existing tests pass incorrectly.

          Verify types pass after the change:
          uv run pyright src/orchestrator/agents/codex_server.py
        requirements:
          - id: "R1"
            desc: "Constructor accepts optional _http_client for test injection"
            priority: critical
          - id: "R2"
            desc: "execute() POSTs to {endpoint}/sessions and extracts a session_id from the response"
            priority: critical
          - id: "R3"
            desc: "Stub AgentNotAvailableError('not yet implemented') is removed"
            priority: critical
        auto_verify:
          items:
            - id: "stub_removed"
              cmd: "python3 -c \"import inspect; from orchestrator.agents.codex_server import CodexServerAgent; src = inspect.getsource(CodexServerAgent.execute); assert 'HTTP transport not yet implemented' not in src, 'Stub is still present'; print('PASS: stub removed')\""
              must: true
            - id: "pyright_passes"
              cmd: "uv run pyright src/orchestrator/agents/codex_server.py"
              must: true
        verifier:
          rubric:
            - id: "stub_gone"
              text: "Is the 'HTTP transport not yet implemented' AgentNotAvailableError raise gone from execute()? Read the source — do not accept a reworded stub as an implementation."
            - id: "http_client_injection"
              text: "Does the constructor accept a _http_client or _transport parameter that tests can use to intercept HTTP calls, so tests never need to start a real Codex process?"
            - id: "session_creation"
              text: "Does execute() make a POST request to create a session (not just build a prompt and return), and does it store the session_id from the response?"

      - id: "T-02"
        title: "Implement event streaming and callback routing"
        task_context: |
          Continue in src/orchestrator/agents/codex_server.py.

          Using the API contract from docs/codex-server-transport/api-contract.md:

          1. After creating the session, poll or stream events from the server.
             Implement whichever mechanism the Codex app-server uses (SSE or
             polling GET {endpoint}/sessions/{session_id}/events).

          2. For each event received:
             - If it is a tool-call event: extract tool_name and args, then call
               await self._route_tool_call(tool_name, args, on_checklist_update,
               on_submit, on_grade=on_grade). The _route_tool_call method already
               enforces the allow-list and dispatches to the right callback.
             - If it is an output/text event: append the text to output_lines and
               call on_output([text_line]) if on_output is not None.
             - If it is a terminal event (complete, error, cancelled): break the loop.

          3. After the loop, check self._cancelled. If set, raise AgentCancelledError.

          4. Build and return an ExecutionResult using _build_metrics() and the
             collected output_lines.

          5. Wrap the entire body in try/except to map httpx.ConnectError to
             AgentNotAvailableError and httpx.TimeoutException to AgentTimeoutError.

          uv run pytest tests/unit/test_codex_server_transport.py -v
        requirements:
          - id: "R1"
            desc: "execute() streams or polls events from the session and routes tool-call events to callbacks"
            priority: critical
          - id: "R2"
            desc: "A tool-call event received from the fake server causes the matching callback to fire"
            priority: critical
          - id: "R3"
            desc: "execute() returns ExecutionResult with output_lines populated from output events"
            priority: expected
        auto_verify:
          items:
            - id: "transport_tests_exist"
              cmd: "test -f tests/unit/test_codex_server_transport.py"
              must: true
            - id: "transport_tests_pass"
              cmd: "uv run pytest tests/unit/test_codex_server_transport.py -v --tb=short"
              must: true
        verifier:
          rubric:
            - id: "behavioral_test"
              text: |
                Open tests/unit/test_codex_server_transport.py. Do any tests:
                (a) inject a fake HTTP client or mock transport into CodexServerAgent,
                (b) call agent.execute() directly (not _route_tool_call or _build_prompt),
                (c) have the fake server return a tool-call event, and
                (d) assert that the on_checklist_update or on_submit callback was actually invoked?
                If none of the tests satisfy all four conditions, this requirement is not met.
            - id: "no_stub_asserts"
              text: |
                Do any tests in test_codex_server_transport.py assert that execute() raises
                AgentNotAvailableError? If yes, those tests are validating the broken stub —
                they must be removed or converted to tests that assert real behavior.
            - id: "execute_is_real"
              text: |
                Call execute() manually against a minimal fake server (spin up a simple
                aiohttp or httpx test server that returns a session_id then a tool event).
                Does a callback fire? Does the function return an ExecutionResult rather
                than raising? If the answer to either is no, the implementation is incomplete.

      - id: "T-03"
        title: "Write complete behavioral test suite for local agent execute()"
        task_context: |
          Ensure tests/unit/test_codex_server_transport.py provides full behavioral
          coverage. Each test must call execute() against a fake HTTP transport —
          not _route_tool_call(), _build_prompt(), or any other helper.

          Required test cases:

          1. test_execute_posts_to_sessions_endpoint
             Fake server records incoming requests. Assert that POST /sessions
             was called with the correct Content-Type and a non-empty body.

          2. test_execute_routes_update_checklist_tool_call
             Fake server returns a session response then a tool-call event for
             "update_checklist" with req_id="R-01" and status="done".
             Assert that on_checklist_update was called with ("R-01", DONE, ...).

          3. test_execute_routes_submit_tool_call
             Fake server returns a tool-call event for "submit".
             Assert that on_submit was called.

          4. test_execute_returns_execution_result_on_terminal_event
             Fake server returns a "complete" terminal event.
             Assert that execute() returns an ExecutionResult (not raises).

          5. test_execute_raises_agent_not_available_on_connect_error
             Inject a transport that raises httpx.ConnectError.
             Assert AgentNotAvailableError is raised (not a raw httpx exception).

          6. test_execute_raises_agent_cancelled_if_cancelled_before_start
             Call cancel() then execute(). Assert AgentCancelledError.
             (This test already exists in test_codex_server_agent.py — keep it there;
             do not duplicate it here unless it is testing the real transport path.)

          Forbidden patterns in this file:
          - Do NOT use pytest.raises(AgentNotAvailableError) to assert the stub message.
          - Do NOT test _route_tool_call() directly — that belongs in test_codex_server_agent.py.
          - Do NOT mock or patch internals — use dependency injection via _http_client.

          uv run pytest tests/unit/test_codex_server_transport.py -v --tb=short
        requirements:
          - id: "R1"
            desc: "test_execute_posts_to_sessions_endpoint passes using a fake transport"
            priority: critical
          - id: "R2"
            desc: "test_execute_routes_update_checklist_tool_call passes — callback is invoked by execute()"
            priority: critical
          - id: "R3"
            desc: "test_execute_raises_agent_not_available_on_connect_error passes"
            priority: expected
        auto_verify:
          items:
            - id: "transport_test_file_has_execute_calls"
              cmd: "grep -c 'await agent.execute(' tests/unit/test_codex_server_transport.py"
              must: true
            - id: "transport_tests_pass"
              cmd: "uv run pytest tests/unit/test_codex_server_transport.py -v --tb=short"
              must: true
            - id: "no_stub_assertions_in_new_file"
              cmd: "python3 -c \"content = open('tests/unit/test_codex_server_transport.py').read(); assert 'HTTP transport not yet implemented' not in content, 'File asserts the stub message — tests must validate real behavior'; print('PASS')\""
              must: true
        verifier:
          rubric:
            - id: "execute_called_directly"
              text: |
                Count the lines in test_codex_server_transport.py that call
                'await agent.execute('. Is the count >= 4? If fewer than 4 tests
                call execute() directly, the suite is testing helpers, not the transport.
            - id: "callback_fired"
              text: |
                In test_execute_routes_update_checklist_tool_call, does the test
                capture whether on_checklist_update was called (e.g. via a list
                that is appended to in the callback)? If the callback capture is
                absent or commented out, the test proves nothing about callback routing.
            - id: "fake_transport_injected"
              text: |
                Is the fake HTTP server injected via the _http_client constructor
                parameter (or equivalent DI mechanism)? Or is the test relying on
                a real network call or monkey-patching? Injection via the constructor
                is the only acceptable approach given the no-mocking constraint.

  - id: "S-03"
    title: "Implement CodexServerRemoteAgent.execute() HTTP transport"
    step_context: |
      Replace the stub in CodexServerRemoteAgent.execute() with a real implementation.
      The stub currently does:
        raise AgentNotAvailableError("Codex remote server HTTPS transport not yet implemented.")

      The remote agent shares the same event loop and callback routing as the local
      agent, with two differences:
        - Uses self._base_url instead of self._endpoint
        - Injects "Authorization: Bearer {self._token}" in every request header
        - Has retry logic up to self._retry for transient HTTP errors

      The session creation and event streaming logic should be factored into
      codex_server_common.py where possible to avoid duplication between variants.
    tasks:
      - id: "T-01"
        title: "Factor shared transport helpers into codex_server_common"
        task_context: |
          Identify what logic is identical between local and remote execute():
          - Session creation request assembly (prompt, model, format)
          - Event stream parsing (same event envelope regardless of auth)
          - Tool-call extraction (same field names)
          - ExecutionResult construction

          Move shared logic into functions in codex_server_common.py:
          - create_session_payload(prompt, model) -> dict
          - parse_event_stream(response) -> AsyncIterator[Event]  (or equivalent)
          - build_execution_result(output_lines, duration_ms, ...) -> ExecutionResult

          Both agents call these helpers; only auth headers and base URL differ.

          uv run pyright src/orchestrator/agents/codex_server_common.py
          uv run ruff check src/orchestrator/agents/codex_server_common.py
        requirements:
          - id: "R1"
            desc: "codex_server_common contains shared transport helpers used by both agents"
            priority: critical
          - id: "R2"
            desc: "No duplicate session/event-parsing logic exists in codex_server.py and codex_server_remote.py"
            priority: expected
        auto_verify:
          items:
            - id: "common_has_transport_helpers"
              cmd: "grep -c 'def ' src/orchestrator/agents/codex_server_common.py"
              must: true
            - id: "pyright_common"
              cmd: "uv run pyright src/orchestrator/agents/codex_server_common.py"
              must: true

      - id: "T-02"
        title: "Implement remote execute() with bearer auth and retry"
        task_context: |
          In src/orchestrator/agents/codex_server_remote.py:

          1. Add an optional _http_client: httpx.AsyncClient | None = None constructor
             parameter (same pattern as local agent).

          2. Implement execute() using the shared helpers from codex_server_common:
             - Build the session payload.
             - POST {self._base_url}/sessions with:
                 headers={"Authorization": f"Bearer {self._token}", "Content-Type": "application/json"}
             - Extract session_id.
             - Stream/poll events from {self._base_url}/sessions/{session_id}/events
               with the same Authorization header.
             - Route tool-call events through self._route_tool_call().
             - Collect output_lines from text events.
             - Break on terminal state.

          3. Implement retry: for transient HTTP errors (5xx, network error), retry
             up to self._retry times with exponential back-off. Do NOT retry 401/403.

          4. Remove the "not yet implemented" stub raise.

          5. Verify the existing map_transport_error() and existing error-handling
             branches already in execute() are now reachable (they were unreachable
             in the stub because the raise happened before any httpx call).

          uv run pyright src/orchestrator/agents/codex_server_remote.py
        requirements:
          - id: "R1"
            desc: "Constructor accepts optional _http_client for test injection"
            priority: critical
          - id: "R2"
            desc: "execute() sends Authorization: Bearer header on every request"
            priority: critical
          - id: "R3"
            desc: "Stub 'not yet implemented' raise is removed"
            priority: critical
          - id: "R4"
            desc: "Retry logic retries on 5xx/network error but not 401/403"
            priority: expected
        auto_verify:
          items:
            - id: "remote_stub_removed"
              cmd: "python3 -c \"import inspect; from orchestrator.agents.codex_server_remote import CodexServerRemoteAgent; src = inspect.getsource(CodexServerRemoteAgent.execute); assert 'HTTPS transport not yet implemented' not in src, 'Stub is still present'; print('PASS: stub removed')\""
              must: true
            - id: "pyright_remote"
              cmd: "uv run pyright src/orchestrator/agents/codex_server_remote.py"
              must: true
        verifier:
          rubric:
            - id: "bearer_header"
              text: |
                Read the execute() source in codex_server_remote.py. Is there a line
                that builds a headers dict containing 'Authorization' and self._token?
                If not, the token is never sent and the remote transport is broken.
            - id: "stub_gone_remote"
              text: |
                Is the 'HTTPS transport not yet implemented' raise gone? Read the source,
                do not trust the auto-verify output alone — the stub wording may have
                been changed without the transport being implemented.
            - id: "uses_common_helpers"
              text: |
                Does execute() call functions from codex_server_common rather than
                re-implementing session creation and event parsing inline? Duplication
                between local and remote agents is a maintenance defect.

      - id: "T-03"
        title: "Write behavioral test suite for remote agent execute()"
        task_context: |
          Create tests/unit/test_codex_server_remote_transport.py with the same
          behavioral coverage required for the local agent, plus remote-specific cases.

          Required test cases:

          1. test_remote_execute_sends_bearer_auth_header
             Inject a fake client. Call execute(). Assert the POST /sessions
             request carried Authorization: Bearer <token>.
             This is the single most important test — bearer auth is the primary
             contract difference between local and remote.

          2. test_remote_execute_routes_update_checklist_tool_call
             Fake server returns a tool-call event for "update_checklist".
             Assert that on_checklist_update was called.

          3. test_remote_execute_routes_submit_tool_call
             Fake server returns a tool-call event for "submit".
             Assert that on_submit was called.

          4. test_remote_execute_returns_result_on_terminal_event
             Fake server returns a terminal event. Assert ExecutionResult returned.

          5. test_remote_execute_raises_agent_not_available_on_connect_error
             Inject a transport that raises httpx.ConnectError. Assert AgentNotAvailableError.

          6. test_remote_execute_raises_agent_execution_error_on_401
             Inject a transport that returns HTTP 401. Assert AgentExecutionError with
             a message that does NOT contain the bearer token value.

          7. test_remote_execute_bearer_token_not_in_error_message_on_401
             Same as above — explicitly assert the raw token string is absent from
             the AgentExecutionError message. (Token leakage, risk R-05.)

          Forbidden patterns: same as for local transport tests.

          uv run pytest tests/unit/test_codex_server_remote_transport.py -v --tb=short
        requirements:
          - id: "R1"
            desc: "test_remote_execute_sends_bearer_auth_header passes — fake client captures the Authorization header"
            priority: critical
          - id: "R2"
            desc: "test_remote_execute_routes_update_checklist_tool_call passes"
            priority: critical
          - id: "R3"
            desc: "test_remote_execute_bearer_token_not_in_error_message_on_401 passes"
            priority: critical
        auto_verify:
          items:
            - id: "remote_transport_test_file_exists"
              cmd: "test -f tests/unit/test_codex_server_remote_transport.py"
              must: true
            - id: "remote_transport_tests_pass"
              cmd: "uv run pytest tests/unit/test_codex_server_remote_transport.py -v --tb=short"
              must: true
            - id: "bearer_header_test_present"
              cmd: "grep -q 'bearer\\|Bearer\\|Authorization' tests/unit/test_codex_server_remote_transport.py"
              must: true
            - id: "no_stub_assertions_remote"
              cmd: "python3 -c \"content = open('tests/unit/test_codex_server_remote_transport.py').read(); assert 'HTTPS transport not yet implemented' not in content; print('PASS')\""
              must: true
        verifier:
          rubric:
            - id: "auth_header_captured"
              text: |
                In test_remote_execute_sends_bearer_auth_header, does the fake transport
                capture the actual Authorization header value from the outgoing request
                and assert it equals 'Bearer <expected_token>'? An assertion that the
                header key exists but not its value is insufficient.
            - id: "token_redaction_proven"
              text: |
                In test_remote_execute_bearer_token_not_in_error_message_on_401, does
                the test use a non-trivial token string (e.g. 'sk-secret-test-token')
                and assert that exact string is absent from exc_info.value.message?
                If the token string is trivially short or the assertion is missing, the
                test does not prove redaction.
            - id: "execute_called_directly"
              text: |
                Count the lines calling 'await agent.execute(' in
                test_codex_server_remote_transport.py. Is the count >= 5?
                If fewer than 5, the suite is not covering the required cases.

  - id: "S-04"
    title: "Full regression and parity verification"
    step_context: |
      Confirm that both transports are complete, that no previously-passing tests
      now fail, and that the 2x2 callback parity matrix (builder/verifier x REST/MCP)
      holds for both agents when called through execute().
    tasks:
      - id: "T-01"
        title: "Run all codex transport and existing tests — confirm no regressions"
        task_context: |
          Run the complete test suite for all Codex-related tests:

          1. New transport tests:
             uv run pytest tests/unit/test_codex_server_transport.py tests/unit/test_codex_server_remote_transport.py -v

          2. Existing tests must still pass (they test helpers and lifecycle, not the transport):
             uv run pytest tests/unit/test_codex_server_agent.py tests/unit/test_codex_server_remote.py tests/unit/test_codex_server_common.py tests/unit/test_codex_server_parity.py tests/unit/test_codex_server_callbacks.py -v

          3. Integration tests:
             uv run pytest tests/integration/test_codex_lifecycle.py tests/integration/test_codex_server_callbacks.py -v

          4. Confirm no tests now fail that previously passed:
             uv run pytest tests/ -x --tb=short -q

          If any previously-passing test now fails, fix the regression before proceeding.
          Do not delete passing tests to make the suite green.
        requirements:
          - id: "R1"
            desc: "New transport test suites pass for both local and remote agents"
            priority: critical
          - id: "R2"
            desc: "All previously-passing Codex tests still pass"
            priority: critical
          - id: "R3"
            desc: "Full test suite passes with no regressions"
            priority: critical
        auto_verify:
          items:
            - id: "new_transport_tests_pass"
              cmd: "uv run pytest tests/unit/test_codex_server_transport.py tests/unit/test_codex_server_remote_transport.py -v --tb=short"
              must: true
            - id: "existing_codex_tests_still_pass"
              cmd: "uv run pytest tests/unit/test_codex_server_agent.py tests/unit/test_codex_server_remote.py tests/unit/test_codex_server_common.py tests/unit/test_codex_server_parity.py tests/unit/test_codex_server_callbacks.py tests/integration/test_codex_lifecycle.py tests/integration/test_codex_server_callbacks.py -v --tb=short"
              must: true
            - id: "full_suite_no_failures"
              cmd: "uv run pytest tests/ -x --tb=short -q"
              must: true
        verifier:
          rubric:
            - id: "both_stubs_gone"
              text: |
                Run these two commands:
                  python3 -c "import inspect; from orchestrator.agents.codex_server import CodexServerAgent; print(inspect.getsource(CodexServerAgent.execute))"
                  python3 -c "import inspect; from orchestrator.agents.codex_server_remote import CodexServerRemoteAgent; print(inspect.getsource(CodexServerRemoteAgent.execute))"
                Do either of the execute() bodies contain the phrases 'not yet implemented',
                'placeholder', or 'will be added in a subsequent step'? If yes, the transport
                is still a stub and this step has not been completed.
            - id: "regression_free"
              text: |
                Compare the test counts: how many tests passed before this routine ran
                (381, from the pre-run baseline) vs how many pass now. The new count
                should be higher (new transport tests added) and no previously-passing
                test should have been deleted or skipped to achieve a green suite.
            - id: "callbacks_fire_through_execute"
              text: |
                Describe a specific test in test_codex_server_transport.py or
                test_codex_server_remote_transport.py where:
                  (1) execute() is called,
                  (2) the fake server returns a tool-call event,
                  (3) a callback function captures the invocation.
                If no such test exists, the transport tests are not proving behavioral correctness.

      - id: "T-02"
        title: "Static analysis and pre-commit gate"
        task_context: |
          Run the full static analysis gate. All checks must pass before the
          routine is complete.

          uv run ruff check .
          uv run ruff format --check .
          uv run pyright
          uv run pre-commit run --all-files

          Fix any failures. Do not use --no-verify or skip hooks.
          Record the results in docs/codex-server-transport/release-readiness.md.
        requirements:
          - id: "R1"
            desc: "ruff check passes with zero violations"
            priority: critical
          - id: "R2"
            desc: "pyright passes with zero errors"
            priority: critical
          - id: "R3"
            desc: "pre-commit run --all-files passes all hooks"
            priority: critical
        auto_verify:
          items:
            - id: "ruff_check"
              cmd: "uv run ruff check ."
              must: true
            - id: "pyright"
              cmd: "uv run pyright"
              must: true
            - id: "precommit"
              cmd: "uv run pre-commit run --all-files"
              must: true
            - id: "readiness_doc_exists"
              cmd: "test -f docs/codex-server-transport/release-readiness.md"
              must: true
        verifier:
          rubric:
            - id: "all_gates_pass"
              text: "Do ruff, pyright, and pre-commit all exit 0? If any gate failed and was worked around rather than fixed, that is a blocker."
            - id: "readiness_doc_accurate"
              text: "Does docs/codex-server-transport/release-readiness.md contain the actual command output, not just 'PASS' without evidence?"
