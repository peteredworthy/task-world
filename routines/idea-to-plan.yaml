routine:
  id: "idea-to-plan"
  name: "Idea to Implementation Plan"
  description: |
    Transform an initial idea into a structured, executable plan through a 9-stage
    workflow with human review gates. Produces step files and a validated routine
    YAML ready for execution.

    Primary process references live in docs/plan-runner/.

  inputs:
    - name: "feature"
      required: true
      description: "Feature name used for directory structure (docs/{feature}/ and routines/{feature}/)"
    - name: "idea"
      required: true
      description: "Initial idea, request, or prompt to plan"
    - name: "codebase_context"
      required: false
      description: "Brief description of existing codebase architecture"

  steps:
    - id: "S-01"
      title: "Initial Plan"
      step_context: |
        Stage 1 from docs/plan-runner/idea_to_plan_stripped.md.
        Produce initial planning docs and front-load uncertainty.
      tasks:
        - id: "T-01"
          title: "Generate Initial Artifacts"
          task_context: |
            Create initial planning artifacts based on the idea and codebase context.

            IDEA:
            {{idea}}

            CODEBASE CONTEXT:
            {{codebase_context}}

            Create these files in docs/{{feature}}/:
            1. intent.md
            2. plan.md
            3. design-questions.md
            4. architecture.md

            Follow:
            - docs/plan-runner/idea_to_plan_stripped.md (Stage 1 checklist)
            - docs/plan-runner/idea_to_plan_detailed.md (principles)
            - docs/planner/templates/*.md (artifact structure)

            Ensure content is specific to the project and actionable.
          requirements:
            - id: "R1"
              desc: "Create intent.md with goal, scope, and completion criteria"
              priority: critical
            - id: "R2"
              desc: "Create plan.md with iterative milestones and implementation order"
              priority: critical
            - id: "R3"
              desc: "Create design-questions.md with prioritized unknowns and options"
              priority: critical
            - id: "R4"
              desc: "Create architecture.md with integration and testing strategy"
              priority: expected
          artifacts:
            - path: "docs/{{feature}}/intent.md"
              required: true
            - path: "docs/{{feature}}/plan.md"
              required: true
            - path: "docs/{{feature}}/design-questions.md"
              required: true
              track_resolution: true
            - path: "docs/{{feature}}/architecture.md"
              required: false
          auto_verify:
            items:
              - id: "files_exist"
                cmd: "test -f docs/{{feature}}/intent.md && test -f docs/{{feature}}/plan.md && test -f docs/{{feature}}/design-questions.md"
                must: true
          verifier:
            rubric:
              - id: "artifact_quality"
                text: "Do all created artifacts contain substantive, project-specific content?"
              - id: "completeness"
                text: "Are all required files created with useful structure?"
          retry:
            max_attempts: 2

    - id: "S-02"
      title: "Human Review"
      step_context: |
        Stage 2 from docs/plan-runner/idea_to_plan_stripped.md.
        Human-only review gate.
      gate:
        type: human_approval
        approval_prompt: |
          Review the generated plan artifacts:
          - docs/{{feature}}/intent.md
          - docs/{{feature}}/plan.md
          - docs/{{feature}}/design-questions.md
          - docs/{{feature}}/architecture.md

          Add feedback by inserting [HUMAN] notes inline.
          Do not remove existing content.

          Example: [HUMAN] Add rollback notes for schema migrations.

          Checklist outcome: mark R1 done when [HUMAN] notes exist, otherwise mark R1 blocked.

          Approve when feedback is complete.
        require_comment: true
      tasks:
        - id: "T-01"
          title: "Await Human Feedback"
          task_context: |
            Verify human feedback annotations before proceeding.
            Check these files for [HUMAN] annotations:
            - docs/{{feature}}/intent.md
            - docs/{{feature}}/plan.md
            - docs/{{feature}}/design-questions.md
            - docs/{{feature}}/architecture.md

            If [HUMAN] annotations are found in the artifact files:
            - Mark requirement R1 as done
            - Submit this task for verification

            If no [HUMAN] annotations are found:
            - Mark requirement R1 as blocked with note: "Awaiting human review — no [HUMAN] annotations found in artifact files"
            - Submit this task for verification
          requirements:
            - id: "R1"
              desc: "Human feedback is present and gate is approved"
              priority: critical

    - id: "S-03"
      title: "Plan Refinement"
      step_context: |
        Stage 3 from docs/plan-runner/idea_to_plan_stripped.md.
        Integrate human feedback and resolve conflicts.
      tasks:
        - id: "T-01"
          title: "Refine Based on Feedback"
          context_from:
            - artifact: "docs/{{feature}}/plan.md"
              as: "plan"
              required: true
            - artifact: "docs/{{feature}}/design-questions.md"
              as: "questions"
              required: true
            - artifact: "docs/{{feature}}/architecture.md"
              as: "architecture"
              required: false
          task_context: |
            Integrate all [HUMAN] annotations from planning artifacts.

            PLAN:
            {{context.plan}}

            DESIGN QUESTIONS:
            {{context.questions}}

            Update docs/{{feature}}/intent.md, docs/{{feature}}/plan.md,
            docs/{{feature}}/design-questions.md, and architecture.md as needed.

            If conflicts remain, document them in docs/{{feature}}/CONFLICTS.md.
            Keep unresolved decisions explicit.
          requirements:
            - id: "R1"
              desc: "Address all [HUMAN] feedback notes"
              priority: critical
            - id: "R2"
              desc: "Update plan artifacts to a consistent state"
              priority: critical
            - id: "R3"
              desc: "Mark resolved design questions clearly"
              priority: expected
            - id: "R4"
              desc: "Capture unresolved conflicts in CONFLICTS.md"
              priority: expected
          artifacts:
            - path: "docs/{{feature}}/CONFLICTS.md"
              required: false
              track_resolution: true
          verifier:
            rubric:
              - id: "feedback_addressed"
                text: "Are [HUMAN] notes addressed or explicitly deferred?"
              - id: "consistency"
                text: "Are refined artifacts internally consistent?"
          retry:
            max_attempts: 2
      transitions:
        on_complete: "S-04"
        on_condition:
          - condition: "has_unresolved_conflicts"
            target: "S-02"
            max_iterations: 3
            message: "Unresolved conflicts detected; return to human review"
          - condition: "has_open_questions"
            target: "S-02"
            max_iterations: 3
            message: "Open critical questions remain"

    - id: "S-04"
      title: "Step Planning"
      step_context: |
        Stage 4 from docs/plan-runner/idea_to_plan_stripped.md.
        Define contracts and verification per implementation step.
      tasks:
        - id: "T-01"
          title: "Create Step Plans"
          context_from:
            - artifact: "docs/{{feature}}/plan.md"
              as: "plan"
              required: true
            - artifact: "docs/{{feature}}/architecture.md"
              as: "architecture"
              required: true
          task_context: |
            Create docs/{{feature}}/step-XX-plan.md files from the implementation plan.

            PLAN:
            {{context.plan}}

            ARCHITECTURE:
            {{context.architecture}}

            Each step plan must include:
            - Purpose and functionality
            - Prerequisites/dependencies
            - Functional contract (inputs/outputs/errors)
            - Verification strategy

            Follow docs/planner/templates/step-plan.md.
          requirements:
            - id: "R1"
              desc: "Create step-XX-plan.md for each plan step"
              priority: critical
            - id: "R2"
              desc: "Each step plan defines input/output/error contracts"
              priority: critical
            - id: "R3"
              desc: "Each step plan contains verification approach"
              priority: expected
            - id: "R4"
              desc: "Dependencies between steps are explicit"
              priority: expected
          auto_verify:
            items:
              - id: "step_plans_exist"
                cmd: "ls docs/{{feature}}/step-*-plan.md 2>/dev/null | wc -l | awk '{if ($1 >= 1) exit 0; else exit 1}'"
                must: true
          verifier:
            rubric:
              - id: "plan_quality"
                text: "Do step plans include purpose, contract, and verification?"
              - id: "coverage"
                text: "Do step plans cover the implementation plan end-to-end?"
          retry:
            max_attempts: 2
      transitions:
        on_complete: "S-05"
        on_condition:
          - condition: "has_unresolved_conflicts"
            target: "S-02"
            max_iterations: 2
            message: "Conflicts discovered during step planning"

    - id: "S-05"
      title: "Task Breakdown"
      step_context: |
        Stage 5 from docs/plan-runner/idea_to_plan_stripped.md.
        Convert step plans into atomic execution tasks.
      tasks:
        - id: "T-01"
          title: "Create Step Files"
          task_context: |
            Convert step plans into docs/{{feature}}/steps/step-XX.md files.

            Follow docs/plan-runner/step-files.md.

            Each task must be:
            - Atomic (<5 files, <500 LOC)
            - Independently verifiable
            - Runnable in sequence
            - Linked to relevant context
          requirements:
            - id: "R1"
              desc: "Create steps/step-XX.md for each step plan"
              priority: critical
            - id: "R2"
              desc: "Tasks are atomic and independently verifiable"
              priority: critical
            - id: "R3"
              desc: "Tasks keep system runnable after each change"
              priority: critical
            - id: "R4"
              desc: "Tasks include references to planning context"
              priority: expected
          auto_verify:
            items:
              - id: "step_files_exist"
                cmd: "ls docs/{{feature}}/steps/step-*.md 2>/dev/null | wc -l | awk '{if ($1 >= 1) exit 0; else exit 1}'"
                must: true
          verifier:
            rubric:
              - id: "atomicity"
                text: "Are tasks atomic and verifiable?"
              - id: "actionability"
                text: "Are tasks concrete enough for an implementation agent?"
          retry:
            max_attempts: 2
      transitions:
        on_complete: "S-06"
        on_condition:
          - condition: "has_unresolved_conflicts"
            target: "S-02"
            max_iterations: 2

    - id: "S-06"
      title: "Dry Run"
      type: dry_run
      step_context: |
        Stage 6 from docs/plan-runner/idea_to_plan_stripped.md.
        Simulate execution and identify gaps.
      dry_run:
        target_steps: ["S-09"]
        context_limit: 4000
        report_path: "docs/{{feature}}/dry-run-notes.md"
      tasks:
        - id: "T-01"
          title: "Simulate Execution"
          task_context: |
            Simulate execution across generated tasks and capture:
            - assumptions
            - expected outputs
            - blockers and mitigation

            Save notes to docs/{{feature}}/dry-run-notes.md.
          requirements:
            - id: "R1"
              desc: "Dry run simulation completes for generated tasks"
              priority: critical
            - id: "R2"
              desc: "Gaps are documented with concrete remediation"
              priority: expected
          auto_verify:
            items:
              - id: "dry_run_exists"
                cmd: "test -f docs/{{feature}}/dry-run-notes.md"
                must: true
          verifier:
            rubric:
              - id: "thoroughness"
                text: "Does dry run identify realistic risks and assumptions?"
              - id: "gap_resolution"
                text: "Are mitigations concrete enough to apply?"
      transitions:
        on_complete: "S-07"

    - id: "S-07"
      title: "Final Check"
      step_context: |
        Stage 7 from docs/plan-runner/idea_to_plan_stripped.md.
        Cross-check all plan artifacts for consistency and readiness.
      tasks:
        - id: "T-01"
          title: "Cross-Check All Artifacts"
          context_from:
            - artifact: "docs/{{feature}}/intent.md"
              as: "intent"
              required: true
            - artifact: "docs/{{feature}}/plan.md"
              as: "plan"
              required: true
            - artifact: "docs/{{feature}}/dry-run-notes.md"
              as: "dry_run"
              required: false
          task_context: |
            Verify alignment across intent, plan, step files, and dry run output.

            INTENT:
            {{context.intent}}

            PLAN:
            {{context.plan}}

            DRY RUN NOTES:
            {{context.dry_run}}

            Create docs/{{feature}}/verification-report.md.
          requirements:
            - id: "R1"
              desc: "Step files align with plan and intent"
              priority: critical
            - id: "R2"
              desc: "Dry run gaps are addressed or tracked"
              priority: expected
            - id: "R3"
              desc: "No unresolved critical conflicts remain"
              priority: critical
          verifier:
            rubric:
              - id: "completeness"
                text: "Does the plan fully address the original intent?"
              - id: "consistency"
                text: "Are artifacts internally consistent?"
              - id: "executability"
                text: "Can an agent execute from produced step files?"
            submission_template:
              grade_scale: [A, B, C, D, F]
              require_reason_if_below: A
              require_remediation_if_below: B
          auto_verify:
            items:
              - id: "report_exists"
                cmd: "test -f docs/{{feature}}/verification-report.md"
                must: true
          retry:
            max_attempts: 2

    - id: "S-08"
      title: "Final Plan Review"
      step_context: |
        Stage 8 from docs/plan-runner/idea_to_plan_stripped.md.
        Human approval before final routine packaging.
      gate:
        type: human_approval
        approval_prompt: |
          The plan is complete. Review before routine packaging:
          - docs/{{feature}}/intent.md
          - docs/{{feature}}/plan.md
          - docs/{{feature}}/verification-report.md
          - docs/{{feature}}/steps/*.md

          Approve to proceed, or reject with comments.
        require_comment: false
      tasks:
        - id: "T-01"
          title: "Human Final Approval"
          task_context: "Human reviews complete planning artifacts before final packaging."
          requirements:
            - id: "R1"
              desc: "Human approves final planning artifacts"
              priority: critical

    - id: "S-09"
      title: "Execution Ready"
      step_context: |
        Stage 9 from docs/plan-runner/idea_to_plan_stripped.md.
        Produce execution summary plus validated routine YAML.
      tasks:
        - id: "T-01"
          title: "Generate Summary"
          task_context: |
            Create docs/{{feature}}/plan-summary.md including:
            - Intent satisfaction summary
            - Ordered step list with task counts
            - Key decisions
            - Risks and mitigations
            - Caveats for execution
          requirements:
            - id: "R1"
              desc: "Create plan-summary.md with complete execution summary"
              priority: critical
          auto_verify:
            items:
              - id: "summary_exists"
                cmd: "test -f docs/{{feature}}/plan-summary.md"
                must: true
          verifier:
            rubric:
              - id: "summary_completeness"
                text: "Does the summary capture intent, order, decisions, and risks?"
              - id: "accuracy"
                text: "Is summary accurate relative to generated artifacts?"

        - id: "T-02"
          title: "Create and Validate Routine YAML"
          task_context: |
            Create execution routine files for this feature:
            - routines/{{feature}}/routine.yaml
            - docs/{{feature}}/routine-yaml-format.md

            Use docs/plan-runner/routine-yaml-format.md as the source format guide.

            The routine must encode the generated steps so another run can execute them.
            Include clear step/task contexts, requirements, artifacts, and verification hooks.

            After writing routine.yaml, validate it and fix errors until it passes:
            uv run orchestrator --json routines validate routines/{{feature}}/routine.yaml

            If validation fails, use exact error output to correct the YAML structure.
          requirements:
            - id: "R1"
              desc: "Create routines/{{feature}}/routine.yaml matching the routine schema"
              priority: critical
            - id: "R2"
              desc: "Create docs/{{feature}}/routine-yaml-format.md for future edits"
              priority: expected
            - id: "R3"
              desc: "Routine YAML passes CLI validation"
              priority: critical
          artifacts:
            - path: "routines/{{feature}}/routine.yaml"
              required: true
            - path: "docs/{{feature}}/routine-yaml-format.md"
              required: true
          auto_verify:
            items:
              - id: "routine_exists"
                cmd: "test -f routines/{{feature}}/routine.yaml"
                must: true
              - id: "routine_yaml_valid"
                cmd: "uv run orchestrator --json routines validate routines/{{feature}}/routine.yaml"
                must: true
          verifier:
            rubric:
              - id: "schema_compliance"
                text: "Does routine.yaml conform to orchestrator routine schema?"
              - id: "execution_mapping"
                text: "Do routine steps map correctly to generated planning artifacts?"
