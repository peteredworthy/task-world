            desc: "All 9 module __init__.py files declare explicit __all__"
            priority: critical
          - id: "R2"
            desc: "BroadcastCallback protocol defined in runners/types.py; runners/executor.py uses it instead of importing ConnectionManager directly from api/"
            priority: critical
