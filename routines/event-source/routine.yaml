        title: "SignalEnqueued/SignalProcessed event types and RunLifecycleProjector"
        task_context: |
          Add two new Pydantic event types to src/orchestrator/workflow/events/types.py:
          - SignalEnqueued: run_id, signal_type (str), payload (dict, optional)
          - SignalProcessed: run_id, enqueued_position (int — the events_v2.position of the
            matched SignalEnqueued event)
          Export both from orchestrator.workflow.events.

          Create src/orchestrator/db/projections/run_lifecycle.py with RunLifecycleProjector:
          - Handles RunStatusChanged events to maintain in-memory set of active run_ids
          - Active statuses: QUEUED, ACTIVE, PAUSED (not COMPLETED, FAILED, CANCELLED, STOPPING)
          - Exposes is_active(run_id: str) -> bool
          - rebuild(event_stream, session) restores the active set from a full event history
          - Must rebuild from persisted events on startup before signal redelivery begins
          Export RunLifecycleProjector from orchestrator.db.projections.
          Register it in ProjectionRegistry alongside other projectors in deps.py.

          Write tests/unit/test_run_lifecycle_projector.py. Extend test_pydantic_events.py.

          See docs/event-source/steps/step-04-plan.md Tasks 4.1, 4.2.
        context_from:
          - artifact: "docs/event-source/steps/step-04-plan.md"
            as: "step_plan"
            required: true
        requirements:
          - id: "R1"
            desc: "SignalEnqueued and SignalProcessed event types defined and round-trip serializable"
            priority: critical
          - id: "R2"
            desc: "RunLifecycleProjector tracks active runs from RunStatusChanged events; is_active() returns correct boolean for all status values; rebuild restores state"
            priority: critical
          - id: "R3"
            desc: "tests/unit/test_run_lifecycle_projector.py passes: active/inactive transitions for all status values, rebuild correctness, stale-signal rejection"
            priority: critical
        auto_verify:
          items:
            - id: "signal_events_import"
              cmd: "uv run python -c \"from orchestrator.workflow.events import SignalEnqueued, SignalProcessed; e = SignalEnqueued(run_id='r1', signal_type='pause'); j = e.model_dump_json(); r = SignalEnqueued.model_validate_json(j); assert r.signal_type == 'pause'\""
              must: true
            - id: "lifecycle_projector"
              cmd: "uv run python -c \"from orchestrator.db.projections import RunLifecycleProjector; p = RunLifecycleProjector(); assert not p.is_active('nonexistent')\""
              must: true
            - id: "lifecycle_tests"
              cmd: "uv run pytest tests/unit/test_run_lifecycle_projector.py -v"
              must: true
        verifier:
