          5. Open ui/src/hooks/useApi.ts
          6. Add useValidateRoutine() mutation hook:
             mutationFn: (yamlContent: string) => validateRoutine(yamlContent)
          7. Verify the exact backend endpoint path by reading src/orchestrator/api/routers/

