          - artifact: "docs/event-source/steps/step-05-plan.md"
            as: "step_plan"
            required: true
        requirements:
          - id: "R1"
            desc: "OutputBatcher flushes on count threshold (50 lines) or time threshold (100ms) or flush_immediate(); buffer keyed by (run_id, task_id, attempt_id); clock is injectable; buffer cleared only after successful append"
            priority: critical
          - id: "R2"
            desc: "tests/unit/test_output_batcher.py passes all four flush paths; lines appear in correct order in batched payloads"
            priority: critical
        auto_verify:
          items:
            - id: "batcher_import"
              cmd: "uv run python -c \"from orchestrator.runners.execution import OutputBatcher; print('ok')\""
              must: true
            - id: "batcher_tests"
              cmd: "uv run pytest tests/unit/test_output_batcher.py -v"
              must: true
        verifier:
          rubric:
            - id: "R1"
              text: "R1 — A: OutputBatcher uses injected clock; flushes when count >= max_lines or elapsed >= flush_interval_ms; flush_immediate() drains all buffers; buffer key is (run_id, task_id, attempt_id) triple. B: batching works but clock injection missing or buffer key is wrong."
            - id: "R2"
              text: "R2 — A: all four flush paths tested with FakeClock; line ordering verified in batch payload; all tests pass. B: tests pass but time-based flush not tested via injected clock or ordering not asserted."
          submission_template:
