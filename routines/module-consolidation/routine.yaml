id: "module-consolidation"
name: "Module Consolidation: 19 → 9 Modules"
description: |
  Consolidate src/orchestrator/ from 19 loosely-bounded modules into 9 coherent
  modules with explicit public interfaces (__all__), resolving all 6 cross-layer
  coupling violations, deleting all dead shims, and ensuring every import path is
  updated. Zero backward-compatibility stubs remain when complete.

  Execution order: Phase 0 (couplings) → Phase 1 (dead code) → Phase 2 (cache/review/repos
  → git) → Phases 3, 4, 6 (absorptions) → Phase 5 (metrics/mcp, after Phase 2) →
  Phases 7, 8, 9 (internal restructuring) → Phase 10 (__all__ + narrowing).

inputs:
  - name: feature
    required: false
    default: "module-consolidation"
    description: "Feature name used for documentation directory (docs/{{feature}}/)"

steps:

  # ── Phase 0: Resolve Coupling Violations C1–C6 ─────────────────────────────
  - id: "S-00"
    title: "Phase 0: Resolve Coupling Violations C1–C6"
    step_context: |
      Fix all 6 cross-layer coupling violations BEFORE moving any files. Clean layering is
      required first, otherwise file moves just relocate the coupling mess.

      See docs/module-consolidation/steps/step-00-plan.md and plan-summary.md Phase 0 section.

      CRITICAL GOTCHA: There are TWO classes named NudgerConfig:
        1. A dataclass in runners/nudger.py (simple, config-only) — this is being MOVED
        2. A Pydantic model in config/global_config.py — this STAYS
      Use explicit aliases in global_config.py to disambiguate after the move.

    tasks:
      - id: "T-01"
        title: "Fix Couplings C1–C4 (Type Relocations)"
        task_context: |
          Relocate four types to their correct architectural layer. Each fix is an import path
          update plus a type definition move.

          C1 — Move NudgerConfig DATACLASS from runners/nudger.py to config/models.py:
            - Add NudgerConfig dataclass to config/models.py
            - Update config/global_config.py to import from config.models (use alias if needed
              to avoid name collision with the existing Pydantic NudgerConfig in that file)
            - Update runners/nudger.py to import from config.models

          C2 — Move CommitInfo, FileStatus, ModifiedFile from review/models.py to git/:
            - Create git/diff_models.py with these three class definitions
            - Update git/diff_ops.py and all review/ consumers to import from git.diff_models
            - Verify: git/diff_models.py must exist (Phase 2 depends on it as a preflight check)

          C3 — Move ActionLog from runners/action_log.py to state/models.py:
            - Add ActionLog class definition to state/models.py
            - Update ALL 7 known consumers: db/models.py, runners/executor.py, runners/nudger.py,
              runners/discovery.py, and any test files that import from runners.action_log
            - ActionLog has the most consumers of any C1–C4 fix; audit carefully

          C4 — Move EnvFileSpec from envfiles/models.py to config/models.py:
            - Add EnvFileSpec to config/models.py
            - Update state/models.py to import from config (fixing the Domain→Infrastructure coupling)
            - Update envfiles/*.py to import from config.models instead of local envfiles.models

          After all 4 fixes: verify no cross-layer import remains, run full test suite.
        requirements:
          - id: "R1"
            desc: "NudgerConfig dataclass in config/models.py; config/global_config.py imports it from config, not from runners; two NudgerConfig classes are disambiguated"
            priority: critical
          - id: "R2"
            desc: "CommitInfo, FileStatus, ModifiedFile defined in git/diff_models.py; no consumer imports from review.models for these types"
            priority: critical
          - id: "R3"
            desc: "ActionLog defined in state/models.py; all 7+ consumers import from state, not from runners.action_log"
            priority: critical
          - id: "R4"
            desc: "EnvFileSpec defined in config/models.py; state/models.py imports from config, not envfiles; no cross-layer Foundation→Infrastructure import remains"
            priority: critical
        auto_verify:
          items:
            - id: "nudger_config_in_config"
              cmd: "uv run python -c \"from orchestrator.config.models import NudgerConfig; assert NudgerConfig is not None; print('NudgerConfig in config: OK')\""
              must: true
            - id: "diff_models_in_git"
              cmd: "uv run python -c \"from orchestrator.git.diff_models import CommitInfo, FileStatus, ModifiedFile; print('diff_models in git: OK')\""
              must: true
            - id: "action_log_in_state"
              cmd: "uv run python -c \"from orchestrator.state.models import ActionLog; a = ActionLog.__new__(ActionLog); print('ActionLog in state: OK')\""
              must: true
            - id: "envfilespec_in_config"
              cmd: "uv run python -c \"from orchestrator.config.models import EnvFileSpec; assert EnvFileSpec is not None; print('EnvFileSpec in config: OK')\""
              must: true
            - id: "no_config_imports_runners"
              cmd: "bash -c '! grep -rn \"from orchestrator.runners\" src/orchestrator/config/'"
              must: true
            - id: "no_state_imports_runners_action_log"
              cmd: "bash -c '! grep -n \"from orchestrator.runners.action_log\" src/orchestrator/state/models.py'"
              must: true
            - id: "no_state_imports_envfiles"
              cmd: "bash -c '! grep -n \"from orchestrator.envfiles\" src/orchestrator/state/models.py'"
              must: true
            - id: "git_diff_models_file_exists"
              cmd: "test -f src/orchestrator/git/diff_models.py"
              must: true
        verifier:
          rubric:
            - id: "R1"
              text: "R1 — A: NudgerConfig dataclass is in config/models.py; global_config.py imports from config.models (not runners/); the two NudgerConfig classes are disambiguated with comments or aliases. B: moved but disambiguation missing, or one consumer still imports from runners.nudger."
            - id: "R2"
              text: "R2 — A: CommitInfo/FileStatus/ModifiedFile defined in git/diff_models.py; zero consumers import these types from review.models; diff_ops.py uses new path. B: types exist in git/ but 1-2 consumers still reference review.models."
            - id: "R3"
              text: "R3 — A: ActionLog in state/models.py; grep confirms zero imports of 'from orchestrator.runners.action_log' anywhere in src/ and tests/. B: ActionLog moved but 1-2 consumers still use old path."
            - id: "R4"
              text: "R4 — A: EnvFileSpec in config/models.py; state/models.py imports from config; no envfiles import in state/. B: moved but state/ still references envfiles."
          submission_template:
            grade_scale: [A, B, C, D, F]
            require_reason_if_below: "A"
            require_remediation_if_below: "B"
        retry:
          max_attempts: 2

      - id: "T-02"
        title: "Fix Couplings C5–C6 (Protocol/Callback Replacements)"
        task_context: |
          Replace two direct cross-layer imports with protocol-based dependencies.

          C5 — workflow/service.py imports from api/schemas/runs (Orchestration→API violation):
            - Define a RecoveryResult dataclass in workflow/service.py (or workflow/types.py)
              with the same fields as RecoverResponse that the function currently returns
            - Update api/routers/runs.py to translate RecoveryResult → RecoverResponse
              in the API response layer (router constructs the schema from the dataclass)
            - Remove the RecoverResponse import from workflow/service.py entirely

          C6 — runners/agents/user_managed/agent.py imports WorkflowService directly
               (Execution→Orchestration violation):
            - Define TaskSubmitCallback protocol in runners/types.py (or runners/interface.py)
              with the minimal callback methods that UserManagedAgent actually needs
            - Update UserManagedAgent to accept TaskSubmitCallback instead of WorkflowService
            - Wire the concrete WorkflowService as the implementation via api/deps.py injection
            - Verify: runners/agents/user_managed/ must have zero imports from orchestrator.workflow

          WIRING VERIFICATION for C5: Read both workflow/service.py (confirm no api/ import)
          AND api/routers/runs.py (confirm router now builds RecoverResponse from RecoveryResult).
          WIRING VERIFICATION for C6: Read both runners/agents/user_managed/agent.py (confirm
          no WorkflowService import) AND api/deps.py (confirm protocol injection is wired).

          Run full test suite after both fixes.
        requirements:
          - id: "R1"
            desc: "workflow/service.py has zero imports from orchestrator.api; RecoveryResult dataclass defined in workflow/"
            priority: critical
          - id: "R2"
            desc: "UserManagedAgent uses TaskSubmitCallback protocol; zero imports from orchestrator.workflow in runners/agents/user_managed/"
            priority: critical
          - id: "R3"
            desc: "All tests pass after C5 and C6 fixes; API behavior is identical (router translates RecoveryResult to RecoverResponse)"
            priority: critical
        auto_verify:
          items:
            - id: "no_workflow_imports_api"
              cmd: "bash -c '! grep -rn \"from orchestrator.api\" src/orchestrator/workflow/service.py'"
              must: true
            - id: "recovery_result_importable"
              cmd: "uv run python -c \"from orchestrator.workflow.service import RecoveryResult; print('RecoveryResult OK')\""
              must: true
            - id: "no_user_managed_imports_workflow"
              cmd: "bash -c '! grep -rn \"from orchestrator.workflow\" src/orchestrator/runners/agents/user_managed/'"
              must: true
            - id: "task_submit_callback_importable"
              cmd: "uv run python -c \"from orchestrator.runners.types import TaskSubmitCallback; print('TaskSubmitCallback OK')\""
              must: true
            - id: "tests_pass"
              cmd: "uv run pytest tests/ -q --tb=short -x"
              must: true
        verifier:
          rubric:
            - id: "R1"
              text: "R1 — A: grep confirms zero 'from orchestrator.api' in workflow/service.py; RecoveryResult dataclass defined in workflow/; api/routers/runs.py constructs RecoverResponse from RecoveryResult (read both files to confirm the switchover). B: dataclass exists but workflow/service.py still has an api import elsewhere."
            - id: "R2"
              text: "R2 — A: grep confirms zero 'from orchestrator.workflow' in runners/agents/user_managed/; TaskSubmitCallback protocol is defined; api/deps.py injects the concrete WorkflowService as the protocol (read user_managed/agent.py AND deps.py to confirm). B: protocol defined but old WorkflowService import still present or injection not wired."
            - id: "R3"
              text: "R3 — A: Full test suite passes; API behavior unchanged. B: ≤2 flaky/unrelated test failures; core API tests pass."
          submission_template:
            grade_scale: [A, B, C, D, F]
            require_reason_if_below: "A"
            require_remediation_if_below: "B"
        retry:
          max_attempts: 2

  # ── Phase 1: Delete Dead Code ───────────────────────────────────────────────
  - id: "S-01"
    title: "Phase 1: Delete Dead Code"
    step_context: |
      Remove all zero-consumer shim files. CRITICAL: agent shims (openhands.py, etc.)
      have ~22 active consumers (mostly test files). Audit BEFORE deleting: grep for
      all consumers, update imports to canonical paths, verify tests pass, then delete.

      Fallback logic MUST work: if consumers found → update all → then delete.
      Do NOT delete before consumers are updated.

      See docs/module-consolidation/steps/step-01-plan.md for the full file list.

    tasks:
      - id: "T-01"
        title: "Audit, Update Consumers, and Delete All Shim Files"
        task_context: |
          Delete all backward-compatibility shim files in this order:

          FILES TO DELETE:
          1. src/orchestrator/routers/ directory (stub shim dir, zero consumers expected)
          2. src/orchestrator/agent_detector.py (replaced by runners/detector.py)
          3. src/orchestrator/parsers/ directory (parsers/base.py, parsers/custom_token_counting.py)
          4. src/orchestrator/agents/openhands.py
          5. src/orchestrator/agents/openhands_docker.py
          6. src/orchestrator/agents/openhands_common.py
          7. src/orchestrator/agents/codex_server.py
          8. src/orchestrator/agents/codex_server_common.py

          FOR EACH FILE, follow this protocol:
            a) grep -rn "from orchestrator.{module}" src/ tests/ to find ALL consumers
            b) Update each consumer to import from the canonical current path
            c) Run pytest to verify no broken imports
            d) Only then: delete the file

          KNOWN CONSUMER COUNT: Agent shims have ~22 active consumers in test files.
          These typically import OpenHands/Codex agent classes for test setup.
          Update them to import from the canonical agent implementation path in runners/.

          After all deletions, run the full test suite.
        requirements:
          - id: "R1"
            desc: "routers/ shim directory deleted; zero imports of 'from orchestrator.routers' in src/ and tests/"
            priority: critical
          - id: "R2"
            desc: "agent_detector.py deleted; all consumers import from canonical runners/ paths"
            priority: critical
          - id: "R3"
            desc: "parsers/ directory deleted; zero imports of 'from orchestrator.parsers' remain"
            priority: critical
          - id: "R4"
            desc: "All 5 agent shim files deleted (openhands.py, openhands_docker.py, openhands_common.py, codex_server.py, codex_server_common.py); ~22 test consumers updated to canonical agent paths"
            priority: critical
          - id: "R5"
            desc: "All backend tests pass after all deletions"
            priority: critical
        auto_verify:
          items:
            - id: "routers_dir_gone"
              cmd: "bash -c 'test ! -d src/orchestrator/routers'"
              must: true
            - id: "no_routers_imports"
              cmd: "bash -c '! grep -rn \"from orchestrator.routers\" src/ tests/'"
              must: true
            - id: "agent_detector_gone"
              cmd: "bash -c 'test ! -f src/orchestrator/agent_detector.py'"
              must: true
            - id: "parsers_dir_gone"
              cmd: "bash -c 'test ! -d src/orchestrator/parsers'"
              must: true
            - id: "openhands_shims_gone"
              cmd: "bash -c 'test ! -f src/orchestrator/agents/openhands.py'"
              must: true
            - id: "codex_shims_gone"
              cmd: "bash -c 'test ! -f src/orchestrator/agents/codex_server.py'"
              must: true
            - id: "tests_pass"
              cmd: "uv run pytest tests/ -q --tb=short"
              must: true
        verifier:
          rubric:
            - id: "R1"
              text: "R1 — A: routers/ gone; grep confirms zero orchestrator.routers imports. B: directory deleted but 1-2 imports still reference it."
            - id: "R2"
              text: "R2 — A: agent_detector.py gone; all consumers use runners/ paths. B: deleted but some consumers not updated."
            - id: "R3"
              text: "R3 — A: parsers/ gone; zero orchestrator.parsers imports. B: deleted but some reference remains."
            - id: "R4"
              text: "R4 — A: all 5 agent shim files deleted; ~22 test consumers updated to canonical import paths (read 2-3 test files to confirm they use real agent paths, not shim paths). B: files deleted but some consumers still reference old shim paths."
            - id: "R5"
              text: "R5 — A: Full test suite passes with no new failures. B: ≤2 unrelated failures; all deletion-related tests pass."
          submission_template:
            grade_scale: [A, B, C, D, F]
            require_reason_if_below: "A"
            require_remediation_if_below: "B"
        retry:
          max_attempts: 2

  # ── Phase 2: Absorb cache/ + review/ + repos/ → git/ ──────────────────────
  - id: "S-02"
    title: "Phase 2: Absorb cache/ + review/ + repos/ → git/"
    step_context: |
      Consolidate three Git-related modules into git/ sub-packages. Creates git/diff/,
      git/repos/, git/testing/, git/ops/ sub-packages.

      PREREQUISITE: Phase 0 must be complete — git/diff_models.py must exist.
      Preflight check at start: test -f src/orchestrator/git/diff_models.py

      See docs/module-consolidation/steps/step-02-plan.md for detailed file mappings.

    tasks:
      - id: "T-01"
        title: "Create git/ Sub-Packages and Absorb cache/review/repos"
        task_context: |
          Absorb cache/, review/, repos/ entirely into git/ sub-packages.

          PREFLIGHT: Verify git/diff_models.py exists (Phase 0 artifact). If missing, stop —
          Phase 0 must complete first.

          TARGET STRUCTURE:
            src/orchestrator/git/
              diff/
                __init__.py
                models.py       ← moved from review/models.py (includes CommitInfo etc. from Phase 0)
                diff_ops.py     ← moved from git/diff_ops.py
                cached_diff_ops.py ← from review/ or cache/ (if exists)
                lru_cache.py    ← from cache/lru_cache.py
              repos/
                __init__.py
                discovery.py   ← from repos/discovery.py
                access.py      ← from repos/access.py (or similar file in repos/)
              testing/
                __init__.py
                test_runner.py ← from repos/test_runner.py or review/test_runner.py
              ops/
                __init__.py
                branch_ops.py  ← from git/branch_ops.py
                conflict_ops.py ← from git/conflict_ops.py
                prune_ops.py   ← from git/prune_ops.py

          STEPS:
          1. Preflight: test -f src/orchestrator/git/diff_models.py
          2. Create all sub-package __init__.py files
          3. Move files into sub-packages (git root files like branch_ops.py → git/ops/)
          4. Update git/__init__.py to re-export all public symbols (diff types, repo discovery,
             test runner, branch ops, conflict ops, prune ops)
          5. Update ALL ~25 consumer import paths across src/ and tests/
             (grep for "from orchestrator.cache", "from orchestrator.review",
              "from orchestrator.repos" to find them all)
          6. Delete cache/, review/, repos/ directories entirely
          7. Run full test suite

          Also update any test discovery files (test_discovery.py) that import from repos/.
          Zero stubs — every import must use orchestrator.git paths.
        requirements:
          - id: "R1"
            desc: "git/diff/, git/repos/, git/testing/, git/ops/ sub-packages all exist with correct content"
            priority: critical
          - id: "R2"
            desc: "cache/, review/, repos/ directories deleted entirely — no orphan files remain"
            priority: critical
          - id: "R3"
            desc: "Zero imports of orchestrator.cache, orchestrator.review, or orchestrator.repos remain in src/ or tests/"
            priority: critical
          - id: "R4"
            desc: "git/__init__.py re-exports CommitInfo, FileStatus, ModifiedFile and other public symbols; consumers use orchestrator.git top-level"
            priority: critical
          - id: "R5"
            desc: "All tests pass after absorption"
            priority: critical
        auto_verify:
          items:
            - id: "preflight_diff_models"
              cmd: "test -f src/orchestrator/git/diff_models.py"
              must: true
            - id: "git_diff_subpkg_importable"
              cmd: "uv run python -c \"from orchestrator.git import CommitInfo, FileStatus, ModifiedFile; print('git diff imports OK')\""
              must: true
            - id: "git_diff_subpkg_exists"
              cmd: "test -d src/orchestrator/git/diff"
              must: true
            - id: "git_repos_subpkg_exists"
              cmd: "test -d src/orchestrator/git/repos"
              must: true
            - id: "git_testing_subpkg_exists"
              cmd: "test -d src/orchestrator/git/testing"
              must: true
            - id: "git_ops_subpkg_exists"
              cmd: "test -d src/orchestrator/git/ops"
              must: true
            - id: "no_cache_dir"
              cmd: "bash -c 'test ! -d src/orchestrator/cache'"
              must: true
            - id: "no_review_dir"
              cmd: "bash -c 'test ! -d src/orchestrator/review'"
              must: true
            - id: "no_repos_dir"
              cmd: "bash -c 'test ! -d src/orchestrator/repos'"
              must: true
            - id: "no_old_cache_imports"
              cmd: "bash -c '! grep -rn \"from orchestrator.cache\" src/ tests/'"
              must: true
            - id: "no_old_review_imports"
              cmd: "bash -c '! grep -rn \"from orchestrator.review\" src/ tests/'"
              must: true
            - id: "no_old_repos_imports"
              cmd: "bash -c '! grep -rn \"from orchestrator.repos\" src/ tests/'"
              must: true
            - id: "tests_pass"
              cmd: "uv run pytest tests/ -q --tb=short"
              must: true
        verifier:
          rubric:
            - id: "R1"
              text: "R1 — A: All 4 sub-packages exist with appropriate files; imports work. B: Sub-packages exist but some files missing or in wrong location."
            - id: "R2"
              text: "R2 — A: All 3 original directories deleted; no orphan files. B: Directories deleted but 1-2 loose files remain."
            - id: "R3"
              text: "R3 — A: Zero stale imports of orchestrator.cache/review/repos; grep returns empty. B: 1-5 stale imports remain."
            - id: "R4"
              text: "R4 — A: git/__init__.py exports CommitInfo, FileStatus, ModifiedFile and other public symbols; consumers use orchestrator.git top-level. B: re-exports incomplete — some public symbols not accessible via git top-level."
            - id: "R5"
              text: "R5 — A: Full test suite passes. B: ≤2 non-critical failures."
          submission_template:
            grade_scale: [A, B, C, D, F]
            require_reason_if_below: "A"
            require_remediation_if_below: "B"
        retry:
          max_attempts: 2

  # ── Phase 3: Absorb routines/ → config/routines/ ──────────────────────────
  - id: "S-03"
    title: "Phase 3: Absorb routines/ → config/routines/"
    step_context: |
      Move routine discovery, loading, and versioning into config module.
      Relatively straightforward with ~13 import path updates.

      See docs/module-consolidation/steps/step-03-plan.md for guidance.

    tasks:
      - id: "T-01"
        title: "Move routines/ into config/routines/ Sub-Package"
        task_context: |
          Absorb routines/ into config/routines/:

          TARGET STRUCTURE:
            src/orchestrator/config/
              routines/
                __init__.py
                discovery.py   ← from routines/discovery.py
                loader.py      ← from routines/loader.py
                versioning.py  ← from routines/versioning.py

          STEPS:
          1. Create config/routines/ sub-package with __init__.py
          2. Move discovery.py, loader.py, versioning.py into sub-package
          3. Update config/__init__.py to re-export routine symbols (RoutineLoader, etc.)
          4. Find all consumers: grep -rn "from orchestrator.routines" src/ tests/
             (expect ~13 files: API routers, workflow service, CLI, test files)
          5. Update all consumer import paths to use orchestrator.config or orchestrator.config.routines
          6. Delete original routines/ directory entirely
          7. Run full test suite

          No stubs. All orchestrator.routines imports must become orchestrator.config imports.
        requirements:
          - id: "R1"
            desc: "config/routines/ sub-package exists with discovery.py, loader.py, versioning.py"
            priority: critical
          - id: "R2"
            desc: "routines/ directory deleted entirely"
            priority: critical
          - id: "R3"
            desc: "Zero imports of 'from orchestrator.routines' remain in src/ or tests/"
            priority: critical
          - id: "R4"
            desc: "All tests pass after absorption"
            priority: critical
        auto_verify:
          items:
            - id: "config_routines_subpkg_exists"
              cmd: "test -d src/orchestrator/config/routines"
              must: true
            - id: "config_routines_discovery_importable"
              cmd: "uv run python -c \"import orchestrator.config.routines.discovery; print('OK')\""
              must: true
            - id: "config_routines_loader_importable"
              cmd: "uv run python -c \"import orchestrator.config.routines.loader; print('OK')\""
              must: true
            - id: "no_routines_dir"
              cmd: "bash -c 'test ! -d src/orchestrator/routines'"
              must: true
            - id: "no_old_routines_imports"
              cmd: "bash -c '! grep -rn \"from orchestrator.routines\" src/ tests/'"
              must: true
            - id: "tests_pass"
              cmd: "uv run pytest tests/ -q --tb=short"
              must: true
        verifier:
          rubric:
            - id: "R1"
              text: "R1 — A: config/routines/ sub-package with all 3 files, importable and functional. B: sub-package exists but one file missing or not importable."
            - id: "R2"
              text: "R2 — A: routines/ directory gone; no orphan files. B: directory deleted but some file remains."
            - id: "R3"
              text: "R3 — A: Zero orchestrator.routines imports; all callers use orchestrator.config. B: 1-3 stale imports remain."
            - id: "R4"
              text: "R4 — A: Full test suite passes. B: ≤2 non-critical failures."
          submission_template:
            grade_scale: [A, B, C, D, F]
            require_reason_if_below: "A"
            require_remediation_if_below: "B"
        retry:
          max_attempts: 2

  # ── Phase 4: Absorb artifacts/ → workflow/artifacts/ ──────────────────────
  - id: "S-04"
    title: "Phase 4: Absorb artifacts/ → workflow/artifacts/"
    step_context: |
      Move artifact registry into workflow module. Small scope (~3 import path updates).
      WATCH: executor.py may have a lazy import for artifact context_from functionality
      (grep executor.py for ArtifactRegistry to find it).

      See docs/module-consolidation/steps/step-04-plan.md for guidance.

    tasks:
      - id: "T-01"
        title: "Move artifacts/ into workflow/artifacts/ Sub-Package"
        task_context: |
          Absorb artifacts/ into workflow/artifacts/:

          TARGET STRUCTURE:
            src/orchestrator/workflow/
              artifacts/
                __init__.py
                registry.py  ← from artifacts/registry.py
                models.py    ← from artifacts/models.py (if exists)

          STEPS:
          1. Audit artifacts/ to enumerate all files and what they export
          2. Create workflow/artifacts/ sub-package with __init__.py
          3. Move all artifact files into sub-package
          4. Update workflow/__init__.py to re-export artifact symbols
          5. Find all consumers: grep -rn "from orchestrator.artifacts" src/ tests/
             SPECIAL: check executor.py for lazy imports of ArtifactRegistry
