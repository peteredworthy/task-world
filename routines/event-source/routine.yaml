            priority: critical
        auto_verify:
          items:
            - id: "no_active_run_ids"
              cmd: "uv run python -c \"import pathlib; t = pathlib.Path('src/orchestrator/workflow/signals/consumer.py').read_text(); assert '_active_run_ids' not in t, '_active_run_ids still in consumer.py'; assert 'def register_active_run' not in t, 'register_active_run still defined'\""
              must: true
