  # ── Phase 10: Explicit __all__ + Interface Narrowing ───────────────────────
  - id: "S-10"
    title: "Phase 10: Explicit __all__ + Interface Narrowing"
    step_context: |
      Add explicit __all__ to all 9 module __init__.py files and narrow public interfaces.

      PREREQUISITES: Phases S-07, S-08, S-09 must all be complete.
      Preflight checks:
        test -d src/orchestrator/workflow/engine
        test -d src/orchestrator/db/orm
        test -d src/orchestrator/runners/detection

      4 modules already have __all__ (config, state, git, workflow) — EDIT, do not recreate.
      5 modules need new __all__ (db, api, runners, envfiles, cli).

      See docs/module-consolidation/steps/step-10-plan.md for guidance.

    tasks:
      - id: "T-01"
        title: "Declare __all__ on All 9 Modules and Define BroadcastCallback Protocol"
        task_context: |
          PREFLIGHT: Verify S-07, S-08, S-09 complete:
            test -d src/orchestrator/workflow/engine
            test -d src/orchestrator/db/orm
            test -d src/orchestrator/runners/detection
          If any missing, stop — those phases must complete first.

          ADD __all__ TO MODULES LACKING IT (create new declarations):
          - db/__init__.py: expose only repository accessors; exclude RunModel, StepModel etc.
          - api/__init__.py: expose schemas, routers, mcp server
          - runners/__init__.py: expose executor, detection, profiles; hide internals
          - envfiles/__init__.py: expose public models and utilities
          - cli/__init__.py: expose main CLI entry points

          EDIT EXISTING __all__ IN THESE MODULES:
          - config/__init__.py (26 symbols): audit; ensure moved types (NudgerConfig, EnvFileSpec) included
          - state/__init__.py (12 symbols): AUDIT first — grep "from orchestrator.state import generate_id"
            — if no external consumers, remove generate_id from __all__
          - git/__init__.py (17 symbols): audit after Phase 2 additions
          - workflow/__init__.py (37 symbols): add NoTaskReason, LoopAction (moved in S-07);
            hide RunWorkflow if possible (audit consumers first)

          DEFINE BroadcastCallback PROTOCOL (wiring check required):
          1. Add BroadcastCallback protocol to runners/types.py with the minimal interface
             that runners/executor.py needs from ConnectionManager
          2. Update runners/executor.py to import and use BroadcastCallback instead of
             directly importing ConnectionManager from api/websocket
          3. WIRING VERIFICATION: After the change, read executor.py to confirm it imports
             BroadcastCallback and does NOT import ConnectionManager directly. Then read
             runners/execution/event_broadcaster.py to confirm it also uses BroadcastCallback.

          SURFACE AREA NARROWING:
          - check_step_progression, check_run_completion: move behind WorkflowService or
            make private; audit test files that import them directly (6 test files) and update
          - RunWorkflow: audit consumers first; if only executor.py uses it, rename to _RunWorkflow

          FINAL VERIFICATION (all must pass):
          - uv run pytest tests/ -q
          - cd ui && npx vitest run
          - cd ui && npx tsc --noEmit
          - cd ui && npx eslint . --max-warnings 0
          - cd ui && npm run build
          - uv run pre-commit run --all-files
        requirements:
