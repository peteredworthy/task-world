- name: task_projection_accepted
  given_events:
    - output_record_accepted: {task_region_id: task-accepted, candidate_id: cand-accepted, attempt_number: 1}
    - verification_passed: {candidate_id: cand-accepted}
    - file_state_accepted: {record_id: file-state-cand-accepted, record_kind: file_state, task_region_id: task-accepted, candidate_id: cand-accepted, snapshot_id: snapshot-cand-accepted, base_snapshot_id: S0, verdict: captured}
    - approval_decision_recorded: {task_region_id: task-accepted, gate_id: gate-accepted, approved: true}
  when_command: null
  then_events: []
  then_projection: {task-accepted: accepted}

- name: task_projection_needs_revision
  given_events:
    - output_record_accepted: {task_region_id: task-revision, candidate_id: cand-revision, attempt_number: 1}
    - verification_failed: {candidate_id: cand-revision}
  when_command: null
  then_events: []
  then_projection: {task-revision: needs_revision}

- name: task_projection_blocked_invalid_test
  given_events:
    - output_record_accepted: {task_region_id: task-invalid-test, candidate_id: cand-invalid-test, attempt_number: 1}
    - verification_failed: {candidate_id: cand-invalid-test}
    - oversight_decision_recorded: {task_region_id: task-invalid-test, candidate_id: cand-invalid-test, appeal_type: invalid_test, decision: accepted}
  when_command: null
  then_events: []
  then_projection: {task-invalid-test: blocked_invalid_test}

- name: task_projection_blocked_environment
  given_events:
    - output_record_accepted: {task_region_id: task-environment, candidate_id: cand-environment, attempt_number: 1}
    - environment_failure_accepted: {task_region_id: task-environment, reason: tool_unavailable}
  when_command: null
  then_events: []
  then_projection: {task-environment: blocked_environment}

- name: task_projection_in_progress
  given_events:
    - node_created: {node_id: worker-in-progress, kind: worker, state: running, task_region_id: task-in-progress}
    - lease_granted: {node_id: worker-in-progress, lease_id: lease-in-progress}
  when_command: null
  then_events: []
  then_projection: {task-in-progress: in_progress, lease-in-progress: active}

- name: task_projection_pending
  given_events:
    - node_created: {node_id: worker-pending, kind: worker, state: planned, task_region_id: task-pending}
  when_command: null
  then_events: []
  then_projection: {task-pending: pending, worker-pending: planned}
