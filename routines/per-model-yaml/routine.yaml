routine:
  id: per-model-token-accounting
  name: Per-Model Token Accounting
  description: |
    Replace the flat, parent-only token counter with a per-model token breakdown
    that includes embedded cost rates. This feature provides accurate run costs instead
    of the current ~27% undercount, making sub-agent tokens visible and accounting for
    different model price tiers (Sonnet vs Haiku vs Opus).

  steps:
    - file: steps/step-01-plan.yaml
    - file: steps/step-02-plan.yaml
    - file: steps/step-03-plan.yaml
    - file: steps/step-04-plan.yaml
    - file: steps/step-05-plan.yaml
    - file: steps/step-06-plan.yaml
