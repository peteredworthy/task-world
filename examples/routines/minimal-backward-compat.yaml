routine:
  id: minimal-backward-compat
  name: Minimal Backward Compatibility Example
  description: |
    Minimal example routine demonstrating backward compatibility.
    These steps have NO available_tools or mcp_servers configuration,
    showing that existing routines work unchanged.

  steps:
    - id: step-1
      title: First Step (No Tool Configuration)
      step_context: |
        This is a traditional step with no tool or MCP restrictions.
        The agent will use its default tools based on the execution phase.
      tasks:
        - id: task-1
          title: Do Something
          task_context: Perform some work.
          requirements:
            - id: r1
              desc: Work is completed
              must: true
              priority: critical

    - id: step-2
      title: Second Step (Also No Tool Configuration)
      tasks:
        - id: task-1
          title: Do More Work
          task_context: Continue with implementation.
          requirements:
            - id: r1
              desc: Implementation is complete
              must: true
              priority: critical

    - id: step-3
      title: Verification Step (Still No Configuration)
      step_context: |
        Legacy verification step. Works as before without tool/MCP specifications.
      tasks:
        - id: verify
          title: Verify Work
          task_context: Review and verify the work completed.
          requirements:
            - id: r1
              desc: Verification passed
              must: true
              priority: critical
