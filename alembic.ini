[alembic]
# Path to migration scripts, relative to this file
script_location = src/orchestrator/alembic

# SQLite URL — override via ORCHESTRATOR_DB_URL env var or alembic -x dburl=...
sqlalchemy.url = sqlite+aiosqlite:///orchestrator.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
