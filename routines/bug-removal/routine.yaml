  - id: "S-05"
    title: "Phase-Aware MCP Tool Filtering"
    step_context: |
      Fix MCP-TOOLS-NO-PHASE-FILTERING bug. Currently all MCP tools are registered
      unconditionally; builder agents that discover orchestrator_set_grade waste a tool call.
      After this fix, builder connections see only builder tools and verifier connections see
      only verifier tools. This step is independent of Steps 1-4.
    tasks:
      - id: "T-01"
        title: "Add phase parameter to MCP server and filter _register_tools()"
        task_context: |
          Add phase: Literal["building", "verifying"] with default "building" to the MCP
          server's __init__ and update _register_tools() to conditionally register tools.

          Steps:
          1. Open src/orchestrator/mcp/server.py
          2. Define BUILDER_TOOLS set: orchestrator_get_requirements, orchestrator_update_checklist,
             orchestrator_submit, orchestrator_request_clarification, orchestrator_list_repos,
             orchestrator_list_branches
          3. Define VERIFIER_TOOLS set: orchestrator_get_requirements, orchestrator_set_grade,
             orchestrator_submit
          4. Add phase parameter to __init__ with default "building":
             def __init__(self, ..., phase: Literal["building", "verifying"] = "building"):
          5. Add validation: raise ValueError if phase not in ("building", "verifying")
          6. Update _register_tools() to filter by self.phase
          7. Read src/orchestrator/mcp/server.py first to understand existing tool registration

          Verification:
          - uv run pyright src/orchestrator/mcp/server.py exits 0
          - uv run ruff check src/orchestrator/mcp/server.py exits 0

          Note: existing callers that omit phase will default to "building" (safe behavior).
          The tools.py soft-error workaround must remain as a safety net.
        requirements:
          - id: "R1"
            desc: "MCP server accepts phase parameter at construction time with 'building' as default"
            priority: critical
          - id: "R2"
            desc: "ValueError raised when phase is an explicitly invalid string"
            priority: expected
          - id: "R3"
            desc: "Builder phase: orchestrator_set_grade is NOT registered"
            priority: critical
          - id: "R4"
            desc: "Verifier phase: orchestrator_update_checklist is NOT registered"
            priority: critical
        auto_verify:
          items:
            - id: "server_type_check"
              cmd: "uv run pyright src/orchestrator/mcp/server.py"
              must: true
        verifier:
          rubric:
            - id: "filtering_correctness"
              text: |
                R1/R2/R3/R4 — A: phase parameter accepted with correct default; ValueError raised
                for invalid phases; builder excludes set_grade; verifier excludes update_checklist.
                B: filtering works but ValueError or default-phase case is missing.
        retry:
          max_attempts: 2

      - id: "T-02"
        title: "Pass phase parameter from executor.py when spawning agents"
        task_context: |
          Update executor.py to determine the current task phase and pass it when constructing
          the MCP server. BUILDING status maps to "building", VERIFYING to "verifying".

          Steps:
          1. Open src/orchestrator/agents/executor.py
          2. Locate where the MCP server (or agent session) is constructed for each task
          3. Derive phase from task's current status:
             if task_status == TaskStatus.VERIFYING: phase = "verifying"
             else: phase = "building"
          4. Pass phase when constructing MCP server: OrchestratorMCPServer(..., phase=phase)
          5. Confirm the phase is passed in all code paths that construct the server

          Verification:
          - uv run pyright src/orchestrator/agents/executor.py exits 0
          - uv run ruff check src/orchestrator/agents/executor.py exits 0
        requirements:
          - id: "R1"
            desc: "Builder agents receive phase 'building' at construction time"
            priority: critical
          - id: "R2"
            desc: "Verifier agents receive phase 'verifying' at construction time"
            priority: critical
        auto_verify:
          items:
            - id: "executor_type_check"
              cmd: "uv run pyright src/orchestrator/agents/executor.py"
              must: true
        verifier:
          rubric:
            - id: "phase_propagation"
              text: |
                R1/R2 — A: executor derives phase from task status and passes it to MCP server
                in all agent construction paths; VERIFYING → "verifying", all others → "building".
                B: phase is passed in the main path but missing in a secondary code path.
        retry:
          max_attempts: 2

      - id: "T-03"
        title: "Write unit tests for phase-aware tool filtering"
        task_context: |
          Write unit tests that verify the builder tool list excludes orchestrator_set_grade,
          the verifier tool list excludes orchestrator_update_checklist, and ValueError is raised
          for an invalid phase.

          Steps:
          1. Create tests/unit/mcp/test_phase_filtering.py
          2. Test 1 — builder: construct with phase="building"; assert orchestrator_set_grade NOT present
          3. Test 2 — verifier: construct with phase="verifying"; assert orchestrator_update_checklist NOT present
          4. Test 3 — invalid phase: construct with phase="unknown"; assert ValueError raised
          5. Test 4 — default phase: construct with no phase; assert no exception and builder tool set
          6. Run: pytest tests/ -k "mcp or phase_filter" -v

          Verification:
          - pytest tests/ -k "mcp or phase_filter" -v exits 0 with all 4 tests PASSED
          - Test file exists at tests/unit/mcp/test_phase_filtering.py
        requirements:
          - id: "R1"
            desc: "Four unit tests exist in tests/unit/mcp/test_phase_filtering.py, all passing"
            priority: critical
          - id: "R2"
            desc: "Builder tool list explicitly tested to exclude orchestrator_set_grade"
            priority: critical
          - id: "R3"
            desc: "Verifier tool list explicitly tested to exclude orchestrator_update_checklist"
            priority: critical
        auto_verify:
          items:
            - id: "test_file_exists"
              cmd: "test -f tests/unit/mcp/test_phase_filtering.py"
              must: true
            - id: "tests_pass"
              cmd: "uv run pytest tests/ -k 'mcp or phase_filter' -q 2>&1 | grep -q 'passed'"
              must: true
        verifier:
          rubric:
            - id: "test_coverage"
              text: |
                R1/R2/R3 — A: all 4 tests present and pass (builder, verifier, invalid phase,
                default). B: 3 of 4 tests present; missing one edge case.
        retry:
          max_attempts: 2

  - id: "S-06"
