id: enhanced-clarifications
name: Enhanced Clarification System
description: >
  Extend the clarification system to support richer question types
  (single_select, multi_select, free_text, number), WebSocket push for instant
  UI updates, answer history in the activity timeline, line-number-aware builder
  resume prompts, and user force-skip with optional reason.

  Implementation is split across 5 steps: data model & MCP tool, prompt changes
  & history endpoint, WebSocket push, frontend question types & skip flow, and
  frontend WebSocket handler & history UI.

steps:
  - id: S-01
    title: "Data Model & MCP Tool"
    step_context: >
      Stage 1: Extend the core clarification data model to support richer
      question types (multi-select, free text, number) and user-skippable
      responses. Update the MCP tool inputSchema so LLMs can emit these new
      question types. Update API schemas and router to pass new fields through.
      This step establishes the foundational contracts that all subsequent steps
      depend on.

      Reference: docs/enhanced-clarifications/steps/step-01.md
    tasks:
      - id: T-01
        title: "Extend ClarificationQuestion and ClarificationAnswer domain models"
        task_context: >
          Add the new fields to the domain dataclasses in
          src/orchestrator/workflow/clarifications.py and update
          format_clarification_artifact to return line-range metadata.

          Changes required:
          1. Add to ClarificationQuestion: question_type (Literal with 4 values,
             default 'single_select'), allow_other (bool, default True), required
             (bool, default True), min (float|None), max (float|None), placeholder
             (str|None).
          2. Add a Pydantic model_validator(mode='after') that enforces: options
             must be non-empty for single_select/multi_select, options must be
             empty for free_text/number, and min <= max when both provided.
          3. Add to ClarificationAnswer: selected_options (list[str]|None),
             skipped (bool, default False), skip_reason (str|None).
          4. Update format_clarification_artifact to return tuple[str, int, int]
             where the second element is 0 (placeholder) and third is
             line_count_of_appended_section.

          Only ClarificationQuestion, ClarificationAnswer, and
          format_clarification_artifact in clarifications.py may be changed.
          All existing fields must retain their current defaults.
          Do not change ClarificationRequest, ClarificationResponse, or
          build_artifact_header.

          See docs/enhanced-clarifications/steps/step-01.md Task 1 for full
          implementation guidance including the exact validator code.
        requirements:
          - id: R1
            desc: "ClarificationQuestion has question_type, allow_other, required, min, max, placeholder fields with correct defaults"
            priority: critical
          - id: R2
            desc: "ClarificationQuestion model_validator enforces options constraints and min<=max"
            priority: critical
          - id: R3
            desc: "ClarificationAnswer has selected_options, skipped, skip_reason fields"
            priority: critical
          - id: R4
            desc: "format_clarification_artifact returns tuple[str, int, int]"
            priority: critical
        auto_verify:
          items:
            - id: model_validator
              cmd: >
                uv run python -c "from orchestrator.workflow.clarifications import
                ClarificationQuestion; ClarificationQuestion(question_type='single_select',
                options=['a'])" && echo "validator OK"
              must: true
            - id: no_mypy_errors
              cmd: "uv run mypy src/orchestrator/workflow/clarifications.py --no-error-summary 2>&1 | tail -1"
              must: false
        retry:
          max_attempts: 2

      - id: T-02
        title: "Update CLARIFICATION_TOOL inputSchema"
        task_context: >
          Expose all new question-type fields to the LLM by extending the JSON
          Schema in src/orchestrator/mcp/clarification_tools.py.

          Changes required:
          1. Open src/orchestrator/mcp/clarification_tools.py and read the full file.
          2. Add new properties to CLARIFICATION_TOOL['inputSchema'] inside each
             question item's properties: question_type (enum with 4 values),
             allow_other (boolean), required (boolean), min (number|null),
             max (number|null), placeholder (string|null).
          3. Remove 'options' from the 'required' array at the item level (make it
             optional in the schema; semantic validation happens in the router).

          Only CLARIFICATION_TOOL dict in clarification_tools.py may change.
          Do not add Python logic to this file—only the JSON schema dict.

          See docs/enhanced-clarifications/steps/step-01.md Task 2 for the exact
          property definitions to add.
        requirements:
          - id: R5
            desc: "CLARIFICATION_TOOL inputSchema includes question_type, allow_other, required, min, max, placeholder"
            priority: critical
          - id: R6
            desc: "options field is no longer in the required array of the question item schema"
            priority: expected
        auto_verify:
          items:
            - id: schema_has_fields
              cmd: >
                uv run python -c "from orchestrator.mcp.clarification_tools import
                CLARIFICATION_TOOL; props = CLARIFICATION_TOOL['inputSchema'];
                print('OK' if 'question_type' in str(props) else 'MISSING')"
              must: true
        retry:
          max_attempts: 2

      - id: T-03
        title: "Mirror new fields in API schemas and update the router"
        task_context: >
          Extend src/orchestrator/api/schemas/clarifications.py to reflect all new
          model fields, then update the router to pass them through and handle
          skipped=True.

          Changes required:
          1. Update ClarificationQuestionSchema to add: question_type, allow_other,
             required, min, max, placeholder (same types/defaults as domain model).
          2. Update ClarificationAnswerSchema to add: selected_options, skipped,
             skip_reason.
          3. Update RespondToClarificationRequest to add: skipped (bool, default
             False), skip_reason (str|None).
          4. In src/orchestrator/api/routers/clarifications.py, locate the guard
             checking "all required questions answered" and wrap it:
               if not request.skipped:
                   # existing required-questions guard
          5. Pass skipped and skip_reason from the request through to the
             service/domain layer when creating ClarificationAnswer objects.

          Only ClarificationQuestionSchema, ClarificationAnswerSchema, and
          RespondToClarificationRequest in schemas file may change.
          Only the respond_to_clarification function in the router may change.
          Do not add new routes in this task (history route is Step 2).

          See docs/enhanced-clarifications/steps/step-01.md Task 3 for details.
        requirements:
          - id: R7
            desc: "API schemas mirror all new domain model fields"
            priority: critical
          - id: R8
            desc: "Router handles skipped=True without requiring all answers"
            priority: critical
        auto_verify:
          items:
            - id: schema_imports
              cmd: "uv run python -c \"from orchestrator.api.schemas.clarifications import RespondToClarificationRequest; print('OK')\"  "
              must: true
        retry:
          max_attempts: 2

      - id: T-04
        title: "Write integration and unit tests for Step 1"
        task_context: >
          Cover all new fields, validation paths, the multi-select response path,
          and the skip path with tests.

          Tests to write:
          Unit tests in tests/unit/ for ClarificationQuestion validator:
          - question_type='free_text' with non-empty options raises ValidationError
          - question_type='single_select' with empty options raises ValidationError
          - question_type='number' with min=5, max=2 raises ValidationError
          - Each valid question_type with appropriate options succeeds

          Integration tests:
          - Create clarification with question_type='free_text'; assert stored
            question has correct type and no options
          - Create clarification with question_type='multi_select' and empty
            options; assert 422 response
          - Respond with selected_options=['A', 'B']; assert artifact contains
            both selections
          - Respond with skipped=True and skip_reason='Not needed'; assert task
            transitions back to BUILDING and no 422 error

          Follow patterns from tests/integration/test_api_runs.py.
          See docs/enhanced-clarifications/steps/step-01.md Task 4 for details.
        requirements:
          - id: R9
            desc: "Unit tests for ClarificationQuestion validator pass"
            priority: critical
          - id: R10
            desc: "Integration tests for new fields and skip path pass"
            priority: critical
          - id: R11
            desc: "No existing tests regress"
            priority: critical
        auto_verify:
          items:
            - id: unit_tests
              cmd: "uv run pytest tests/unit/ -k clarifications -v --tb=short 2>&1 | tail -20"
              must: false
            - id: integration_tests
              cmd: "uv run pytest tests/integration/ -k clarification -v --tb=short 2>&1 | tail -20"
              must: false
        verifier:
          rubric:
            - id: test_coverage
              text: "Do the tests cover all four question types, the validator paths, and the skip flow?"
            - id: no_regression
              text: "Do all previously passing clarification tests still pass?"
        retry:
          max_attempts: 2

  - id: S-02
    title: "Prompt Changes & History Endpoint"
    step_context: >
      Stage 2: Wire the line-range data introduced in Step 1 into the builder
      resume prompt so the LLM knows exactly where in the artifact file to look
      for answers. Add the clarification history API endpoint so the frontend can
      display past Q&A rounds. Also surface the skip signal in the prompt so the
      builder can proceed with partial information.

      Prerequisites: Step 1 must be complete.
      Reference: docs/enhanced-clarifications/steps/step-02.md
    tasks:
      - id: T-05
        title: "Update respond_to_clarification in workflow/service.py"
        task_context: >
          Capture the line range returned by format_clarification_artifact and
          pass it (along with skip data) to generate_builder_prompt.

          Changes required in src/orchestrator/workflow/service.py in the
          respond_to_clarification function:
          1. Before appending to the artifact file, count current lines:
               try:
                   with open(artifact_path, 'r') as f:
                       current_line_count = sum(1 for _ in f)
               except FileNotFoundError:
                   current_line_count = 0
          2. Unpack the 3-tuple from format_clarification_artifact:
               text, _, section_line_count = format_clarification_artifact(req, resp)
          3. After appending, compute line range:
               start_line = current_line_count + 1
               end_line = current_line_count + section_line_count
               clarification_line_range = (str(artifact_path), start_line, end_line)
          4. Pass clarification_line_range and skip data to generate_builder_prompt.

          Only respond_to_clarification in service.py may change in this task.
          Do not change request_clarification or get_pending_clarification.

          See docs/enhanced-clarifications/steps/step-02.md Task 1 for details.
        requirements:
          - id: R12
            desc: "respond_to_clarification passes clarification_line_range to generate_builder_prompt"
            priority: critical
          - id: R13
            desc: "When skipped=True, skipped_questions list is passed to generate_builder_prompt"
            priority: critical
        auto_verify:
          items:
            - id: mypy_service
              cmd: "uv run mypy src/orchestrator/workflow/service.py --no-error-summary 2>&1 | tail -3"
              must: false
        retry:
          max_attempts: 2

      - id: T-06
        title: "Update generate_builder_prompt in workflow/prompts.py"
        task_context: >
          Accept new optional parameters and append the appropriate clarification
          context sentences to the prompt.

          Changes required in src/orchestrator/workflow/prompts.py:
          1. Add to BuilderPrompt dataclass:
               clarification_line_range: tuple[str, int, int] | None = None
               skipped_questions: list[str] | None = None
          2. Update generate_builder_prompt signature to accept:
               clarification_line_range: tuple[str, int, int] | None = None,
               skipped_questions: list[str] | None = None,
               skip_reason: str | None = None,
          3. In the function body, after the existing clarifications section:
               if clarification_line_range:
                   path, start, end = clarification_line_range
                   clarification_text += (
                       f"\n\nUser answers have been written to {path} (lines {start}–{end}). "
                       "Read that section for the answers."
                   )
               if skipped_questions:
                   reason = skip_reason or 'none given'
                   q_list = ', '.join(f'"{q}"' for q in skipped_questions)
                   clarification_text += (
                       f"\n\nThe user declined to answer: {q_list}. "
                       f"Reason: {reason}. Proceed with your best judgment."
                   )
          4. Populate the new BuilderPrompt fields when constructing return value.

          Only generate_builder_prompt and BuilderPrompt in prompts.py may change.
          All existing parameters remain with their current defaults.

          See docs/enhanced-clarifications/steps/step-02.md Task 2 for details.
        requirements:
          - id: R14
            desc: "generate_builder_prompt includes file path and line range when clarification_line_range provided"
            priority: critical
          - id: R15
            desc: "generate_builder_prompt includes skip signal text when skipped_questions provided"
            priority: critical
          - id: R16
            desc: "Calling without new params produces identical output to previous version"
            priority: expected
        auto_verify:
          items:
            - id: mypy_prompts
              cmd: "uv run mypy src/orchestrator/workflow/prompts.py --no-error-summary 2>&1 | tail -3"
              must: false
        retry:
          max_attempts: 2

      - id: T-07
        title: "Add repository method for clarification history"
        task_context: >
          Add get_clarification_history(run_id, task_id) to the repository layer
          so the router can fetch all rounds.

          Changes required:
          1. Identify the repository file that contains clarification DB queries
             (likely src/orchestrator/db/repositories/clarifications.py).
          2. Add the method that:
             - Queries ClarificationRequestModel filtered by run_id and task_id,
               ordered by created_at ascending
             - For each request, queries for its ClarificationResponseModel
             - Returns list[tuple[ClarificationRequest, ClarificationResponse|None]]
             with pending rounds having response=None

          Returns empty list when no clarifications exist.
          Items ordered by creation time ascending.

          See docs/enhanced-clarifications/steps/step-02.md Task 3 for the exact
          method signature and implementation.
        requirements:
          - id: R17
            desc: "get_clarification_history returns all rounds ordered by creation time ascending"
            priority: critical
          - id: R18
            desc: "Pending rounds have response=None in returned tuples"
            priority: expected
        retry:
          max_attempts: 2

      - id: T-08
        title: "Add ClarificationHistoryItem/Response schemas and history route"
        task_context: >
          Add the new Pydantic schemas and wire up the GET .../clarifications
          endpoint.

          Changes required:
          1. In src/orchestrator/api/schemas/clarifications.py, add:
               class ClarificationHistoryItem(BaseModel):
                   request: <existing request schema class>
                   response: <existing answer schema class> | None
               class ClarificationHistoryResponse(BaseModel):
                   items: list[ClarificationHistoryItem]
          2. In src/orchestrator/api/routers/clarifications.py, add:
               GET /{run_id}/tasks/{task_id}/clarifications endpoint
               that returns ClarificationHistoryResponse
               - Returns 404 if run or task not found
               - Returns {"items": []} when no rounds exist
               - Pending rounds appear with response=null
               - Items in ascending creation order

          Only add the two new schema classes; do not modify existing schemas.
          Only add the new GET route; do not modify existing routes.

          See docs/enhanced-clarifications/steps/step-02.md Task 4 for details.
        requirements:
          - id: R19
            desc: "GET /api/runs/{run_id}/tasks/{task_id}/clarifications returns history with correct shape"
            priority: critical
          - id: R20
            desc: "Returns 404 when run_id or task_id not found"
            priority: expected
          - id: R21
            desc: "Pending rounds appear with response=null"
            priority: expected
        auto_verify:
          items:
            - id: schema_imports
              cmd: "uv run python -c \"from orchestrator.api.schemas.clarifications import ClarificationHistoryResponse; print('OK')\""
              must: true
        retry:
          max_attempts: 2

      - id: T-09
        title: "Write integration and unit tests for prompt and history"
        task_context: >
          Verify the prompt changes and history endpoint with automated tests.

          Unit tests to add for generate_builder_prompt:
          - With clarification_line_range=('/artifact.md', 5, 12): assert output
            contains "lines 5–12" and "/artifact.md"
          - With skipped_questions=['Question 1'], skip_reason='Too vague': assert
            output contains "declined to answer" and "Too vague"
          - Without new params: assert output matches existing baseline (no regression)

          Integration tests to add:
          - Complete a clarification round; then GET .../clarifications; assert 1
            item with non-null response
          - Submit a pending clarification; GET .../clarifications; assert the
            pending item has response=null
          - GET .../clarifications with nonexistent run_id; assert 404
          - Respond with skipped=True; read builder prompt; assert skip message present

          Follow patterns from tests/integration/test_api_runs.py.
          See docs/enhanced-clarifications/steps/step-02.md Task 5 for details.
        requirements:
          - id: R22
            desc: "Unit tests for generate_builder_prompt line-range and skip-signal pass"
            priority: critical
          - id: R23
            desc: "Integration tests for history endpoint pass"
            priority: critical
          - id: R24
            desc: "No existing tests regress"
            priority: critical
        auto_verify:
          items:
            - id: unit_prompts
              cmd: "uv run pytest tests/unit/ -k prompts -v --tb=short 2>&1 | tail -20"
              must: false
            - id: integration_clarification
              cmd: "uv run pytest tests/integration/ -k clarification -v --tb=short 2>&1 | tail -20"
              must: false
        verifier:
          rubric:
            - id: test_coverage
              text: "Do the tests verify line-range inclusion and skip signal in prompt output?"
            - id: history_endpoint
              text: "Does the integration test cover the history endpoint shape including pending rounds?"
        retry:
          max_attempts: 2

  - id: S-03
    title: "WebSocket Push"
    step_context: >
      Stage 3: Ensure that when a clarification is requested or responded to, a
      WebSocket event is broadcast to all connected clients immediately. This
      eliminates the 10-second polling delay. The existing 10s polling in
      usePendingClarification is preserved as a fallback.

      Prerequisites: Step 1 complete; can run concurrently with Step 2.
      Reference: docs/enhanced-clarifications/steps/step-03.md
    tasks:
      - id: T-10
        title: "Audit and update ClarificationRequested event dataclass"
        task_context: >
          Ensure ClarificationRequested has all required fields including
          question_count and a forward-compatible questions list.

          Changes required in src/orchestrator/workflow/events.py:
          1. Locate ClarificationRequested dataclass and verify it has run_id,
             task_id, and request_id fields.
          2. If question_count: int is missing, add it. Add questions: list[dict]
             = field(default_factory=list) for forward-compatibility.
          3. Verify ClarificationResponded has run_id, task_id, and request_id.
             Add any missing fields (check existing usage first).
          4. Find wherever ClarificationRequested is instantiated (likely
             workflow/service.py request_clarification). Pass
             question_count=len(questions) when constructing the event.

          Only ClarificationRequested and ClarificationResponded dataclasses in
          events.py may change. Changes must be backward-compatible.
          Do not populate questions list—leave it empty.

          See docs/enhanced-clarifications/steps/step-03.md Task 1 for details.
        requirements:
          - id: R25
            desc: "ClarificationRequested has question_count field"
            priority: critical
          - id: R26
            desc: "ClarificationResponded has run_id, task_id, request_id fields"
            priority: critical
        auto_verify:
          items:
            - id: event_imports
              cmd: >
                uv run python -c "from orchestrator.workflow.events import
                ClarificationRequested; e = ClarificationRequested(run_id='r',
                task_id='t', request_id='req', question_count=1); print('OK')"
              must: true
        retry:
          max_attempts: 2

      - id: T-11
        title: "Verify and add WebSocket broadcast for clarification events"
        task_context: >
          Confirm the WS broadcaster serializes ClarificationRequested and
          ClarificationResponded events; add serialization branches if missing.

          Changes required in src/orchestrator/api/websocket.py (or equivalent):
          1. Find the section where events are serialized and broadcast to clients.
          2. If no branch for ClarificationRequested, add one that broadcasts:
               {"event_type": "clarification_requested", "run_id": ...,
                "task_id": ..., "request_id": ..., "question_count": ...}
          3. If no branch for ClarificationResponded, add one that broadcasts:
               {"event_type": "clarification_responded", "run_id": ...,
                "task_id": ..., "request_id": ...}
          4. Ensure disconnected clients are handled silently.

          Only add new serialization branches; do not modify existing ones.
          Do not change WS connection management logic.
          Payload must be minimal (IDs + counts only).

          See docs/enhanced-clarifications/steps/step-03.md Task 2 for details.
        requirements:
          - id: R27
            desc: "WS broadcaster emits clarification_requested event after request_clarification"
            priority: critical
          - id: R28
            desc: "WS broadcaster emits clarification_responded event after respond_to_clarification"
            priority: critical
          - id: R29
            desc: "Disconnected clients do not cause unhandled exceptions"
            priority: expected
        auto_verify:
          items:
            - id: mypy_websocket
              cmd: "uv run mypy src/orchestrator/api/websocket.py --no-error-summary 2>&1 | tail -3"
              must: false
        retry:
          max_attempts: 2

      - id: T-12
        title: "Write integration tests for WS clarification events"
        task_context: >
          Verify that the correct WS messages are received when clarification
          events fire.

          Tests to write:
          1. test_ws_clarification_requested: Connect via WebSocket to
             /ws/runs/{run_id}, POST a clarification, receive WS message, assert
             event_type='clarification_requested', task_id matches, question_count >= 1.
          2. test_ws_clarification_responded: POST the response, capture WS
             message, assert event_type='clarification_responded', task_id and
             request_id are present.

          Find existing WS integration test file for patterns.
          See docs/enhanced-clarifications/steps/step-03.md Task 3 for details.
        requirements:
          - id: R30
            desc: "WS test for clarification_requested passes"
            priority: critical
          - id: R31
            desc: "WS test for clarification_responded passes"
            priority: critical
          - id: R32
            desc: "Existing WS tests still pass"
            priority: critical
        auto_verify:
          items:
            - id: ws_tests
              cmd: "uv run pytest tests/integration/ -k ws_clarification -v --tb=short 2>&1 | tail -20"
              must: false
        verifier:
          rubric:
            - id: ws_test_quality
              text: "Do the WS tests properly assert event_type, task_id, and question_count fields?"
        retry:
          max_attempts: 2

  - id: S-04
    title: "Frontend – Question Types & Skip"
    step_context: >
      Stage 4: Update the frontend to render all four question types
      (single_select, multi_select, free_text, number) and support the user
      force-skip flow. TypeScript types are extended to mirror the new backend
      schema. QuestionCard branches on question_type; ClarificationModal handles
      multi-select answer state, type-aware validation, and the "Skip remaining"
      action.

      Prerequisites: Step 1 complete; can start without Steps 2-3.
      Reference: docs/enhanced-clarifications/steps/step-04.md
    tasks:
      - id: T-13
        title: "Extend TypeScript types in clarifications.ts"
        task_context: >
          Mirror all new backend fields in the TypeScript domain types so the
          rest of the frontend is fully typed.

          Changes required in ui/src/types/clarifications.ts:
          1. Update ClarificationQuestion to add: question_type (union of 4 string
             literals), allow_other (boolean), required (boolean), min (number|null
             optional), max (number|null optional), placeholder (string|null optional).
          2. Update ClarificationAnswer to add: selected_options (string[] optional),
             skipped (boolean optional), skip_reason (string|null optional).
          3. Update RespondToClarificationRequest to add: skipped (boolean optional),
             skip_reason (string|null optional).
          4. Add new interfaces:
               ClarificationHistoryItem { request: ClarificationRequest;
                                          response: ClarificationResponse | null; }
               ClarificationHistoryResponse { items: ClarificationHistoryItem[]; }

          All existing fields must remain (additive changes only).
          Use ? for optional fields for backward compatibility.

          See docs/enhanced-clarifications/steps/step-04.md Task 1 for details.
        requirements:
          - id: R33
            desc: "TypeScript ClarificationQuestion type has all new fields"
            priority: critical
          - id: R34
            desc: "ClarificationHistoryItem and ClarificationHistoryResponse types are exported"
            priority: critical
        auto_verify:
          items:
            - id: typecheck
              cmd: "cd ui && npm run typecheck 2>&1 | tail -10"
              must: false
        retry:
          max_attempts: 2

      - id: T-14
        title: "Update QuestionCard to render all four question types"
        task_context: >
          Branch QuestionCard on question_type and render the appropriate input
          element for each type.

          Changes required in ui/src/components/detail/QuestionCard.tsx:
          1. Add onOptionsChange prop for multi-select.
          2. Wrap existing radio-button JSX in question.question_type === 'single_select' branch.
          3. Add multi_select branch rendering checkboxes with allow_other support.
          4. Add free_text branch rendering a textarea with placeholder support.
          5. Add number branch rendering number input with inline min/max validation.
          6. Show required indicator (*) consistently across all branches.
          7. Hide "Other" option when question.allow_other === false.

          The existing single_select rendering path must be preserved exactly.

          See docs/enhanced-clarifications/steps/step-04.md Task 2 for the exact
          JSX for each branch.
        requirements:
          - id: R35
            desc: "QuestionCard renders radio buttons for single_select (unchanged)"
            priority: critical
          - id: R36
            desc: "QuestionCard renders checkboxes for multi_select with allow_other support"
            priority: critical
          - id: R37
            desc: "QuestionCard renders textarea for free_text with placeholder"
            priority: critical
          - id: R38
            desc: "QuestionCard renders number input with inline min/max error for number type"
            priority: critical
        auto_verify:
          items:
            - id: typecheck
              cmd: "cd ui && npm run typecheck 2>&1 | tail -10"
              must: false
            - id: component_exists
              cmd: "test -f ui/src/components/detail/QuestionCard.tsx && echo 'OK'"
              must: true
        retry:
          max_attempts: 2

      - id: T-15
        title: "Update ClarificationModal for multi-select state, validation, and skip flow"
        task_context: >
          Extend ClarificationModal to handle the new answer state, validate per
          required and question_type, and support "Skip remaining" with optional
          reason.

          Changes required in ui/src/components/detail/ClarificationModal.tsx:
          1. Extend AnswerState to include selectedOptions (string[]), skipped (boolean).
          2. Add handleOptionsChange handler that updates selectedOptions in state.
          3. Pass onOptionsChange={handleOptionsChange} to QuestionCard.
          4. Update isAnswerComplete validation to be type-aware:
             - single_select: selectedOption or otherText is set
             - multi_select: selectedOptions.length > 0 or otherText is set
             - free_text: textValue.trim().length > 0
             - number: value is valid number within [min, max]
          5. Add skip UI state (showSkip, skipReason).
          6. Show "Skip remaining" button when canSkip condition is met.
          7. Implement handleSkipSubmit that calls onRespond with
             {answers: partialAnswers, skipped: true, skip_reason: skipReason || null}.
          8. Update buildAnswers() to include selected_options for multi-select.

          The existing single-answer submit path must be preserved.

          See docs/enhanced-clarifications/steps/step-04.md Task 3 for the exact
          implementation code.
        requirements:
          - id: R39
            desc: "Multi-select question produces selected_options in submit payload"
            priority: critical
          - id: R40
            desc: "Required free_text with empty value disables Submit button"
            priority: critical
          - id: R41
            desc: "Number question with out-of-range value disables Submit button"
            priority: expected
          - id: R42
            desc: "Skip remaining button visible and produces {skipped: true, skip_reason, answers} payload"
            priority: critical
        auto_verify:
          items:
            - id: typecheck
              cmd: "cd ui && npm run typecheck 2>&1 | tail -10"
              must: false
        verifier:
          rubric:
            - id: skip_ux
              text: "Is the skip flow complete with reason textarea, confirm/cancel buttons, and correct payload?"
            - id: validation
              text: "Is the type-aware validation correct for all four question types?"
        retry:
          max_attempts: 2

  - id: S-05
    title: "Frontend – WebSocket Handler & History UI"
    step_context: >
      Stage 5: Wire the WebSocket clarification events into the React Query cache
      invalidation so the UI reacts instantly. Add useClarificationHistory query
      hook backed by the new history endpoint. Render completed clarification
      rounds as expandable ClarificationHistoryCard components in the activity feed.

      Prerequisites: Steps 2, 3, 4 complete.
      Reference: docs/enhanced-clarifications/steps/step-05.md
    tasks:
      - id: T-16
        title: "Add clarification event payload types to activity.ts"
        task_context: >
          Define TypeScript types for the incoming WS event payloads so
          processEvent is fully typed.

          Changes required in ui/src/types/activity.ts:
          1. Add ClarificationRequestedPayload interface:
               { event_type: 'clarification_requested'; run_id: string;
                 task_id: string; request_id: string; question_count: number; }
          2. Add ClarificationRespondedPayload interface:
               { event_type: 'clarification_responded'; run_id: string;
                 task_id: string; request_id: string; }
          3. If there is a union type for all WS event payloads, add both new
             interfaces to the union.

          Only activity.ts changes in this task.
          Do not modify existing type definitions.

          See docs/enhanced-clarifications/steps/step-05.md Task 1 for details.
        requirements:
          - id: R43
            desc: "ClarificationRequestedPayload and ClarificationRespondedPayload are exported"
            priority: critical
        auto_verify:
          items:
            - id: typecheck
              cmd: "cd ui && npm run typecheck 2>&1 | tail -10"
              must: false
        retry:
          max_attempts: 2

      - id: T-17
        title: "Extend useWebSocket processEvent with clarification handlers"
        task_context: >
          Add cache invalidation logic so ClarificationModal auto-opens on
          clarification_requested and history refetches on clarification_responded.

          Changes required in ui/src/hooks/useWebSocket.ts:
          1. Find the processEvent function that dispatches on event_type.
          2. Add branch for 'clarification_requested':
             - Invalidate ['pending-actions', runId]
             - If payload.task_id: invalidate ['pending-clarification', runId, payload.task_id]
          3. Add branch for 'clarification_responded':
             - If payload.task_id: invalidate ['clarification-history', runId, payload.task_id]
          4. Guard task_id access to avoid crashing on malformed payloads.

          Only add the two new else-if branches; do not modify existing handlers.

          See docs/enhanced-clarifications/steps/step-05.md Task 2 for details.
        requirements:
          - id: R44
            desc: "processEvent invalidates pending-actions and pending-clarification on clarification_requested"
            priority: critical
          - id: R45
            desc: "processEvent invalidates clarification-history on clarification_responded"
            priority: critical
          - id: R46
            desc: "Missing task_id in payload does not throw"
            priority: expected
        auto_verify:
          items:
            - id: typecheck
              cmd: "cd ui && npm run typecheck 2>&1 | tail -10"
              must: false
        retry:
          max_attempts: 2

      - id: T-18
        title: "Add useClarificationHistory query hook"
        task_context: >
          Add a React Query hook that fetches all Q&A history from
          GET /api/runs/{run_id}/tasks/{task_id}/clarifications.

          Changes required in ui/src/hooks/useClarifications.ts:
          Add useClarificationHistory hook:
          - queryKey: ['clarification-history', runId, taskId]
          - queryFn: fetches /api/runs/{runId}/tasks/{taskId}/clarifications;
            throws Error on non-200 response
          - enabled: !!runId && !!taskId (disabled when either is undefined)
          - staleTime: 30_000

          Adapt the fetch call to match existing API client pattern in the file.

          Only add useClarificationHistory; do not modify usePendingClarification
          or useRespondToClarification.

          See docs/enhanced-clarifications/steps/step-05.md Task 3 for details.
        requirements:
          - id: R47
            desc: "useClarificationHistory hook returns ClarificationHistoryItem[] from data.items"
            priority: critical
          - id: R48
            desc: "Hook is disabled when runId or taskId is undefined"
            priority: expected
        auto_verify:
          items:
            - id: typecheck
              cmd: "cd ui && npm run typecheck 2>&1 | tail -10"
              must: false
        retry:
          max_attempts: 2

      - id: T-19
        title: "Create ClarificationHistoryCard component"
        task_context: >
          Create the new ClarificationHistoryCard component that renders a single
          completed (or pending) clarification round in the activity feed.

          Create new file ui/src/components/detail/ClarificationHistoryCard.tsx:
          - Props: item (ClarificationHistoryItem), roundNumber (number)
          - State: expanded (boolean, default false)
          - Collapsed view: "Clarification N", status badge (Pending/Skipped/Answered),
            timestamp from request.created_at
          - Expanded view: per-question rows with question text and answer(s);
            for multi-select shows selected_options joined by ', ';
            for skipped shows skip_reason; for pending shows "Awaiting response…"
          - Null response must not crash the component
          - Collapsed by default

          See docs/enhanced-clarifications/steps/step-05.md Task 4 for the full
          component implementation.
        requirements:
          - id: R49
            desc: "ClarificationHistoryCard renders collapsed/expanded with correct status badge"
            priority: critical
          - id: R50
            desc: "Component handles null response without crashing"
            priority: critical
          - id: R51
            desc: "Expanded view shows per-question Q&A content"
            priority: expected
        auto_verify:
          items:
            - id: component_exists
              cmd: "test -f ui/src/components/detail/ClarificationHistoryCard.tsx && echo 'OK'"
              must: true
            - id: typecheck
              cmd: "cd ui && npm run typecheck 2>&1 | tail -10"
              must: false
        verifier:
          rubric:
            - id: component_quality
              text: "Does the component correctly show all states: pending, answered, skipped?"
            - id: accessibility
              text: "Is the expand/collapse button properly accessible (aria-expanded)?"
        retry:
          max_attempts: 2

      - id: T-20
        title: "Wire ClarificationHistoryCard into the activity feed"
        task_context: >
          Render ClarificationHistoryCard in the activity feed for each
          clarification_responded event.

          Changes required in ui/src/components/detail/RunDetail.tsx (or the
          activity sub-component that renders event cards):
          1. Import useClarificationHistory and ClarificationHistoryCard.
          2. Call useClarificationHistory(runId, taskId) at the top of the
             component to get history data.
          3. In the event-rendering section, add a branch for
             'clarification_responded' that:
             - Finds the matching history item by request_id
             - Renders ClarificationHistoryCard with item and roundNumber
             - Falls back to a simple div if history item not found
          4. If useClarificationHistory returns an error, render a fallback div.

          Minimize changes to RunDetail.tsx; only add the new rendering branch
          and hook call.

          See docs/enhanced-clarifications/steps/step-05.md Task 5 for details.
        requirements:
          - id: R52
            desc: "ClarificationHistoryCard appears in activity feed after clarification_responded event"
            priority: critical
          - id: R53
            desc: "History endpoint error renders fallback (no crash)"
            priority: expected
          - id: R54
            desc: "Other activity events render exactly as before (no regression)"
            priority: critical
        auto_verify:
          items:
            - id: typecheck
              cmd: "cd ui && npm run typecheck 2>&1 | tail -10"
              must: false
        verifier:
          rubric:
            - id: activity_feed
              text: "Does the ClarificationHistoryCard appear at the correct chronological position in the feed?"
            - id: no_regression
              text: "Do all other event types still render correctly?"
        retry:
          max_attempts: 2
