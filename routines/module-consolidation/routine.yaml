  # ── Phase 6: Absorb scaffolding/ + agents/ → runners/ ─────────────────────
  - id: "S-06"
    title: "Phase 6: Absorb scaffolding/ + agents/ (profiles) → runners/"
    step_context: |
      Move workspace setup and agent profiles into runners module.

      CRITICAL LAYERING VIOLATION: agents/schemas.py imports ApiModel from api/schemas.base.
      Runners cannot import from api/. Fix BEFORE moving any files.
      Decision: Replace ApiModel with pydantic.BaseModel in agents/schemas.py (Option A).

      CRITICAL: db/migrations/env.py imports from agents.models for Alembic table discovery.
      Must update this file to runners.profiles.models after the move.

      See docs/module-consolidation/steps/step-06-plan.md for guidance.

    tasks:
      - id: "T-01"
        title: "Fix ApiModel Violation and Absorb scaffolding/agents into runners/"
        task_context: |
          PREREQUISITE FIX FIRST: agents/schemas.py imports ApiModel from api/schemas.base.
          Before moving anything, replace this with pydantic.BaseModel in agents/schemas.py.
          Verify no api/ imports remain in agents/ after this fix.

          Then absorb scaffolding/ and agents/ into runners/:

          TARGET STRUCTURE:
            src/orchestrator/runners/
              scaffolding/
                __init__.py
                workspace_setup.py ← from scaffolding/ (audit to find exact filename)
              profiles/
                __init__.py
                models.py    ← from agents/models.py
                schemas.py   ← from agents/schemas.py (with BaseModel fix applied)
                registry.py  ← from agents/registry.py (if exists)
                service.py   ← from agents/service.py (if exists)
                resolution.py ← from agents/resolution.py (if exists)
                errors.py    ← from agents/errors.py (if exists)

          CRITICAL CONSUMER: db/migrations/env.py imports from agents.models for Alembic.
          Add it explicitly to your consumer update list.

          STEPS:
          1. Fix ApiModel: replace with pydantic.BaseModel in agents/schemas.py
          2. Verify no api/ imports remain in agents/
          3. Create runners/scaffolding/ and runners/profiles/ sub-packages
          4. Move files into sub-packages
          5. Update runners/__init__.py with re-exports for new sub-packages
          6. Find ALL consumers:
             grep -rn "from orchestrator.scaffolding\|from orchestrator.agents" src/ tests/
             SPECIAL: check db/migrations/env.py and alembic/versions/*.py
          7. Update all consumers including db/migrations/env.py
          8. Delete scaffolding/ and agents/ directories
          9. Run full test suite
        requirements:
          - id: "R1"
            desc: "ApiModel layering violation fixed: no api/ imports in agents/schemas.py or anywhere in runners/"
            priority: critical
          - id: "R2"
            desc: "runners/scaffolding/ sub-package exists with workspace setup content"
            priority: critical
          - id: "R3"
            desc: "runners/profiles/ sub-package exists with agent profile models, schemas, and registry"
            priority: critical
          - id: "R4"
            desc: "scaffolding/ and agents/ directories deleted; db/migrations/env.py updated to runners.profiles.models"
            priority: critical
          - id: "R5"
            desc: "All tests pass after absorption"
            priority: critical
        auto_verify:
          items:
            - id: "no_api_imports_in_runners"
              cmd: "bash -c '! grep -rn \"from orchestrator.api\" src/orchestrator/runners/agents/'"
              must: true
            - id: "runners_scaffolding_importable"
              cmd: "uv run python -c \"import orchestrator.runners.scaffolding; print('runners.scaffolding OK')\""
              must: true
            - id: "runners_profiles_importable"
              cmd: "uv run python -c \"import orchestrator.runners.profiles; print('runners.profiles OK')\""
              must: true
            - id: "no_scaffolding_dir"
              cmd: "bash -c 'test ! -d src/orchestrator/scaffolding'"
              must: true
            - id: "no_agents_dir"
              cmd: "bash -c 'test ! -d src/orchestrator/agents'"
              must: true
            - id: "no_old_scaffolding_imports"
              cmd: "bash -c '! grep -rn \"from orchestrator.scaffolding\" src/ tests/'"
              must: true
            - id: "no_old_agents_imports"
              cmd: "bash -c '! grep -rn \"from orchestrator.agents\" src/ tests/'"
              must: true
            - id: "tests_pass"
              cmd: "uv run pytest tests/ -q --tb=short"
              must: true
        verifier:
          rubric:
            - id: "R1"
              text: "R1 — A: grep confirms zero api/ imports in runners/; agents/schemas.py uses pydantic.BaseModel. Read the file to confirm the fix. B: violation fixed in schemas.py but another runners/ file imports from api/."
            - id: "R2"
              text: "R2 — A: runners/scaffolding/ sub-package with correct content, importable. B: sub-package exists but incomplete."
            - id: "R3"
              text: "R3 — A: runners/profiles/ with models, schemas, and other agent profile files; all importable. B: sub-package exists but some files missing."
            - id: "R4"
              text: "R4 — A: Both original dirs deleted; db/migrations/env.py updated to point to runners.profiles.models (read migrations/env.py to confirm). B: dirs deleted but migrations/env.py still references orchestrator.agents."
            - id: "R5"
              text: "R5 — A: Full test suite passes. B: ≤2 non-critical failures."
          submission_template:
            grade_scale: [A, B, C, D, F]
            require_reason_if_below: "A"
            require_remediation_if_below: "B"
        retry:
          max_attempts: 2

  # ── Phase 7: Restructure workflow/ Internals ───────────────────────────────
  - id: "S-07"
    title: "Phase 7: Restructure workflow/ Internals"
    step_context: |
      Internal restructuring of workflow/ into engine/, events/, signals/, agent/ sub-packages.
      No external import changes — all access via workflow/__init__.py.

      CRITICAL: Audit ALL symbols before writing __init__.py files.
        events.py exports ~35 symbols (not 11). signals/ must include SignalQueue.
      CRITICAL: Move LoopAction AND NoTaskReason together to signals/runtime.py.
      SPECIAL: After Phase 5 moved mcp to api/, check if api/mcp/tools.py needs
               updating if workflow.clarifications moved.

      See docs/module-consolidation/steps/step-07-plan.md for file mappings.

    tasks:
      - id: "T-01"
        title: "Reorganize workflow/ into engine/events/signals/agent Sub-Packages"
        task_context: |
          Internal restructuring — no external API changes. All public symbols remain
          accessible via workflow/__init__.py.

          CRITICAL FIRST STEP: Audit current workflow/ to enumerate ALL exported symbols.
          Run: grep -rn "^from orchestrator.workflow import\|^from orchestrator.workflow " src/ tests/
          Every symbol found must be re-exported from workflow/__init__.py after the move.

          TARGET STRUCTURE (see architecture.md for canonical layout):
            workflow/
              engine/    ← engine.py, transitions.py, gates.py, grades.py, condition_evaluator.py, errors.py
              events/    ← ALL events types and logger (audit events.py for ~35 symbols first)
              signals/   ← signals.py, handlers.py, runtime.py
                           runtime.py gets BOTH NoTaskReason AND LoopAction (move together)
              agent/     ← prompts.py, templates.py, context_builder.py, clarifications.py,
                           auto_verify.py, summary_cache.py
              artifacts/ ← already exists from Phase 4 — DO NOT MOVE
              __init__.py ← MUST re-export ALL previously-public symbols exhaustively

          MOVE LoopAction WITH NoTaskReason: These are coupled (C6 completion).
          Both go to workflow/signals/runtime.py.

          AFTER MOVING: Check if api/mcp/tools.py imports from workflow.clarifications
          (which is moving to workflow/agent/clarifications.py). Update if needed.

          Verify exhaustiveness: from orchestrator.workflow import X for every symbol
          that was importable before restructuring.
        requirements:
          - id: "R1"
            desc: "workflow/engine/, workflow/events/, workflow/signals/, workflow/agent/ sub-packages exist with correct content"
            priority: critical
          - id: "R2"
            desc: "workflow/__init__.py re-exports ALL previously-public symbols exhaustively; no external callers need updating"
            priority: critical
          - id: "R3"
            desc: "NoTaskReason AND LoopAction both moved to workflow/signals/runtime.py; accessible via workflow top-level"
            priority: critical
          - id: "R4"
            desc: "All tests pass — no external import breakage caused by restructuring"
            priority: critical
        auto_verify:
          items:
            - id: "workflow_engine_importable"
              cmd: "uv run python -c \"import orchestrator.workflow.engine; print('workflow.engine OK')\""
              must: true
            - id: "workflow_events_importable"
              cmd: "uv run python -c \"import orchestrator.workflow.events; print('workflow.events OK')\""
              must: true
            - id: "workflow_signals_importable"
              cmd: "uv run python -c \"import orchestrator.workflow.signals; print('workflow.signals OK')\""
              must: true
            - id: "workflow_agent_importable"
              cmd: "uv run python -c \"import orchestrator.workflow.agent; print('workflow.agent OK')\""
              must: true
            - id: "no_task_reason_via_workflow"
              cmd: "uv run python -c \"from orchestrator.workflow import NoTaskReason; assert NoTaskReason is not None; print('NoTaskReason OK')\""
              must: true
            - id: "loop_action_in_signals"
              cmd: "uv run python -c \"from orchestrator.workflow.signals import runtime; assert hasattr(runtime, 'LoopAction') or True; print('OK')\""
              must: false
            - id: "tests_pass"
              cmd: "uv run pytest tests/ -q --tb=short"
              must: true
        verifier:
          rubric:
            - id: "R1"
              text: "R1 — A: All 4 sub-packages exist with correct files; imports work. B: Sub-packages exist but some files missing or in wrong location."
            - id: "R2"
              text: "R2 — A: workflow/__init__.py re-exports all public symbols; grep of src/ and tests/ for 'from orchestrator.workflow import' confirms no import errors. The exhaustive symbol audit was done before writing __init__.py. B: Most symbols re-exported but 1-3 missing."
            - id: "R3"
              text: "R3 — A: Both NoTaskReason and LoopAction in workflow/signals/runtime.py; accessible via 'from orchestrator.workflow import NoTaskReason' and LoopAction. B: NoTaskReason moved but LoopAction missed."
            - id: "R4"
              text: "R4 — A: Full test suite passes with no regressions. B: ≤2 non-critical failures."
          submission_template:
            grade_scale: [A, B, C, D, F]
            require_reason_if_below: "A"
            require_remediation_if_below: "B"
        retry:
          max_attempts: 2

  # ── Phase 8: Restructure db/ Internals ────────────────────────────────────
  - id: "S-08"
    title: "Phase 8: Restructure db/ Internals"
    step_context: |
      Internal restructuring of db/ into orm/, access/, recovery/ sub-packages.
      No external API changes.

      CRITICAL SHADOWING BUG: db/recovery.py flat file and db/recovery/ directory
      CANNOT COEXIST. Creating the directory shadows the flat file immediately,
      breaking all imports. Must delete flat file atomically when creating directory.
      Update ALL consumers BEFORE creating the directory.

      CONSUMERS TO UPDATE FIRST (before creating db/recovery/ dir):
      - scripts/restore_from_journal.py
      - scripts/seed_db.py
      - scripts/worker.py
      - Integration tests (grep to find all)

      See docs/module-consolidation/steps/step-08-plan.md for guidance.

    tasks:
      - id: "T-01"
        title: "Reorganize db/ into orm/access/recovery Sub-Packages"
        task_context: |
          Internal restructuring of db/ module. No external API changes.

          TARGET STRUCTURE:
            src/orchestrator/db/
              orm/         ← ORM model definitions (not for direct external use)
                __init__.py
                models.py  ← ORM table models
                base.py    ← SQLAlchemy declarative base
              access/      ← data access abstractions
                __init__.py
                repositories.py
                connection.py
                event_store.py (if separate)
              recovery/    ← recovery procedures
                __init__.py
                event_journal.py
                journal_replay.py
                recovery.py (recovery service)
                backup.py (if exists)
              __init__.py  ← re-exports only public APIs; ORM models NOT exposed

          EXECUTE IN THIS EXACT ORDER (to avoid shadowing bug):
          1. Find ALL consumers of db.recovery (flat file):
             grep -rn "from orchestrator.db.recovery\|from orchestrator.db import recovery" src/ tests/ scripts/
             Include: scripts/restore_from_journal.py, scripts/seed_db.py, scripts/worker.py
          2. Update all consumer imports to point to new recovery sub-package paths
          3. Run tests to verify consumers work
          4. Delete flat db/recovery.py (ATOMICALLY with next step)
          5. Create db/recovery/ directory and files
          6. Create db/orm/ and db/access/ sub-packages
          7. Move files into sub-packages
          8. Write db/__init__.py with public re-exports (hide ORM models)
          9. Run full test suite

          Also update db/migrations/env.py if it references old db paths or agents.models
          (Phase 6 should have handled agents.models but verify).
        requirements:
          - id: "R1"
            desc: "db/orm/, db/access/, db/recovery/ sub-packages exist with correct content"
            priority: critical
          - id: "R2"
            desc: "Flat db/recovery.py deleted BEFORE db/recovery/ directory was created; all scripts/ and test consumers updated first"
            priority: critical
          - id: "R3"
            desc: "db/__init__.py re-exports only public repository/access APIs; raw ORM models not in public interface"
            priority: critical
          - id: "R4"
            desc: "All tests pass — no external import breakage"
            priority: critical
        auto_verify:
          items:
            - id: "db_orm_importable"
              cmd: "uv run python -c \"import orchestrator.db.orm; print('db.orm OK')\""
              must: true
            - id: "db_access_importable"
              cmd: "uv run python -c \"import orchestrator.db.access; print('db.access OK')\""
              must: true
            - id: "db_recovery_importable"
              cmd: "uv run python -c \"import orchestrator.db.recovery; print('db.recovery OK')\""
              must: true
            - id: "no_flat_recovery_file"
              cmd: "bash -c 'test ! -f src/orchestrator/db/recovery.py'"
              must: true
            - id: "db_recovery_is_dir"
              cmd: "test -d src/orchestrator/db/recovery"
              must: true
            - id: "tests_pass"
              cmd: "uv run pytest tests/ -q --tb=short"
              must: true
        verifier:
          rubric:
            - id: "R1"
              text: "R1 — A: All 3 sub-packages exist with appropriate files; all importable. B: Sub-packages exist but some files missing."
            - id: "R2"
              text: "R2 — A: Flat recovery.py is gone (test -f confirms); the creation order was correct (consumers updated first, then flat file deleted, then directory created). Ask the builder to confirm the execution order. B: Directory created but flat file still exists, OR consumers were not updated before directory creation."
            - id: "R3"
              text: "R3 — A: db/__init__.py has public API re-exports; ORM model classes (RunModel, StepModel, etc.) are NOT in db/__all__; external callers use repository interfaces. B: __init__.py exists but ORM models still exposed."
            - id: "R4"
              text: "R4 — A: Full test suite passes. B: ≤2 non-critical failures."
          submission_template:
            grade_scale: [A, B, C, D, F]
            require_reason_if_below: "A"
            require_remediation_if_below: "B"
        retry:
          max_attempts: 2

