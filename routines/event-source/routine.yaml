            require_remediation_if_below: "C"

      - id: "T-02"
        title: "EventSignalTransport, remove _active_run_ids, wire transport, add migration"
        task_context: |
          Implement EventSignalTransport in src/orchestrator/workflow/signals/signals.py:
          - enqueue(run_id, signal_type, payload): appends SignalEnqueued event to SqliteEventStore;
            raises domain error if run is not active (checked via RunLifecycleProjector)
          - drain(run_id): queries events_v2 for SignalEnqueued events with no matching
            SignalProcessed (by enqueued_position) for the given run_id; appends SignalProcessed
            events to mark them consumed; returns PendingSignal list in FIFO order. Idempotent.
          Inject RunLifecycleProjector and SqliteEventStore via constructor.

          In src/orchestrator/workflow/signals/consumer.py:
          - Remove module-level _active_run_ids set, register_active_run, unregister_active_run,
            has_active_workflow functions and all their call sites
