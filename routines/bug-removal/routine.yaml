          1. Add types to ui/src/types/ (create types/envFiles.ts or extend existing):
             - EnvFile: { path: string, masked_value: string, key: string }
             - EnvSnapshot: { id: string, timestamp: string, agent: string, files: EnvFile[] }
             - EnvDefaultTarget: { target_path: string }
          2. Open ui/src/api/client.ts and add five functions:
             - getEnvFiles(runId): GET /api/runs/{runId}/env-files
             - getEnvSnapshots(runId): GET /api/runs/{runId}/env-snapshots
             - getEnvDefaultTarget(runId): GET /api/runs/{runId}/env-default-target
             - revertEnvSnapshot(runId, snapshotId): POST /api/runs/{runId}/env-snapshots/{snapshotId}/revert
             - copyBackEnvFiles(runId, targetPath): POST /api/runs/{runId}/env-copy-back

          Security: Do not display unmasked env values. Always show masked_value only.

          Verification:
          - npx tsc --noEmit exits 0
        requirements:
