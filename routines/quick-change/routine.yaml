routine:
  id: "quick-change"
  name: "Quick Change"
  description: |
    A streamlined routine for making targeted changes. Captures intent, establishes
    measurable success criteria, then carries out and verifies the work.
    Artifacts live in docs/{{feature}}/.

  inputs:
    - name: feature
      required: true
      description: "Short name for this change (used as docs/{{feature}}/ directory)"
    - name: request
      required: true
      description: "The change request — written verbatim into intent.md"

  clarifications:
    artifact_path: "docs/{{feature}}/clarifications.md"

  steps:
    - id: "S-01"
      title: "Capture Intent"
      step_context: |
        Write the intent file and clarify the request before any work begins.
        The request text must be preserved verbatim — do not paraphrase or summarise it.
      tasks:
        - id: "T-01"
          title: "Write Intent File"
          task_context: |
            Your job is to record and clarify the intent of this change request.

            CHANGE REQUEST:
            {{request}}

            Steps:
            1. Create docs/{{feature}}/ if it does not exist.
            2. Write the CHANGE REQUEST above verbatim into docs/{{feature}}/intent.md.
               Copy the exact text — do not paraphrase, reformat, or summarise it.
            3. Read it back and decide whether you understand the intent well enough
               to define success criteria and carry out the work without guessing.
               - If there are genuine ambiguities, call orchestrator_request_clarification
                 with your questions, then stop. Do NOT mark R1 or R2 done yet.
               - If the request is already clear, mark both requirements done and submit.
          requirements:
            - id: "R1"
              desc: "docs/{{feature}}/intent.md exists and contains the original request verbatim"
              priority: critical
            - id: "R2"
              desc: "All ambiguities resolved — either by clarification or because the request is already clear"
              priority: critical
          auto_verify:
            items:
              - id: "intent_exists"
                cmd: "test -f docs/{{feature}}/intent.md"
                must: true
          retry:
            max_attempts: 2

    - id: "S-02"
      title: "Set Success Criteria"
      step_context: |
        Define what "done" looks like so the verifier in the next step can grade the
        work objectively. Criteria must be concrete and verifiable, not vague goals.
      tasks:
        - id: "T-01"
          title: "Write Success Criteria File"
          context_from:
            - artifact: "docs/{{feature}}/intent.md"
              as: "intent"
              required: true
          task_context: |
            Create docs/{{feature}}/success-criteria.md based on the intent.

            INTENT:
            {{context.intent}}

            Each criterion must be concrete and checkable — either by running a command,
            inspecting a file, or reading output. Where possible, describe the check explicitly.

            Good examples:
            - "The `login` function validates the token signature before returning a user object"
            - "Running `pytest tests/test_auth.py` passes with zero failures"
            - "The UI renders an error banner when the API returns 401"

            Bad examples:
            - "Code quality is improved"
            - "The feature works correctly"

            Every criterion must map back to something in the intent — do not add out-of-scope criteria.
          requirements:
            - id: "R1"
              desc: "docs/{{feature}}/success-criteria.md exists with at least one concrete, verifiable criterion"
              priority: critical
            - id: "R2"
              desc: "Every criterion traces back to the intent — no out-of-scope criteria included"
              priority: expected
          auto_verify:
            items:
              - id: "criteria_exists"
                cmd: "test -f docs/{{feature}}/success-criteria.md"
                must: true
          verifier:
            rubric:
              - id: "alignment"
                text: |
                  R1 — A: success-criteria.md exists and each criterion is specific and verifiable
                  (references concrete files, commands, or observable behaviour).
                  B: file exists but criteria are vague ("it works", "code is clean").
                  F: file is missing or contains only headings with no real content.
                  R2 — A: every criterion has a clear basis in the intent.
                  B: most criteria are in scope but one or two feel invented.
                  F: criteria are largely unrelated to the intent.
          retry:
            max_attempts: 2

    - id: "S-03"
      title: "Carry Out Work"
      step_context: |
        Implement the change, then the verifier checks every success criterion.
        If gaps remain, the verifier fails and returns specific feedback to the builder.
      tasks:
        - id: "T-01"
          title: "Implement the Change"
          context_from:
            - artifact: "docs/{{feature}}/intent.md"
              as: "intent"
              required: true
            - artifact: "docs/{{feature}}/success-criteria.md"
              as: "success_criteria"
              required: true
          task_context: |
            Implement the change described in the intent.

            INTENT:
            {{context.intent}}

            SUCCESS CRITERIA:
            {{context.success_criteria}}

            Steps:
            1. If the change is non-trivial, first write a brief plan in
               docs/{{feature}}/plan.md listing the steps you will take. Skip this for
               simple single-file changes.
            2. Carry out all changes needed to satisfy every criterion in success-criteria.md.
            3. Self-check before submitting: go through each criterion and confirm it is met.
               If a criterion is not yet met, keep working until it is.
          requirements:
            - id: "R1"
              desc: "Every success criterion in docs/{{feature}}/success-criteria.md is satisfied"
              priority: critical
            - id: "R2"
              desc: "Changes are within the scope of intent.md — no unrelated modifications"
              priority: expected
            - id: "R3"
              desc: "If a plan was needed, docs/{{feature}}/plan.md exists and was followed"
              priority: nice
          verifier:
            rubric:
              - id: "criteria_met"
                text: |
                  R1 — Check every criterion in success-criteria.md against the current state
                  of the codebase or files.
                  A: every critical criterion is fully met.
                  B: most criteria met but one or two expected criteria fall short.
                  C: critical criteria are only partially met.
                  F: one or more critical criteria are not met.

                  IMPORTANT: If any criteria are NOT met, list them explicitly as gaps and describe
                  exactly what still needs to be done. This feedback goes to the builder on retry —
                  be specific enough that they can fix it without further clarification.
              - id: "scope"
                text: |
                  R2 — A: all changes are within scope; no unrelated files modified.
                  B: mostly in scope but one minor unrelated change present.
                  F: significant out-of-scope changes made.
            submission_template:
              grade_scale: [A, B, C, D, F]
              require_reason_if_below: A
              require_remediation_if_below: B
          retry:
            max_attempts: 3
