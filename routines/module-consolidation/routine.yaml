          PREFLIGHT: Verify Phase 2 complete: test ! -d src/orchestrator/repos
          If repos/ still exists, stop — Phase 2 must run first.

          TARGET STRUCTURE:
            src/orchestrator/api/
              metrics.py     ← from metrics/ (flat module, not sub-package)
              mcp/
                __init__.py
                server.py    ← from mcp/server.py
                tools.py     ← from mcp/tools.py (UPDATE repos import → git if repos moved)
                clarification_tools.py ← from mcp/ if exists

          STEPS:
          1. Preflight: verify repos/ directory is gone (Phase 2 complete)
          2. Create api/mcp/ sub-package
          3. Move mcp/ files into api/mcp/, updating any repos→git imports as needed
          4. Create api/metrics.py from metrics/ content (flatten to single file)
          5. Update api/__init__.py to re-export mcp and metrics symbols
          6. Find all consumers: grep -rn "from orchestrator.metrics\|from orchestrator.mcp" src/ tests/
          7. Update all consumers
          8. Delete metrics/ and mcp/ directories
          9. Run full test suite
        requirements:
          - id: "R1"
            desc: "api/metrics.py exists with cost calculation content and is importable"
            priority: critical
          - id: "R2"
            desc: "api/mcp/ sub-package exists with MCP server tools and is importable"
            priority: critical
          - id: "R3"
            desc: "metrics/ and mcp/ directories deleted entirely"
            priority: critical
          - id: "R4"
            desc: "Zero imports of orchestrator.metrics or orchestrator.mcp remain in src/ or tests/"
            priority: critical
          - id: "R5"
            desc: "All tests pass after absorption"
            priority: critical
        auto_verify:
          items:
            - id: "preflight_repos_gone"
              cmd: "bash -c 'test ! -d src/orchestrator/repos'"
              must: true
            - id: "api_metrics_importable"
              cmd: "uv run python -c \"import orchestrator.api.metrics; print('api.metrics OK')\""
              must: true
            - id: "api_mcp_importable"
              cmd: "uv run python -c \"import orchestrator.api.mcp; print('api.mcp OK')\""
              must: true
            - id: "no_metrics_dir"
              cmd: "bash -c 'test ! -d src/orchestrator/metrics'"
              must: true
            - id: "no_mcp_dir"
              cmd: "bash -c 'test ! -d src/orchestrator/mcp'"
