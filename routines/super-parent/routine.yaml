routine:
  id: "super-parent"
  name: "Super Parent Sequential Oversight"
  description: |
    Turn one high-level instruction into bounded, verifiable child runs. The parent
    routine maintains target inventory, selects one useful next slice, creates an
    embedded child routine, waits for child state/evidence, refreshes understanding,
    integrates accepted child work, loops to the next unresolved slice, and writes
    the final report once the target inventory is resolved. V1 runs one child
    implementation run at a time, routes mechanical parent bookkeeping to cheaper
    model profiles, and keeps compact machine state separate from rich Markdown
    audit documents.

  strict_validation: true

  inputs:
    - name: instruction
      required: true
      description: "The high-level user job to complete."
    - name: source_artifacts
      required: false
      default: []
      description: "Optional source documents or file paths the parent should inspect."
    - name: max_child_runs
      required: false
      default: 20
      description: "Guardrail limit for child runs in this parent job."

  steps:
    - id: "SP-01"
      title: "Intake Inventory"
      step_context: |
        Build a durable target inventory from the instruction and source artifacts. Keep IDs stable
        because child slices and evidence refer back to them.
      tasks:
        - id: "T-01"
          title: "Create Target Inventory"
          profile: "architect"
          mcp_servers:
            - name: "orchestrator"
              url: "http://127.0.0.1:8000/mcp/sse"
            - name: "codesight"
              command: "npx"
              args: ["-y", "codesight", "--mcp"]
              cwd: "worktree"
              timeout_seconds: 60
          available_tools:
            - "orchestrator_update_parent_oversight"
          task_context: |
            Read the user instruction and source artifacts. Write `docs/super-parent/current-understanding.md`
            with the original instruction, assumptions, target inventory, out-of-scope items, and initial
            risks. Call `orchestrator_update_parent_oversight` with matching `target_inventory` and
            `current_understanding` payloads. Keep the persisted `current_understanding` compact and
            structured; the Markdown file is a human-readable rollup, not the machine source of truth for
            later steps. Store a machine ledger under `current_understanding.ledger` with only compact
            control-flow facts: active child run ID, parent slice ID, child evidence readiness, child
            terminal status, merge queue size, accepted/rejected/abandoned child IDs, unresolved inventory
            IDs, next allowed parent action, current blocker, and a short evidence digest. Separate concrete bugs, missing tests, design improvements, policy gaps,
            reproduction targets, and clarification needs. Assign stable IDs such as `INV-001`.
          requirements:
            - id: "R1"
              desc: "Inventory contains stable IDs for every in-scope target and separates target classes."
              priority: critical
            - id: "R2"
              desc: "Out-of-scope and clarification-needed items are explicit instead of silently dropped."
              priority: critical
            - id: "R3"
              desc: "`docs/super-parent/current-understanding.md` records original instruction and current assumptions."
              priority: critical
          artifacts:
            - path: "docs/super-parent/current-understanding.md"
              required: true
          auto_verify:
            items:
              - id: "understanding_exists"
                cmd: "test -f docs/super-parent/current-understanding.md"
                must: true
          retry:
            max_attempts: 2

    - id: "SP-02"
      title: "Select Next Slice"
      step_context: |
        Choose the next bounded child slice using the current inventory and evidence. Do not decompose the
        whole job before evidence justifies the expansion.
      tasks:
        - id: "T-01"
          title: "Write Slice Brief"
          profile: "architect"
          mcp_servers:
            - name: "orchestrator"
              url: "http://127.0.0.1:8000/mcp/sse"
            - name: "codesight"
              command: "npx"
              args: ["-y", "codesight", "--mcp"]
              cwd: "worktree"
              timeout_seconds: 60
          available_tools:
            - "orchestrator_get_parent_oversight"
          task_context: |
            Read the persisted oversight snapshot with `orchestrator_get_parent_oversight` before selecting
            work. Treat the compact ledger and `next_parent_action` fields as the control-flow source of
            truth; read rich Markdown only when the current choice needs narrative detail that is absent
            from the ledger. Select one next child slice only when the legal next parent action is to
            launch a child. Write `docs/super-parent/next-slice.md` with the assumption
            under test, target IDs, expected files or subsystems, verifiable requirements, stop/replan
            conditions, evidence artifacts, and the child workflow template that should execute it. Prefer
            slices that reduce uncertainty and exercise a real execution surface. Keep implementation
            slices small enough for one child task to finish: prefer one subsystem, one API surface, or a
            narrow file cluster with a focused test. If the next inventory item needs broad design,
            multi-step implementation, or touches more than one subsystem, select an investigation or
            `planning_to_implementation_brief` child first to produce a smaller implementation brief
            instead of launching a large one-step coding child. Use `implementation_slice` for generic
            narrow implementation work when no specialized template fits, and use
            `partial_progress_recovery` when the next child should package dirty or turn-limited work
            before the parent decides whether to continue or replan. Treat
            `scripts/run_child_evidence.py` as the standard child evidence-capture tool: slices with
            verification commands should expect the generated child to run those commands through the
            helper so command logs and `run.evidence.v1` stay synchronized without manual log reads.
          requirements:
            - id: "R1"
              desc: "Slice is bounded to one assumption, one subsystem, or a planning child that creates a smaller implementation brief."
              priority: critical
            - id: "R2"
              desc: "Slice brief defines success, bug-not-reproduced, environment-blocked, and replan evidence."
              priority: critical
            - id: "R3"
              desc: "Slice brief names the real verification surface, not only file existence."
              priority: critical
          artifacts:
            - path: "docs/super-parent/next-slice.md"
              required: true
          auto_verify:
            items:
              - id: "next_slice_exists"
                cmd: "test -f docs/super-parent/next-slice.md"
                must: true
          retry:
            max_attempts: 2

    - id: "SP-03"
      title: "Launch Child Run"
      step_context: |
        Convert the selected slice into an embedded child routine and create a linked child run through the
        orchestrator API or MCP tools. Child creation enqueues the child start automatically.
      tasks:
        - id: "T-01"
          title: "Create Embedded Child Routine"
          profile: "coder"
          mcp_servers:
            - name: "orchestrator"
              url: "http://127.0.0.1:8000/mcp/sse"
            - name: "codesight"
              command: "npx"
              args: ["-y", "codesight", "--mcp"]
              cwd: "worktree"
              timeout_seconds: 60
          available_tools:
            - "orchestrator_get_parent_oversight"
            - "orchestrator_create_child_from_template"
          task_context: |
            Read the persisted oversight snapshot and selected slice brief, then create a compact child
            slice spec and call `orchestrator_create_child_from_template`. Do not hand-author embedded child
            YAML when one of the server templates fits; the server compiles the spec into a child routine
            with stable requirement IDs, auto-verify, retry limits, stop/replan guidance, and exact
            `run.evidence.v1` validation. The slice spec must include `template_id`, `slice_id`, `goal`,
            target inventory IDs, allowed paths, expected files, verification commands, evidence
            expectations, stop conditions, and real execution surface. Do not call the raw embedded-routine
            child creation tool unless this routine is explicitly changed to grant it; if no template fits,
            record a replan or clarification instead. Use the MCP tool schema as the canonical argument
            contract before calling the creation tool; routine text defines action constraints, not a
            duplicate schema. Do not pass unsupported fields; child creation enqueues start automatically.
            Before creating a child, enforce the sequential-child invariant from the oversight snapshot:
            if any linked child is unresolved (for example `active_child_run_ids` is non-empty,
            `terminal_guard.blocking_child_run_ids` is non-empty, `attention_items` contains a
            `child_not_terminal:*` reason, or `next_parent_action` is not `launch_child`), do not call
            `orchestrator_create_child_from_template`. Record the blocked launch decision, keep the
            current slice brief for audit, and submit so the parent can return to evidence review or child
            resolution first. Never try to work around the invariant by creating a parallel child.
            The server-provided child template makes `scripts/run_child_evidence.py`
            available to the child and includes a ready-to-run helper command; do not ask children to
            redirect command output by hand and then read logs back unless the helper itself is blocked.
          requirements:
            - id: "R1"
              desc: "Child run is created from `orchestrator_create_child_from_template`; raw embedded-routine child creation is not used by default."
              priority: critical
            - id: "R2"
              desc: "Child run is linked to the parent with `parent_run_id` and `parent_slice_id`."
              priority: critical
            - id: "R3"
              desc: "Child routine requires a schema-valid `run.evidence.v1` bundle with exact service field names, exact enum values, matching slice/routine IDs, and a distinct outcome."
              priority: critical
            - id: "R4"
              desc: "The selected runner and runner config are preserved for the child, and child start is enqueued."
              priority: critical
          retry:
            max_attempts: 2

    - id: "SP-04"
      title: "Evaluate Evidence And Integrate"
      step_context: |
        Wait for child terminal or paused state, refresh deterministic oversight state, and integrate only
        accepted child work into the parent branch.
      tasks:
        - id: "T-01"
          title: "Evaluate Child Evidence"
          work_mode: "oversight"
          profile: "summarizer"
          mcp_servers:
            - name: "orchestrator"
              url: "http://127.0.0.1:8000/mcp/sse"
            - name: "codesight"
              command: "npx"
              args: ["-y", "codesight", "--mcp"]
              cwd: "worktree"
              timeout_seconds: 60
          available_tools:
            - "orchestrator_wait_for_run"
            - "orchestrator_get_run_evidence"
            - "orchestrator_refresh_parent_oversight"
            - "orchestrator_get_parent_oversight"
            - "orchestrator_update_parent_oversight"
            - "orchestrator_resolve_child_run"
            - "orchestrator_request_clarification"
            - "orchestrator_escalate_requirement"
          task_context: |
            Wait for the child run with `orchestrator_wait_for_run`, then collect evidence with
            `orchestrator_get_run_evidence` and refresh parent oversight with
            `orchestrator_refresh_parent_oversight`. Use at most one bounded wait call per attempt
            (`timeout_seconds` no higher than 300). If the child is still active after that wait,
            record the active child state in parent oversight and submit rather than repeatedly
            polling from the LLM context. Treat paused children as meaningful states. Update only
            `docs/super-parent/current-understanding.md` as a concise human rollup and call
            `orchestrator_update_parent_oversight` with compact structured state before asking for human
            input, accepting a child, or stopping. Keep `current_understanding.ledger` as the machine
            source of truth for active child run ID, slice ID, evidence readiness, terminal status, merge
            queue size, accepted/rejected/abandoned child IDs, unresolved inventory IDs, next allowed
            parent action, current blocker, and evidence digest. Do not append raw evidence dumps to the
            Markdown file; use the persisted oversight snapshot and validated evidence payloads as the machine state.
            This is an orchestration-only
            task: do not edit source code, tests, dependency files, lockfiles, migrations, UI files,
            routine files, generated child work, or child worktree files. If evidence exposes missing
            service behavior, record it as target inventory, a replan input, or a human action instead
            of implementing it in this parent task. If a child is paused because the runner or executor
            failed before child work began (for example API overload, rate limit, missing executor, or
            agent-not-available), do not reject or abandon it and do not launch a replacement child.
            Record that the existing child should be resumed when execution is kicked off again. If a
            child hit an agent turn limit, treat the service-provided synthetic evidence as
            `partial_progress` and inspect the listed changed files before deciding whether to continue,
            replan, or ask the human. If a child failed without schema-valid evidence for reasons tied
            to the child work, or requires a human decision, use `orchestrator_resolve_child_run` with
            `reject` or `abandon` before launching a replacement child when the oversight state clearly
            supports an autonomous replan and that replan is recorded. Use
            `orchestrator_request_clarification` or `orchestrator_escalate_requirement` only when the
            parent cannot make that decision from available evidence. Before high-risk MCP calls such as
            clarification, escalation, child resolution, or oversight updates, validate required fields,
            enum values, and allowed actions against the live MCP tool schema; if guidance conflicts, the
            tool schema is canonical and the routine should record the mismatch for follow-up. Clarification questions must be
            human-facing and concise: explain what the parent needed from the child, what the child did,
            what the parent needs the human to decide, and the actual options. Translate target inventory
            IDs into plain-language labels from the oversight state or slice brief; do not rely on IDs
            alone. For finite decisions, use a schema-supported select question with explicit options;
            do not encode choices inside a free-text question.
          requirements:
            - id: "R1"
              desc: "Evidence is collected from the child worktree and validated against the standard schema."
              priority: critical
            - id: "R2"
              desc: "Missing, malformed, or contradictory evidence becomes a replan or failure input."
              priority: critical
            - id: "R3"
              desc: "`bug_not_reproduced` asks the human with reproduction paths tried."
              priority: critical
            - id: "R4"
              desc: "Three failed or revision attempts for the same slice are declared stalled."
              priority: critical
            - id: "R5"
              desc: "Human clarification requests are concise, explain parent need and child result in plain language, and use select options for finite decisions."
              priority: critical
          artifacts:
            - path: "docs/super-parent/current-understanding.md"
              required: true
          retry:
            max_attempts: 2
        - id: "T-02"
          title: "Accept And Merge Child"
          work_mode: "oversight"
          profile: "summarizer"
          mcp_servers:
            - name: "orchestrator"
              url: "http://127.0.0.1:8000/mcp/sse"
            - name: "codesight"
              command: "npx"
              args: ["-y", "codesight", "--mcp"]
              cwd: "worktree"
              timeout_seconds: 60
          available_tools:
            - "orchestrator_get_parent_oversight"
            - "orchestrator_update_parent_oversight"
            - "orchestrator_accept_child_run"
            - "orchestrator_resolve_child_run"
          task_context: |
            Read the current parent oversight state first with `orchestrator_get_parent_oversight`. If child
            evidence supports acceptance and the child appears in the merge queue, call
            `orchestrator_accept_child_run` so the child branch merges into the parent worktree branch. Do
            not merge failed, paused, unsupported, or missing-evidence children, and do not merge directly
            to the source branch. Do not manually run `git merge`, resolve conflicts directly, inspect
            implementation internals, or edit source/tests. Merge conflicts become parent attention items.
            This task is orchestration-only. If there is no acceptable child to merge, use
            `orchestrator_resolve_child_run` to reject or abandon a non-accepted child when evidence
            supports that decision; otherwise record the no-op merge decision, keep the child unresolved
            for audit, and submit. Validate merge, resolve, and oversight-update arguments against the
            live MCP tool schema before calling them.
          requirements:
            - id: "R1"
              desc: "Accepted children merge only into the parent run branch from the parent worktree."
              priority: critical
            - id: "R2"
              desc: "Failed, paused, missing-evidence, or unsupported child outcomes remain unmerged and are rejected, abandoned, or recorded for audit."
              priority: critical
            - id: "R3"
              desc: "Merge conflicts are recorded as parent attention items rather than hidden."
              priority: critical
          retry:
            max_attempts: 2
      transitions:
        on_condition:
          - condition: "super_parent_has_unresolved_inventory"
            target: "SP-02"
            max_iterations: 20
            message: "Target inventory remains unresolved; select and launch the next child slice."

    - id: "SP-05"
      title: "Parent Validation And Report"
      step_context: |
        Validate the original instruction on the integrated parent branch and write the final report.
      tasks:
        - id: "T-01"
          title: "Run Integrated Validation"
          profile: "coder"
          mcp_servers:
            - name: "orchestrator"
              url: "http://127.0.0.1:8000/mcp/sse"
            - name: "codesight"
              command: "npx"
              args: ["-y", "codesight", "--mcp"]
              cwd: "worktree"
              timeout_seconds: 60
          available_tools:
            - "orchestrator_update_parent_oversight"
          task_context: |
            Run the work-specific validation surface and broad regression commands needed for the job. Validation
            must run on the integrated parent branch, not only on isolated child worktrees. Record the result
            with `orchestrator_update_parent_oversight` using `final_validation`, including
            `integrated_commit_sha`, `report_path`, non-empty `commands_run`, and non-empty `evidence_files`.
            The commit SHA must match the parent worktree HEAD, every passing command must have exit code 0,
            and the report/evidence paths must already exist under the parent worktree so the service can verify them.
          requirements:
            - id: "R1"
              desc: "Integrated validation covers the original instruction and accepted child verification surfaces."
              priority: critical
            - id: "R2"
              desc: "Failures are summarized with impact on the final outcome."
              priority: critical
          retry:
            max_attempts: 1
        - id: "T-02"
          title: "Write Final Report"
          profile: "summarizer"
          mcp_servers:
            - name: "codesight"
              command: "npx"
              args: ["-y", "codesight", "--mcp"]
              cwd: "worktree"
              timeout_seconds: 60
          task_context: |
            Write `docs/super-parent/final-report.md` with original instruction, final target inventory status,
            child runs, evidence consumed, files changed, final validation commands, remaining risks, human
            decisions, and clear success/blocked/failed outcome. Summarize from the compact oversight
            ledger and validated evidence first, then cite richer audit Markdown only for human-readable
            provenance details that are not present in the ledger.
          requirements:
            - id: "R1"
              desc: "Final report includes child run IDs, slice IDs, evidence paths, validation commands, and outcome."
              priority: critical
            - id: "R2"
              desc: "No terminal success is claimed while blocking child work, unmerged accepted children, or unresolved human actions remain."
              priority: critical
          artifacts:
            - path: "docs/super-parent/final-report.md"
              required: true
          auto_verify:
            items:
              - id: "final_report_exists"
                cmd: "test -f docs/super-parent/final-report.md"
                must: true
          retry:
            max_attempts: 1
