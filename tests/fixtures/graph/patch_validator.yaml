- name: patch_stale_neutral_lease_accepted
  given_events:
    - graph_patch_accepted: {patch_id: patch-neutral-lease, base_graph_position: 10}
    - lease_granted: {node_id: worker-neutral-lease, lease_id: lease-neutral-lease}
  when_command: null
  then_events:
    - graph_patch_accepted: {patch_id: patch-neutral-lease}
    - lease_granted: {node_id: worker-neutral-lease}
  then_projection: {lease-neutral-lease: active}

- name: patch_stale_neutral_heartbeat_accepted
  given_events:
    - heartbeat_recorded: {node_id: worker-neutral-heartbeat}
    - graph_patch_accepted: {patch_id: patch-neutral-heartbeat, base_graph_position: 20}
  when_command: null
  then_events:
    - heartbeat_recorded: {node_id: worker-neutral-heartbeat}
    - graph_patch_accepted: {patch_id: patch-neutral-heartbeat}
  then_projection: {}

- name: patch_stale_requirement_in_read_set_rejected
  given_events:
    - requirement_amended: {record_id: requirement-1, version: 2}
    - graph_patch_rejected: {patch_id: patch-requirement-conflict, reason: stale_read_set_conflict}
  when_command: null
  then_events:
    - requirement_amended: {record_id: requirement-1}
    - graph_patch_rejected: {patch_id: patch-requirement-conflict}
  then_projection: {}

- name: patch_stale_retired_region_rejected
  given_events:
    - region_marked_suspect: {region_node_ids: [region-1], reason: requirement_changed}
    - graph_patch_rejected: {patch_id: patch-region-conflict, reason: stale_read_set_conflict}
  when_command: null
  then_events:
    - region_marked_suspect: {region_node_ids: [region-1]}
    - graph_patch_rejected: {patch_id: patch-region-conflict}
  then_projection: {}

- name: patch_planner_create_gate_rejected
  given_events:
    - graph_patch_rejected: {patch_id: patch-create-gate, reason: actor_role_not_allowed}
  when_command: null
  then_events:
    - graph_patch_rejected: {patch_id: patch-create-gate}
  then_projection: {}

- name: patch_resource_claim_escalation_rejected
  given_events:
    - authority_narrowed: {node_id: worker-claim, mode: read}
    - graph_patch_rejected: {patch_id: patch-claim-escalation, reason: authority_scope_exceeded}
  when_command: null
  then_events:
    - authority_narrowed: {node_id: worker-claim}
    - graph_patch_rejected: {patch_id: patch-claim-escalation}
  then_projection: {}
